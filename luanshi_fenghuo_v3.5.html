<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乱世烽火 - 劳役营篇 (精简版)</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft YaHei';background:#1a1510;color:#d4c4a8;height:100vh;display:flex;flex-direction:column}
        
        /* ==================== 顶部状态栏（一体化设计）==================== */
        .top{
            background:#2a2015;
            padding:10px 15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid #3a2a1a;
            flex-shrink:0;
        }
        .top-title{color:#d4af37;font-weight:bold;font-size:1rem}
        
        /* 时间周期大图标 */
        .top-time{
            display:flex;
            align-items:center;
            gap:10px;
            background:#1a1510;
            padding:6px 14px;
            border-radius:20px;
            border:1px solid #3a2a1a;
        }
        .top-time-icon{font-size:1.3rem}
        .top-time-text{font-size:0.75rem;color:#8a7a6a}
        .top-time-num{font-size:0.9rem;color:#c9b896;font-weight:bold}
        
        /* 核心状态（体力/饱食/天数一体化） */
        .top-stats{
            display:flex;
            gap:8px;
        }
        .top-stat{
            display:flex;
            align-items:center;
            gap:5px;
            padding:5px 10px;
            background:#1a1510;
            border-radius:8px;
            border:1px solid #3a2a1a;
            font-size:0.8rem;
        }
        .top-stat.danger{background:#2a1515;border-color:#4a2020;color:#c97a7a}
        .top-stat.good{background:#1a2515;border-color:#3a4a2a;color:#9ab87a}
        
        /* ==================== 任务栏（紧凑标签）==================== */
        .tasks{
            background:#1a1510;
            padding:8px 15px;
            display:flex;
            gap:15px;
            border-bottom:1px solid #2a1a10;
            flex-shrink:0;
        }
        .task-tag{
            display:flex;
            align-items:center;
            gap:5px;
            font-size:0.7rem;
            color:#5a4a3a;
            padding:4px 10px;
            border-radius:12px;
            background:#0f0a08;
        }
        .task-tag.done{color:#9ab87a;background:#1a2515}
        .task-tag.urgent{color:#c9a87a;background:#251a10}
        
        /* ==================== 作息时间条（精简）==================== */
        .schedule{
            background:#0f0a08;
            display:flex;
            border-bottom:1px solid #2a1a10;
            flex-shrink:0;
        }
        .sch{
            flex:1;
            text-align:center;
            padding:6px 2px;
            font-size:0.55rem;
            color:#3a2a1a;
            cursor:pointer;
            transition:all 0.2s;
            position:relative;
        }
        .sch::after{
            content:'';
            position:absolute;
            bottom:0;
            left:50%;
            transform:translateX(-50%);
            width:6px;
            height:6px;
            border-radius:50%;
            background:#3a2a1a;
        }
        .sch:hover{background:#1a1510;color:#6a5a4a}
        .sch.current{color:#9ab87a}
        .sch.current::after{background:#9ab87a;box-shadow:0 0 8px rgba(154,184,122,0.5)}
        .sch.passed{color:#2a1a10}
        .sch-p{font-size:0.6rem;display:block}
        
        /* ==================== 主体区域==================== */
        .main{
            flex:1;
            display:flex;
            overflow:hidden;
            min-height:0;
        }
        
        /* 左侧区域（图标横排） */
        .side{
            width:50px;
            background:#0f0a08;
            border-right:1px solid #3a2a1a;
            padding:8px 5px;
            display:flex;
            flex-direction:column;
            gap:6px;
            overflow-y:auto;
        }
        .loc-btn{
            width:100%;
            aspect-ratio:1;
            background:#1a1510;
            border:1px solid #3a2a1a;
            border-radius:8px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:0.5rem;
            color:#8a7a6a;
            transition:all 0.2s;
            position:relative;
        }
        .loc-btn:hover{background:#2a2015;border-color:#5a4a3a;transform:scale(1.05)}
        .loc-btn.current{background:#2a3520;border-color:#9ab87a;color:#9ab87a}
        .loc-btn.locked,.loc-btn.forbidden{opacity:0.35;cursor:not-allowed}
        .loc-btn.forbidden{border-color:#4a2020;color:#6a4a4a}
        .loc-btn i{display:block;font-size:1rem;margin-bottom:2px}
        
        /* 区域状态标记 */
        .loc-btn .badge{
            position:absolute;
            top:-3px;
            right:-3px;
            font-size:0.45rem;
            padding:1px 3px;
            border-radius:4px;
            background:#3a1515;
            color:#c97a7a;
        }
        .loc-btn.locked .badge{background:#2a1515;color:#6a5a5a}
        .loc-btn.current .badge{display:none}
        
        /* 中央区域 */
        .center{
            flex:1;
            padding:10px;
            display:flex;
            flex-direction:column;
            gap:10px;
            overflow-y:auto;
            min-height:0;
        }
        
        /* 当前位置卡片 */
        .cur-card{
            background:#1a1510;
            border:1px solid #3a2a1a;
            border-radius:10px;
            padding:12px 15px;
            flex-shrink:0;
        }
        .cur-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:6px;
        }
        .cur-name{
            font-size:0.95rem;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .cur-name i{font-size:1.2rem}
        .cur-tag{
            padding:3px 10px;
            border-radius:12px;
            font-size:0.65rem;
        }
        .cur-tag.work{background:#251a10;color:#c9a87a}
        .cur-tag.rest{background:#151a10;color:#7ac9a8}
        .cur-tag.danger{background:#251010;color:#c97a7a}
        .cur-tag.night{background:#101525;color:#a8a8c9}
        .cur-env{font-size:0.75rem;color:#6a5a4a;font-style:italic}
        
        /* 遭遇列表（卡片网格） */
        .encounters{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
            gap:8px;
        }
        .enc{
            background:#1a1510;
            border:1px solid #3a2a1a;
            border-radius:10px;
            padding:12px;
            display:flex;
            flex-direction:column;
            gap:6px;
            cursor:pointer;
            transition:all 0.2s;
        }
        .enc:hover{
            background:#252015;
            border-color:#5a4a3a;
            transform:translateY(-2px);
        }
        .enc-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .enc-icon{font-size:1.4rem}
        .enc-tag{
            font-size:0.6rem;
            padding:2px 8px;
            border-radius:8px;
        }
        .enc-tag.talk{background:#1a2530;color:#7ab8c9}
        .enc-tag.work{background:#251a10;color:#c9a87a}
        .enc-tag.rest{background:#151a10;color:#7ac9a8}
        .enc-tag.caution{background:#251510;color:#c97a7a}
        .enc-tag.steal{background:#251010;color:#c97a7a}
        .enc-name{font-size:0.85rem}
        .enc-desc{font-size:0.65rem;color:#6a5a4a}
        
        /* 逃跑面板（可折叠） */
        .escape-panel{
            background:#1a1510;
            border:1px solid #3a2a1a;
            border-radius:10px;
            overflow:hidden;
            flex-shrink:0;
        }
        .escape-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 15px;
            cursor:pointer;
            transition:background 0.2s;
        }
        .escape-header:hover{background:#252015}
        .escape-title{
            font-size:0.85rem;
            color:#d4af37;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .escape-toggle{
            font-size:0.7rem;
            color:#6a5a4a;
            transition:transform 0.3s;
        }
        .escape-panel.open .escape-toggle{transform:rotate(180deg)}
        .escape-body{
            display:none;
            padding:0 15px 15px;
        }
        .escape-panel.open .escape-body{display:block}
        
        /* 逃跑条件 */
        .escape-conds{
            display:flex;
            gap:10px;
            margin-bottom:12px;
        }
        .cond{
            flex:1;
            text-align:center;
            padding:8px;
            background:#0f0a08;
            border-radius:8px;
            font-size:0.7rem;
        }
        .cond.done{background:#1a2515;color:#9ab87a}
        .cond.fail{color:#5a4a3a}
        
        /* 逃跑按钮 */
        .esc-btn{
            width:100%;
            padding:12px;
            border-radius:8px;
            font-size:0.85rem;
            cursor:pointer;
            transition:all 0.3s;
            border:2px solid;
        }
        .esc-btn.disabled{
            background:#1a1510;
            border-color:#3a2a1a;
            color:#5a4a3a;
            cursor:not-allowed;
        }
        .esc-btn.ready{
            background:#2a3520;
            border-color:#9ab87a;
            color:#9ab87a;
            animation:glow 2s infinite;
        }
        @keyframes glow{
            0%,100%{box-shadow:0 0 5px rgba(154,184,122,0.3)}
            50%{box-shadow:0 0 20px rgba(154,184,122,0.5)}
        }
        
        /* ==================== 底部日志（横向滚动）==================== */
        .log{
            background:#0f0a08;
            border-top:2px solid #3a2a1a;
            padding:8px 15px;
            height:65px;
            flex-shrink:0;
            overflow-x:auto;
            overflow-y:hidden;
            display:flex;
            gap:15px;
            align-items:center;
        }
        .log::-webkit-scrollbar{height:4px}
        .log::-webkit-scrollbar-track{background:#1a1510}
        .log::-webkit-scrollbar-thumb{background:#3a2a1a;border-radius:2px}
        .log-entry{
            flex-shrink:0;
            font-size:0.7rem;
            padding:4px 10px;
            background:#1a1510;
            border-radius:15px;
            border:1px solid #2a1a10;
            white-space:nowrap;
        }
        .log-entry.narrative{color:#8a7a6a}
        .log-entry.action{color:#9ab87a}
        .log-entry.danger{color:#c97a7a;background:#251515;border-color:#4a2020}
        .log-entry.important{color:#d4af37;background:#251a10;border-color:#3a2a1a}
        .log-entry.dialog{color:#a8b8c8}
        .log-entry.system{color:#6a5a4a}
        
        /* ==================== 弹窗==================== */
        .modal-overlay{
            display:none;
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.85);
            z-index:100;
            justify-content:center;
            align-items:center;
            padding:20px
        }
        .modal-overlay.active{display:flex}
        .modal{
            background:#2a2015;
            border:2px solid #3a2a1a;
            border-radius:15px;
            padding:20px;
            max-width:380px;
            width:100%;
            max-height:70vh;
            overflow-y:auto
        }
        .modal-title{
            font-size:1rem;
            color:#d4af37;
            margin-bottom:12px;
            text-align:center
        }
        .modal-content{
            font-size:0.85rem;
            line-height:1.7;
            margin-bottom:15px
        }
        .modal-content p{margin-bottom:8px}
        .modal-choices{
            display:flex;
            flex-direction:column;
            gap:8px
        }
        .choice-btn{
            background:#1a2510;
            border:1px solid #3a4a2a;
            border-radius:8px;
            padding:12px 15px;
            color:#9ab87a;
            font-size:0.85rem;
            cursor:pointer;
            text-align:left;
            transition:all 0.2s
        }
        .choice-btn:hover{background:#2a3520;border-color:#9ab87a}
        .choice-btn.danger{background:#251510;border-color:#5a3a3a;color:#c97a7a}
        .choice-btn.danger:hover{background:#3a2020;border-color:#c97a7a}
        
        /* 滚动条 */
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:#1a1510}
        ::-webkit-scrollbar-thumb{background:#3a2a1a;border-radius:3px}
        
        /* 禁闭状态 */
        .locked-overlay{
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.95);
            z-index:200;
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            color:#c97a7a;
            text-align:center;
            padding:20px
        }
        .locked-overlay.active{display:flex}
        .locked-icon{font-size:4rem;margin-bottom:20px}
        .locked-title{font-size:1.5rem;margin-bottom:10px;color:#d4af37}
        .locked-text{font-size:0.9rem;line-height:1.8;color:#8a7a6a;margin-bottom:20px}
        .locked-buttons{display:flex;flex-direction:column;gap:12px;margin-top:15px}
        .locked-btn{
            background:#251510;
            border:2px solid #5a3a3a;
            border-radius:8px;
            padding:14px 24px;
            color:#c97a7a;
            font-size:0.9rem;
            cursor:pointer;
            transition:all 0.2s
        }
        .locked-btn:hover{background:#3a2020;border-color:#c97a7a}
        .locked-btn-rest{
            background:#1a2510;
            border:2px solid #3a4a2a;
            border-radius:8px;
            padding:14px 24px;
            color:#9ab87a;
            font-size:0.9rem;
            cursor:pointer;
            transition:all 0.2s
        }
        .locked-btn-rest:hover{background:#2a3520;border-color:#9ab87a}
        
        /* 游戏结束遮罩 */
        .game-over{
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.95);
            z-index:300;
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            padding:20px
        }
        .game-over.active{display:flex}
        .game-over-icon{font-size:5rem;margin-bottom:20px}
        .game-over-title{font-size:1.8rem;color:#c97a7a;margin-bottom:15px}
        .game-over-subtitle{font-size:1rem;color:#8a7a6a;margin-bottom:20px}
        .game-over-btn{
            background:#2a2010;
            border:2px solid #d4af37;
            border-radius:8px;
            padding:12px 30px;
            color:#d4af37;
            font-size:1rem;
            cursor:pointer
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="top">
        <div class="top-title">🔥 乱世烽火</div>
        
        <div class="top-time">
            <span class="top-time-icon" id="timeIcon">🌅</span>
            <div>
                <div class="top-time-num" id="timeNum">06:00</div>
                <div class="top-time-text" id="timePeriod">清晨</div>
            </div>
        </div>
        
        <div class="top-stats">
            <div class="top-stat" id="stStat">💪 <span id="stVal">80</span>%</div>
            <div class="top-stat" id="fdStat">🍜 <span id="fdVal">70</span>%</div>
            <div class="top-stat">📅 第<span id="dayVal">1</span>天</div>
        </div>
    </div>
    
    <!-- 任务栏 -->
    <div class="tasks" id="taskBar">
        <div class="task-tag" id="taskMorning">
            <span id="taskMorningIcon">☐</span>
            <span>上午</span>
        </div>
        <div class="task-tag" id="taskAfternoon">
            <span id="taskAfternoonIcon">☐</span>
            <span>下午</span>
        </div>
        <div class="task-tag" id="taskEvening">
            <span id="taskEveningIcon">☐</span>
            <span>傍晚</span>
        </div>
    </div>
    
    <!-- 作息时间条 -->
    <div class="schedule" id="schedBar">
        <div class="sch" data-h="6"><span class="sch-p">🌅</span><span>6</span></div>
        <div class="sch" data-h="8"><span class="sch-p">🔥</span><span>8</span></div>
        <div class="sch" data-h="12"><span class="sch-p">🍜</span><span>12</span></div>
        <div class="sch" data-h="14"><span class="sch-p">🔥</span><span>14</span></div>
        <div class="sch" data-h="18"><span class="sch-p">🌆</span><span>18</span></div>
        <div class="sch" data-h="20"><span class="sch-p">🌙</span><span>20</span></div>
        <div class="sch" data-h="22"><span class="sch-p">🌙</span><span>22</span></div>
        <div class="sch" data-h="0"><span class="sch-p">💤</span><span>0</span></div>
    </div>
    
    <!-- 主体区域 -->
    <div class="main">
        <!-- 左侧区域 -->
        <div class="side">
            <div id="locList"></div>
        </div>
        
        <!-- 中央区域 -->
        <div class="center">
            <!-- 当前位置 -->
            <div class="cur-card">
                <div class="cur-header">
                    <div class="cur-name">
                        <i id="curIcon">🏠</i>
                        <span id="curName">牢房</span>
                    </div>
                    <span class="cur-tag rest" id="curTag">休息</span>
                </div>
                <div class="cur-env" id="curEnv">天色微亮，牢房里弥漫着潮湿的霉味...</div>
            </div>
            
            <!-- 遭遇列表 -->
            <div class="encounters" id="encList"></div>
            
            <!-- 逃跑面板 -->
            <div class="escape-panel" id="escapePanel">
                <div class="escape-header" onclick="toggleEscape()">
                    <span class="escape-title">🔓 逃跑计划</span>
                    <span class="escape-toggle">▼</span>
                </div>
                <div class="escape-body">
                    <div class="escape-conds">
                        <div class="cond fail" id="condRoute">路线</div>
                        <div class="cond fail" id="condNight">夜间</div>
                        <div class="cond fail" id="condStamina">体力</div>
                        <div class="cond fail" id="condTime">时机</div>
                    </div>
                    <button class="esc-btn disabled" id="escBtn" onclick="tryEscape()">条件不足</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部日志 -->
    <div class="log" id="logPanel"></div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
    
    <!-- 关禁闭遮罩 -->
    <div class="locked-overlay" id="lockedOverlay">
        <div class="locked-icon">🔒</div>
        <div class="locked-title">关禁闭</div>
        <div class="locked-text" id="lockedText">
            你被关进了暗无天日的禁闭室...<br>
            只能在牢房里等待处罚结束
        </div>
        <div class="locked-buttons">
            <button class="locked-btn" onclick="waitInCell()">⏰ 熬过这段时间 (推进4小时)</button>
            <button class="locked-btn-rest" onclick="restInCell()">💤 好好休息 (推进8小时)</button>
        </div>
    </div>
    
    <!-- 游戏结束 -->
    <div class="game-over" id="gameOver">
        <div class="game-over-icon" id="goIcon">💀</div>
        <div class="game-over-title" id="goTitle">游戏结束</div>
        <div class="game-over-subtitle" id="goSubtitle">...</div>
        <button class="game-over-btn" onclick="location.reload()">重新开始</button>
    </div>
    
<script>
// ==================== 游戏数据 ====================

const LOCS = {
    dorm: {
        n: '牢房', i: '🏠',
        d: '休息睡觉的地方',
        time: [22,23,0,1,2,3,4,5],
        tags: ['rest'],
        env: {
            morning: '鸡鸣声响起，天色微亮...',
            noon: '阳光从高窗照进来，尘埃飞舞...',
            evening: '暮色渐沉，牢房里开始变得昏暗...',
            night: '月光从铁窗照入，冷冷清清...'
        },
        enc: [
            {id:'bed', n:'木板床', i:'🛏️', d:'硬邦邦的', type:'rest'},
            {id:'oz', n:'老张', i:'👴', d:'待了一年的老犯人', type:'npc'},
            {id:'z4', n:'赵四', i:'👤', d:'目光呆滞', type:'npc'}
        ]
    },
    yard: {
        n: '操场', i: '🌳',
        d: '放风休息',
        time: [11,12,13,19,20,21],
        tags: ['rest'],
        env: {
            morning: '早起的犯人三三两两走动...',
            noon: '阳光刺眼，有人在井边打水...',
            evening: '点名即将开始，人群聚集...',
            night: '月光下空无一人，寂静得可怕...'
        },
        enc: [
            {id:'lw', n:'李五', i:'👤', d:'消息灵通', type:'npc'},
            {id:'sd', n:'士兵', i:'⚔️', d:'两个守卫', type:'guard'},
            {id:'wl', n:'水井', i:'💧', d:'可以打水', type:'rest'}
        ]
    },
    kitchen: {
        n: '厨房', i: '🍜',
        d: '偷食物',
        time: [11,12,17,18],
        tags: ['steal'],
        env: {
            noon: '伙夫们正在忙活午饭...',
            evening: '伙夫们在清点食材...',
            night: '厨房里黑漆漆的...'

// ==================== 工具函数 ====================

function getTimePeriod(hour) {
    if(hour >= 6 && hour < 8) return {icon:'🌅', text:'清晨', period:'morning'};
    if(hour >= 8 && hour < 12) return {icon:'🔥', text:'上午', period:'morning'};
    if(hour >= 12 && hour < 14) return {icon:'🍜', text:'中午', period:'noon'};
    if(hour >= 14 && hour < 18) return {icon:'🔥', text:'下午', period:'afternoon'};
    if(hour >= 18 && hour < 20) return {icon:'🌆', text:'傍晚', period:'evening'};
    if(hour >= 20 && hour < 23) return {icon:'🌙', text:'夜间', period:'night'};
    return {icon:'🌙', text:'深夜', period:'night'};
}

function isNight() {
    return G.hour >= 20 || G.hour < 6;
}

function canAccess(locId) {
    let loc = LOCS[locId];
    if(G.locked && locId !== 'dorm') return false;
    if(loc.locked) return false;
    if(loc.nightOnly && !isNight()) return false;
    if(locId === 'dorm') return true;
    if(isNight()) return true;
    return loc.time.includes(G.hour);
}

function showModal(title, content, choices, keepOpen = false) {
    let html = `<div class="modal-title">${title}</div><div class="modal-content">${content}</div>`;
    if(choices && choices.length) {
        html += '<div class="modal-choices">';
        window.cb = [];
        choices.forEach((c,i) => {
            window.cb.push(c.a);
            let cls = c.danger ? 'choice-btn danger' : 'choice-btn';
            html += `<button class="${cls}" onclick="doCb(${i},${keepOpen})">${c.t}</button>`;
        });
        html += '</div>';
    }
    document.getElementById('modalContent').innerHTML = html;
    if(!document.getElementById('modalOverlay').classList.contains('active')) {
        document.getElementById('modalOverlay').classList.add('active');
    }
}

function doCb(i, keepOpen = false) {
    if(keepOpen) {
        window.cb[i]();
    } else {
        document.getElementById('modalOverlay').classList.remove('active');
        setTimeout(() => window.cb[i](), 150);
    }
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function showNPCDialog(npcId) {
    let npc = NPCS[npcId];
    let trust = G.trust[npcId] || 0;
    let level = trust >= 3 ? 3 : trust >= 2 ? 2 : trust >= 1 ? 1 : 0;
    let npcData = npc.levels[level] || npc.levels[0];
    
    let choices = npcData.opts.map(o => ({
        t: o.q,
        a: () => {
            if(o.close) { closeModal(); return; }
            showNPCReply(npcId, o);
        }
    }));
    
    showModal(`${npc.i} ${npc.n}`, `
        <div style="background:#1a1510;border-radius:10px;padding:15px;text-align:center">
            <div style="font-size:2.5rem">${npc.i}</div>
            <div style="color:#c9b896;font-size:0.9rem;margin-top:8px">${npc.n}</div>
            <div style="color:#6a5a4a;font-size:0.7rem;margin-top:4px">${['陌生','熟悉','信任','挚友'][level]}</div>
        </div>
        <p style="color:#a8b8c8;margin-top:15px;line-height:1.6">${npcData.intro}</p>
    `, choices, true);
}

function showNPCReply(npcId, opt) {
    let npc = NPCS[npcId];
    
    addLog(`你说：${opt.q}`, 'action');
    addLog(`${npc.i} ${npc.n}：${opt.a}`, 'dialog');
    
    if(opt.trust) {
        G.trust[npcId] = Math.max(0, (G.trust[npcId]||0) + opt.trust);
        if(opt.trust > 0) addLog(`关系改善 (+${opt.trust})`, 'important');
    }
    
    if(opt.unlock === 'route' && !G.progress.route) {
        G.progress.route = true;
        addLog('📝 发现逃跑路线：围墙东北角', 'important');
    }
    if(opt.unlock === 'info' && !G.progress.info) {
        G.progress.info = true;
        addLog('📝 掌握巡逻规律：戌时换班', 'important');
    }
    if(opt.unlock2 === 'route' && !G.progress.route) {
        G.progress.route = true;
        addLog('📝 发现逃跑路线', 'important');
    }
    if(opt.unlock2 === 'info' && !G.progress.info) {
        G.progress.info = true;
        addLog('📝 掌握巡逻规律', 'important');
    }
    
    if(opt.giveFood && G.food < 100) {
        G.food = Math.min(100, G.food + 15);
        addLog('🍞 获得食物', 'important');
    }
    if(opt.giveFood2 && G.food < 100) {
        G.food = Math.min(100, G.food + 10);
    }
    
    showModal(`${npc.i} ${npc.n}`, `
        <div style="background:#1a1510;border-radius:10px;padding:15px">
            <p style="color:#9ab87a;margin-bottom:10px">问：${opt.q}</p>
            <p style="color:#a8b8c8;line-height:1.6">答：${opt.a}</p>
        </div>
    `, [
        {t:'继续交谈', a:() => showNPCDialog(npcId)},
        {t:'先走了', a:() => closeModal()}
    ], true);
}

function addLog(text, type='narrative') {
    G.log.unshift({t:text, ty:type});
    if(G.log.length > 30) G.log.pop();
    renderLog();
}

function renderLog() {
    document.getElementById('logPanel').innerHTML = G.log.slice(0,10).map(e => 
        `<div class="log-entry ${e.ty}">${e.t}</div>`
    ).join('');
}

// ==================== UI更新 ====================

function updateUI() {
    let period = getTimePeriod(G.hour);
    
    // 顶部
    document.getElementById('timeIcon').textContent = period.icon;
    document.getElementById('timeNum').textContent = G.hour.toString().padStart(2,'0') + ':00';
    document.getElementById('timePeriod').textContent = period.text;
    document.getElementById('dayVal').textContent = G.day;
    
    // 状态颜色
    let stStat = document.getElementById('stStat');
    stStat.className = 'top-stat ' + (G.stamina < 30 ? 'danger' : G.stamina > 70 ? 'good' : '');
    document.getElementById('stVal').textContent = G.stamina;
    
    let fdStat = document.getElementById('fdStat');
    fdStat.className = 'top-stat ' + (G.food < 30 ? 'danger' : G.food > 70 ? 'good' : '');
    document.getElementById('fdVal').textContent = G.food;
    
    // 任务
    updateTaskBar();
    
    // 作息条
    document.querySelectorAll('.sch').forEach(el => {
        let h = parseInt(el.dataset.h);
        el.classList.remove('current','passed');
        if(G.hour >= h && G.hour < h+2) el.classList.add('current');
        else if(G.hour < h) el.classList.add('passed');
    });
    
    // 区域
    updateLocationList();
    updateCurrentLocation();
    updateEncounters();
    updateEscapeConditions();
    updateLockedStatus();
}

function updateTaskBar() {
    let updateTag = (id, iconId, done) => {
        let el = document.getElementById(id);
        let icon = document.getElementById(iconId);
        el.className = 'task-tag ' + (done ? 'done' : (G.hour >= (id==='taskMorning'?12:id==='taskAfternoon'?18:24) ? '' : 'urgent'));
        icon.textContent = done ? '☑' : '☐';
    };
    
    if(G.hour < 12) {
        updateTag('taskMorning', 'taskMorningIcon', G.tasks.morning);
    } else {
        updateTag('taskMorning', 'taskMorningIcon', G.tasks.morning);
    }
    
    if(G.hour >= 12 && G.hour < 18) {
        updateTag('taskAfternoon', 'taskAfternoonIcon', G.tasks.afternoon);
    } else {
        updateTag('taskAfternoon', 'taskAfternoonIcon', G.tasks.afternoon);
    }
    
    updateTag('taskEvening', 'taskEveningIcon', G.tasks.evening);
}

function updateLocationList() {
    let locs = ['dorm','yard','kitchen','mine','wood','stable','gate','wall'];
    document.getElementById('locList').innerHTML = locs.map(id => {
        let loc = LOCS[id];
        let cur = G.loc === id;
        let acc = canAccess(id);
        let disabled = !acc && !cur;
        
        let cls = 'loc-btn';
        if(cur) cls += ' current';
        if(disabled) cls += loc.locked ? ' locked' : ' forbidden';
        
        let clk = disabled ? '' : `onclick="moveTo('${id}')"`;
        
        let badge = '';
        if(loc.locked) badge = '<span class="badge">禁</span>';
        else if(loc.nightOnly && !isNight()) badge = '<span class="badge">夜</span>';
        else if(disabled) badge = '<span class="badge">×</span>';
        
        return `<div class="${cls}" ${clk}>
            <i>${loc.i}</i>
            ${badge}
        </div>`;
    }).join('');
}

function updateCurrentLocation() {
    let loc = LOCS[G.loc];
    let period = getTimePeriod(G.hour).period;
    let env = loc.env[period] || loc.env.default || loc.env.night || '';
    
    document.getElementById('curIcon').textContent = loc.i;
    document.getElementById('curName').textContent = loc.n;
    document.getElementById('curEnv').textContent = env;
    
    let tag = document.getElementById('curTag');
    if(loc.tags.includes('work')) {
        tag.className = 'cur-tag work';
        tag.textContent = '劳役';
    } else if(loc.tags.includes('steal') || loc.tags.includes('escape')) {
        tag.className = 'cur-tag danger';
        tag.textContent = loc.tags.includes('escape') ? '逃跑' : '危险';
    } else if(loc.nightOnly) {
        tag.className = 'cur-tag night';
        tag.textContent = '夜间';
    } else {
        tag.className = 'cur-tag rest';
        tag.textContent = '休息';
    }
}

function updateEncounters() {
    let loc = LOCS[G.loc];
    let typeMap = {
        npc: {tag:'talk', label:'交谈'},
        guard: {tag:'caution', label:'小心'},
        work: {tag:'work', label:'劳役'},
        rest: {tag:'rest', label:'休息'},
        steal: {tag:'steal', label:'偷窃'},
        observe: {tag:'rest', label:'观察'},
        patrol: {tag:'caution', label:'危险'}

    document.getElementById('encList').innerHTML = loc.enc.map(e => {
        let t = typeMap[e.type] || typeMap.npc;
        return `<div class="enc" onclick="interact('${e.id}')">
            <div class="enc-top">
                <span class="enc-icon">${e.i}</span>

            </div>
            <div class="enc-name">${e.n}</div>
            <div class="enc-desc">${e.d}</div>
        </div>`;
    }).join('');

function updateEscapeConditions() {
    let routeOk = G.progress.route;
    let nightOk = isNight() && G.hour >= 20 && G.hour <= 23;
    let staminaOk = G.stamina >= 40;
    let timeOk = G.hour >= 20 && G.hour <= 23;
    let ready = routeOk && nightOk && staminaOk && timeOk;
    
    let setCond = (id, ok, label) => {
        let el = document.getElementById(id);
        el.className = 'cond ' + (ok ? 'done' : 'fail');
        el.textContent = label;
    };
    
    setCond('condRoute', routeOk, '路线');
    setCond('condNight', nightOk, '夜间');
    setCond('condStamina', staminaOk, '体力');
    setCond('condTime', timeOk, '时机');
    
    let btn = document.getElementById('escBtn');
    btn.className = 'esc-btn ' + (ready ? 'ready' : 'disabled');
    btn.textContent = ready ? '🔓 尝试逃跑' : '条件不足';
    btn.disabled = !ready;

function updateLockedStatus() {
    let overlay = document.getElementById('lockedOverlay');
    if(G.locked) {
        overlay.classList.add('active');
        document.getElementById('lockedText').innerHTML = `
            你被关进了暗无天日的禁闭室...<br>
            <br>
            🔒 ${getLockReason()}<br>
            ⏰ 禁闭剩余：${G.lockHours}小时
        `;
    } else {
        overlay.classList.remove('active');
    }
}

function getLockReason() {
    if(G.lockHours >= 20) return '严重违规，关禁闭一天';
    if(G.caught >= 2) return '多次违规，关禁闭半天';
    if(G.stamina <= 0) return '体力耗尽昏迷';
    return '违规被抓';
}

function toggleEscape() {
    document.getElementById('escapePanel').classList.toggle('open');
}

// ==================== 游戏逻辑 ====================

function moveTo(locId) {
    if(G.locked && locId !== 'dorm') {
        addLog('🔒 被关禁闭中，只能待在牢房', 'danger');
        return;
    }
    if(G.loc === locId) return;
    let loc = LOCS[locId];
    if(loc.locked) { addLog('🚫 无法通行', 'system'); return; }
    if(!canAccess(locId)) { addLog('⏰ 现在不能去那里', 'system'); return; }
    G.loc = locId;
    addLog(`📍 来到「${loc.n}」`, 'action');
    updateUI();
}

function interact(id) {
    let loc = LOCS[G.loc];
    let enc = loc.enc.find(e => e.id === id);
    if(!enc) return;
    
    switch(enc.type) {
        case 'npc': talkToNPC(id); break;
        case 'guard': encounterGuard(enc); break;
        case 'work': doWork(enc); break;
        case 'rest': doRest(enc); break;
        case 'steal': doSteal(enc); break;
        case 'observe': doObserve(enc); break;
        case 'patrol': encounterPatrol(enc); break;
    }
}

function talkToNPC(id) {
    if(!NPCS[id]) { addLog('...没人回应', 'narrative'); return; }
    showNPCDialog(id);
}

function encounterGuard(enc) {
    let danger = Math.random();
    addLog(`${enc.i} ${enc.n}打量着你...`, 'narrative');
    
    if(danger < 0.3) {
        showModal(`${enc.i} ${enc.n}`, `
            <p style="color:#c97a7a;font-size:1.1rem">「你鬼鬼祟祟的，在干什么！」</p>
            <p style="margin-top:15px">监工大怒，一把抓住你的衣领...</p>
        `, [{
            t:'挣扎辩解',
            danger: true,
            a:() => getCaught('被监工发现鬼鬼祟祟')
        }]);
    } else if(danger < 0.6) {
        showModal(`${enc.i} ${enc.n}`, `
            <p style="color:#c9a87a">「看什么看！滚去干活！」</p>
        `, [{
            t:'低头离开',
            a:() => { addLog('被呵斥：看什么看！滚去干活！', 'action'); closeModal(); }
        }]);
    } else {
        showModal(`${enc.i} ${enc.n}`, `
            <p>监工瞥了你一眼，没理会。</p>
        `, [{
            t:'悄悄离开',
            a:() => { addLog('监工没理会你', 'narrative'); closeModal(); }
        }]);
    }
}

function encounterPatrol(enc) {
    let danger = Math.random();
    addLog(`${enc.i} ${enc.n}正在巡逻...`, 'narrative');
    
    if(danger < 0.4) {
        showModal(`${enc.i} ${enc.n}`, `
            <p style="color:#c97a7a">巡逻队发现你了！「站住！有人！」</p>
            <p style="margin-top:10px">火把逼近，你无处可逃...</p>
        `, [{
            t:'被抓住',
            danger: true,
            a:() => getCaught('被巡逻队发现')
        }]);
    } else {
        showModal(`${enc.i} ${enc.n}`, `
            <p>巡逻队从你藏身处走过...</p>
            <p style="color:#9ab87a;margin-top:10px">脚步声渐渐远去...</p>
        `, [{
            t:'松了口气',
            a:() => { addLog('巡逻队走远了', 'narrative'); closeModal(); }
        }]);
    }
}

function doWork(enc) {
    if(G.locked) { addLog('🔒 被关禁闭中', 'danger'); return; }
    if(!canAccess(G.loc)) { addLog('⏰ 现在不是劳役时间', 'system'); return; }
    
    let cost = enc.stamina || 20;
    if(G.stamina < cost) { addLog('⚠️ 体力不足！', 'danger'); return; }
    
    G.stamina -= cost;
    G.food = Math.max(0, G.food - 5);
    addLog(`${enc.i} ${enc.name || enc.n}... 体力 -${cost}`, 'action');
    
    if(G.hour < 12) G.tasks.morning = true;
    else if(G.hour < 18) G.tasks.afternoon = true;
    
    if(enc.risk && Math.random() < enc.risk) {
        let hurt = 10 + Math.floor(Math.random()*15);
        G.stamina = Math.max(0, G.stamina - hurt);
        addLog(`⚠️ 出了点意外！体力 -${hurt}`, 'danger');
    }
    
    if(Math.random() < 0.1) {
        let found = Math.random() < 0.5 ? 'iron' : 'cloth';
        if(G.inventory.length < 5 && !G.inventory.includes(found)) {
            G.inventory.push(found);
            addLog(`📦 发现：${ITEMS[found].i} ${ITEMS[found].n}`, 'important');
        }
    }
    
    if(enc.bonus) {
        G.food = Math.min(100, G.food + enc.bonus);
        addLog(`饱食度 +${enc.bonus}`, 'action');
    }
    
    checkStatus();
    advanceTime();
    updateUI();
}

function doRest(enc) {
    if(enc.id === 'bed' && G.loc !== 'dorm') { addLog('...这里不方便休息', 'narrative'); return; }
    let gain = enc.id === 'wl' ? 10 : 20;
    G.stamina = Math.min(100, G.stamina + gain);
    addLog(`${enc.i} 休息... 体力 +${gain}`, 'action');
    advanceTime();
    checkStatus();
    updateUI();
}

function doSteal(enc) {
    if(G.locked) { addLog('🔒 被关禁闭中', 'danger'); return; }
    if(!canAccess(G.loc)) { addLog('⏰ 现在不能偷', 'system'); return; }
    
    addLog(`${enc.i} 你悄悄靠近${enc.n}...`, 'action');
    
    if(Math.random() < 0.4) {
        getCaught('偷食物时被当场抓住');
    } else {
        let gain = 15 + Math.floor(Math.random()*15);
        G.food = Math.min(100, G.food + gain);
        addLog(`🍞 成功！饱食度 +${gain}`, 'important');
        advanceTime();
        checkStatus();
        updateUI();
    }
}

function doObserve(enc) {
    if(G.loc !== 'wall') { addLog('...没什么好观察的', 'narrative'); return; }
    
    if(!G.progress.route) {
        G.progress.route = true;
        addLog(`🔍 发现逃跑路线！围墙东北角可以逃跑！`, 'important');
    } else {
        addLog(`🔍 再次确认逃跑路线...`, 'action');
    }
    
    if(Math.random() < 0.3 && G.inventory.length < 5 && !G.inventory.includes('rope')) {
        G.inventory.push('rope');
        addLog(`📦 在墙角发现麻绳！`, 'important');
    }
    
    advanceTime();
    updateUI();
}

function getCaught(reason) {
    G.caught++;
    G.stamina = Math.max(0, G.stamina - 20);
    
    let items = [...G.inventory];
    G.inventory = [];
    if(items.length > 0) {
        addLog(`📦 物品被没收：${items.map(i=>ITEMS[i].i).join(' ')}`, 'danger');
    }
    
    addLog(`⚠️ ${reason}`, 'danger');
    
    let content = `<p style="color:#c97a7a">你被抓了！</p><p>${reason}</p>`;
    
    if(G.caught === 1) {
        content += `<p style="margin-top:10px">处罚：体力 -20，物品被没收，今晚不许吃饭</p>`;
        G.food = Math.max(0, G.food - 20);
    } else if(G.caught === 2) {
        content += `<p style="margin-top:10px">处罚：体力 -20，关禁闭半天</p>`;
        G.locked = true;
        G.lockHours = 12;
    } else if(G.caught >= 3) {
        content += `<p style="margin-top:10px;color:#c97a7a">处罚极其严厉！关禁闭一天！逃跑准备全部重置！</p>`;
        G.locked = true;
        G.lockHours = 24;
        G.progress = {route:false, info:false, tool:false};
    }
    
    content += `<p style="margin-top:10px">累计被抓：${G.caught}/3</p>`;
    
    showModal('⚠️ 被抓了！', content, [{
        t:'认错',
        a:() => { checkStatus(); updateUI(); }
    }]);
}

function tryEscape() {
    let routeOk = G.progress.route;
    let nightOk = isNight() && G.hour >= 20 && G.hour <= 23;
    let staminaOk = G.stamina >= 40;
    let timeOk = G.hour >= 20 && G.hour <= 23;
    
    if(!routeOk || !nightOk || !staminaOk || !timeOk) {
        addLog('🚫 逃跑条件不足...', 'system');
        return;
    }
    
    addLog('🔓 你决定今晚逃跑！', 'important');
    
    let chance = 0.4;
    if(G.progress.info) chance += 0.2;
    if(G.inventory.includes('rope') || G.inventory.includes('iron')) chance += 0.2;
    
    setTimeout(() => {
        if(Math.random() < chance) {
            G.escaped = true;
            addLog('🎉 你成功逃出了劳役营！', 'important');
            
            showModal('🎉 成功逃脱！', `
                <p style="text-align:center;font-size:1.2rem">🎊 恭喜！你成功逃出了广年屯劳役营！</p>
                <p style="margin-top:15px">在一个月黑风高的夜晚，你翻过低矮的围墙，向着山林狂奔...</p>
                <p style="margin-top:15px;color:#d4af37">【乱世烽火 · 劳役营篇 · 完】</p>
                <p style="color:#8a7a6a;margin-top:10px">存活天数：${G.day}天</p>
            `, [{
                t:'新的旅途开始...',
                a:() => {
                    document.getElementById('gameOver').classList.add('active');
                    document.getElementById('goIcon').textContent = '🎉';
                    document.getElementById('goTitle').textContent = '成功逃脱！';
                    document.getElementById('goTitle').style.color = '#d4af37';
                    document.getElementById('goSubtitle').textContent = `存活 ${G.day} 天！`;
                }
            }]);
        } else {
            addLog('⚠️ 刚要翻墙就被发现了！', 'danger');
            getCaught('逃跑时被巡逻队当场抓住');
        }
    }, 800);
}

function advanceTime() {
    G.hour += 2;
    if(G.hour >= 24) {
        G.hour -= 24;
        newDay();
    }
    
    G.food = Math.max(0, G.food - 3);
    
    if(G.food < 30) {
        G.stamina = Math.max(0, G.stamina - 8);
        addLog('🍜 太饿了...体力 -8', 'danger');
    }
    
    if(G.hour === 18 && !G.locked) {
        checkEveningRollCall();
    }
    
    checkStatus();
    updateUI();
}

function checkEveningRollCall() {
    addLog('🌆 傍晚点名时间到了...', 'system');
    
    if(G.day === 1) {
        addLog(`✅ 第1天，点名通过`, 'action');
        G.tasks.morning = true;
        G.tasks.afternoon = true;
        G.tasks.evening = true;
        return;
    }
    
    let missed = !G.tasks.morning || !G.tasks.afternoon;
    
    if(missed) {
        showModal('🌆 傍晚点名', `
            <p>监工王二开始逐个检查...</p>
            <p style="color:#c97a7a;margin-top:10px">「你就是那个偷懒的！」</p>
            <p style="margin-top:15px">监工大怒！</p>
        `, [{
            t:'低头认错',
            danger: true,
            a:() => {
                addLog(`⚠️ 点名时被发现偷懒！`, 'danger');
                getCaught(`点名时被发现${!G.tasks.morning?'上午':'下午'}没干活`);
            }
        }]);
    } else {
        showModal('🌆 傍晚点名', `
            <p>监工扫了你一眼，点了点头。</p>
            <p style="color:#9ab87a;margin-top:10px">「算你识相，滚吧。」</p>
        `, [{
            t:'松了口气',
            a:() => {
                addLog(`✅ 点名通过`, 'action');
                G.tasks.evening = true;
                updateUI();
            }
        }]);
    }
}

function newDay() {
    G.day++;
    G.food = Math.max(0, G.food - 10);
    
    if(G.locked && G.lockHours > 0) {
        addLog('🔒 禁闭还没结束...', 'narrative');
    } else if(G.locked) {
        G.locked = false;
        G.lockHours = 0;
        G.caught = 0;
        addLog('🔓 关禁闭结束！', 'important');
    }
    
    G.tasks = {morning:false, afternoon:false, evening:false};
    
    let recovery = G.locked ? 10 : 25;
    G.stamina = Math.min(100, G.stamina + recovery);
    
    addLog('────────────────────', 'important');
    addLog(`🌅 第${G.day}天清晨...`, 'important');
    addLog(`睡眠恢复：体力 +${recovery}`, 'action');
    
    if(G.day > 30) {
        gameOver('time', '被押往更远的地方劳役...');
    }
}

function checkStatus() {
    if(G.stamina <= 0 && !G.locked) {
        G.stamina = 10;
        G.locked = true;
        addLog('⚠️ 体力耗尽，晕倒在地...', 'danger');
        addLog('🔒 被抬进禁闭室休养...', 'danger');
    }
    
    if(G.food <= 0) {
        G.food = 5;
        G.stamina = Math.max(0, G.stamina - 30);
        addLog('⚠️ 严重饥饿！体力大幅下降！', 'danger');
        
        if(G.stamina <= 0) {
            G.stamina = 10;
            G.locked = true;
            addLog('🔒 饿晕了，被抬进禁闭室...', 'danger');
        }
    }
}

function waitInCell() {
    if(!G.locked) return;
    
    G.hour += 4;
    if(G.hour >= 24) G.hour -= 24;
    G.lockHours -= 4;
    G.food = Math.max(0, G.food - 5);
    
    let period = getTimePeriod(G.hour);
    addLog(`⏰ 在禁闭室煎熬了4小时... (${period.icon} ${period.text})`, 'narrative');
    
    if(G.lockHours <= 0) {
        G.locked = false;
        G.lockHours = 0;
        G.caught = 0;
        addLog('🔓 禁闭结束！', 'important');
        showModal('禁闭结束', '<p>漫长的禁闭终于结束了...</p>', [{
            t:'继续游戏',
            a:() => updateUI()
        }]);
    }
    
    checkStatus();
    updateUI();
}

function restInCell() {
    if(!G.locked) return;
    
    G.hour += 8;
    if(G.hour >= 24) G.hour -= 24;
    G.lockHours -= 8;
    G.food = Math.max(0, G.food - 8);
    G.stamina = Math.min(100, G.stamina + 15);
    
    addLog(`💤 在禁闭室昏睡...过了8小时`, 'action');
    addLog('体力恢复 +15', 'action');
    
    if(G.lockHours <= 0) {
        G.locked = false;
        G.lockHours = 0;
        G.caught = 0;
        addLog('🔓 禁闭结束！', 'important');
        showModal('禁闭结束', '<p>漫长的禁闭终于结束了...</p>', [{
            t:'继续游戏',
            a:() => updateUI()
        }]);
    }
    
    checkStatus();
    updateUI();
}

function gameOver(type, message) {
    let overlay = document.getElementById('gameOver');
    overlay.classList.add('active');
    
    let icons = {time:'😢', stamina:'💀', food:'💀'};
    let titles = {time:'任务失败', stamina:'体力耗尽', food:'饿死'};
    
    document.getElementById('goIcon').textContent = icons[type] || '💀';
    document.getElementById('goTitle').textContent = titles[type] || '游戏结束';
    document.getElementById('goTitle').style.color = '#c97a7a';
    document.getElementById('goSubtitle').textContent = `${message}（存活 ${G.day} 天）`;
}

// ==================== 初始化 ====================

function init() {
    updateUI();
    
    addLog('🔥 乱世烽火 - 劳役营篇', 'system');
    addLog('184年，黄巾之乱爆发。你被抓到边塞劳役营...', 'narrative');
    
    showModal('序章 · 乱世难民', `
        <p>184年，黄巾之乱爆发。</p>
        <p>你本是巨鹿郡的普通农户，战乱中家人离散，被押往边塞广年屯劳役营。</p>
        <p>每日做牛做马，不知何时是个尽头...</p>
        <p style="margin-top:15px;color:#c9a87a">📋 <strong>目标：</strong>30天内找到逃跑路线并成功逃脱！</p>
        <p style="color:#8a7a6a;margin-top:10px">💡 提示：完成每日劳役，与NPC交谈获取情报</p>
        <p style="color:#6a5a4a;margin-top:15px;font-style:italic">「想办法活下去...想办法逃出去...」</p>
    `, [{
        t:'开始游戏',
        a:closeModal
    }]);
}

init();
</script>
</body>
</html>
