<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>三国江湖 v1.7.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #ffd700; overflow: hidden; }
        
        #char-creation {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; overflow-y: auto; padding: 15px;
        }
        #char-creation h1 { font-size: 28px; margin-bottom: 3px; text-shadow: 0 0 20px #ffd700; }
        .subtitle { color: #888; margin-bottom: 12px; font-size: 13px; }
        #char-preview {
            width: 100px; height: 120px;
            background: rgba(0,0,0,0.5); border: 2px solid #ffd700;
            border-radius: 10px; margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center;
        }
        
        #preset-list { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .preset-btn {
            background: #333; color: #fff; border: 2px solid #555;
            padding: 6px 12px; cursor: pointer; border-radius: 15px;
            font-size: 12px; transition: all 0.3s;
        }
        .preset-btn:hover, .preset-btn.active { background: #ffd700; color: #1a1a1a; border-color: #ffd700; }
        
        #options-panel {
            width: 100%; max-width: 320px;
            background: rgba(0,0,0,0.6); border: 2px solid #ffd700;
            border-radius: 8px; padding: 10px; margin-bottom: 10px;
        }
        .option-group { margin-bottom: 8px; }
        .option-label { color: #ffd700; font-size: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .option-label::before { content: ''; width: 3px; height: 10px; background: #ffd700; border-radius: 2px; }
        .option-btns { display: flex; flex-wrap: wrap; gap: 5px; }
        .opt-btn {
            background: #2a2a3a; color: #ccc; border: 2px solid #444;
            padding: 4px 8px; cursor: pointer; border-radius: 4px;
            font-size: 10px; transition: all 0.2s; min-width: 50px; text-align: center;
        }
        .opt-btn:hover { border-color: #ffd700; color: #fff; }
        .opt-btn.selected { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a1a; border-color: #ffd700; }
        .color-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .color-btn {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #333; cursor: pointer; transition: all 0.2s;
        }
        .color-btn:hover { transform: scale(1.15); }
        .color-btn.selected { border-color: #fff; box-shadow: 0 0 6px rgba(255,215,0,0.8); }
        
        #confirm-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a1a;
            border: none; padding: 10px 40px; font-size: 14px; cursor: pointer;
            border-radius: 20px; font-weight: bold; margin-top: 5px;
        }
        
        #title-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #title-screen h1 { font-size: 40px; margin-bottom: 8px; text-shadow: 0 0 20px #ffd700; }
        #title-screen p { color: #888; margin-bottom: 25px; }
        .btn {
            background: #ffd700; color: #1a1a1a; border: none; padding: 10px 35px;
            font-size: 16px; cursor: pointer; border-radius: 6px; margin: 6px;
        }
        
        #game { width: 100vw; height: 100vh; position: relative; display: none; }
        #map { width: 100%; height: 100%; position: relative; background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #5a9a5a 55%, #4a8a4a 100%); }
        
        .cloud { position: absolute; background: rgba(255,255,255,0.9); border-radius: 40px; animation: floatCloud 25s linear infinite; }
        @keyframes floatCloud { 0% { transform: translateX(-100px); } 100% { transform: translateX(calc(100vw + 100px)); } }
        .cloud::before { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .cloud-1 { top: 6%; width: 70px; height: 25px; }
        .cloud-1::before { width: 35px; height: 35px; top: -12px; left: 12px; }
        .cloud-2 { top: 12%; width: 50px; height: 20px; animation-duration: 30s; animation-delay: -10s; }
        .cloud-2::before { width: 25px; height: 25px; top: -10px; left: 8px; }
        
        .dirt { position: absolute; bottom: 0; left: 0; right: 0; height: 45px; background: #8B7355; }
        
        .qchar { position: absolute; width: 36px; height: 36px; z-index: 50; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
        .qchar svg { width: 100%; height: 100%; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        .qchar.idle { animation: bounce 1.2s ease-in-out infinite; }
        .qchar-shadow { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 24px; height: 6px; background: rgba(0,0,0,0.25); border-radius: 50%; }
        .char-name { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #fff; white-space: nowrap; text-shadow: 1px 1px 0 #000; }
        .enemy-char .char-name { color: #ff6666; }
        .npc-char .char-name { color: #66ccff; }
        .enemy-hp { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 28px; height: 4px; background: #333; border: 1px solid #555; border-radius: 2px; overflow: hidden; }
        .enemy-hp-fill { height: 100%; background: linear-gradient(180deg, #ff4444, #cc0000); }
        @keyframes shake { 0%, 100% { transform: translateY(0) rotate(0); } 25% { transform: translateY(-2px) rotate(-2deg); } 75% { transform: translateY(-2px) rotate(2deg); } }
        .enemy-char { animation: shake 1s ease-in-out infinite; }
        
        .house { position: absolute; }
        .roof { position: relative; background: linear-gradient(180deg, #696969, #808080); border-radius: 2px; }
        .roof::before { content: ''; position: absolute; bottom: -6px; left: -3px; right: -3px; height: 6px; background: #505050; clip-path: polygon(0 0, 50% 100%, 100% 0); }
        .wall { background: linear-gradient(180deg, #c0392b, #a93226); border: 2px solid #922b21; }
        .door { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 12px; height: 15px; background: linear-gradient(180deg, #5d4037, #4e342e); border: 2px solid #3e2723; border-radius: 2px 2px 0 0; }
        .window { position: absolute; width: 8px; height: 8px; background: linear-gradient(135deg, #87CEEB, #B0E0E6); border: 2px solid #5d4037; }
        .house1 { left: 50px; top: 90px; }
        .house1 .roof { width: 45px; height: 12px; }
        .house1 .wall { width: 42px; height: 35px; margin-top: -1px; }
        .house1 .window { top: 6px; left: 6px; }
        .house2 { right: 70px; top: 65px; }
        .house2 .roof { width: 60px; height: 16px; }
        .house2 .wall { width: 56px; height: 42px; margin-top: -1px; }
        .house2 .window { top: 8px; left: 8px; }
        .house2 .window:last-of-type { right: 8px; left: auto; }
        .house3 { left: 160px; bottom: 80px; }
        .house3 .roof { width: 40px; height: 10px; }
        .house3 .wall { width: 36px; height: 30px; margin-top: -1px; }
        
        .lantern { position: absolute; right: 130px; bottom: 65px; }
        .lantern-top { width: 12px; height: 6px; background: #2c2c2c; border-radius: 2px; margin: 0 auto; }
        .lantern-body { width: 10px; height: 12px; background: linear-gradient(180deg, #ff6b6b, #ee5a5a, #ff6b6b); margin: 0 auto; border-radius: 2px; box-shadow: 0 0 8px rgba(255,107,107,0.5); }
        .lantern-bottom { width: 6px; height: 3px; background: #2c2c2c; margin: 0 auto; }
        .lantern-pole { width: 3px; height: 15px; background: #4a4a4a; margin: 0 auto; }
        
        .ptree { position: absolute; }
        .ptree-leaf { width: 32px; height: 28px; background: radial-gradient(ellipse at 30% 30%, #6b8e23 0%, #228b22 50%, #006400 100%); border-radius: 50% 50% 45% 45%; position: relative; }
        .ptree-leaf::before { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 18px; height: 18px; background: radial-gradient(ellipse, #228b22 0%, #006400 100%); border-radius: 50%; }
        .ptree-trunk { width: 6px; height: 14px; background: linear-gradient(90deg, #5d4037 0%, #8d6e63 50%, #5d4037 100%); margin: 0 auto; margin-top: -3px; }
        .ptree1 { left: 25px; top: 90px; transform: scale(1.1); }
        .ptree2 { right: 50px; top: 130px; }
        .ptree3 { left: 240px; bottom: 70px; transform: scale(0.9); }
        .ptree4 { right: 80px; bottom: 120px; transform: scale(1.15); }
        
        .pstone { position: absolute; background: linear-gradient(135deg, #9e9e9e 0%, #757575 50%, #616161 100%); border-radius: 40% 50% 45% 55%; }
        .pstone1 { left: 220px; top: 260px; width: 18px; height: 12px; }
        .pstone2 { left: 380px; top: 300px; width: 15px; height: 10px; }
        .pstone3 { left: 150px; top: 320px; width: 16px; height: 11px; }
        
        #interact-prompt { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(255,215,0,0.9); color: #1a1a1a; padding: 6px 16px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 150; display: none; }
        .hint { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); color: #666; font-size: 10px; background: rgba(0,0,0,0.5); padding: 3px 10px; border-radius: 3px; }
        
        #status { position: absolute; top: 45px; right: 6px; background: rgba(0,0,0,0.8); padding: 8px 10px; border-radius: 5px; font-size: 11px; z-index: 100; border: 1px solid #ffd700; min-width: 110px; }
        .status-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .stat-label { color: #888; }
        .stat-value { color: #ffd700; font-weight: bold; }
        .hp-bar { width: 100%; height: 5px; background: #333; border-radius: 2px; margin-top: 2px; overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); }
        
        #quest-box { position: absolute; top: 45px; left: 6px; background: rgba(0,0,0,0.8); padding: 8px 10px; border-radius: 5px; font-size: 11px; z-index: 100; border: 1px solid #4488ff; max-width: 160px; display: none; }
        .quest-title { color: #4488ff; font-weight: bold; margin-bottom: 3px; }
        .quest-desc { color: #aaa; line-height: 1.3; }
        .quest-reward { color: #ffd700; margin-top: 3px; font-size: 10px; }
        
        #dialogue { position: absolute; bottom: 0; width: 100%; height: 22%; background: rgba(15,15,25,0.95); border-top: 2px solid #ffd700; padding: 12px; display: none; z-index: 200; }
        #speaker { color: #ff6b6b; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        #text { font-size: 13px; line-height: 1.5; color: #ddd; margin-bottom: 8px; }
        #choices { display: flex; flex-wrap: wrap; gap: 6px; }
        .choice-btn { background: #ffd700; color: #1a1a1a; border: none; padding: 6px 14px; cursor: pointer; font-size: 11px; border-radius: 4px; }
        #close-btn { position: absolute; right: 12px; bottom: 12px; background: #444; color: #fff; border: none; padding: 5px 14px; cursor: pointer; border-radius: 4px; }
        
        #notification { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.9); color: #ffd700; padding: 12px 25px; border-radius: 8px; font-size: 14px; z-index: 300; display: none; border: 2px solid #ffd700; }
        
        #touch-controls { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 150px; padding-bottom: env(safe-area-inset-bottom, 8px); z-index: 150; }
        #joystick-zone { position: absolute; left: max(12px, env(safe-area-inset-left, 12px)); bottom: max(12px, env(safe-area-inset-bottom, 12px)); width: 90px; height: 90px; background: rgba(0,0,0,0.4); border-radius: 50%; border: 2px solid rgba(255,215,0,0.6); }
        #joystick-thumb { position: absolute; width: 36px; height: 36px; background: rgba(255,215,0,0.9); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        #action-buttons { position: absolute; right: max(10px, env(safe-area-inset-right, 10px)); bottom: max(12px, env(safe-area-inset-bottom, 12px)); display: flex; flex-direction: column; gap: 8px; }
        .action-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btn-interact { background: rgba(68,136,255,0.85); border-color: #6aa3ff; color: #fff; }
        #btn-attack { background: rgba(255,68,68,0.85); border-color: #ff8888; color: #fff; }
        #btn-pause { background: rgba(80,80,80,0.85); border-color: #aaa; color: #fff; width: 36px; height: 36px; font-size: 9px; }
        @media (hover: none) and (pointer: coarse) { #touch-controls { display: block; } .hint { bottom: 160px; } }
    </style>
</head>
<body>
    <div id="char-creation">
        <h1>创建角色</h1>
        <p class="subtitle">打造你的三国英雄</p>
        <div id="char-preview"><div id="preview-char"></div></div>
        
        <div id="preset-list">
            <button class="preset-btn active" data-preset="warrior">武士</button>
            <button class="preset-btn" data-preset="general">将军</button>
            <button class="preset-btn" data-preset="scholar">谋士</button>
            <button class="preset-btn" data-preset="lady">女子</button>
            <button class="preset-btn" data-preset="bandit">草寇</button>
        </div>
        
        <div id="options-panel">
            <div class="option-group">
                <div class="option-label">发型</div>
                <div class="option-btns" data-type="hair">
                    <button class="opt-btn selected" data-value="bun">发髻</button>
                    <button class="opt-btn" data-value="short">短发</button>
                    <button class="opt-btn" data-value="long">长发</button>
                    <button class="opt-btn" data-value="twin">双髻</button>
                </div>
            </div>
            <div class="option-group">
                <div class="option-label">发色</div>
                <div class="color-btns" data-type="hairColor">
                    <button class="color-btn selected" data-value="#2d2d2d" style="background:#2d2d2d"></button>
                    <button class="color-btn" data-value="#5d4037" style="background:#5d4037"></button>
                    <button class="color-btn" data-value="#b71c1c" style="background:#b71c1c"></button>
                    <button class="color-btn" data-value="#ffd700" style="background:#ffd700"></button>
                    <button class="color-btn" data-value="#e0e0e0" style="background:#e0e0e0"></button>
                </div>
            </div>
            <div class="option-group">
                <div class="option-label">服装</div>
                <div class="option-btns" data-type="cloth">
                    <button class="opt-btn selected" data-value="warrior">战袍</button>
                    <button class="opt-btn" data-value="robe">长袍</button>
                    <button class="opt-btn" data-value="dress">襦裙</button>
                    <button class="opt-btn" data-value="armor">铠甲</button>
                </div>
            </div>
            <div class="option-group">
                <div class="option-label">服装色</div>
                <div class="color-btns" data-type="clothColor">
                    <button class="color-btn selected" data-value="#27ae60" style="background:#27ae60" title="蜀"></button>
                    <button class="color-btn" data-value="#2980b9" style="background:#2980b9" title="魏"></button>
                    <button class="color-btn" data-value="#e67e22" style="background:#e67e22" title="吴"></button>
                    <button class="color-btn" data-value="#c0392b" style="background:#c0392b" title="红"></button>
                    <button class="color-btn" data-value="#9b59b6" style="background:#9b59b6" title="紫"></button>
                </div>
            </div>
        </div>
        
        <button id="confirm-btn" onclick="confirmChar()">开始冒险</button>
    </div>
    
    <div id="title-screen">
        <h1>三国江湖</h1>
        <p>乱世烽火 · 群雄逐鹿</p>
        <p style="color:#666;font-size:12px;margin-bottom:15px">版本 1.7.0</p>
        <button class="btn" onclick="showCreate()">创建角色</button>
        <button class="btn" onclick="startGame()">快速开始</button>
    </div>
    
    <div id="game">
        <div id="map">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="dirt"></div>
            
            <div class="house house1">
                <div class="roof"></div>
                <div class="wall"><div class="door"></div><div class="window"></div></div>
            </div>
            <div class="house house2">
                <div class="roof"></div>
                <div class="wall"><div class="door"></div><div class="window"></div><div class="window"></div></div>
            </div>
            <div class="house house3">
                <div class="roof"></div>
                <div class="wall"><div class="door"></div></div>
            </div>
            
            <div class="lantern">
                <div class="lantern-top"></div>
                <div class="lantern-body"></div>
                <div class="lantern-bottom"></div>
                <div class="lantern-pole"></div>
            </div>
            
            <div class="ptree ptree1"><div class="ptree-leaf"></div><div class="ptree-trunk"></div></div>
            <div class="ptree ptree2"><div class="ptree-leaf"></div><div class="ptree-trunk"></div></div>
            <div class="ptree ptree3"><div class="ptree-leaf"></div><div class="ptree-trunk"></div></div>
            <div class="ptree ptree4"><div class="ptree-leaf"></div><div class="ptree-trunk"></div></div>
            
            <div class="pstone pstone1"></div>
            <div class="pstone pstone2"></div>
            <div class="pstone pstone3"></div>
            
            <div id="player" class="qchar idle"><div class="qchar-shadow"></div></div>
            
            <div class="npc-char qchar" id="npc-soldier"><div class="char-name">士兵</div></div>
            <div class="npc-char qchar" id="npc-merchant"><div class="char-name">商人</div></div>
            <div class="npc-char qchar" id="npc-general"><div class="char-name">将军</div></div>
            
            <div class="enemy-char qchar" id="enemy1"><div class="char-name">黄巾兵</div><div class="enemy-hp"><div class="enemy-hp-fill" id="enemy1-hp" style="width:100%"></div></div></div>
            <div class="enemy-char qchar" id="enemy2"><div class="char-name">黄巾兵</div><div class="enemy-hp"><div class="enemy-hp-fill" id="enemy2-hp" style="width:100%"></div></div></div>
            <div class="enemy-char qchar" id="enemy3"><div class="char-name">黄巾兵</div><div class="enemy-hp"><div class="enemy-hp-fill" id="enemy3-hp" style="width:100%"></div></div></div>
            
            <div id="interact-prompt"></div>
            <div class="hint">WASD移动 | 空格交互</div>
        </div>
        
        <div id="status">
            <div class="status-row"><span class="stat-label">等级</span><span class="stat-value" id="level">1</span></div>
            <div class="status-row"><span class="stat-label">金币</span><span class="stat-value" id="gold">0</span></div>
            <div class="status-row"><span class="stat-label">HP</span><span class="stat-value" id="hp-text">100/100</span></div>
            <div class="hp-bar"><div class="hp-fill" id="hp-bar" style="width:100%"></div></div>
        </div>
        
        <div id="quest-box">
            <div class="quest-title" id="quest-title">当前任务</div>
            <div class="quest-desc" id="quest-desc"></div>
            <div class="quest-reward" id="quest-reward"></div>
        </div>
        
        <div id="dialogue">
            <div id="speaker"></div>
            <div id="text"></div>
            <div id="choices"></div>
            <button id="close-btn" onclick="closeDialogue()">关闭</button>
        </div>
        
        <div id="notification"></div>
        
        <div id="touch-controls">
            <div id="joystick-zone"><div id="joystick-thumb"></div></div>
            <div id="action-buttons">
                <button class="action-btn" id="btn-pause">暂停</button>
                <button class="action-btn" id="btn-attack">攻击</button>
                <button class="action-btn" id="btn-interact">交互</button>
            </div>
        </div>
    </div>
    
    <script>
    var playerConfig = {
        hair: 'bun',
        hairColor: '#2d2d2d',
        cloth: 'warrior',
        clothColor: '#27ae60'
    };
    
    var presets = {
        warrior: { hair: 'bun', hairColor: '#2d2d2d', cloth: 'warrior', clothColor: '#27ae60' },
        general: { hair: 'bun', hairColor: '#2d2d2d', cloth: 'armor', clothColor: '#2980b9' },
        scholar: { hair: 'long', hairColor: '#2d2d2d', cloth: 'robe', clothColor: '#9b59b6' },
        lady: { hair: 'twin', hairColor: '#5d4037', cloth: 'dress', clothColor: '#e91e63' },
        bandit: { hair: 'short', hairColor: '#5d4037', cloth: 'warrior', clothColor: '#795548' }
    };
    
    function genQCharSVG(cfg) {
        var hairPaths = {
            bun: '<ellipse cx="18" cy="7" rx="10" ry="5" fill="' + cfg.hairColor + '"/><circle cx="18" cy="4" r="5" fill="' + cfg.hairColor + '"/><rect x="15" y="0" width="6" height="4" fill="' + cfg.hairColor + '" rx="1"/>',
            short: '<ellipse cx="18" cy="8" rx="9" ry="6" fill="' + cfg.hairColor + '"/>',
            long: '<ellipse cx="18" cy="7" rx="9" ry="5" fill="' + cfg.hairColor + '"/><rect x="7" y="10" width="4" height="14" fill="' + cfg.hairColor + '" rx="2"/><rect x="23" y="10" width="4" height="14" fill="' + cfg.hairColor + '" rx="2"/>',
            twin: '<ellipse cx="18" cy="7" rx="8" ry="5" fill="' + cfg.hairColor + '"/><circle cx="6" cy="11" r="4" fill="' + cfg.hairColor + '"/><circle cx="30" cy="11" r="4" fill="' + cfg.hairColor + '"/>'
        };
        
        var clothShapes = {
            warrior: '<rect x="8" y="19" width="20" height="13" fill="' + cfg.clothColor + '" rx="2"/><rect x="11" y="19" width="14" height="3" fill="' + lighten(cfg.clothColor, 20) + '"/>',
            robe: '<path d="M6,19 L30,19 L32,34 L4,34 Z" fill="' + cfg.clothColor + '"/><path d="M12,19 L24,19 L25,34 L11,34 Z" fill="' + lighten(cfg.clothColor, 15) + '"/>',
            dress: '<ellipse cx="18" cy="28" rx="12" ry="8" fill="' + cfg.clothColor + '"/><rect x="12" y="19" width="12" height="7" fill="' + cfg.clothColor + '"/>',
            armor: '<rect x="6" y="19" width="24" height="13" fill="' + cfg.clothColor + '" rx="2"/><rect x="4" y="21" width="5" height="10" fill="' + lighten(cfg.clothColor, 15) + '" rx="1"/><rect x="27" y="21" width="5" height="10" fill="' + lighten(cfg.clothColor, 15) + '" rx="1"/><circle cx="18" cy="24" r="3" fill="#ffd700"/>'
        };
        
        return '<svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">' +
            '<ellipse cx="18" cy="35" rx="8" ry="2" fill="rgba(0,0,0,0.2)"/>' +
            '<rect x="12" y="32" width="4" height="3" fill="#5d4037" rx="1"/>' +
            '<rect x="20" y="32" width="4" height="3" fill="#5d4037" rx="1"/>' +
            clothShapes[cfg.cloth] +
            '<ellipse cx="18" cy="15" rx="9" ry="9" fill="#f5d0c5"/>' +
            '<ellipse cx="10" cy="17" rx="2.5" ry="1.5" fill="#ffb6c1" opacity="0.5"/>' +
            '<ellipse cx="26" cy="17" rx="2.5" ry="1.5" fill="#ffb6c1" opacity="0.5"/>' +
            '<ellipse cx="14" cy="14" rx="2.5" ry="3" fill="#2d2d2d"/><ellipse cx="22" cy="14" rx="2.5" ry="3" fill="#2d2d2d"/>' +
            '<circle cx="13" cy="13" r="0.8" fill="#fff"/><circle cx="21" cy="13" r="0.8" fill="#fff"/>' +
            '<ellipse cx="18" cy="19" rx="1.5" ry="0.8" fill="#e57373"/>' +
            '<ellipse cx="9" cy="15" rx="1.5" ry="2" fill="#f5d0c5"/>' +
            '<ellipse cx="27" cy="15" rx="1.5" ry="2" fill="#f5d0c5"/>' +
            hairPaths[cfg.hair] +
            '</svg>';
    }
    
    function lighten(hex, amt) {
        var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
        return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
    }
    
    var npcConfigs = {
        'npc-soldier': { hair: 'bun', hairColor: '#2d2d2d', cloth: 'armor', clothColor: '#2980b9' },
        'npc-merchant': { hair: 'short', hairColor: '#5d4037', cloth: 'robe', clothColor: '#795548' },
        'npc-general': { hair: 'bun', hairColor: '#2d2d2d', cloth: 'armor', clothColor: '#e67e22' }
    };
    
    var enemyConfig = { hair: 'short', hairColor: '#8d6e63', cloth: 'warrior', clothColor: '#d4a574' };
    
    function initChars() {
        document.getElementById('player').innerHTML = '<div class="qchar-shadow"></div>' + genQCharSVG(playerConfig);
        
        Object.keys(npcConfigs).forEach(function(id) {
            var names = { 'npc-soldier': '士兵', 'npc-merchant': '商人', 'npc-general': '将军' };
            document.getElementById(id).innerHTML = '<div class="char-name">' + names[id] + '</div>' + genQCharSVG(npcConfigs[id]);
        });
        
        ['enemy1','enemy2','enemy3'].forEach(function(id) {
            document.getElementById(id).innerHTML = '<div class="char-name">黄巾兵</div><div class="enemy-hp"><div class="enemy-hp-fill" id="' + id + '-hp" style="width:100%"></div></div>' + genQCharSVG(enemyConfig);
        });
    }
    
    function updatePreview() {
        document.getElementById('preview-char').innerHTML = genQCharSVG(playerConfig);
    }
    
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.onclick = function() {
            document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            Object.assign(playerConfig, presets[btn.dataset.preset]);
            document.querySelectorAll('.option-btns').forEach(function(g) {
                var type = g.dataset.type;
                g.querySelectorAll('.opt-btn').forEach(function(o) { o.classList.toggle('selected', o.dataset.value === playerConfig[type]); });
            });
            document.querySelectorAll('.color-btns').forEach(function(g) {
                var type = g.dataset.type;
                g.querySelectorAll('.color-btn').forEach(function(o) { o.classList.toggle('selected', o.dataset.value === playerConfig[type]); });
            });
            updatePreview();
        };
    });
    
    document.querySelectorAll('.option-btns').forEach(function(g) {
        g.querySelectorAll('.opt-btn').forEach(function(btn) {
            btn.onclick = function() {
                g.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('selected'); });
                btn.classList.add('selected');
                playerConfig[g.dataset.type] = btn.dataset.value;
                updatePreview();
            };
        });
    });
    
    document.querySelectorAll('.color-btns').forEach(function(g) {
        g.querySelectorAll('.color-btn').forEach(function(btn) {
            btn.onclick = function() {
                g.querySelectorAll('.color-btn').forEach(function(b) { b.classList.remove('selected'); });
                btn.classList.add('selected');
                playerConfig[g.dataset.type] = btn.dataset.value;
                updatePreview();
            };
        });
    });
    
    function confirmChar() {
        document.getElementById('char-creation').style.display = 'none';
        document.getElementById('title-screen').style.display = 'flex';
    }
    
    function showCreate() {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('char-creation').style.display = 'flex';
    }
    
    var player = { x: 350, y: 280, hp: 100, maxHp: 100, level: 1, gold: 0, attack: 15 };
    var isTalking = false, nearbyTarget = null;
    var enemyHp = { enemy1: {hp:30,maxHp:30}, enemy2: {hp:30,maxHp:30}, enemy3: {hp:30,maxHp:30} };
    
    var targets = {
        'npc-soldier': {x:160,y:180,type:'npc',id:'soldier'},
        'npc-merchant': {x:450,y:130,type:'npc',id:'merchant'},
        'npc-general': {x:520,y:280,type:'npc',id:'general'},
        'enemy1': {x:260,y:220,type:'enemy',id:'enemy1'},
        'enemy2': {x:380,y:250,type:'enemy',id:'enemy2'},
        'enemy3': {x:280,y:350,type:'enemy',id:'enemy3'}
    };
    
    var dialogues = {
        soldier: {speaker:'士兵', texts:['黄巾贼在村外作乱！','将军有令，剿灭贼寇！']},
        merchant: {speaker:'商人', texts:['买卖公道，童叟无欺！','兵荒马乱，生意难做...']},
        general: {speaker:'将军', texts:['壮士，去消灭黄巾兵！','好！我军士气大振！']}
    };
    
    var quest = { title:'剿灭黄巾', desc:'消灭3个黄巾兵', reward:'+50金币' };
    
    var keys = {}, touchDir = null;
    var speed = 4;
    
    function startGame() {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        initChars();
        
        document.addEventListener('keydown', function(e) {
            if (isTalking) return;
            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': keys.up = true; break;
                case 's': case 'arrowdown': keys.down = true; break;
                case 'a': case 'arrowleft': keys.left = true; break;
                case 'd': case 'arrowright': keys.right = true; break;
                case ' ': e.preventDefault(); interact(); break;
            }
        });
        document.addEventListener('keyup', function(e) {
            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': keys.up = false; break;
                case 's': case 'arrowdown': keys.down = false; break;
                case 'a': case 'arrowleft': keys.left = false; break;
                case 'd': case 'arrowright': keys.right = false; break;
            }
        });
        
        setupTouch();
        updateQuest();
        gameLoop();
    }
    
    function setupTouch() {
        var zone = document.getElementById('joystick-zone');
        var thumb = document.getElementById('joystick-thumb');
        var cx, cy, maxD = 30;
        
        zone.addEventListener('touchstart', function(e) {
            e.preventDefault();
            var r = zone.getBoundingClientRect();
            cx = r.left + r.width/2; cy = r.top + r.height/2;
        });
        
        zone.addEventListener('touchmove', function(e) {
            e.preventDefault();
            var dx = e.touches[0].clientX - cx, dy = e.touches[0].clientY - cy;
            var d = Math.sqrt(dx*dx + dy*dy);
            if (d > maxD) { dx = dx/d*maxD; dy = dy/d*maxD; }
            thumb.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
            touchDir = {x: dx/maxD, y: dy/maxD, dist: d/maxD};
        });
        
        zone.addEventListener('touchend', function() {
            thumb.style.transform = 'translate(-50%,-50%)';
            touchDir = null;
        });
        
        document.getElementById('btn-interact').addEventListener('touchstart', function(e) { e.preventDefault(); interact(); });
        document.getElementById('btn-attack').addEventListener('touchstart', function(e) { e.preventDefault(); attack(); });
    }
    
    function gameLoop() {
        var dx = 0, dy = 0;
        if (keys.up) dy -= 1; if (keys.down) dy += 1;
        if (keys.left) dx -= 1; if (keys.right) dx += 1;
        if (touchDir && touchDir.dist > 0.3) { dx = touchDir.x; dy = touchDir.y; }
        
        if (dx || dy) {
            var len = Math.sqrt(dx*dx + dy*dy);
            dx /= len; dy /= len;
            player.x += dx * speed;
            player.y += dy * speed;
            player.x = Math.max(60, Math.min(window.innerWidth - 60, player.x));
            player.y = Math.max(80, Math.min(window.innerHeight - 80, player.y));
            
            var p = document.getElementById('player');
            p.style.left = (player.x - 18) + 'px';
            p.style.top = (player.y - 18) + 'px';
        }
        
        checkNearby();
        requestAnimationFrame(gameLoop);
    }
    
    function checkNearby() {
        var found = null;
        for (var id in targets) {
            var t = targets[id];
            if (Math.sqrt((player.x-t.x)*(player.x-t.x) + (player.y-t.y)*(player.y-t.y)) < 50) { found = t; break; }
        }
        if (found !== nearbyTarget) {
            nearbyTarget = found;
            var prompt = document.getElementById('interact-prompt');
            prompt.textContent = found ? (found.type === 'enemy' ? '空格 攻击' : '空格 对话') : '';
            prompt.style.display = found ? 'block' : 'none';
        }
    }
    
    function interact() {
        if (!nearbyTarget) return;
        if (nearbyTarget.type === 'enemy') { attack(); return; }
        var d = dialogues[nearbyTarget.id];
        if (!d) return;
        isTalking = true;
        document.getElementById('speaker').textContent = d.speaker;
        document.getElementById('text').textContent = d.texts[0];
        document.getElementById('dialogue').style.display = 'block';
    }
    
    function attack() {
        if (!nearbyTarget || nearbyTarget.type !== 'enemy') return;
        var id = nearbyTarget.id;
        enemyHp[id].hp -= player.attack;
        document.getElementById(id + '-hp').style.width = Math.max(0, enemyHp[id].hp / enemyHp[id].maxHp * 100) + '%';
        
        if (enemyHp[id].hp <= 0) {
            document.getElementById(id).style.display = 'none';
            player.gold += 20;
            document.getElementById('gold').textContent = player.gold;
            showNotif('击败敌人！+20金币');
            
            if (['enemy1','enemy2','enemy3'].filter(function(e) { return enemyHp[e].hp > 0; }).length === 0) {
                showNotif('任务完成！' + quest.reward);
                player.gold += 50;
                document.getElementById('gold').textContent = player.gold;
                quest = null;
                updateQuest();
            }
        }
    }
    
    function closeDialogue() {
        isTalking = false;
        document.getElementById('dialogue').style.display = 'none';
    }
    
    function showNotif(text) {
        var n = document.getElementById('notification');
        n.textContent = text;
        n.style.display = 'block';
        setTimeout(function() { n.style.display = 'none'; }, 2000);
    }
    
    function updateQuest() {
        var box = document.getElementById('quest-box');
        if (quest) {
            document.getElementById('quest-title').textContent = quest.title;
            document.getElementById('quest-desc').textContent = quest.desc;
            document.getElementById('quest-reward').textContent = quest.reward;
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }
    
    updatePreview();
    </script>
</body>
</html>
