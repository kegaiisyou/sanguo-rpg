<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>江湖风云录 - 武侠RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    background:#0a0a0f;
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;padding:10px;
    background-image:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a0f 70%);
}
#game{
    width:100%;max-width:600px;
    background:#0d1117;
    border-radius:12px;overflow:hidden;
    box-shadow:0 0 40px rgba(180,140,60,0.2),0 0 80px rgba(0,0,0,0.6);
    position:relative;height:94vh;max-height:800px;
    display:flex;flex-direction:column;
    border:2px solid #2a2015;
}

/* ===== 开场界面 ===== */
#title-screen{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(180deg,#0d0d1a 0%,#1a1020 40%,#0d0d1a 100%);
    z-index:500;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;
}
#title-screen::before{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    background:
        radial-gradient(circle at 20% 30%,rgba(180,140,60,0.08) 0%,transparent 50%),
        radial-gradient(circle at 80% 70%,rgba(180,140,60,0.06) 0%,transparent 50%);
    pointer-events:none;
}
.title-deco{
    font-size:60px;color:#b48c3c;
    text-shadow:0 0 30px rgba(180,140,60,0.5);
    animation:float 3s ease-in-out infinite;
    position:relative;z-index:1;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title-main{
    font-size:42px;color:#e8d5a3;
    text-shadow:0 0 20px rgba(200,160,60,0.6),0 2px 4px rgba(0,0,0,0.8);
    letter-spacing:8px;position:relative;z-index:1;
    font-weight:bold;
}
.title-sub{
    font-size:16px;color:#8b7355;
    letter-spacing:6px;position:relative;z-index:1;
    margin-top:-5px;
}
.title-divider{
    width:120px;height:2px;
    background:linear-gradient(90deg,transparent,#b48c3c,transparent);
    position:relative;z-index:1;
}
#title-btns{
    display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;
    margin-top:10px;
}
.title-btn{
    padding:12px 50px;font-size:18px;
    background:linear-gradient(180deg,rgba(180,140,60,0.15) 0%,rgba(100,70,20,0.2) 100%);
    border:2px solid #6b4c2a;border-radius:8px;
    color:#e8d5a3;cursor:pointer;letter-spacing:4px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    transition:all 0.3s;position:relative;overflow:hidden;
}
.title-btn:hover{
    background:linear-gradient(180deg,rgba(200,160,80,0.3) 0%,rgba(140,100,40,0.3) 100%);
    border-color:#b48c3c;box-shadow:0 0 20px rgba(180,140,60,0.3);
    transform:scale(1.03);
}
.title-btn:active{transform:scale(0.96);}
.title-btn.disabled{
    opacity:0.35;cursor:not-allowed;pointer-events:none;
}
.title-version{
    font-size:11px;color:#4a3520;position:relative;z-index:1;
    margin-top:10px;
}

/* ===== 顶栏 ===== */
#topbar{
    background:linear-gradient(180deg,#1a1520,#101018);
    padding:8px 16px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:2px solid #3d2e1a;
}
#topbar h1{font-size:16px;color:#d4a853;letter-spacing:3px;}
#loc-name{font-size:12px;color:#8b7355;}

/* ===== 地图区（视口跟随主角） ===== */
#map-container{
    flex:1;position:relative;overflow:hidden;
    background:#0d0a10;
    min-height:0;
}
#map-viewport{
    position:absolute;top:0;left:0;right:0;bottom:0;
    overflow:hidden;
}
#map-layer{
    position:absolute;top:0;left:0;
    width:800px;height:560px;
    background:#2d5016;
    box-shadow:0 0 0 3px #3d2e1a, 0 0 30px rgba(0,0,0,0.6);
    transition:transform 0.2s ease-out;
}
.tile{
    position:absolute;image-rendering:pixelated;
    border:1px solid rgba(0,0,0,0.06);
}
.tile-grass{background:#4a7c2e;}
.tile-path{background:#c4a46c;}
.tile-wall{background:#4a4a4a;border-color:rgba(255,255,255,0.05);}
.tile-house{background:#8d6e63;border-color:rgba(0,0,0,0.15);}
.tile-cave{background:#5d4037;border-color:rgba(0,0,0,0.2);}
.tile-dungeon{background:#311b92;border-color:rgba(255,255,255,0.05);}
.tile-shop{background:#c06014;border-color:rgba(0,0,0,0.1);}
.tile-altar{background:#d4a853;border-color:rgba(0,0,0,0.1);}
.tile-water{background:#2980b9;border-color:rgba(255,255,255,0.08);}
.tile-forest{background:#2d6b1e;border-color:rgba(0,0,0,0.08);}
.tile-bridge{background:#8d6e63;border-color:rgba(0,0,0,0.1);}
.tile-temple{background:#6d4c41;border-color:rgba(0,0,0,0.1);}

/* ===== CSS像素角色 ===== */
.actor{position:absolute;z-index:10;transition:left 0.15s,top 0.15s;}
.actor-body{position:relative;width:28px;height:40px;}
.actor-head{
    width:15px;height:15px;border-radius:50%;
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    border:1px solid rgba(0,0,0,0.3);
}
.actor-hair{
    width:17px;height:6px;border-radius:3px 3px 0 0;
    position:absolute;top:-2px;left:50%;transform:translateX(-50%);
}
.actor-torso{
    width:19px;height:15px;border-radius:3px;
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    border:1px solid rgba(0,0,0,0.3);
}
.actor-left-leg,.actor-right-leg{
    width:6px;height:10px;border-radius:0 0 2px 2px;
    position:absolute;bottom:0;
}
.actor-left-leg{left:6px;}.actor-right-leg{right:6px;}
.actor-weapon{
    width:3px;height:22px;border-radius:1px;
    position:absolute;top:8px;right:-4px;
    background:#b0bec5;
}
.actor-shadow{
    width:20px;height:6px;background:rgba(0,0,0,0.35);
    border-radius:50%;position:absolute;bottom:-4px;left:50%;
    transform:translateX(-50%);
}
.actor-name{
    position:absolute;top:-19px;left:50%;transform:translateX(-50%);
    font-size:9px;white-space:nowrap;color:#fff;
    text-shadow:1px 1px 0 #000;
    font-family:"Microsoft YaHei",sans-serif;
}
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes walkBob{0%,100%{transform:translateY(0) translateX(0)}
    25%{transform:translateY(-3px) translateX(1px)}
    75%{transform:translateY(-3px) translateX(-1px)}}
.actor.idle .actor-body{animation:idleBounce 1.2s ease-in-out infinite;}
.actor.walk .actor-body{animation:walkBob 0.35s ease-in-out infinite;}

/* ===== 状态面板 ===== */
#status-panel{
    background:rgba(0,0,0,0.88);padding:8px 14px;
    display:flex;justify-content:space-around;gap:6px;
    border-top:2px solid #3d2e1a;
    flex-wrap:wrap;align-items:flex-end;
}
.stat{text-align:center;min-width:52px;}
.stat-icon{font-size:14px;}
.stat-val{font-size:12px;font-weight:bold;color:#d4a853;margin-bottom:1px;}
.stat-label{font-size:9px;color:#8b7355;}
/* 血条/蓝条 */
.stat-bar-wrap{
    width:100%;height:5px;background:#222;
    border-radius:3px;overflow:hidden;
    border:1px solid #333;margin-top:2px;
}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 0.3s ease;}
.stat-bar-fill.hp-fill{background:linear-gradient(90deg,#c0392b,#e74c3c,#c0392b);}
.stat-bar-fill.mp-fill{background:linear-gradient(90deg,#2471a3,#3498db,#2471a3);}
.stat-bar-fill.exp-fill{background:linear-gradient(90deg,#b7950b,#f1c40f,#b7950b);}
.stat-hp-val{color:#e74c3c;font-size:12px;font-weight:bold;}
.stat-mp-val{color:#3498db;font-size:12px;font-weight:bold;}

/* ===== 操作栏 ===== */
#action-bar{
    background:rgba(0,0,0,0.88);padding:6px 14px;
    display:flex;gap:8px;justify-content:center;
    border-top:1px solid #3d2e1a;
}
.act-btn{
    padding:7px 16px;border-radius:6px;border:1px solid #4a3520;
    font-size:12px;font-weight:bold;cursor:pointer;
    background:linear-gradient(180deg,rgba(180,140,60,0.1),rgba(100,70,20,0.15));
    color:#e8d5a3;transition:all 0.15s;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
}
.act-btn:hover{background:linear-gradient(180deg,rgba(200,160,80,0.2),rgba(140,100,40,0.2));border-color:#b48c3c;}
.act-btn:active{transform:scale(0.95);}

/* ===== 对话框 ===== */
#dialog-box{
    display:none;position:absolute;bottom:0;left:0;right:0;
    background:rgba(10,8,14,0.97);padding:14px 18px;
    border-top:3px solid #b48c3c;z-index:50;
}
#dialog-speaker{font-size:14px;color:#e8a850;margin-bottom:6px;font-weight:bold;letter-spacing:2px;}
#dialog-text{font-size:13px;color:#ccc;line-height:1.7;margin-bottom:10px;}
#dialog-choices{display:flex;flex-wrap:wrap;gap:8px;}
.dchoice{
    padding:7px 16px;border-radius:4px;border:1px solid #6b4c2a;
    background:rgba(180,140,60,0.08);color:#d4a853;cursor:pointer;
    font-size:12px;font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    transition:all 0.15s;
}
.dchoice:hover{background:#b48c3c;color:#0d0d1a;border-color:#b48c3c;}

/* ===== 战斗面板 ===== */
#battle-panel{
    display:none;position:absolute;top:0;left:0;right:0;bottom:0;
    background:rgba(8,6,12,0.94);z-index:100;
    flex-direction:column;align-items:center;justify-content:center;
}
#battle-scene{padding:20px;text-align:center;}
.battle-row{display:flex;align-items:center;gap:30px;margin:10px 0;justify-content:center;}
.battle-char{text-align:center;min-width:80px;}
.battle-char .actor{position:relative;display:inline-block;}
.battle-hp-bar{
    width:130px;height:8px;background:#222;border-radius:4px;
    margin-top:6px;overflow:hidden;border:1px solid #444;
    display:inline-block;
}
.battle-hp-fill{height:100%;transition:width 0.3s;}
.hp-player{background:linear-gradient(90deg,#2ea043,#1a7a2e);}
.hp-enemy{background:linear-gradient(90deg,#c0392b,#7b241c);}
.battle-name{font-size:13px;color:#e8d5a3;margin-top:4px;letter-spacing:2px;}
.battle-nums{font-size:10px;color:#8b7355;}
#battle-vs{font-size:30px;color:#b48c3c;}
#battle-log{
    color:#d4a853;font-size:13px;min-height:24px;
    text-align:center;margin:12px 0;line-height:1.6;
}
#battle-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.bact-btn{
    padding:10px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
    font-size:12px;font-weight:bold;cursor:pointer;color:#fff;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:1px;transition:all 0.15s;
}
.bact-btn.atk{background:linear-gradient(180deg,#c0392b,#8b1a1a);}
.bact-btn.skill{background:linear-gradient(180deg,#2471a3,#154360);}
.bact-btn.item{background:linear-gradient(180deg,#1e8449,#145a32);}
.bact-btn.flee{background:linear-gradient(180deg,#555,#333);}
.bact-btn:hover{filter:brightness(1.2);transform:translateY(-1px);}

/* ===== 弹窗 ===== */
.modal{
    display:none;position:absolute;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.88);z-index:200;
    flex-direction:column;align-items:center;justify-content:center;
}
.modal.show{display:flex;}
.modal-box{
    background:linear-gradient(180deg,#1a1520,#101018);
    border:2px solid #6b4c2a;border-radius:12px;
    padding:22px 26px;max-width:400px;width:90%;text-align:center;
}
.modal-box h2{color:#d4a853;margin-bottom:10px;font-size:18px;letter-spacing:3px;}
.modal-box p{color:#b8a080;font-size:13px;line-height:1.8;margin-bottom:16px;white-space:pre-line;}
.modal-btn{
    padding:9px 32px;border-radius:6px;border:1px solid #6b4c2a;
    background:linear-gradient(180deg,rgba(180,140,60,0.15),rgba(100,70,20,0.2));
    color:#e8d5a3;cursor:pointer;font-size:14px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:2px;transition:all 0.2s;
}
.modal-btn:hover{background:linear-gradient(180deg,rgba(200,160,80,0.3),rgba(140,100,40,0.3));border-color:#b48c3c;}

/* ===== 提示 ===== */
#hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.92);color:#d4a853;padding:10px 24px;
    border-radius:8px;font-size:13px;z-index:60;
    display:none;pointer-events:none;
    border:1px solid #6b4c2a;letter-spacing:1px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
}

/* ===== 手机虚拟方向键 ===== */
#mobile-controls{
    display:none;
    position:absolute;bottom:10px;left:0;right:0;
    z-index:80;pointer-events:none;
    justify-content:space-between;align-items:flex-end;
    padding:0 10px;
}
#mobile-dpad{
    display:grid;grid-template-columns:44px 44px 44px;
    grid-template-rows:44px 44px 44px;
    gap:2px;pointer-events:auto;
}
.mbtn{
    width:44px;height:44px;border-radius:8px;
    border:1px solid rgba(180,140,60,0.4);
    background:rgba(20,15,10,0.75);
    color:#d4a853;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
}
.mbtn:active{background:rgba(180,140,60,0.35);transform:scale(0.9);}
.mbtn-empty{background:transparent;border:none;pointer-events:none;}
#mbtn-up{grid-column:2;grid-row:1;}
#mbtn-left{grid-column:1;grid-row:2;}
#mbtn-center{grid-column:2;grid-row:2;}
#mbtn-right{grid-column:3;grid-row:2;}
#mbtn-down{grid-column:2;grid-row:3;}

#mobile-actions{
    display:flex;flex-direction:column;gap:6px;pointer-events:auto;
}
.maction{
    width:56px;height:56px;border-radius:50%;
    border:2px solid rgba(180,140,60,0.5);
    background:rgba(30,15,5,0.8);
    color:#e8d5a3;font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:1px;
}
.maction:active{background:rgba(180,140,60,0.4);transform:scale(0.9);}
#mbtn-act{font-size:22px;}

/* 长按方向键保持移动 */
.mbtn.pressed{background:rgba(180,140,60,0.4);}

/* 手机端适配 */
@media(max-width:600px){
    #mobile-controls{display:flex;}
    #action-bar .act-btn{font-size:10px;padding:5px 8px;}
    #topbar h1{font-size:13px;}
}

/* ===== 设置面板 ===== */
.setting-row{
    display:flex;align-items:center;justify-content:space-between;
    margin:14px 0;gap:10px;
}
.setting-row span.set-label{color:#d4a853;font-size:14px;white-space:nowrap;min-width:48px;}
.setting-row span.set-val{font-size:12px;color:#b48c3c;min-width:32px;text-align:right;}
.setting-row input[type=range]{
    flex:1;max-width:180px;height:6px;cursor:pointer;
    -webkit-appearance:none;appearance:none;
    background:#2a2015;border-radius:3px;outline:none;
}
.setting-row input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:20px;height:20px;border-radius:50%;
    background:linear-gradient(135deg,#b48c3c,#8b6914);
    cursor:pointer;border:2px solid #e8d5a3;
    box-shadow:0 0 8px rgba(180,140,60,0.4);
}
</style>
</head>
<body>

<div id="game">

<!-- ===== 开场界面 ===== -->
<div id="title-screen">
    <div class="title-deco">⚔️</div>
    <div class="title-main">江 湖 风 云 录</div>
    <div class="title-sub">仗 剑 天 涯 · 快 意 恩 仇</div>
    <div class="title-divider"></div>
    <div id="title-btns">
        <button class="title-btn" onclick="newGame()">初 入 江 湖</button>
        <button class="title-btn" id="btn-load" onclick="loadGame()">再 续 前 缘</button>
    </div>
    <div class="title-version">v4.0 · 武侠RPG</div>
</div>

<!-- 顶栏 -->
<div id="topbar">
    <h1>⚔️ 江湖风云录</h1>
    <span id="loc-name">清风镇</span>
</div>

<!-- 地图 -->
<div id="map-container">
    <div id="map-viewport">
        <div id="map-layer"></div>
    </div>
    <div id="hint"></div>
    <!-- 手机虚拟控件 -->
    <div id="mobile-controls">
        <div id="mobile-dpad">
            <button class="mbtn" id="mbtn-up"    ontouchstart="mobileDir('up',event)"    ontouchend="mobileStop(event)"    onmousedown="mobileDir('up',event)"    onmouseup="mobileStop(event)">▲</button>
            <button class="mbtn" id="mbtn-left"  ontouchstart="mobileDir('left',event)"  ontouchend="mobileStop(event)"    onmousedown="mobileDir('left',event)"  onmouseup="mobileStop(event)">◄</button>
            <button class="mbtn mbtn-empty" id="mbtn-center"></button>
            <button class="mbtn" id="mbtn-right" ontouchstart="mobileDir('right',event)" ontouchend="mobileStop(event)"    onmousedown="mobileDir('right',event)" onmouseup="mobileStop(event)">►</button>
            <button class="mbtn" id="mbtn-down"  ontouchstart="mobileDir('down',event)"  ontouchend="mobileStop(event)"    onmousedown="mobileDir('down',event)"  onmouseup="mobileStop(event)">▼</button>
        </div>
        <div id="mobile-actions">
            <button class="maction" id="mbtn-act" ontouchstart="mobileInteract(event)" onmousedown="mobileInteract(event)">🗡️</button>
            <button class="maction" id="mbtn-meditate" onclick="meditate()">🧘</button>
        </div>
    </div>
</div>

<!-- 状态 -->
<div id="status-panel">
    <div class="stat">
        <div class="stat-icon">❤️</div>
        <div class="stat-val stat-hp-val" id="s-hp">100/100</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill hp-fill" id="s-hpbar"></div></div>
        <div class="stat-label">气血</div>
    </div>
    <div class="stat">
        <div class="stat-icon">💠</div>
        <div class="stat-val stat-mp-val" id="s-mp">30/30</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill mp-fill" id="s-mpbar"></div></div>
        <div class="stat-label">内力</div>
    </div>
    <div class="stat" style="min-width:40px;">
        <div class="stat-icon">⚔️</div>
        <div class="stat-val" id="s-atk">15</div>
        <div class="stat-label">攻击</div>
    </div>
    <div class="stat" style="min-width:42px;">
        <div class="stat-icon">💰</div>
        <div class="stat-val" id="s-gold">50</div>
        <div class="stat-label">银两</div>
    </div>
    <div class="stat">
        <div class="stat-icon">⭐</div>
        <div class="stat-val" id="s-lv">Lv.1</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill exp-fill" id="s-expbar"></div></div>
        <div class="stat-label" id="s-exp">EXP</div>
    </div>
</div>

<!-- 操作 -->
<div id="action-bar">
    <button class="act-btn" onclick="showInventory()">🎒 行囊</button>
    <button class="act-btn" onclick="showQuest()">📜 任务</button>
    <button class="act-btn" onclick="meditate()">🧘 调息</button>
    <button class="act-btn" onclick="openSettings()" title="设置" style="min-width:36px;padding:7px 8px;">⚙️</button>
</div>

<!-- 对话框 -->
<div id="dialog-box">
    <div id="dialog-speaker"></div>
    <div id="dialog-text"></div>
    <div id="dialog-choices"></div>
</div>

<!-- 战斗面板 -->
<div id="battle-panel">
    <div id="battle-scene">
        <div class="battle-row">
            <div class="battle-char">
                <div id="battle-player"></div>
                <div class="battle-name">少侠</div>

<script>
// ==================== 音效系统 (Web Audio API) ====================
var SND = {ctx:null, sfxGain:null, musicGain:null, sfxVol:0.7, musicVol:0.3};
function sndInit(){
    if(!SND.ctx)try{
        SND.ctx=new(window.AudioContext||window.webkitAudioContext)();
        SND.sfxGain=SND.ctx.createGain();
        SND.sfxGain.gain.value=SND.sfxVol;
        SND.sfxGain.connect(SND.ctx.destination);
        SND.musicGain=SND.ctx.createGain();
        SND.musicGain.gain.value=SND.musicVol;
        SND.musicGain.connect(SND.ctx.destination);
        loadSettings();
    }catch(e){}
}
function sndTone(f,t,d,v,s){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    var o=c.createOscillator(),g=c.createGain();
    o.type=t||'sine';o.frequency.setValueAtTime(f,tm);
    if(s)o.frequency.exponentialRampToValueAtTime(f*s,tm+d);
    g.gain.setValueAtTime(v||0.12,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
    o.connect(g);g.connect(SND.sfxGain);o.start(tm);o.stop(tm+d);
}
function sndNoise(d,v,ff,q){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    var sr=c.sampleRate,len=Math.floor(sr*d);
    var b=c.createBuffer(1,len,sr),a=b.getChannelData(0);
    for(var i=0;i<len;i++)a[i]=Math.random()*2-1;
    var s=c.createBufferSource();s.buffer=b;
    var g=c.createGain();
    g.gain.setValueAtTime(v||0.06,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
    var f=c.createBiquadFilter();f.type=ff?'bandpass':'highpass';f.frequency.value=ff||2500;f.Q.value=q||0.8;
    s.connect(f);f.connect(g);g.connect(SND.sfxGain);s.start(tm);
}
function sndRing(f1,f2,d,v){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    for(var i=0;i<2;i++){var o=c.createOscillator(),g=c.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(i?f1:f2,tm);
        g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
        o.connect(g);g.connect(SND.sfxGain);o.start(tm);o.stop(tm+d);
    }
}

// ==================== 背景音乐 — 箫声沧海 ====================
var MUSIC = {playing:false, noteIdx:0, timer:null, drones:[], curFreq:0};
// 五声音阶 宫商角徵羽 C D E G A (三层)
var PENTA = [[131,147,165,196,220],[262,294,330,392,440],[523,587,659,784,880]];
// 沧海一声笑风格旋律 [八度, 音位, 时值(拍)]
var MELODY = [
    [1,2,2],[1,1,2],[1,0,3],[0,4,3],[0,3,2],[1,2,2],[1,1,2],[1,0,4],[0,4,2],
    [1,2,2],[1,1,2],[1,0,3],[0,4,2],[0,3,1],[0,4,2],[1,0,3],[1,1,4],
    [1,0,2],[1,1,2],[1,2,2],[1,3,3],[1,4,3],[2,0,5],
    [1,3,2],[1,2,2],[1,1,2],[1,0,3],[0,4,3],[0,3,4],
    [0,3,2],[0,4,2],[1,0,2],[1,1,2],[1,2,3],[1,0,3],[1,1,4],
    [1,2,3],[1,1,2],[1,0,2],[0,4,3],[0,3,2],[1,0,3],[1,0,6]
];
var BGM_BPM = 42, BGM_BEAT = 60000/BGM_BPM;

function musicPlayNote(){
    if(!SND.ctx||!MUSIC.playing) return;
    var idx = MUSIC.noteIdx % MELODY.length;
    var m = MELODY[idx];
    var freq = PENTA[m[0]][m[1]];
    var dur = m[2] * BGM_BEAT / 1000;
    var c = SND.ctx, tm = c.currentTime;
    var prevFreq = MUSIC.curFreq||freq;
    MUSIC.curFreq = freq;

    // 主箫声 — triangle波模拟竹管共鸣
    var o1 = c.createOscillator(), g1 = c.createGain();
    o1.type = 'triangle';
    if(idx>0&&Math.abs(freq-prevFreq)<freq*0.35){
        o1.frequency.setValueAtTime(prevFreq, tm);
        o1.frequency.exponentialRampToValueAtTime(freq, tm+0.12);
    } else { o1.frequency.setValueAtTime(freq, tm); }
    g1.gain.setValueAtTime(0, tm);
    g1.gain.linearRampToValueAtTime(0.09, tm+0.1);
    g1.gain.setValueAtTime(0.09, tm+dur*0.55);
    g1.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.95);
    o1.connect(g1); g1.connect(SND.musicGain);
    o1.start(tm); o1.stop(tm+dur+0.15);

    // 泛音 — sine高八度增加清澈感
    var o2 = c.createOscillator(), g2 = c.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq*2, tm);
    g2.gain.setValueAtTime(0, tm);
    g2.gain.linearRampToValueAtTime(0.03, tm+0.15);
    g2.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.7);
    o2.connect(g2); g2.connect(SND.musicGain);
    o2.start(tm); o2.stop(tm+dur*0.7+0.1);

    // 气声 — 模拟吹奏的呼吸噪音
    var sr = c.sampleRate;
    var noiseLen = Math.floor(sr * dur * 0.45);
    var nb = c.createBuffer(1, noiseLen, sr);
    var nd = nb.getChannelData(0);
    for(var i=0;i<noiseLen;i++) nd[i] = Math.random()*2-1;
    var ns = c.createBufferSource(); ns.buffer = nb;
    var ng = c.createGain();
    ng.gain.setValueAtTime(0, tm);
    ng.gain.linearRampToValueAtTime(0.012, tm+0.08);
    ng.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.45);
    var nf = c.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.setValueAtTime(freq*5, tm);
    nf.Q.value = 1.2;
    ns.connect(nf); nf.connect(ng); ng.connect(SND.musicGain);
    ns.start(tm);

    // 余音混响 — 延迟淡出模拟山谷回响
    if(dur > 1.2){
        var o3 = c.createOscillator(), g3 = c.createGain();
        o3.type = 'sine';
        o3.frequency.setValueAtTime(freq*0.5, tm+dur*0.6);
        g3.gain.setValueAtTime(0, tm+dur*0.6);
        g3.gain.linearRampToValueAtTime(0.025, tm+dur*0.7);
        g3.gain.exponentialRampToValueAtTime(0.001, tm+dur*1.1);
        o3.connect(g3); g3.connect(SND.musicGain);
        o3.start(tm+dur*0.6); o3.stop(tm+dur*1.2);
    }

    MUSIC.noteIdx++;
    var nextDelay = m[2] * BGM_BEAT;
    // 在长音末尾稍有停顿，增加苍凉感
    if(m[2] >= 5) nextDelay += 150;
    MUSIC.timer = setTimeout(musicPlayNote, nextDelay);
}

function startMusic(){
    if(MUSIC.playing) return;
    if(!SND.ctx){ sndInit(); if(!SND.ctx) return; }
    MUSIC.playing = true; MUSIC.noteIdx = 0;
    var c = SND.ctx;
    // 底层持续嗡鸣 — 远山风声
    MUSIC.drones=[];
    var droneFreqs = [32.7, 65.4, 98];
    for(var i=0;i<3;i++){
        var o=c.createOscillator(), g=c.createGain();
        o.type=i===0?'sine':'triangle';
        o.frequency.setValueAtTime(droneFreqs[i],c.currentTime);
        g.gain.setValueAtTime(i===0?0.016:i===1?0.012:0.008, c.currentTime);
        o.connect(g); g.connect(SND.musicGain);
        o.start(); MUSIC.drones.push({osc:o,gain:g});
    }
    musicPlayNote();
}

function stopMusic(){
    MUSIC.playing = false; MUSIC.curFreq = 0;
    if(MUSIC.timer){ clearTimeout(MUSIC.timer); MUSIC.timer = null; }
    if(MUSIC.drones){
        for(var i=0;i<MUSIC.drones.length;i++){
            try{MUSIC.drones[i].osc.stop()}catch(e){}
            MUSIC.drones[i].gain.disconnect();
        }
        MUSIC.drones=[];
    }
}

function setSfxVol(v){
    SND.sfxVol = Math.max(0, Math.min(1, v));
    if(SND.sfxGain) SND.sfxGain.gain.value = SND.sfxVol;
    var lbl = document.getElementById('sfx-vol-label'); if(lbl) lbl.textContent = Math.round(SND.sfxVol*100);
    saveSettings();
}
function setMusicVol(v){
    SND.musicVol = Math.max(0, Math.min(1, v));
    if(SND.musicGain) SND.musicGain.gain.value = SND.musicVol;
    var lbl = document.getElementById('music-vol-label'); if(lbl) lbl.textContent = Math.round(SND.musicVol*100);
    saveSettings();
}
function openSettings(){
    sndInit();
    document.getElementById('sfx-vol-slider').value = Math.round(SND.sfxVol*100);
    document.getElementById('music-vol-slider').value = Math.round(SND.musicVol*100);
    var sl = document.getElementById('sfx-vol-label'); if(sl) sl.textContent = Math.round(SND.sfxVol*100);
    var ml = document.getElementById('music-vol-label'); if(ml) ml.textContent = Math.round(SND.musicVol*100);
    document.getElementById('settings-modal').classList.add('show');
}
function closeSettings(){
    document.getElementById('settings-modal').classList.remove('show');
}
function saveSettings(){
    try{ localStorage.setItem('wuxia_settings', JSON.stringify({sfxVol:SND.sfxVol, musicVol:SND.musicVol})); }catch(e){}
}
function loadSettings(){
    try{
        var raw = localStorage.getItem('wuxia_settings');
        if(raw){
            var s = JSON.parse(raw);
            if(s.sfxVol != null) SND.sfxVol = s.sfxVol;
            if(s.musicVol != null) SND.musicVol = s.musicVol;
        }
    }catch(e){}
}

// ==================== 存档系统 ====================
var SAVE_KEY = 'wuxia_rpg_save';

function hasSave(){
    return !!localStorage.getItem(SAVE_KEY);
}

function saveGameData(){
    var data = {
        player: player,
        killCounts: killCounts,
        deadEnemies: deadEnemies,
        quests: quests,
        hermitBuffed: player.hermitBuffed
    };
    try{
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        showHint('💾 存档成功！');
    }catch(e){
        showHint('❌ 存档失败，请检查浏览器存储空间');
    }
}

function loadGameData(){
    try{
        var raw = localStorage.getItem(SAVE_KEY);
        if(!raw) return false;
        var data = JSON.parse(raw);
        // 恢复玩家数据
        var p = data.player;
        player.x = p.x; player.y = p.y;
        player.hp = p.hp; player.maxHp = p.maxHp;
        player.mp = p.mp; player.maxMp = p.maxMp;
        player.atk = p.atk; player.def = p.def;
        player.level = p.level; player.exp = p.exp;
        player.expNeed = p.expNeed; player.gold = p.gold;
        player.items = p.items || {potion:3, superPotion:1};
        player.quests = p.quests || {quest_1:false,quest_2:false,quest_3:false};
        player.hermitBuffed = p.hermitBuffed || data.hermitBuffed || false;
        // 恢复击杀数据
        killCounts = data.killCounts || {bandit:0, bully:0, guard:0, boss:0};
        deadEnemies = data.deadEnemies || {};
        quests = data.quests || {
            quest_1:{name:'剿灭山贼',desc:'击败5名山贼',target:5,progress:0,rewardGold:150,rewardExp:100,done:false,rewardClaimed:false},
            quest_2:{name:'惩治恶霸',desc:'击败3名恶霸',target:3,progress:0,rewardGold:250,rewardExp:150,done:false,rewardClaimed:false},
            quest_3:{name:'决战魔教',desc:'击败魔教教主',target:1,progress:0,rewardGold:1200,rewardExp:600,done:false,rewardClaimed:false}
        };
        return true;
    }catch(e){
        console.error('读档失败:', e);
        return false;
    }
}

        showModal('读档失败','存档数据损坏，请重新开始游戏。');
        return;
    }
    startGame();
}

function startGame(){
    sndInit();
    startMusic();
    gameStarted = true;
    checkMobile();
    document.getElementById('title-screen').style.display = 'none';
    buildMap();
    renderPlayer();
    updateStats();
    // resize触发镜头重新计算

// ==================== 渲染 ====================
function buildMap(){
    var layer = document.getElementById('map-layer');
    var h = '';
    for(var y=0;y<MAP_H;y++){
        for(var x=0;x<MAP_W;x++){
            var t = mapData[y][x];
            var s = tileStyle[t];
            h += '<div class="tile '+s.cls+'" style="left:'+(x*TILE)+'px;top:'+(y*TILE)+'px;width:'+TILE+'px;height:'+TILE+'px;"></div>';
        }
    }
    layer.innerHTML = h;

    // NPC
    npcs.forEach(function(n){
        layer.innerHTML += genActorHTML(n.id, n.x, n.y, n.color, n.name, 'npc');
    });

    // 敌人——只渲染活着的
    enemies.forEach(function(e){
        if(!deadEnemies[e.id]){
            layer.innerHTML += genActorHTML(e.id, e.x, e.y, {skin:'#deb887',hair:'#333',cloth:e.color}, e.name, 'enemy');
        }
    });

    renderPlayer();
}

function genActorHTML(id,x,y,color,name,type){
    var cssX = x*TILE + (TILE-28)/2;
    var cssY = y*TILE + TILE-44;
    var h = '<div class="actor '+type+'" id="'+id+'" style="left:'+cssX+'px;top:'+cssY+'px;">';
    h += '<span class="actor-name">'+name+'</span>';
    h += '<div class="actor-shadow"></div>';
    h += '<div class="actor-body">';
    h += '<div class="actor-head" style="background:'+color.skin+'"></div>';
    h += '<div class="actor-hair" style="background:'+color.hair+'"></div>';
    h += '<div class="actor-torso" style="background:'+color.cloth+'"></div>';
    h += '<div class="actor-left-leg" style="background:#333"></div>';
    h += '<div class="actor-right-leg" style="background:#333"></div>';
    if(type==='player'){
        h += '<div class="actor-weapon" style="background:#b0bec5"></div>';
    }
    h += '</div></div>';
    return h;
}

function renderPlayer(){
    var pdiv = document.getElementById('player-actor');
    var cssX = player.x*TILE + (TILE-28)/2;
    var cssY = player.y*TILE + TILE-44;
    if(!pdiv){
        var layer = document.getElementById('map-layer');
        var color = {skin:'#ffe0bd',hair:'#3d2817',cloth:'#1a5276'};
        var h = genActorHTML('player-actor',player.x,player.y,color,'少侠','player');
        layer.insertAdjacentHTML('beforeend',h);
        pdiv = document.getElementById('player-actor');
    }
    pdiv.style.left = cssX+'px';
    pdiv.style.top = cssY+'px';
    pdiv.className = 'actor player idle';

    var loc = areaName(player.x,player.y);
    document.getElementById('loc-name').textContent = loc;
    updateStats();
    updateCamera();
}

// ==================== 镜头跟随 ====================
function updateCamera(){
    var viewport = document.getElementById('map-viewport');
    var mlayer = document.getElementById('map-layer');
    var vw = viewport.clientWidth;
    var vh = viewport.clientHeight;
    var mw = MAP_W * TILE;  // 560
    var mh = MAP_H * TILE;  // 400

    // 主角在地图上的像素中心
    var px = player.x * TILE + TILE/2;
    var py = player.y * TILE + TILE/2;

    // 如果地图比视口小，居中显示
    var tx, ty;
    if(mw <= vw){
        tx = (vw - mw) / 2;
    } else {
        tx = vw/2 - px;
        tx = Math.max(vw - mw, Math.min(0, tx));
    }
    if(mh <= vh){
        ty = (vh - mh) / 2;
    } else {
        ty = vh/2 - py;
        ty = Math.max(vh - mh, Math.min(0, ty));
    }

    mlayer.style.transform = 'translate('+Math.round(tx)+'px,'+Math.round(ty)+'px)';
}

function updateStats(){
    var hpPct = (player.hp/player.maxHp*100).toFixed(1);
    var mpPct = (player.mp/player.maxMp*100).toFixed(1);
    var expPct = (player.exp/player.expNeed*100).toFixed(1);
    document.getElementById('s-hp').textContent = player.hp+'/'+player.maxHp;
    document.getElementById('s-mp').textContent = player.mp+'/'+player.maxMp;
    document.getElementById('s-hpbar').style.width = hpPct+'%';
    document.getElementById('s-mpbar').style.width = mpPct+'%';
    document.getElementById('s-expbar').style.width = expPct+'%';
    document.getElementById('s-atk').textContent = player.atk;
    document.getElementById('s-gold').textContent = player.gold;
    document.getElementById('s-lv').textContent = 'Lv.'+player.level;
    document.getElementById('s-exp').textContent = 'EXP:'+player.exp+'/'+player.expNeed;
}

// ==================== 移动 ====================
document.addEventListener('keydown',function(e){
    if(!gameStarted) return;
    if(inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block'){
        if(e.key==='Escape' || e.key===' ' || e.key==='e'){
            closeDialog();
        }
        return;
    }

    var nx=player.x, ny=player.y;
    switch(e.key.toLowerCase()){
        case 'w':case 'arrowup':ny--;break;
        case 's':case 'arrowdown':ny++;break;
        case 'a':case 'arrowleft':nx--;break;
        case 'd':case 'arrowright':nx++;break;
        case ' ':case 'e':interact();return;
        default:return;
    }
    e.preventDefault();

    // 边界
    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) return;
    // 不可通行
    var t=mapData[ny][nx];
    if(t==='W'||t==='C') return;

    // 检查敌人
    var en = enemies.find(function(v){
        return v.x===nx && v.y===ny && !deadEnemies[v.id];
    });
    if(en){startBattle(enemies.indexOf(en));return;}

    player.x=nx;player.y=ny;
    var pdiv=document.getElementById('player-actor');
    pdiv.className='actor player walk';
    if(walkTimer) clearTimeout(walkTimer);
    walkTimer=setTimeout(function(){pdiv.className='actor player idle';},350);

    renderPlayer();
    checkNpcProximity();
});

// ==================== NPC交互 ====================
function checkNpcProximity(){
    for(var i=0;i<npcs.length;i++){
        var n=npcs[i];
        if(Math.abs(player.x-n.x)<=1 && Math.abs(player.y-n.y)<=1){
            showHint('按空格与'+n.name+'对话');
            return;
        }
    }
    hideHint();
}

function interact(){
    if(!gameStarted) return;
    for(var i=0;i<npcs.length;i++){
        var n=npcs[i];
        if(Math.abs(player.x-n.x)<=1 && Math.abs(player.y-n.y)<=1){
            curNpc=i;
            // 根据任务状态自动跳转到对应对话
            curNpcDi=getNpcStartDialog(i);
            showDialog(n.dialogs[curNpcDi]);
            return;
        }
    }
    // 检查演武场治疗
    if(mapData[player.y][player.x]==='A'){
        showHint('🧘 在演武场调息，气血内力完全恢复！');
        player.hp=player.maxHp;player.mp=player.maxMp;
        updateStats();
    }
    // 检查敌人(同格)
    var en=enemies.find(function(v){return v.x===player.x && v.y===player.y && !deadEnemies[v.id];});
    if(en){startBattle(enemies.indexOf(en));}
}

function showDialog(d){
    var box=document.getElementById('dialog-box');
    document.getElementById('dialog-speaker').textContent=npcs[curNpc].name;
    document.getElementById('dialog-text').textContent=d.s;
    var choices=document.getElementById('dialog-choices');
    choices.innerHTML='';

    if(d.heal){
        choices.innerHTML='<button class="dchoice" onclick="doHeal()">有劳大师</button>'+
            '<button class="dchoice" onclick="closeDialog()">不必了</button>';
    }else if(d.q){
        if(!player.quests[d.q]){
            choices.innerHTML='<button class="dchoice" onclick="acceptQuest(\''+d.q+'\')">义不容辞</button>'+
                '<button class="dchoice" onclick="closeDialog()">容我再想想</button>';
        }else if(d.t2 && quests[d.q].done && !quests[d.q].rewardClaimed){
            choices.innerHTML='<button class="dchoice" onclick="claimReward(\''+d.q+'\')">领取报酬</button>'+
                '<button class="dchoice" onclick="closeDialog()">告辞</button>';
        }
    }else if(d.buy){
        choices.innerHTML='<button class="dchoice" onclick="buyItem()">买金创药(10两)</button>'+
            '<button class="dchoice" onclick="closeDialog()">不了，告辞</button>';
    }

    if(!choices.innerHTML){
        choices.innerHTML='<button class="dchoice" onclick="nextDialog()">继续</button>';
    }
    box.style.display='block';
}

function doHeal(){
    player.hp=player.maxHp;player.mp=player.maxMp;
    sfxHeal();
    showHint('🧘 大师诵经祈福，你感到浑身舒畅！');
    closeDialog();
    updateStats();
}

function getNpcStartDialog(npcIdx){
    var n=npcs[npcIdx];
    // 武师：根据任务进度自动跳转
    if(n.id==='master'){
        // quest_1已接正在进行中 → 询问进度
        if(player.quests.quest_1 && !quests.quest_1.done) return 2;
        // quest_1已完成未领报酬 → 领取报酬
        if(player.quests.quest_1 && quests.quest_1.done && !quests.quest_1.rewardClaimed) return 1;
        // quest_1报酬已领，quest_2未接 → quest_2介绍
        if(player.quests.quest_1 && quests.quest_1.rewardClaimed && !player.quests.quest_2) return 3;
        // quest_2已接正在进行中 → 询问进度
        if(player.quests.quest_2 && !quests.quest_2.done) return 5;
        // quest_2已完成未领报酬 → 领取报酬
        if(player.quests.quest_2 && quests.quest_2.done && !quests.quest_2.rewardClaimed) return 4;
        // 全部完成 → 开头
        return 0;
    }
    // 镖师：quest_2完成后可接quest_3，quest_3完成可领报酬
    if(n.id==='escort'){
        // quest_3已接，已完成，未领报酬 → 领取报酬
        if(player.quests.quest_3 && quests.quest_3.done && !quests.quest_3.rewardClaimed) return 1;
        // quest_3报酬已领 → 闲聊
        if(player.quests.quest_3 && quests.quest_3.rewardClaimed) return 0;
        // quest_2完成，quest_3未接 → 接quest_3
        if(player.quests.quest_2 && quests.quest_2.done && !player.quests.quest_3) return 1;
        return 0;
    }
    return 0;
}
function findNextDialog(npcIdx, curDi){
    var next=curDi+1;
    if(next>=npcs[npcIdx].dialogs.length) return -1;
    var nd=npcs[npcIdx].dialogs[next];
    // 跳过已接取的任务对话
    if(nd.q && player.quests[nd.q]) return -1;
    // 武师：从进度询问跳下一段需对应任务已完成
    var n=npcs[npcIdx];
    if(n.id==='master' && curDi===2 && !quests.quest_1.done) return -1;
    if(n.id==='master' && curDi===5 && !quests.quest_2.done) return -1;
    return next;
}
function advanceToDialog(idx){
    curNpcDi=idx;
    var d=npcs[curNpc].dialogs[curNpcDi];
    showDialog(d);
}
function nextDialog(){
    var d=npcs[curNpc].dialogs[curNpcDi];
    if(d.t){
        document.getElementById('dialog-text').textContent=d.t;
        var choices=document.getElementById('dialog-choices');
        if(d.q){
            if(player.quests[d.q] && quests[d.q].done && d.t2 && !quests[d.q].rewardClaimed){
                choices.innerHTML='<button class="dchoice" onclick="nextDialog2()">继续</button>';
            }else if(!player.quests[d.q]){
                choices.innerHTML='<button class="dchoice" onclick="acceptQuest(\''+d.q+'\')">义不容辞</button>'+
                    '<button class="dchoice" onclick="closeDialog()">容我再想想</button>';
            }else{
                choices.innerHTML='<button class="dchoice" onclick="closeDialog()">好</button>';
            }
        }else if(d.buff || d.t2){
            choices.innerHTML='<button class="dchoice" onclick="nextDialog2()">继续</button>';
        }else{
            var nextDi=findNextDialog(curNpc,curNpcDi);
            if(nextDi>=0){
                choices.innerHTML='<button class="dchoice" onclick="advanceToDialog('+nextDi+')">继续</button>';
            }else{
                choices.innerHTML='<button class="dchoice" onclick="closeDialog()">告辞</button>';
            }
        }
    }else{
        closeDialog();
    }
}

function nextDialog2(){
    var d=npcs[curNpc].dialogs[curNpcDi];
    document.getElementById('dialog-text').textContent=d.t2;
    // 处理buff（隐士只能领一次）
    if(d.buff){
        var n=npcs[curNpc];
        if(n.id==='hermit' && player.hermitBuffed){
            document.getElementById('dialog-text').textContent='这套吐纳之法你已融会贯通，无需再学了。';
            document.getElementById('dialog-choices').innerHTML='<button class="dchoice" onclick="closeDialog()">多谢前辈</button>';
            updateStats();
            return;
        }
        if(d.buff.mp){player.maxMp+=d.buff.mp;player.mp=Math.min(player.mp+d.buff.mp,player.maxMp);showHint('💠 内力上限+'+d.buff.mp+'！');}
        if(d.buff.hp){player.maxHp+=d.buff.hp;player.hp=Math.min(player.hp+d.buff.hp,player.maxHp);showHint('❤️ 气血上限+'+d.buff.hp+'！');}
        if(n.id==='hermit') player.hermitBuffed=true;
        updateStats();
    }
    if(d.q){
        document.getElementById('dialog-choices').innerHTML=
            '<button class="dchoice" onclick="claimReward(\''+d.q+'\')">领取报酬</button>'+
            '<button class="dchoice" onclick="closeDialog()">告辞</button>';
    }else{
        document.getElementById('dialog-choices').innerHTML=
            '<button class="dchoice" onclick="closeDialog()">多谢前辈</button>';
    }
}

function acceptQuest(q){
    player.quests[q]=true;
    sfxQuest();
    quests[q].progress = killCounts[q==='quest_1'?'bandit':q==='quest_2'?'bully':'boss'];
    if(quests[q].progress >= quests[q].target){
        quests[q].done = true;
        showModal('📜 任务已接受','【'+quests[q].name+'】\n'+quests[q].desc+'\n\n✅ 你已完成此任务的要求！\n速去领取报酬吧！');
    }else{
        showModal('📜 任务已接受','【'+quests[q].name+'】\n'+quests[q].desc+'\n\n目标: '+quests[q].progress+'/'+quests[q].target+'\n报酬: '+quests[q].rewardGold+'银两 +'+quests[q].rewardExp+'修为');
    }
    closeDialog();
}

function claimReward(q){
    if(quests[q].rewardClaimed){showHint('报酬已领取过了！');closeDialog();return;}
    quests[q].rewardClaimed=true;
    var qd=quests[q];
    player.gold+=qd.rewardGold;
    player.exp+=qd.rewardExp;
    sfxCoin();
    var lvUp=checkLevelUpSilent();
    var txt='【'+qd.name+'】完成！\n\n';
    txt+='💰 银两 +'+qd.rewardGold+'\n';
    txt+='✨ 修为 +'+qd.rewardExp;
    if(lvUp>0) txt+='\n\n🎉 功力突破至第'+player.level+'重天！';
    showModal('🏆 任务完成',txt);
    closeDialog();
}

function closeDialog(){
    document.getElementById('dialog-box').style.display='none';
    updateStats();
}

function buyItem(){
    if(player.gold<10){showHint('银两不够!');closeDialog();return;}
    player.gold-=10;
    player.items.potion=(player.items.potion||0)+1;
    sfxCoin();
    showHint('💊 购得金创药一瓶!');
    updateStats();
}

// ==================== 战斗 ====================
function startBattle(ei){
    enemyIdx=ei;
    var e=enemies[ei];
    enemyHp=e.hp;enemyMaxHp=e.hp;
    inBattle=true;

    document.getElementById('battle-panel').style.display='flex';
    document.getElementById('be-name').textContent=e.name;
    document.getElementById('be-hp').textContent=enemyHp;
    document.getElementById('be-maxhp').textContent=enemyMaxHp;
    document.getElementById('be-hpbar').style.width='100%';
    document.getElementById('bp-hp').textContent=player.hp;
    document.getElementById('bp-maxhp').textContent=player.maxHp;
    document.getElementById('bp-hpbar').style.width=(player.hp/player.maxHp*100)+'%';
    document.getElementById('battle-log').textContent='⚔️ 狭路相逢！'+e.name+'挡在了你的面前！';
    sfxStart();

    var pColor={skin:'#ffe0bd',hair:'#3d2817',cloth:'#1a5276'};
    document.getElementById('battle-player').innerHTML = genActorHTML('bp-actor',0,0,pColor,'少侠','player');
    var eColor={skin:'#deb887',hair:'#333',cloth:e.color};
    document.getElementById('battle-enemy').innerHTML = genActorHTML('be-actor',0,0,eColor,e.name,'enemy');
}

function battleAction(act){
    var e=enemies[enemyIdx];
    var log=document.getElementById('battle-log');

    if(act==='flee'){
        if(Math.random()<0.5){
            log.textContent='💨 轻功施展，脱离了战斗！';
            sfxFlee();
            endBattle(false);
        }else{
            log.textContent='❌ 逃脱失败！';
            sfxHit();
            enemyTurn();
        }
        return;
    }

    if(act==='atk'){
        var rng=Math.floor(Math.random()*7);
        var crit=rng>=5?2:1;
        var dmg=Math.max(1,(player.atk-e.def)*crit+Math.floor(Math.random()*5));
        enemyHp-=dmg;
        log.textContent='⚔️ 一剑挥出，造成 '+dmg+' 点伤害！'+(crit>1?' 【会心一击！】':'');
        if(crit>1)sfxCrit();else sfxSword();
    }

    if(act==='skill'){
        if(player.mp<10){log.textContent='💠 内力不足！需要10点内力';return;}
        player.mp-=10;
        var dmg=Math.max(1,Math.floor(player.atk*2.2)-e.def+Math.floor(Math.random()*10));
        enemyHp-=dmg;
        log.textContent='🗡️ 独孤九剑！剑气纵横，造成 '+dmg+' 点伤害！(消耗10内力)';
        sfxSkill();
    }

    if(act==='item'){
        if((player.items.potion||0)>0){
            player.items.potion--;
            var heal=35;
            player.hp=Math.min(player.maxHp,player.hp+heal);
            log.textContent='💊 服下金创药，恢复 '+heal+' 气血！';
        }else if((player.items.superPotion||0)>0){
            player.items.superPotion--;
            player.hp=player.maxHp;
            log.textContent='💊 服下大还丹，气血完全恢复！';
        }else{
            log.textContent='❌ 没有丹药了！';
            return;
        }
    }

    updateBattleUI();

    if(enemyHp<=0){
        log.textContent='🎉 '+e.name+' 被击败了！';
        endBattle(true);
        return;
    }
    enemyTurn();
}

function enemyTurn(){
    var e=enemies[enemyIdx];
    var dmg=Math.max(1,e.atk-player.def+Math.floor(Math.random()*5));
    // 偶尔暴击
    if(Math.random()<0.12) dmg=Math.floor(dmg*1.8);
    player.hp-=dmg;
    document.getElementById('battle-log').textContent+='\n'+e.name+'反击，造成 '+dmg+' 点伤害！';
    sfxHit();
    updateBattleUI();

    if(player.hp<=0){
        player.hp=1;
        sfxDefeat();
        document.getElementById('battle-log').textContent='💀 你倒在了血泊中...被好心人救回了清风镇';
        endBattle(false);
        player.x=9;player.y=3;
        buildMap();
        renderPlayer();
        showModal('💀 力竭倒下','你被敌人击败了！\n\n被好心人救回清风镇，气血恢复至1。\n回去调息修养后再来报仇吧！');
    }
}

function updateBattleUI(){
    document.getElementById('be-hp').textContent=Math.max(0,enemyHp);
    document.getElementById('be-hpbar').style.width=(Math.max(0,enemyHp)/enemyMaxHp*100)+'%';
    document.getElementById('bp-hp').textContent=Math.max(0,player.hp);
    document.getElementById('bp-hpbar').style.width=(Math.max(0,player.hp)/player.maxHp*100)+'%';
    // 同步更新底部状态栏血条
    document.getElementById('s-hp').textContent=Math.max(0,player.hp)+'/'+player.maxHp;
    document.getElementById('s-mp').textContent=player.mp+'/'+player.maxMp;
    document.getElementById('s-hpbar').style.width=(Math.max(0,player.hp)/player.maxHp*100)+'%';
    document.getElementById('s-mpbar').style.width=(player.mp/player.maxMp*100)+'%';
}

function endBattle(won){
    var e=enemies[enemyIdx];
    if(won){
        sfxVictory();
        player.exp+=e.exp;
        player.gold+=e.gold;

        // 标记敌人死亡，不再重生
        deadEnemies[e.id]=true;

        // 击杀计数
        if(e.type==='bandit') killCounts.bandit++;
        if(e.type==='bully') killCounts.bully++;
        if(e.type==='guard') killCounts.guard++;
        if(e.type==='boss') killCounts.boss++;

        // 任务进度
        var questDone=false;
        if(player.quests.quest_1 && !quests.quest_1.done && e.type==='bandit'){
            quests.quest_1.progress++;
            if(quests.quest_1.progress>=quests.quest_1.target){
                quests.quest_1.done=true;
                questDone=true;
            }
        }
        if(player.quests.quest_2 && !quests.quest_2.done && e.type==='bully'){
            quests.quest_2.progress++;
            if(quests.quest_2.progress>=quests.quest_2.target){
                quests.quest_2.done=true;
                questDone=true;
            }
        }
        if(e.type==='boss'){
            if(player.quests.quest_3 && !quests.quest_3.done){
                quests.quest_3.progress++;
                if(quests.quest_3.progress>=quests.quest_3.target){
                    quests.quest_3.done=true;
                    questDone=true;
                }
            }
        }
        var lvUp=checkLevelUpSilent();

        // ===== 战斗结算弹窗 =====
        var resultTxt='⚔️ '+e.name+' 已被击败！\n\n';
        resultTxt+='💰 银两 +'+e.gold+'\n';
        resultTxt+='✨ 修为 +'+e.exp;
        if(lvUp>0) resultTxt+='\n\n🎉 功力突破至第'+player.level+'重天！';
        if(questDone) resultTxt+='\n\n📜 有任务目标已达成！回去领赏吧。';
        showModal('🎉 战斗胜利',resultTxt);
    }

    document.getElementById('battle-panel').style.display='none';
    inBattle=false;
    enemyIdx=null;
    updateStats();
    buildMap();
    renderPlayer();
}

function checkLevelUpSilent(){
    var gained=0;
    while(player.exp>=player.expNeed){
        player.exp-=player.expNeed;
        player.level++;
        player.expNeed=Math.floor(player.expNeed*1.6);
        player.maxHp+=22;player.hp=player.maxHp;
        player.maxMp+=12;player.mp=player.maxMp;
        player.atk+=4;player.def+=2;
        gained++;
        sfxLevelUp();
    }
    return gained;
}

// ==================== UI辅助 ====================
function meditate(){
    if(player.gold<15){showHint('💰 需要15两银子');return;}
    player.gold-=15;
    player.hp=Math.min(player.maxHp,player.hp+50);
    player.mp=Math.min(player.maxMp,player.mp+20);
    sfxHeal();
    showHint('🧘 打坐调息一番，恢复50气血和20内力');
    updateStats();
}

function saveGame(){
    saveGameData();
    // 更新开场界面加载按钮
    initTitleScreen();
}

function showInventory(){
    var txt='🎒 行囊\n\n';
    txt+='金创药 x'+(player.items.potion||0)+' (恢复35气血)\n';
    txt+='大还丹 x'+(player.items.superPotion||0)+' (恢复全部气血)\n\n';
    txt+='💰 银两: '+player.gold+'\n';
    txt+='⚔️ 攻击: '+player.atk+' | 🛡️ 防御: '+player.def;
    showModal('行囊',txt);
}

function showQuest(){
    var txt='📜 江湖任务\n\n';
    var hasQuest=false;
    for(var k in quests){
        var q=quests[k];
        // 不显示未接的任务
        if(!player.quests[k]) continue;
        hasQuest=true;
        var status=q.done ? '[✅ 已完成]' : '[进行中 '+q.progress+'/'+q.target+']';
        txt+=status+' '+q.name+'\n';
        txt+='  '+q.desc+'\n';
        txt+='  报酬: '+q.rewardGold+'银两 +'+q.rewardExp+'修为\n\n';
    }
    if(!hasQuest) txt+='暂无进行中的任务。\n前往清风镇找武师接取任务吧！\n\n';
    txt+='击杀统计: 山贼×'+killCounts.bandit+' 恶霸×'+killCounts.bully+' 魔教×'+killCounts.guard;
    showModal('任务',txt);
}

function showHint(msg){
    var h=document.getElementById('hint');
    h.textContent=msg;h.style.display='block';
    setTimeout(function(){h.style.display='none';},2200);
}
function hideHint(){document.getElementById('hint').style.display='none';}

// ==================== 手机虚拟方向键 ====================
function mobileDir(dir, e){
    if(!gameStarted || inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block') return;
    e.preventDefault();
    mobileMoveDir = dir;
    // 立即执行一次
    doMobileMove();
    // 长按持续移动
    if(mobileMoveInterval) clearInterval(mobileMoveInterval);
    mobileMoveInterval = setInterval(doMobileMove, 130);
    // 高亮按钮
    var btn = document.getElementById('mbtn-'+dir);
    if(btn) btn.classList.add('pressed');
}

function mobileStop(e){
    if(e) e.preventDefault();
    mobileMoveDir = null;
    if(mobileMoveInterval){ clearInterval(mobileMoveInterval); mobileMoveInterval = null; }
    // 取消所有按钮高亮
    document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('pressed'); });
    var pdiv = document.getElementById('player-actor');
    if(pdiv) pdiv.className = 'actor player idle';
}

function doMobileMove(){
    if(!mobileMoveDir || !gameStarted || inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block') return;

    var nx = player.x, ny = player.y;
    switch(mobileMoveDir){
        case 'up': ny--; break;
        case 'down': ny++; break;
        case 'left': nx--; break;
        case 'right': nx++; break;
    }

    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) return;
    var t = mapData[ny][nx];
    if(t==='W'||t==='C') return;

    // 检查敌人
    var en = enemies.find(function(v){
        return v.x===nx && v.y===ny && !deadEnemies[v.id];
    });
    if(en){
        mobileStop({preventDefault:function(){}});
        startBattle(enemies.indexOf(en));
        return;
    }

    player.x = nx; player.y = ny;
    var pdiv = document.getElementById('player-actor');
    if(pdiv) pdiv.className = 'actor player walk';
    if(walkTimer) clearTimeout(walkTimer);
    walkTimer = setTimeout(function(){ if(pdiv) pdiv.className = 'actor player idle'; }, 350);

    renderPlayer();
    checkNpcProximity();
}

function mobileInteract(e){
    if(!gameStarted || inBattle) return;
    e.preventDefault();
    interact();
}

function showModal(title,text){
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-text').textContent=text;
    document.getElementById('modal').classList.add('show');
}
function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

// ==================== 初始化 ====================
// 移动端阻止默认手势
document.getElementById('game').addEventListener('touchstart',function(e){
    if(e.target.closest('#mobile-controls') || e.target.closest('#map-viewport')){
        e.preventDefault();
    }
},{passive:false});
document.addEventListener('gesturestart',function(e){ e.preventDefault(); });
document.addEventListener('gesturechange',function(e){ e.preventDefault(); });

buildMap();
renderPlayer();
initTitleScreen();
// 标题界面默认显示，不自动开始
document.getElementById('title-screen').style.display='flex';
updateStats();
</script>
