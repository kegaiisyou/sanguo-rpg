<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>乱世烽火 · 水墨</title>
<style>
  :root{
    --paper:#f4eee2;        /* 宣纸底 */
    --paper2:#ece3d1;
    --ink:#2c2620;          /* 墨色正文 */
    --ink-soft:#6f6456;     /* 浅墨 */
    --ink-faint:#a99e8c;    /* 极浅 */
    --seal:#9e3b2e;         /* 朱印红 */
    --jade:#3f7d5e;         /* 收获青 */
    --gold:#b0832f;         /* 修为/银两 */
    --panel:rgba(255,253,248,.74);
    --panel-line:rgba(74,62,48,.22);
    --btn:rgba(255,255,255,.5);
    --btn-line:rgba(74,62,48,.30);
    --shadow:0 2px 14px rgba(60,48,34,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100dvh;overflow:hidden;overscroll-behavior:none;}
  body{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fbf7ee 0%, var(--paper) 45%, var(--paper2) 100%);
    position:relative;
  }
  /* 淡墨山水背景：远山剪影 */
  #ink-bg{position:fixed;left:0;right:0;bottom:0;height:46dvh;pointer-events:none;z-index:0;opacity:.16;}
  #ink-bg svg{width:100%;height:100%;display:block;}

  #app{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    height:100dvh;max-width:560px;margin:0 auto;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ===== 顶部状态栏（两行：身份 + 数值条） ===== */
  #status{
    flex:0 0 auto;
    padding:9px 16px 10px;
    border-bottom:1px solid var(--panel-line);
    background:linear-gradient(180deg,rgba(255,253,248,.9),rgba(255,253,248,.45));
    backdrop-filter:blur(6px);
  }
  .st-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft);}
  .st-top .who{font-size:14px;color:var(--ink);font-weight:700;font-family:"STKaiti","KaiTi","Songti SC",serif;letter-spacing:1px;}
  .st-top .dot{color:var(--ink-faint);}
  .st-top .sh{color:var(--seal);}
  .st-top .ka{color:var(--jade);}
  .st-top .rp{color:var(--gold);}
  .st-bars{display:flex;align-items:center;gap:11px 14px;flex-wrap:wrap;padding-top:7px;}
  .bar{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
  .bar>span{white-space:nowrap;font-family:"STKaiti","KaiTi",serif;}
  .bar i{flex:1 1 56px;height:6px;border-radius:4px;background:rgba(74,62,48,.14);overflow:hidden;min-width:46px;}
  .bar i b{display:block;height:100%;border-radius:4px;transition:width .4s;}
  .bar i.s-hp b{background:var(--seal);}
  .bar i.s-mp b{background:var(--jade);}
  .bar i.s-en b{background:var(--gold);}
  .bar em{font-style:normal;font-size:10.5px;color:var(--ink-faint);min-width:44px;text-align:right;}
  .st-bars .txt{display:flex;gap:10px;font-size:11.5px;color:var(--ink-soft);}
  .st-bars .txt .jade{color:var(--jade);}
  .st-bars .txt .gold{color:var(--gold);}
  .st-bars .txt .danger{color:#c0392b;font-weight:700;}
  .st-warn{margin-top:6px;padding:6px 9px;border-radius:8px;font-size:12px;line-height:1.5;
    background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.35);color:#a83227;
    font-family:"STKaiti","KaiTi","Songti SC",serif;}

  /* ===== 中部文字叙事窗 ===== */
  #scene{
    flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:16px 16px 6px;
  }
  #scene::-webkit-scrollbar{width:0;}
  .narr{margin:0 0 12px;line-height:1.85;font-size:15.5px;
    font-family:"STKaiti","KaiTi","Songti SC",serif;
    animation:rise .5s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .narr.env{color:var(--ink);}                 /* 环境风貌 */
  .narr.title{color:var(--seal);font-weight:700;font-size:17px;
    letter-spacing:3px;text-align:center;margin:4px 0 13px;
    text-shadow:0 1px 0 rgba(255,255,255,.5);}
  .narr.npc{color:#543b6b;border-left:3px solid var(--seal);padding-left:11px;}  /* 人物对话 */
  .narr.npc .nm{color:var(--seal);font-weight:600;margin-right:6px;}
  .narr.combat{color:var(--seal);font-weight:600;} /* 打斗效果 */
  .narr.good{color:var(--jade);}                /* 收获 */
  .narr.sys{color:var(--ink-faint);font-size:13px;} /* 系统/提示 */
  .narr.item{color:#7a5a2e;background:rgba(176,131,47,.10);padding:5px 10px;border-radius:8px;font-size:14px;display:inline-block;}
  .narr.exit{color:var(--ink-soft);font-size:13.5px;border-left:3px solid var(--gold);padding-left:10px;}

  /* ===== 动态按钮区（分组菜单 · 自适应网格） ===== */
  /* 三层视觉分级：叙事区(浅) → 按钮区(略深+上沿分隔) → 系统dock(再深) */
  #actions{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(100px,1fr));
    align-items:stretch;gap:8px;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--panel-line);
    background:linear-gradient(0deg,rgba(244,238,227,.96),rgba(250,246,237,.55));
    box-shadow:0 -9px 18px -12px rgba(60,48,34,.24), inset 0 1px 0 rgba(255,255,255,.7);
    max-height:50dvh;overflow-y:auto;
  }
  #actions::-webkit-scrollbar{width:0;}
  .acts-label{grid-column:1/-1;text-align:center;font-size:11px;letter-spacing:5px;
    color:var(--ink-faint);font-family:"STKaiti","KaiTi",serif;opacity:.72;margin:1px 0 2px;}
  .obj-hint{grid-column:1/-1;text-align:center;font-size:12px;line-height:1.6;color:var(--ink-faint);
    padding:7px 6px 11px;font-family:"PingFang SC","Microsoft YaHei",sans-serif;opacity:.8;}
  /* 分组底色卡片：人物/场景/去处 各异；自身 加边框强化「关于我」 */
  .act.g-ren{background:rgba(86,59,107,.13);border-color:rgba(86,59,107,.32);}
  .act.g-ren .ob-nm{color:#4a3560;}
  .act.g-scene{background:rgba(63,125,94,.13);border-color:rgba(63,125,94,.32);}
  .act.g-scene .ob-nm{color:#2f5d45;}
  .act.g-exit{background:rgba(176,131,47,.15);border-color:rgba(176,131,47,.38);}
  .act.g-exit .ob-nm{color:#6e4f17;}
  .act.g-explore{background:rgba(74,62,48,.07);border-color:rgba(74,62,48,.20);}
  .act.g-self{background:var(--btn);border:1.5px solid rgba(158,59,46,.42);box-shadow:0 0 0 1px rgba(158,59,46,.06),var(--shadow);}
  .act.g-self .ob-nm{color:var(--seal);}
  /* 新出现的「去处」按钮：弹出动画，吸引注意 */
  .act.pop{animation:popIn .7s cubic-bezier(.2,.9,.3,1.45) both;}
  @keyframes popIn{0%{opacity:0;transform:scale(.7) translateY(6px);}60%{opacity:1;transform:scale(1.07);}100%{opacity:1;transform:none;}}
  /* 调查文字：高亮渐显 */
  .narr.investigate{background:linear-gradient(90deg,rgba(176,131,47,.18),rgba(176,131,47,.03));
    border-left:3px solid var(--gold);padding:7px 11px;border-radius:8px;color:#5e4a22;font-size:15px;
    box-shadow:0 1px 0 rgba(255,255,255,.45);}
  .narr.typing::after{content:'▌';color:var(--gold);animation:blink 1s steps(1) infinite;margin-left:1px;font-weight:400;}
  @keyframes blink{50%{opacity:0;}}
  .act{
    grid-column:span 1;
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:9px 8px;font-size:13.5px;line-height:1.25;min-height:38px;color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--btn);border:1px solid var(--btn-line);border-radius:10px;
    cursor:pointer;transition:.18s;
    box-shadow:var(--shadow);
  }
  .act:hover{background:rgba(158,59,46,.10);border-color:rgba(158,59,46,.4);
    box-shadow:0 0 0 3px rgba(158,59,46,.08),0 2px 14px rgba(158,59,46,.12);}
  .act:active{transform:scale(.97);}
  .act:disabled{opacity:.4;cursor:default;filter:grayscale(.4);}
  .act.wide{grid-column:1/-1;text-align:left;
    font-family:"STKaiti","KaiTi","Songti SC",serif;font-size:15px;
    display:flex;flex-direction:column;gap:2px;}
  .act.wide .tip{font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:11.5px;color:var(--ink-faint);}
  .act.primary{background:rgba(158,59,46,.14);border-color:rgba(158,59,46,.45);color:var(--seal);font-weight:600;}
  /* 场景对象：小按钮只显示图标 + 标题，描述移入弹窗 */
  .act.obj-btn{flex-direction:column;gap:3px;padding:8px 6px;font-size:12.5px;line-height:1.2;}
  .act.obj-btn .ob-ic{font-size:20px;line-height:1;}
  .act.obj-btn .ob-nm{font-size:12.5px;color:var(--ink);}
  /* 点击弹出的操作面板（醒目窗口）：详情 + 选项 + 告辞 */
  .sheet-btns{display:flex;flex-direction:column;gap:9px;margin:14px 0 4px;}
  .sheet-btn{padding:13px 14px;border:1px solid var(--btn-line);border-radius:12px;
    background:var(--btn);color:var(--ink);font-size:15px;cursor:pointer;text-align:center;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;box-shadow:var(--shadow);transition:.18s;}
  .sheet-btn:hover{border-color:rgba(158,59,46,.4);background:rgba(158,59,46,.08);}
  .sheet-btn:active{transform:scale(.97);}
  .sheet-btn.danger{color:#c0392b;border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.06);}
  .sheet-leave{margin-top:14px;width:100%;padding:12px;border:none;border-radius:12px;
    background:rgba(74,62,48,.10);color:var(--ink-soft);font-size:14px;cursor:pointer;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
  .sheet-leave:active{transform:scale(.97);}
  /* 研习武学：13 艺线分组标题 */
  .learn-line{display:flex;align-items:center;justify-content:space-between;
    margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--panel-line);}
  .learn-line:first-child{margin-top:4px;}
  .learn-line .ll-name{font-family:"STKaiti","KaiTi",serif;font-size:14px;color:var(--seal);font-weight:600;}
  .learn-line .ll-lv{font-size:11.5px;color:var(--ink-faint);}
  .card .skills span.force{background:rgba(176,131,47,.16);border-color:rgba(176,131,47,.4);color:#8a6a2e;}

  /* ===== 底部常驻功能栏（全局面板入口，与上下文按钮再分级） ===== */
  #dock{
    flex:0 0 auto;display:flex;
    border-top:2px solid var(--panel-line);
    box-shadow:0 -6px 14px -10px rgba(60,48,34,.20);
    background:linear-gradient(0deg,rgba(240,233,220,.98),rgba(248,243,233,.85));
    backdrop-filter:blur(6px);
  }
  #dock button{
    flex:1;padding:10px 4px 12px;background:none;border:none;cursor:pointer;
    color:var(--ink-soft);font-size:11.5px;letter-spacing:1px;
    display:flex;flex-direction:column;align-items:center;gap:4px;transition:.18s;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  }
  #dock button .ic{font-size:19px;line-height:1;}
  #dock button:hover{color:var(--seal);}
  #dock button:active{transform:scale(.94);}
  #dock button.rest{color:var(--seal);}

  /* ===== 弹窗 ===== */
  #modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:rgba(40,32,24,.34);backdrop-filter:blur(3px);padding:24px;
    animation:fade .25s ease both;}
  #modal.hidden{display:none;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{
    width:100%;max-width:440px;max-height:82dvh;overflow-y:auto;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;
    box-shadow:0 12px 40px rgba(50,38,26,.28);padding:22px 20px;
    animation:pop .28s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
  .card h3{margin:0 0 14px;font-family:"STKaiti","KaiTi",serif;font-size:19px;color:var(--seal);
    letter-spacing:2px;text-align:center;font-weight:700;}
  .card .row{display:flex;justify-content:space-between;padding:7px 2px;
    border-bottom:1px dashed var(--panel-line);font-size:14px;}
  .card .row span:first-child{color:var(--ink-soft);}
  .card .row span:last-child{color:var(--ink);font-weight:600;}
  .card .skills{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
  .card .skills span{padding:5px 11px;border:1px solid var(--btn-line);border-radius:20px;
    font-size:13px;background:var(--btn);color:var(--ink);}
  .card p.tip{color:var(--ink-faint);font-size:12.5px;line-height:1.7;margin:12px 0 0;}
  .card .map-node{display:flex;align-items:center;gap:10px;padding:9px 6px;font-size:14.5px;
    border-bottom:1px dashed var(--panel-line);}
  .card .map-node .dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--ink-faint);flex:0 0 auto;}
  .card .map-node.cur .dot{background:var(--seal);border-color:var(--seal);box-shadow:0 0 0 4px rgba(158,59,46,.15);}
  .card .map-node.cur{color:var(--seal);font-weight:700;}
  .card .map-node .ex{color:var(--ink-faint);font-size:12px;margin-left:auto;}
  .card .close{margin-top:18px;width:100%;padding:12px;border:none;border-radius:12px;
    background:rgba(158,59,46,.14);color:var(--seal);font-size:15px;font-weight:600;cursor:pointer;}
  .card .close:active{transform:scale(.97);}
  .card .dev-sec{margin-top:14px;border-top:1px dashed var(--panel-line);padding-top:10px;}
  .card .dev-h{font-size:12.5px;color:var(--ink-soft);letter-spacing:1px;margin-bottom:7px;}
  .card .dev-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
  .card .dev{padding:8px 12px;font-size:13px;border:1px solid var(--btn-line);border-radius:10px;background:var(--btn);color:var(--ink);cursor:pointer;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
  .card .dev:hover{border-color:rgba(158,59,46,.4);}
  .card .dev.on{background:rgba(63,125,94,.16);border-color:rgba(63,125,94,.5);color:var(--jade);}
  .card .dev.wide{flex:1 1 100%;}

  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);
    background:rgba(44,38,32,.9);color:#f4eee2;padding:9px 18px;border-radius:22px;font-size:13px;
    opacity:0;pointer-events:none;transition:.3s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== 战斗 UI ===== */
  .c-enemy{background:rgba(158,59,46,.08);border:1px solid rgba(158,59,46,.25);
    border-radius:12px;padding:14px 16px;margin:0 0 14px;}
  .c-enemy .ec-top{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
  .c-enemy .ec-name{font-size:17px;font-weight:700;color:var(--seal);
    font-family:"STKaiti","KaiTi",serif;letter-spacing:2px;}
  .c-enemy .ec-title{font-size:12px;color:var(--ink-faint);font-weight:400;letter-spacing:0;}
  .c-enemy .ec-hp{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);}
  .c-enemy .ec-hp .c-bar{flex:1;height:8px;border-radius:4px;background:rgba(74,62,48,.14);overflow:hidden;}
  .c-enemy .ec-hp .c-bar div{height:100%;border-radius:4px;transition:width .5s;}
  .c-enemy .c-hp{background:var(--seal);}
  .c-enemy .c-hp-warn{background:#c0762a;}
  .c-enemy .c-hp-danger{background:#a03030;}
  .c-enemy .ec-buffs,.c-enemy .ec-dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .c-enemy .ec-tag{padding:2px 8px;border-radius:10px;font-size:11px;color:var(--ink-soft);background:rgba(74,62,48,.08);}
  .c-enemy .ec-tag.debuff{color:var(--seal);background:rgba(158,59,46,.12);}

  .c-player{margin:0 0 12px;font-size:13px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:6px 14px;}
  .c-player .cp-hp{color:var(--seal);font-weight:600;}
  .c-player .cp-mp{color:var(--jade);font-weight:600;}
  .c-player .cp-rage{color:#c0762a;font-weight:600;}

  .c-round{text-align:center;font-size:12px;color:var(--ink-faint);letter-spacing:3px;
    margin:8px 0 4px;font-family:"STKaiti","KaiTi",serif;}

  .c-summary{background:rgba(63,125,94,.08);border:1px solid rgba(63,125,94,.3);border-radius:12px;
    padding:14px 16px;margin:12px 0;text-align:center;}
  .c-summary.win{color:var(--jade);}
  .c-summary.lose{color:var(--seal);background:rgba(158,59,46,.08);border-color:rgba(158,59,46,.3);}
  .c-summary .cs-title{font-size:18px;font-weight:700;letter-spacing:4px;font-family:"STKaiti","KaiTi",serif;}
  .c-summary .cs-detail{font-size:13px;color:var(--ink-soft);margin-top:4px;}

  .act.danger{color:var(--seal);border-color:rgba(158,59,46,.45);background:rgba(158,59,46,.06);}
  .act.danger:hover{background:rgba(158,59,46,.15);}

  /* ===== 场景对象卡片 ===== */
  .obj-card{grid-column:1/-1;width:100%;background:var(--btn);border:1px solid var(--btn-line);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);animation:rise .35s ease both;}
  .obj-head{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;transition:.18s;}
  .obj-head:hover{background:rgba(158,59,46,.06);}
  .obj-icon{font-size:19px;flex-shrink:0;line-height:1;}
  .obj-info{flex:1;min-width:0;}
  .obj-name{font-size:14px;font-weight:600;color:var(--ink);font-family:"STKaiti","KaiTi",serif;}
  .obj-desc{font-size:11.5px;color:var(--ink-faint);margin-top:1px;}
  .obj-arrow{font-size:11px;color:var(--ink-faint);transition:.2s;}
  .obj-card.open .obj-arrow{transform:rotate(180deg);}
  .obj-actions{display:none;flex-wrap:wrap;gap:7px;padding:9px 12px 11px 12px;border-top:1px solid var(--panel-line);}
  .obj-card.open .obj-actions{display:flex;}
  .obj-actions .act{flex:1 1 calc(50% - 7px);min-width:0;padding:8px 10px;font-size:13px;}
  .obj-actions .act.full{flex:1 1 100%;}

  /* ===== 装备面板 ===== */
  .equip-slots{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
  .equip-slots .eq-slot,.equip-bag .eq-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--btn-line);border-radius:10px;background:var(--btn);cursor:pointer;transition:.18s;font-size:13.5px;}
  .equip-slots .eq-slot:hover,.equip-bag .eq-item:hover{background:rgba(158,59,46,.08);border-color:rgba(158,59,46,.35);}
  .eq-slot.empty{color:var(--ink-faint);cursor:default;background:rgba(74,62,48,.04);}
  .eq-slot.empty:hover{background:rgba(74,62,48,.04);border-color:var(--btn-line);}
  .eq-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .eq-nm{flex:0 0 auto;font-weight:600;font-family:"STKaiti","KaiTi",serif;}
  .eq-st{flex:1;color:var(--ink-soft);font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eq-dur{font-size:11.5px;color:var(--ink-faint);flex:0 0 auto;}
  .eq-x,.eq-w{flex:0 0 auto;font-size:12px;color:var(--seal);padding:2px 8px;border:1px solid rgba(158,59,46,.3);border-radius:8px;}
  .equip-bag{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
</style>
</head>
<body>
<script>
window.onerror=function(msg,url,line,col,err){
  var pre=document.createElement('pre');
  pre.style.cssText='position:fixed;inset:0;z-index:9999;padding:24px;background:#fff;color:#c00;white-space:pre-wrap;font-size:13px;line-height:1.6;overflow:auto;';
  pre.textContent='JS ERROR\n'+msg+'\n'+url+':'+line+':'+col+'\n'+(err&&err.stack?err.stack:'');
  document.body.innerHTML=''; document.body.appendChild(pre);
};
</script>

    <button data-modal="char"><span class="ic">🧭</span>角色</button>

    <button data-modal="quest"><span class="ic">📜</span>任务</button>
    <button data-modal="map"><span class="ic">🗺️</span>山河</button>

<script src="shared/config/constants.js"></script>
<script src="shared/config/balance.js"></script>
<script src="shared/story/sects.js"></script>
<script src="shared/story/skills.js"></script>
<script src="shared/story/events.js"></script>
<script src="shared/story/dialogues.js"></script>
<script src="shared/story/rooms.js"></script>
<script src="shared/data/martial.js"></script>
<script src="shared/data/enemies.js"></script>
<script src="shared/data/items.js"></script>
<script src="shared/combat/engine.js"></script>
<script src="shared/index.js"></script>
<script>
(function(){
  try{
  var G = window.LF.SharedGame;
  var KEY='lf_save_v1';
  var SHICHEN=['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];

  function load(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
  function save(d){ if(!d||d.hp<=0||d.dead) return; try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){} }
  function clearSave(){try{localStorage.removeItem(KEY);}catch(e){}}
  // 旧存档缺字段则补默认，保证兼容（v0.1 → v0.2 迁移）
  function normalize(s){
    var def=G.defaultSave();
    // 顶层字段补全
    for(var k in def){
      if(s[k]===undefined) s[k]=def[k];
      // 深拷贝嵌套对象，防止引用污染
      if(typeof def[k]==='object' && def[k] && !Array.isArray(def[k]) && k!=='flags'){
        if(typeof s[k]!=='object' || !s[k] || Array.isArray(s[k])) s[k]={};
        for(var nk in def[k]){ if(s[k][nk]===undefined) s[k][nk]=def[k][nk]; }
      }
    }
    // 数组字段补默认
    if(!Array.isArray(s.learnedMartial)) s.learnedMartial=def.learnedMartial.slice();
    if(!Array.isArray(s.equippedForce)) s.equippedForce=[];
    if(!Array.isArray(s.skills)) s.skills=def.skills.slice();
    if(!Array.isArray(s.items)) s.items=[];
    if(!Array.isArray(s.equips)) s.equips=[];
    if(!s.equipment || typeof s.equipment!=='object') s.equipment={weapon:null,armor:null,trinket:null,mount:null};
    ['weapon','armor','trinket','mount'].forEach(function(sl){ if(s.equipment[sl]===undefined) s.equipment[sl]=null; });
    // 旧存档没有 spd 则给默认
    if(!s.spd) s.spd=20;
    // time 字段
    if(s.time==null) s.time=0;
    // 确保武器艺线所有 key 存在
    for(var l in def.lines){ if(s.lines[l]===undefined) s.lines[l]=0; }
    // 确保艺线经验 key 存在（P2）
    if(!s.lineExp || typeof s.lineExp!=='object') s.lineExp={};
    for(var l in def.lines){ if(s.lineExp[l]===undefined) s.lineExp[l]=0; }
    // 确保善恶双轴存在（P3）：旧档 karma 单值迁移为 chivalry/notoriety
    if(typeof s.chivalry!=='number'){
      s.chivalry = (typeof s.karma==='number' && s.karma>0) ? s.karma : 0;
    }
    if(typeof s.notoriety!=='number'){
      s.notoriety = (typeof s.karma==='number' && s.karma<0) ? (-s.karma) : 0;
    }
    delete s.karma;
    return s;
  }

  var state = normalize(load() || G.defaultSave());
  if(!state.sect || !G.SECTS[state.sect]){ state=G.defaultSave(); }
  G.applySect(state);
  if(!state.quest || typeof state.quest!=='object') state.quest={bandit:0,turban:0,hua_xiong:false,luoyang:false};

  var $status=document.getElementById('status');
  var $narr=document.getElementById('narr');
  var $actions=document.getElementById('actions');
  var $modal=document.getElementById('modal');
  var $card=document.getElementById('modal-card');
  var $toast=document.getElementById('toast');

  function curRoom(){ return G.ROOMS[state.room] || G.ROOMS.camp; }

  // ===== 文字叙事窗 =====
  function log(text, cls, name){
    var p=document.createElement('p');
    p.className='narr '+(cls||'env');
    if(cls==='npc' && name){
      var s=document.createElement('span'); s.className='nm'; s.textContent=name+'：';
      p.appendChild(s); p.appendChild(document.createTextNode(text));
    } else { p.textContent=text; }
    $narr.appendChild(p);
    var sc=document.getElementById('scene'); sc.scrollTop=sc.scrollHeight;
  }

  // ===== 状态栏（两行：身份 + 数值条） =====
  // P3 善恶双轨：侠义/凶名独立双轴，互不抵消
  function moralLabel(){
    var c=state.chivalry, n=state.notoriety;
    if(c>0 && n>0) return '侠'+c+'·凶'+n;
    if(c>0) return '侠'+c;
    if(n>0) return '凶'+n;
    return '中立';
  }
  // 风评称号（基于双轴阈值，见 GAME_DESIGN 4.2）
  function moralTitle(){
    var c=state.chivalry, n=state.notoriety;
    if(c>=40 && n>=40) return '亦正亦邪·枭雄';
    if(c>=30 && n>=30) return '正邪莫测';
    if(c>=30) return '清流义士';
    if(n>=30) return '绿林枭雄';
    if(c>=10 && n>=10) return '正邪交织';
    if(c>=10) return '侠义新秀';
    if(n>=10) return '初露凶名';
    return '无名之辈';
  }
  // 双轴累积 + 阈值解锁提示（P3）
  function addChivalry(v){
    var b=state.chivalry; state.chivalry=Math.max(0,state.chivalry+(v||1));
    afterMoral('chivalry', b, state.chivalry);
  }
  function addNotoriety(v){
    var b=state.notoriety; state.notoriety=Math.max(0,state.notoriety+(v||1));
    afterMoral('notoriety', b, state.notoriety);
  }
  function afterMoral(axis, before, after){
    if(axis==='chivalry'){
      if(before<30 && after>=30) log('【风评】侠义值达 30！清流名士敬重，可接「侠义委托」。','good');
      if(before<40 && after>=40) log('【风评】侠义值达 40！','good');
    } else {
      if(before<30 && after>=30) log('【风评】凶名值达 30！影门与绿林亲近，可接「高阶悬赏」。','good');
      if(before<40 && after>=40) log('【风评】凶名值达 40！','good');
    }
    if(state.chivalry>=40 && state.notoriety>=40 && !state.flags.usurper_seen){
      state.flags.usurper_seen=true;
      log('【风评】侠义凶名俱达 40——亦正亦邪·枭雄 之路为你敞开！','good');
    }
  }
  // 声望框架：0-100，称号区间见 GAME_DESIGN 4.1（P4 起由胜战真实获取；调试台内置常驻，可直赋测试）
  function repTitle(rep){
    if(rep>=95) return '一代宗师';
    if(rep>=85) return '名扬天下';
    if(rep>=70) return '威震一方';
    if(rep>=55) return '名动一方';
    if(rep>=40) return '江湖新秀';
    if(rep>=25) return '小有名气';
    if(rep>=10) return '初入江湖';
    return '无名小卒';
  }
  function addReputation(n){
    var old=state.reputation;
    state.reputation=Math.max(0,Math.min(100,state.reputation+n));
    log('【声望】'+(state.reputation-old>=0?'+':'')+(state.reputation-old)+'（当前 '+state.reputation+' · '+repTitle(state.reputation)+'）','good');
  }
  function bar(label,cur,max,cls){
    var pct=Math.max(0,Math.min(100, max?cur/max*100:0));
    return '<div class="bar"><span>'+label+'</span><i class="'+cls+'"><b style="width:'+pct+'%"></b></i><em>'+cur+'/'+max+'</em></div>';
  }
  function renderStatus(){
    var sect=G.SECTS[state.sect]?G.SECTS[state.sect].name:state.sect;
    var sh=SHICHEN[state.time%12];
    var ka = moralLabel();
    var mt = moralTitle();
    var es = effectiveStats();
    var warn='';
    if(state.energy<=0) warn='精力耗尽 · 无法行动（请「帐中休整」）';
    else if(state.food<=0||state.drink<=0) warn='饥馁缠身 · 气血正被侵蚀（请「休整」补给）';
    $status.innerHTML=
      '<div class="st-top">'+
        '<span class="who">'+state.name+'</span>'+
        '<span class="dot">·</span><span>'+sect+'</span>'+
        '<span class="dot">·</span><span>LV.'+state.level+'</span>'+
        '<span class="dot">·</span><span class="sh">'+sh+'</span>'+
        '<span class="dot">·</span><span class="ka">'+ka+'</span>'+
        '<span class="dot">·</span><span class="rp">风评·'+mt+'</span>'+
        '<span class="dot">·</span><span class="rp">声望'+state.reputation+'</span>'+
      '</div>'+
      '<div class="st-bars">'+
        bar('气血',state.hp,es.maxHp,'s-hp')+
        bar('内力',state.mp,es.maxMp,'s-mp')+
        bar('精力',state.energy,state.maxEnergy,'s-en')+
        '<div class="txt"><span'+(state.food<=0?' class="danger"':'')+'>食 '+state.food+'</span><span'+(state.drink<=0?' class="danger"':'')+'>水 '+state.drink+'</span>'+
          '<span class="jade">潜 '+state.pot+'</span><span class="gold">银 '+state.gold+'</span>'+
          '<span class="jade">攻 '+Math.round(es.atk)+'</span><span class="gold">防 '+Math.round(es.def)+'</span>'+
          '<span>命 '+(es.hitRate*100).toFixed(0)+'%</span><span>暴 '+(es.critRate*100).toFixed(0)+'%</span></div>'+
      '</div>'+
      (warn?'<div class="st-warn">⚠ '+warn+'</div>':'');
  }

  // ===== 升级 / 效果结算 =====
  function addXp(n){
    state.exp+=n;
    while(state.exp>=G.BALANCE.expNeed(state.level) && state.level<G.CONSTANTS.MAX_LEVEL){
      state.exp-=G.BALANCE.expNeed(state.level); state.level++;
      state.maxHp+=10;state.maxMp+=5;state.atk+=2;state.def+=1;
      state.hp=state.maxHp;state.mp=state.maxMp;
      log('【破境】你已至 LV.'+state.level+'！气血内力尽复，实力大涨。','good');
    }
  }
  function applyEffect(e){
    e=e||{}; var got=[];
    if(e.xp){addXp(e.xp);got.push('修为+'+e.xp);}
    if(e.gold){state.gold=Math.max(0,state.gold+e.gold);got.push('银两'+(e.gold>0?'+':'')+e.gold);}
    if(e.atk){state.atk+=e.atk;got.push('攻+'+e.atk);}
    if(e.def){state.def+=e.def;got.push('防+'+e.def);}
    if(e.maxMp){state.maxMp+=e.maxMp;state.mp+=e.maxMp;got.push('内力上限+'+e.maxMp);}
    if(e.mp==='full'){state.mp=state.maxMp;} else if(e.mp){state.mp=Math.min(state.maxMp,state.mp+e.mp);}
    if(e.hp==='full'){state.hp=state.maxHp;got.push('气血尽复');} else if(e.hp){state.hp=Math.min(state.maxHp,state.hp+e.hp);got.push('气血+'+e.hp);}
    if(e.flag)state.flags[e.flag]=true;
    if(e.reputation){addReputation(e.reputation);}
    else if(e.rep){addReputation(e.rep);}
    if(got.length) log('【收获】'+got.join('，')+'。','good');
  }
  function findEvent(id){ for(var i=0;i<G.EVENTS.length;i++) if(G.EVENTS[i].id===id) return G.EVENTS[i]; return null; }

  // ===== 时间与生存消耗 =====
  function advanceTime(n){
    n=n||1; state.time=(state.time+n)%12;
    state.food=Math.max(0,state.food-n);
    state.drink=Math.max(0,state.drink-n);
    state.energy=Math.max(0,state.energy-2*n);
    maybeStarve();
  }
  // 饥饿过高：食物/饮水耗尽则持续侵蚀气血（硬性限制）；归零即殒落
  function maybeStarve(){
    var dmg=0, msgs=[];
    if(state.food<=0){ dmg+=6; msgs.push('腹中空虚'); }
    if(state.drink<=0){ dmg+=4; msgs.push('喉间干涸'); }
    if(dmg>0){
      state.hp=Math.max(0,state.hp-dmg);
      log('〔饥馁〕'+msgs.join('，')+'，气血-'+dmg+'。','combat');
      checkDeath();
    }
  }
  // 死亡：气血归零 → 回标题页（读档/重开）
  function checkDeath(){ if(!state.dead && state.hp<=0){ die(); } }
  function die(){
    state.dead=true;   // 注意：不落盘（save 对 hp<=0 跳过），读档即回到死前存档
    $modal.classList.remove('hidden');
    $card.innerHTML='<h3 style="color:#8a3b2e">⚔ 殒 落</h3>'+
      '<p class="tip">你气血耗尽，魂归尘土……乱世如炉，无人会记得你的姓名。</p>'+
      '<button class="close" id="m-load">读档续命</button>'+
      '<button class="close" id="m-new" style="background:rgba(120,60,50,.12);color:#8a3b2e;margin-top:10px;">重头来过</button>';
    var ld=document.getElementById('m-load'); if(ld)ld.onclick=function(){location.reload();};
    var nw=document.getElementById('m-new'); if(nw)nw.onclick=function(){clearSave();location.reload();};
  }
  // 体力亏空：精力耗尽则无法行动（硬性限制）
  function exert(label){
    if(state.energy<=0){
      log('〔精力耗尽〕你四肢酸软，难以为继——须先「帐中休整」恢复精力，方可'+label+'。','sys');
      return false;
    }
    return true;
  }

  // ===== 动态按钮区（分组菜单：对话 / 探查 / 行动 / 移动） =====
  var lastGroup=null;
  function clearActions(){$actions.innerHTML='';lastGroup=null;}
  function addBtn(label, fn, cls){
    var b=document.createElement('button');
    b.className='act '+(cls||''); b.textContent=label;
    b.onclick=fn; $actions.appendChild(b);
  }
  function prependActsLabel(){
    var l=document.createElement('div'); l.className='acts-label';
    l.textContent='· 可 行 之 事 ·'; $actions.appendChild(l);
  }
  // 点击弹出的操作面板：详情 + 选项 + 告辞（始终可退回菜单）
  function openSheet(o){
    if(state.dead){ die(); return; }
    o=o||{};
    var acts=o.actions||[];
    var h='<h3 style="display:flex;align-items:center;justify-content:center;gap:8px;">'+
          (o.icon?'<span style="font-size:22px;line-height:1;">'+o.icon+'</span>':'')+
          '<span>'+ (o.title||'') +'</span></h3>';
    if(o.desc) h+='<p class="tip" style="text-align:center;font-size:14px;margin:2px 0 0;">'+o.desc+'</p>';
    if(acts.length){
      h+='<div class="sheet-btns">';
      acts.forEach(function(a,i){ h+='<button class="sheet-btn'+(a.danger?' danger':'')+'" data-i="'+i+'">'+ (a.label||'') +'</button>'; });
      h+='</div>';
    }
    h+='<button class="sheet-leave" id="m-leave">告 辞</button>';
    $card.innerHTML=h;
    $modal.classList.remove('hidden');
    $card.querySelectorAll('.sheet-btn').forEach(function(btn){
      btn.onclick=function(){ closeModal(); var a=acts[+btn.getAttribute('data-i')]; if(a&&a.fn) a.fn(); };
    });
    var lv=document.getElementById('m-leave'); if(lv) lv.onclick=closeModal;
  }
  function addGrouped(group,label,fn,tip){
    if(group!==lastGroup){
      var t=document.createElement('div'); t.className='grp'; t.textContent='— '+group+' —';
      $actions.appendChild(t); lastGroup=group;
    }
    var b=document.createElement('button'); b.className='act'; b.textContent=label;
    if(tip){
      b.onclick=function(){ openSheet({title:label, desc:tip, actions:[{label:'执 行', fn:fn}]}); };
    } else {
      b.onclick=fn;
    }
    $actions.appendChild(b);
  }

  // ===== 房间渲染 =====
  var explored=false;        // 当前房间是否已探查（调查四周后解锁「去处」）
  function renderRoom(rid, silent){
    var room=G.ROOMS[rid]; if(!room) return;
    state.room=rid;
    explored = !!(state.exploredRooms && state.exploredRooms[rid]);
    if(!silent){
      log('〔'+room.name+'〕','title');
      room.desc.forEach(function(d){ log(d,'env'); });
    }
    if(room.npcs && room.npcs.length){
      log('〔此处人物〕','sys');
      room.npcs.forEach(function(k){
        var n=G.DIALOGUES.npcs[k];
        if(n) log(n.lines[0].slice(0,20)+'…','npc', n.name);
      });
    }
    if(room.items && room.items.length){
      log('〔地上之物〕','sys');
      room.items.forEach(function(it){ log('· '+it,'item'); });
    }
    if(room.exits){
      var ex=Object.keys(room.exits).map(function(d){return d+'·'+G.ROOMS[room.exits[d]].name;}).join('　');
      log('〔出口〕 '+ex,'exit');
    }
    buildActions(room);
    if(room.patrol && !silent){ maybeAmbush(room); }
    save(state); renderStatus();
  }
  // 巡山埋伏：进入巡逻山道有概率遇敌（山贼 / 黄巾余孽）
  function maybeAmbush(room){
    if(state.defeated) return;
    if(Math.random() < 0.5){
      var enemy = Math.random()<0.6 ? 'bandit' : 'yellow_turban';
      log('〔警觉〕林间树影倏动，一伙'+(enemy==='bandit'?'山贼':'黄巾余孽')+'自草莽中杀出，拦住去路！','combat');
      startCombat(enemy);
    } else {
      log('这一程山道尚算平静，只闻松涛与远鸟。你按刀而行，未遇拦路之敌。','sys');
    }
  }
  // ===== 场景对象配置：每个房间的可交互元素（人物/建筑/家具/出口） =====
  var ROOM_OBJECTS={
    camp:[
      {type:'npc',   key:'hanbo',   icon:'👤', name:'县尉韩博',  desc:'按剑而立，目光如炬',                actions:[{label:'与他交谈', fn:function(){ talk('hanbo'); }}]},
      {type:'building',key:'tent',  icon:'⛺', name:'中军大帐',  desc:'案上谱录，凝神参悟',                actions:[{label:'研习武学', fn:function(){ handleAction('learn'); }, tip:'案上谱录，凝神参悟'},
                                                                            {label:'帐中休整', fn:function(){ actRest(); },         tip:'盹一觉，气血内力尽复'}]},
      {type:'feature',key:'training',icon:'⚔️',name:'操练场',   desc:'木人桩列于场中，供你试招练手',      actions:[{label:'与木人过招', fn:function(){ handleAction('spar_dummy'); }, tip:'木人桩不伤性命，正可演练新招'}]},
      {type:'feature',key:'arena',  icon:'🏆', name:'挑战台',   desc:'温酒斩华雄，名震天下',              actions:[{label:'温酒斩华雄', fn:function(){ handleAction('battle_hua_xiong'); }, tip:'需声望≥20·首场Boss战'}]},
      {type:'feature',key:'env',    icon:'🔍', name:'四周环境', desc:'环顾此地',                          actions:[{label:'环顾四周', fn:function(){ renderRoom(state.room, true); }}]},

  function buildActions(room, popExits){
    clearActions();
    grpCursor=null;

      log('〔力竭〕你重伤未愈，动弹不得——点底部「🧘 调息」恢复后，方可再动。','sys');

    }
    var objs=ROOM_OBJECTS[room.id];
    if(objs && objs.length){
      renderObjs(objs.filter(function(o){return o.type==='npc';}), 'ren');
      renderObjs(objs.filter(function(o){return o.type==='feature' && o.key!=='env' && o.key!=='learn';}), 'scene');
      renderObjs(objs.filter(function(o){return o.key==='env';}), 'explore');
      if(explored && !suppressExits){
        renderExits(objs.filter(function(o){return o.type==='exit';}), popExits);
      } else if(suppressExits){
        // 调查期间：去处按钮延后到对应文字渐显完成后再逐个弹出
      } else {
        var hint=document.createElement('div'); hint.className='obj-hint';
        hint.innerHTML='🔍 先「调查四周」，方能探明通往他处的通路';
        $actions.appendChild(hint);
      }
      renderSelf(room);
      return;
    }
    // fallback：旧版分组按钮（兼容无配置的房间）
    (room.npcs||[]).forEach(function(k){
      var n=G.DIALOGUES.npcs[k]; if(!n) return;
      mkAct('ren','👤','与'+n.name+'交谈',function(){
        openSheet({title:'与'+n.name+'交谈',desc:n.name+'·当前态度：'+npcAttitude(k),actions:[{label:'执 行',fn:function(){ talk(k); }}]});
      });
    });
    if(explored){
      mkAct('explore','🔍','环顾四周',function(){ renderRoom(state.room,true); });
    } else {
      mkAct('explore','🔍','调查四周',function(){ investigateRoom(); });
    }
    (room.actions||[]).forEach(function(a){
      mkAct('scene','·',a.label,function(){
        openSheet({title:a.label,desc:a.tip,actions:[{label:'执 行',fn:function(){ handleAction(a.id,a); }}]});
      });
    });
    if(explored && !suppressExits){
      Object.keys(room.exits||{}).forEach(function(dir){
        var tid=room.exits[dir];
        mkAct('exit','🚪',dir+' · '+G.ROOMS[tid].name,function(){ move(dir,tid); }, popExits?'pop':'');
      });
    } else {
      var hint2=document.createElement('div'); hint2.className='obj-hint';
      hint2.innerHTML='🔍 先「调查四周」，方能探明通往他处的通路';
      $actions.appendChild(hint2);
    }
    renderSelf(room);
  }
  var grpCursor=null;
  var suppressExits=false;
  function isSelfCare(a){
    return (a.label==='研习武学') || /休整|歇|栖|借宿|调息/.test(a.label||'');
  }
  // 通用分组按钮（带分组底色；自身加边框由 .g-self 控制）
  function mkAct(group, icon, name, fn, extraCls){
    var b=document.createElement('button');
    b.className='act obj-btn g-'+group+(extraCls?(' '+extraCls):'');
    b.innerHTML='<span class="ob-ic">'+(icon||'·')+'</span><span class="ob-nm">'+name+'</span>';
    b.onclick=fn; $actions.appendChild(b);
    return b;
  }
  function renderObjs(list, group){
    if(!list.length) return;
    list.forEach(function(o){
      if(o.key==='env'){
        mkAct('explore', o.icon, o.name, function(){ investigateRoom(); });
      } else {
        var acts=(o.actions||[]).filter(function(a){return !isSelfCare(a);});
        mkAct(group, o.icon, o.name, function(){ openSheet({icon:o.icon,title:o.name,desc:o.desc,actions:acts}); });
      }
    });
  }
  function renderExits(list, pop){
    list.forEach(function(o){
      var tid=o.tid || (G.ROOMS[state.room] && G.ROOMS[state.room].exits && G.ROOMS[state.room].exits[o.dir]);
      mkAct('exit', o.icon, o.name, function(){ move(o.dir, tid); }, pop?'pop':'');
    });
  }
  function renderSelf(room){
    // 研习武学：仅特定房间出现；调息已移至底部 dock
    if(roomCanLearn(room.id)){
      mkAct('self','📖','研习武学', function(){ openLearn(); });
    }
  }

  // ===== 调查四周：叙事框高亮逐字显出，并解锁去处（按钮带弹出动画） =====
  var typeQueue=[], typing=false;
  function typeNarr(text, cls, done){
    typeQueue.push({text:text, cls:cls, done:done});
    runTypeQueue();
  }
  function runTypeQueue(){
    if(typing) return;
    var item=typeQueue.shift();
    if(!item){ return; }
    typing=true;
    var p=document.createElement('p');
    p.className='narr '+(item.cls||'env')+' typing';
    $narr.appendChild(p);
    var i=0, full=item.text;
    var timer=setInterval(function(){
      i++;
      p.textContent=full.slice(0,i);
      var sc=document.getElementById('scene'); sc.scrollTop=sc.scrollHeight;
      if(i>=full.length){
        clearInterval(timer);
        p.classList.remove('typing');
        typing=false;
        if(item.done) item.done();
        runTypeQueue();
      }
    }, 34);
  }
  function stripDir(nm){ return (nm||'').replace(/^[^·]*·/,''); }
  // 各方向通路描述：显眼者用「抬眼便见」，隐蔽者用「循迹探得」，并保留原 desc 的感官线索
  function exitReveal(o){
    var tid=o.tid;
    var tname = (tid && G.ROOMS[tid]) ? G.ROOMS[tid].name : stripDir(o.name);
    var d=o.desc||'通路隐于其间';
    var obvious=/正门|巍然|主轴|通衢|车水马龙|正对|大道|门楼|坦途|敞亮|灯火|通明/.test(d);
    var lead = obvious
      ? ('抬眼便见'+o.dir+'方便是「'+tname+'」')
      : ('循着迹象探去，'+o.dir+'面隐约现出通往「'+tname+'」的去路');
    return '〔'+o.dir+'〕'+lead+'——'+d+'。';
  }
  function investigateRoom(){
    if(state.defeated){ dockRest(); return; }
    explored=true;
    if(!state.exploredRooms) state.exploredRooms={};
    state.exploredRooms[state.room]=true;
    save(state);
    var room=G.ROOMS[state.room];
    // 先渲染人物/场景/自身；「去处」按钮延后到对应文字渐显完成后逐个弹出
    clearActions();
    suppressExits=true;
    buildActions(room, false);
    suppressExits=false;
    // 叙事框高亮逐字显出
    var find = room.find || '你凝神四望，周遭风物、通路尽收眼底。';
    typeNarr('〔调查 · '+room.name+'〕', 'title');
    typeNarr(find, 'investigate', function(){
      var objs=ROOM_OBJECTS[room.id]||[];
      var exits=objs.filter(function(o){return o.type==='exit';});
      if(!exits.length){ toast('已探明周遭通路'); return; }
      // 逐条通路文字渐显，每条打完才弹出对应「去处」按钮（顺序出现）
      exits.forEach(function(o, idx){
        typeNarr(exitReveal(o), 'investigate', function(){
          addExitBtn(o);
          if(idx===exits.length-1) toast('已探明周遭通路');
        });
      });
    });
  }
  // 对应某方向通路文字打完后，才把该「去处」按钮弹出（吸引注意）
  function addExitBtn(o){
    var tid=o.tid || (G.ROOMS[state.room] && G.ROOMS[state.room].exits && G.ROOMS[state.room].exits[o.dir]);
    mkAct('exit', o.icon, o.name, function(){ move(o.dir, tid); }, 'pop');
  }


  // ===== 行走探索 =====
  function move(dir, tid){
    if(!exert('远行')) return;
    state.energy=Math.max(0,state.energy-4);
    state.food=Math.max(0,state.food-1);
    state.drink=Math.max(0,state.drink-1);
    advanceTime(1);
    log('你朝'+dir+'方行去，沿途景物渐换……','sys');
    renderRoom(tid);
  }

  // ===== NPC 态度（由善恶双轴驱动，GAME_DESIGN 4.2） =====
  function npcAttitude(k){
    var n=G.DIALOGUES.npcs[k];
    var align=(n&&n.align)||'neutral';
    var c=state.chivalry, no=state.notoriety;
    if(align==='order'){
      if(no>=30) return '敌视';
      if(no>=10) return '戒备';
      if(c>=30) return '敬重';
      if(c>=10) return '友善';
      return '平常';
    }
    if(align==='shadow'){
      if(c>=30) return '戒备';
      if(no>=30) return '亲近';
      if(no>=10) return '友善';
      return '平常';
    }
    if(c>=30||no>=30) return '看重';
    return '平常';
  }

  // ===== NPC 对话 =====
  function talk(k){
    var n=G.DIALOGUES.npcs[k];
    if(!n) return;
    var at=npcAttitude(k);
    log('〔'+n.name+'·态度：'+at+'〕','npc');
    if(at==='敌视'){
      log(n.name+'面色不豫：「久闻壮士凶名……恕不奉陪。」说罢拂袖而去。','npc');
      return;
    }
    var line=n.lines[Math.floor(Math.random()*n.lines.length)];
    log(line,'npc', n.name);
    // ── P3 双轴解锁事件 ──
    if(k==='hanbo' && state.chivalry>=30){ var er=findEvent('ev_righteous'); if(er) runEvent(er); return; }
    if(k==='yingmen' && state.notoriety>=30){ var es2=findEvent('ev_shadow'); if(es2) runEvent(es2); return; }
    if(k==='shuijing' && state.chivalry>=40 && state.notoriety>=40){ var eu=findEvent('ev_usurper'); if(eu) runEvent(eu); return; }
    if(k==='hanbo' && Math.random()<0.6){ var ev=findEvent('ev_hanbo'); if(ev) runEvent(ev); }
  }

  // ===== 行动分发 =====
  function handleAction(id, a){
    switch(id){
      case 'learn': openLearn(); break;
      case 'rest':  actRest(); break;
      case 'market': if(!exert('行走市集')) return; runEvent(findEvent('ev_merchant')); break;
      case 'city_patrol': if(!exert('巡查城防')) return; runEvent(findEvent('ev_escapees')); break;
      case 'patrol': if(!exert('深入山林')) return; 
        var pool=['ev_escapees','ev_hermit','ev_leftci','ev_merchant','ev_hanbo'];
        var ev2=findEvent(pool[Math.floor(Math.random()*pool.length)]);
        if(ev2) runEvent(ev2); break;
      // ─── 战斗试炼 ───
      case 'spar_bandit': if(!exert('应战')) return; startCombat('bandit'); break;
      case 'spar_chief':  if(!exert('应战')) return; startCombat('bandit_chief'); break;
      case 'spar_turban': if(!exert('应战')) return; startCombat('yellow_turban'); break;
      // ─── 新战斗：木人桩 / 黑山寨 ───
      case 'spar_dummy': if(!exert('应战')) return; startCombat('dummy'); break;
      case 'spar_heishan_zei': if(!exert('应战')) return; startCombat('heishan_zei'); break;
      case 'spar_heishan_zhu': if(!exert('应战')) return; startCombat('heishan_zhu'); break;
      case 'battle_hua_xiong':
        if(!exert('应战')) return;
        if(state.reputation < 20){ log('时机未至——声望未达 20（当前 '+state.reputation+' · '+repTitle(state.reputation)+'），先扬名立万。','sys'); return; }
        startCombat('hua_xiong'); break;
      case 'visit_luoyang':
        if(!exert('远赴洛阳')) return;
        if(!state.quest.luoyang){ log('洛阳城门紧闭——需先「温酒斩华雄」扬名立万，方得入城。','sys'); return; }
        move('南','luoyang'); break;
    }
  }
  function actRest(){
    clearActions();
    var esR=effectiveStats();
    state.hp=esR.maxHp; state.mp=esR.maxMp; state.energy=state.maxEnergy;
    state.food=state.maxFood; state.drink=state.maxDrink;
    if(state.defeated){ state.defeated=false; log('你缓缓起身，伤势渐愈，气力渐复……','good'); }
    else { log('你就地调息，闭目养神片刻——气血、内力、精力皆复，饥渴亦消。','env'); }
    buildActions(curRoom()); save(state); renderStatus();
  }

  // ===== 修炼（消耗潜能习真招式，接入 MARTIAL_ARTS，按 13 艺线分组） =====
  function openLearn(){
    clearActions();
    log('【修炼】案上摊开武学谱录，你凝神参悟，耗「潜能」以窥门径：','title');
    var MA=G.MARTIAL_ARTS, LINES=MA.LINES;
    var order=Object.keys(LINES).sort(function(a,b){return LINES[a].order-LINES[b].order;});
    order.forEach(function(lid){
      var line=LINES[lid];
      var list=[];
      for(var k in MA){ var a=MA[k]; if(a&&a.id&&a.line===lid&&a.type!=='technique') list.push(a); }
      if(!list.length) return;
      var head=document.createElement('div'); head.className='learn-line';
      head.innerHTML='<span class="ll-name">'+line.name+'</span><span class="ll-lv">艺线 Lv.'+(state.lines[lid]||0)+'</span>';
      $actions.appendChild(head);
      list.forEach(function(a){
        var owned=state.learnedMartial.indexOf(a.id)>=0;
        var rlm=(state.realm[a.id]||0);
        var rname=G.MARTIAL_ARTS.REALMS[rlm];
        var potCost=a.type==='ultimate'?50 : 20 + a.learn.lineMin*8 + Math.floor(a.beat/10);
        var lockLine=(state.lines[lid]||0) < a.learn.lineMin;
        var b=document.createElement('button'); b.className='act wide';
        b.title=a.desc+'（当前境界：'+rname+'）';
        if(owned){ b.innerHTML='✓ '+a.name+'（'+rname+'）'; b.disabled=true; }
        else if(lockLine){ b.innerHTML='🔒 '+a.name+'（'+line.name+'艺线需 Lv.'+a.learn.lineMin+'）'; b.disabled=true; }
        else{
          b.innerHTML='› '+a.name+(a.type==='ultimate'?' · 绝技':'')+'（耗潜能 '+potCost+'）';
          b.onclick=function(){
            if(state.pot<potCost){ log('潜能不足，难窥'+a.name+'门径。可多去历练积攒潜能。','sys'); return; }
            state.pot-=potCost; state.learnedMartial.push(a.id);
            state.lines[lid]=Math.min(20,(state.lines[lid]||0)+1);
            log('【习得】'+a.name+'！'+a.desc,'good');
            clearActions(); buildActions(curRoom()); save(state); renderStatus();
          };
        }
        $actions.appendChild(b);
      });
    });
    // 发力技巧（可嵌任意武学，单独成组）
    var techs=MA.getTechniques();
    if(techs.length){
      var th=document.createElement('div'); th.className='learn-line';
      th.innerHTML='<span class="ll-name">发力技巧</span><span class="ll-lv">装配增威</span>';
      $actions.appendChild(th);
      techs.forEach(function(a){
        var equipped=state.equippedForce.indexOf(a.id)>=0;
        var potCost=20 + a.learn.lineMin*8;
        var lockLine=(state.lines[a.line]||0) < a.learn.lineMin;
        var b=document.createElement('button'); b.className='act wide';
        b.title=a.desc;
        if(equipped){ b.innerHTML='✓ '+a.name+'（已装配）'; b.disabled=true; }
        else if(lockLine){ b.innerHTML='🔒 '+a.name+'（'+LINES[a.line].name+'艺线需 Lv.'+a.learn.lineMin+'）'; b.disabled=true; }
        else{
          b.innerHTML='› '+a.name+'（耗潜能 '+potCost+'）';
          b.onclick=function(){
            if(state.pot<potCost){ log('潜能不足，难通'+a.name+'。','sys'); return; }
            state.pot-=potCost; state.equippedForce.push(a.id);
            log('【装配】'+a.name+'！'+a.desc,'good');
            clearActions(); buildActions(curRoom()); save(state); renderStatus();
          };
        }
        $actions.appendChild(b);
      });
    }
    addBtn('返回营中', function(){ buildActions(curRoom()); });
  }

  // ===== 随机事件（含打斗氛围） =====
  function runEvent(ev){
    if(!ev) return;
    clearActions(); advanceTime(1);
    log('— '+ev.title+' —','title');
    log(ev.text,'env');
    if(/劫掠|剿匪|驱赶|受命|巡山|溃兵/.test(ev.title+ev.text))
      log('刀光乍起，你与对方缠斗数合，招式凌厉，各展所能。','combat');
    ev.choices.forEach(function(ch){
      var b=document.createElement('button'); b.className='act wide';
      b.innerHTML='› '+ch.text+(ch.cost?('<span class="tip">耗银'+(ch.cost.gold||0)+'</span>'):'');
      b.onclick=function(){
        if(ch.cost){
          if(state.gold<(ch.cost.gold||0)){ log('银两不足，难以行事。','sys'); return; }
          state.gold-=(ch.cost.gold||0);
        }
        if(/驱赶|剿匪|受命|巡山|挺身/.test(ch.text)) log('你提气凝神，一招逼退对手！','combat');
        applyEffect(ch.effect||{});
        log(ch.result,'env');
        // P3 善恶双轴：按 choice.moral 累积（互不抵消）
        if(ch.moral==='chivalry'){ addChivalry(1); log('〔侠义 +1〕','good'); }
        else if(ch.moral==='notoriety'){ addNotoriety(1); log('〔凶名 +1〕','sys'); }
        buildActions(curRoom()); save(state); renderStatus();
      };
      $actions.appendChild(b);
    });
    addBtn('返回营中', function(){ buildActions(curRoom()); });
  }

  // ===== 底部弹窗 =====

    var MA=G.MARTIAL_ARTS;
    var all=state.learnedMartial.concat(state.equippedForce);
    if(!all.length) return '<span style="color:var(--ink-faint)">尚无</span>';
    return all.map(function(id){
      var a=MA.get(id);
      return '<span'+(a&&a.type==='technique'?' class="force"':'')+'>'+(a?a.name:id)+(a&&a.type==='technique'?'◆':'')+'</span>';
    }).join('');
  }

  // ═══════════════════════════════════════════
  //  战 斗 系 统（v0.2 半手动回合制 + 节拍 + 战意）
  // ═══════════════════════════════════════════
  var combatMode=null;  // null | 'manual' | 'auto'
  var combatAutoStrategy='optimal';

  /** 计算含装备+艺线加成的有效属性（P1 装备 / P2 艺线：攻/命中/暴击/内力/身法） */
  function effectiveStats(){
    var atk=state.atk, def=state.def, maxHp=state.maxHp, maxMp=state.maxMp, spd=state.spd;
    ['weapon','armor','trinket','mount'].forEach(function(sl){
      var eq=state.equipment[sl]; if(!eq) return;
      atk+=(eq.atk||0); def+=(eq.def||0); maxHp+=(eq.hp||0); maxMp+=(eq.mp||0); spd+=(eq.spd||0);
    });
    // ── P2：艺线等级加成 ──
    var lineAtk=0, lineCrit=0, lineHit=0, lineMp=0, lineSpd=0;
    for(var l in state.lines){
      var lv=state.lines[l]||0;
      lineAtk += lv*0.6;
      lineCrit += lv*0.003;
      lineHit += lv*0.002;
      if(l==='internal') lineMp += lv*1;   // 内功线 → 内力上限
      if(l==='light')    lineSpd += lv*0.3; // 轻功线 → 身法
    }
    atk += lineAtk;
    maxMp += lineMp;
    spd += lineSpd;
    var hitRate = Math.min(0.99, 0.92 + lineHit);
    var critRate = Math.min(0.35, lineCrit);
    return {atk:atk,def:def,maxHp:maxHp,maxMp:maxMp,spd:spd,hitRate:hitRate,critRate:critRate};
  }
  function clampHp(){ var mx=effectiveStats().maxHp; if(state.hp>mx) state.hp=mx; }
  // 每场战斗结束（胜/败/逃）已装备耐久 -1，耗尽则损毁
  function decayEquipment(){
    var broken=[];
    ['weapon','armor','trinket','mount'].forEach(function(sl){
      var eq=state.equipment[sl]; if(!eq) return;
      eq.dur-=1;
      if(eq.dur<=0){ state.equipment[sl]=null; broken.push(eq.name); }
    });
    if(broken.length) log('【装备】'+broken.join('、')+' 耐久已尽，损毁弃之。','sys');
    clampHp();
  }
  // 装备/卸下
  function equipItem(id){
    var idx=-1;
    for(var i=0;i<state.equips.length;i++){ if(state.equips[i].id===id){ idx=i; break; } }
    if(idx<0) return;
    var eq=state.equips[idx], slot=eq.type;
    if(state.equipment[slot]) state.equips.push(state.equipment[slot]); // 原装备退回背包
    state.equipment[slot]=eq; state.equips.splice(idx,1);
    clampHp(); save(state); renderStatus(); openModal('pack'); toast('已装备 '+eq.name);
  }
  function unequip(slot){
    var eq=state.equipment[slot]; if(!eq) return;
    state.equipment[slot]=null; state.equips.push(eq);
    clampHp(); save(state); renderStatus(); openModal('pack'); toast('已卸下 '+eq.name);
  }

  /** 开始战斗 */
  function startCombat(enemyId){
    var es=effectiveStats();
    var pstate=Object.assign({}, state, {
      atk:es.atk, def:es.def, maxHp:es.maxHp, maxMp:es.maxMp, spd:es.spd,
      hitRate:es.hitRate, critRate:es.critRate
    });
    var r=G.CombatEngine.init(pstate, enemyId);
    if(r.error){ log(r.error,'sys'); return; }
    state.energy=Math.max(0,state.energy-5);   // 应战耗精力
    combatMode='manual';
    $narr.innerHTML='';
    var enemy=G.CombatEngine.getEnemy();
    log('════ 刀兵相见 ════','combat');
    log(enemy.name+(enemy.title?' · '+enemy.title:''),'title');
    renderCombatRound();
  }

  /** 渲染战斗卡 */
  function renderCombatCard(){
    var st=G.CombatEngine.getStatus();
    var e=st.enemy, p=st.player;
    var hpPct=Math.round(Math.max(0,e.hp)/Math.max(1,e.maxHp)*100);
    var hpCls=hpPct>50?'c-hp':hpPct>25?'c-hp-warn':'c-hp-danger';

    var bufHtml='';
    if(e.buffs&&e.buffs.length){
      e.buffs.forEach(function(b){ bufHtml+='<span class="ec-tag">'+(b.type==='atk'?'攻↑':'速↑')+' '+b.turns+'回合</span>'; });
    }
    if(e.dots&&e.dots.length){
      e.dots.forEach(function(d){ bufHtml+='<span class="ec-tag debuff">'+d.name+' '+d.turns+'回合</span>'; });
    }

    logHTML(
      '<div class="c-enemy">'+
        '<div class="ec-top"><span class="ec-name">'+e.name+'</span><span class="ec-title">'+e.title+'</span></div>'+
        '<div class="ec-hp"><span>气血</span><div class="c-bar"><div class="'+hpCls+'" style="width:'+hpPct+'%"></div></div><span>'+Math.max(0,e.hp)+'/'+e.maxHp+'</span></div>'+
        (bufHtml?'<div class="ec-buffs">'+bufHtml+'</div>':'')+
      '</div>'
    ,'env');

    logHTML(
      '<div class="c-player">'+
        '<span>▲ '+state.name+'</span>'+
        '<span class="cp-hp">气血 '+p.hp+'/'+p.maxHp+'</span>'+
        '<span class="cp-mp">内力 '+p.mp+'/'+p.maxMp+'</span>'+
        '<span class="cp-rage">战意 '+p.rage+'/'+p.maxRage+'</span>'+
      '</div>'+
      '<div class="c-round">—— 第 '+st.round+' 回合 ——</div>'
    ,'sys');
  }

  /** 渲染战斗回合（场景 + 按钮） */
  function renderCombatRound(){
    var st=G.CombatEngine.getStatus();
    if(st.result){ endCombat(st.result); return; }
    clearActions();
    renderCombatCard();

    // ── 战斗按钮 ──
    var actions=G.CombatEngine.getPlayerActionList();
    actions.forEach(function(a){
      var tip=(a.cost&&a.cost.type==='mp'?'耗内'+a.cost.val:'')+
              (a.cost&&a.cost.type==='rage'?'耗战意':'')+
              (a.multiHit?' · '+a.multiHit+'段':'');
      var cls=a.affordable?(a.type==='ultimate'?'danger':''):'disabled';
      var prefix=a.affordable?((a.type==='ultimate'?'▸':'›')+' '):('🔒 ');
      var label=prefix+a.name+' · '+a.beat+'拍';
      // 统一用 '武技/招式' 分组防止重复标题
      if(!a.affordable){ addGrouped('武技/招式',label,function(){ return; },tip); }
      else {
        addGrouped('武技/招式',label,
          function(aid){ return function(){ handleCombatAction(aid); };}(a.id),
          tip);
      }
    });

    addGrouped('战术','⛊ 防御架势',function(){ handleCombatAction('defend'); },'减伤·回复少量内力');
    addGrouped('战术','⇱ 撤退',function(){ handleCombatFlee(); },'速度差决定成功率');
    addGrouped('战术','⚡ 自动战斗',function(){ startAutoBattle('optimal'); },'激进·AI代战');
    addGrouped('战术','🛡 自动(保守)',function(){ startAutoBattle('conservative'); },'防守·稳扎稳打');
  }

  /** 处理手动战斗操作 */
  function handleCombatAction(actionId){
    var battleLog=G.CombatEngine.playTurn(actionId);
    battleLog.forEach(function(entry){
      logText(entry.text, entry.type||'env');
    });
    // 同步战意/内力回 state
    var st=G.CombatEngine.getStatus();
    state.mp=st.player.mp;
    // 检查结束
    if(st.result){ endCombat(st.result); return; }
    renderCombatRound();
  }

  /** 处理逃跑 */
  function handleCombatFlee(){
    var r=G.CombatEngine.tryFlee();
    log(r.text,'sys');
    if(r.success){ endCombat('fled'); return; }
    if(r.log) r.log.forEach(function(e){ log(e.text,e.type||'sys'); });
    var st=G.CombatEngine.getStatus();
    if(st.result){ endCombat(st.result); return; }
    renderCombatRound();
  }

  /** 自动战斗 */
  function startAutoBattle(strategy){
    combatMode='auto';
    combatAutoStrategy=strategy;
    clearActions();
    log('【自动战斗】放手一搏，交由天意——','sys');
    var result=G.CombatEngine.autoResolve(strategy);
    // 输出摘要（只显示攻击事件）
    result.log.forEach(function(entry){
      if(entry.type==='player_atk'||entry.type==='enemy_atk'||
         entry.type==='debuff'||entry.type==='buff'||
         entry.type==='dot'||entry.type==='counter'){
        logText(entry.text, 'sys');
      }
    });
    // 同步状态
    var st=G.CombatEngine.getStatus();
    state.mp=st.player.mp;
    endCombat(result.result);
  }

  /** 战斗结束 */
  function endCombat(result){
    if(combatMode===null) return;   // 防止重复调用（如快速连点）
    combatMode=null;
    clearActions();                  // 清除战斗按钮，防止残留可点击
    if(G.CombatEngine && G.CombatEngine.state){ G.CombatEngine.state.result='ended'; } // 标记引擎已结束，阻断 playTurn
    var st=G.CombatEngine.getStatus();
    var enemy=G.CombatEngine.getEnemy();

    // 更新玩家状态
    state.hp=st.player.hp;
    state.mp=st.player.mp;
    maybeStarve();   // 战后结算饥馁（食物/饮水耗尽则扣血）
    decayEquipment(); // 战后装备耐久衰减

    if(result==='win'){
      var drop=G.CombatEngine.getDrop();
      state.gold+=drop.gold;
      state.pot+=drop.pot;
      // ── 掉落入库（P1 背包系统：按 id 堆叠 count）──
      drop.items.forEach(function(it){
        var ex=null;
        for(var i=0;i<state.items.length;i++){ if(state.items[i].id===it.id){ ex=state.items[i]; break; } }
        if(ex){ ex.count=(ex.count||1)+1; }
        else { state.items.push({id:it.id, name:it.name, count:1}); }
      });
      var detail=drop.gold+'银两 · 潜能+'+drop.pot;
      if(drop.items.length) detail+=' · '+drop.items.map(function(it){return it.name;}).join('、');
      // ── 装备掉落（P1 完整）──
      if(drop.equip){
        state.equips.push(drop.equip);
        detail+=' · 夺得'+drop.equip.qualityName+'「'+drop.equip.name+'」('+LF.ITEMS.statText(drop.equip)+')';
      }

      // ── 声望 / 主线进度（P4 真实获取途径，替代调试台直赋）──
      var RREP={bandit:2,bandit_chief:4,yellow_turban:5,hua_xiong:20,dummy:0,heishan_zei:2,heishan_zhu:12};
      if(RREP[enemy.id]) addReputation(RREP[enemy.id]);
      if(enemy.id==='bandit'||enemy.id==='bandit_chief'||enemy.id==='heishan_zei'||enemy.id==='heishan_zhu') state.quest.bandit++;
      else if(enemy.id==='yellow_turban') state.quest.turban++;
      else if(enemy.id==='hua_xiong'){
        state.quest.hua_xiong=true; state.quest.luoyang=true;
        log('【主线】温酒斩华雄！洛阳之门已为你敞开，可自「颍川主营」赴洛阳。','good');
      }
      else if(enemy.id==='heishan_zhu'){
        log('【剿匪】黑山寨主张燕授首！聚义厅群龙无首，余众溃散——此寨已平。','good');
      }

      // ── P2：艺线经验由战斗出手累积，满则升级 ──
      var gains=G.CombatEngine.getLineGains()||[];
      if(gains.length){
        var expMap={};
        gains.forEach(function(g){ if(!g.line) return; expMap[g.line]=(expMap[g.line]||0)+(g.crit?8:5); });
        var LINES=G.MARTIAL_ARTS.LINES, upMsgs=[];
        for(var l in expMap){
          state.lineExp[l]=(state.lineExp[l]||0)+expMap[l];
          var lv=state.lines[l]||0, need=(lv+1)*40;
          while(lv<20 && state.lineExp[l]>=need){
            state.lineExp[l]-=need; lv++;
            upMsgs.push(LINES[l].name+'艺线 Lv.'+lv);
            need=(lv+1)*40;
          }
          state.lines[l]=lv;
        }
        if(upMsgs.length) log('【武学精进】'+upMsgs.join('、')+' 突破！攻防随之精进。','good');
      }

      logHTML(
        '<div class="c-summary win">'+
          '<div class="cs-title">✦ 大胜 ✦</div>'+
          '<div class="cs-detail">「'+enemy.name+'」败于你手！</div>'+
          '<div class="cs-detail">'+detail+'</div>'+
        '</div>'
      ,'good');
      toast('胜！+'+drop.gold+'银 +'+drop.pot+'潜能');
    } else if(result==='lose'){
      state.hp=1;
      state.defeated=true;   // 战败标记：封锁一切行动直到休整恢复
      logHTML(
        '<div class="c-summary lose">'+
          '<div class="cs-title">✘ 战 败</div>'+
          '<div class="cs-detail">眼前一黑……你重伤倒地，气若游丝。须先「休整」恢复，方可再动。</div>'+
        '</div>'
      ,'combat');
      toast('败北！气血仅余1点');
    } else if(result==='fled'){
      log('你已脱离战斗，回到原地。','sys');
      toast('已脱离战斗');
    }

    // 返回房间（战败时只留休整按钮，由 buildActions 的 defeated 锁控制）
    addBtn('返回',function(){ renderRoom(state.room,true); },'wide');
    save(state); renderStatus();
  }

  // ===== 离线收益（按设计文档 v2：操演部众放置内核暂未启用，仅记录时间戳，不做收益结算）=====
  // 注：state.lastSeen 仍由 beforeunload 记录用于存档时间戳，但不再结算离线收益。

  // ===== 序幕 =====
  G.DIALOGUES.prologue.forEach(function(l){log(l,'env');});
  log('— 颍川起兵 —','title');
  renderStatus();
  renderRoom(state.room || state.spawnRoom || 'ji_guomen');

  window.addEventListener('beforeunload',function(){state.lastSeen=Date.now();save(state);});
  }catch(e){
    var pre=document.createElement('pre');
    pre.style.cssText='padding:24px;color:#c00;background:#fff;white-space:pre-wrap;font-size:13px;line-height:1.6';
    pre.textContent=e.stack || e.message || String(e);
    document.body.innerHTML='';
    document.body.appendChild(pre);
  }
})();
</script>
</body>
</html>
