<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>种田日记</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:"Microsoft YaHei",sans-serif; 
    background:linear-gradient(180deg,#2d5016 0%,#4a7c2e 40%,#87CEEB 40%,#87CEEB 100%);
    min-height:100vh; display:flex; justify-content:center; align-items:center;
    padding:20px;
}
#app {
    width:100%; max-width:480px;
    background:linear-gradient(180deg,#f5e6c8,#e8d5a8);
    border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.3);
    overflow:hidden;
}

/* 顶栏 */
#header {
    background:linear-gradient(135deg,#5d4037,#8d6e63);
    color:#ffd54f; padding:16px 20px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:3px solid #4e342e;
}
#header h1 { font-size:24px; text-shadow:1px 1px 2px rgba(0,0,0,0.3); }
#season-info { text-align:right; }
#year-display { font-size:14px; color:#ffcc80; }
#season-display { font-size:22px; }

/* 状态栏 */
#status-bar {
    display:flex; justify-content:space-around;
    padding:12px; background:rgba(0,0,0,0.08);
    border-bottom:2px dashed #bcaaa4;
}
.stat-item { text-align:center; }
.stat-icon { font-size:24px; }
.stat-label { font-size:11px; color:#795548; }
.stat-value { font-size:18px; font-weight:bold; color:#4e342e; }

/* 田地 */
#fields-area {
    padding:16px 20px; min-height:200px;
}
#fields-area h3 { color:#5d4037; margin-bottom:10px; font-size:15px; }
#fields {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px;
}
.field {
    background:linear-gradient(180deg,#8d6e63,#6d4c41);
    border-radius:10px; padding:16px 10px;
    text-align:center; min-height:90px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    border:3px solid #5d4037;
    transition:all 0.2s;
    cursor:pointer; position:relative;
}
.field:hover { border-color:#ffd54f; transform:translateY(-2px); }
.field.empty { background:linear-gradient(180deg,#a1887f,#8d6e63); border-style:dashed; }
.field.ready { background:linear-gradient(180deg,#66bb6a,#43a047); border-color:#2e7d32; animation:pulse 1.5s infinite; }
.field.growing { background:linear-gradient(180deg,#795548,#5d4037); }
@keyframes pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(255,215,0,0.4); }
    50% { box-shadow:0 0 12px 4px rgba(255,215,0,0.6); }
}
.field-icon { font-size:32px; }
.field-name { font-size:13px; color:#fff; font-weight:bold; margin-top:4px; }
.field-status { font-size:10px; color:#e0e0e0; margin-top:2px; }
.field.empty .field-icon { opacity:0.3; font-size:24px; }
.field.empty .field-name,.field.empty .field-status { color:#d7ccc8; }

/* 操作区 */
#actions {
    padding:0 20px 16px;
}
#actions h3 { color:#5d4037; margin-bottom:10px; font-size:15px; }
.action-btns { display:flex; flex-wrap:wrap; gap:8px; }
.action-btn {
    flex:1; min-width:90px;
    padding:12px 8px; border-radius:10px;
    border:2px solid #8d6e63; cursor:pointer;
    font-size:13px; font-weight:bold;
    background:#fff; color:#5d4037;
    transition:all 0.15s;
    text-align:center;
}
.action-btn:hover { background:#ffd54f; border-color:#f9a825; transform:translateY(-1px); }
.action-btn:active { transform:scale(0.96); }
.action-btn.disabled { opacity:0.4; pointer-events:none; }
.action-btn .btn-icon { font-size:20px; display:block; }
.action-btn .btn-cost { font-size:10px; color:#888; margin-top:2px; }

/* 日志 */
#log-area {
    padding:0 20px 16px;
}
#log-area h3 { color:#5d4037; margin-bottom:8px; font-size:15px; }
#log {
    background:rgba(255,255,255,0.7); border-radius:8px;
    padding:10px 14px; max-height:100px; overflow-y:auto;
    font-size:12px; color:#5d4037; line-height:1.8;
    border:1px solid #d7ccc8;
}
#log::-webkit-scrollbar { width:4px; }
#log::-webkit-scrollbar-thumb { background:#bcaaa4; border-radius:2px; }
.log-entry { border-bottom:1px dotted #d7ccc8; padding:2px 0; }
.log-good { color:#2e7d32; }
.log-bad { color:#c62828; }
.log-info { color:#1565c0; }

/* 底部 */
#footer {
    display:flex; gap:10px; padding:0 20px 16px;
}
#footer button {
    flex:1; padding:10px; border-radius:8px;
    border:none; cursor:pointer; font-size:14px; font-weight:bold;
    transition:all 0.15s;
}
#btn-next { background:linear-gradient(135deg,#66bb6a,#43a047); color:#fff; }
#btn-next:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(67,160,71,0.4); }
#btn-reset { background:#efebe9; color:#795548; }
#btn-reset:hover { background:#d7ccc8; }

/* 弹窗 */
.modal {
    display:none; position:fixed; top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.6); z-index:100;
    justify-content:center; align-items:center;
}
.modal.show { display:flex; }
.modal-box {
    background:#fff; border-radius:16px; padding:24px;
    max-width:360px; width:90%; text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.modal-box h2 { color:#5d4037; margin-bottom:12px; }
.modal-box p { color:#666; font-size:14px; line-height:1.8; margin-bottom:16px; }
.modal-btn {
    padding:10px 32px; border-radius:8px; border:none;
    background:linear-gradient(135deg,#66bb6a,#43a047);
    color:#fff; font-size:15px; font-weight:bold; cursor:pointer;
}
.modal-btn:hover { transform:translateY(-1px); }

/* 季节性背景微调 */
body.spring { background:linear-gradient(180deg,#7cb342 0%,#66bb6a 40%,#b3e5fc 40%,#b3e5fc 100%); }
body.summer { background:linear-gradient(180deg,#f9a825 0%,#ffb300 30%,#4fc3f7 30%,#4fc3f7 100%); }
body.autumn { background:linear-gradient(180deg,#e65100 0%,#ef6c00 30%,#ffcc80 30%,#ffcc80 100%); }
body.winter { background:linear-gradient(180deg,#eceff1 0%,#cfd8dc 40%,#90caf9 40%,#90caf9 100%); }
</style>
</head>
<body class="spring">
<div id="app">

<!-- 顶栏 -->
<div id="header">
    <h1>🌾 种田日记</h1>
    <div id="season-info">
        <div id="year-display"></div>
        <div id="season-display"></div>
    </div>
</div>

<!-- 状态栏 -->
<div id="status-bar">
    <div class="stat-item">
        <div class="stat-icon">💰</div>
        <div class="stat-label">金币</div>
        <div class="stat-value" id="gold-val">200</div>
    </div>
    <div class="stat-item">
        <div class="stat-icon">📦</div>
        <div class="stat-label">粮仓</div>
        <div class="stat-value" id="storage-val">0</div>
    </div>
    <div class="stat-item">
        <div class="stat-icon">🏡</div>
        <div class="stat-label">田地</div>
        <div class="stat-value" id="land-val">2</div>
    </div>
    <div class="stat-item">
        <div class="stat-icon">⭐</div>
        <div class="stat-label">声望</div>
        <div class="stat-value" id="fame-val">0</div>
    </div>
</div>

<!-- 田地 -->
<div id="fields-area">
    <h3>🪴 我的田地</h3>
    <div id="fields"></div>
</div>

<!-- 操作 -->
<div id="actions">
    <h3>🔧 操作</h3>
    <div class="action-btns" id="action-btns">
        <button class="action-btn" onclick="plant('rice')">
            <span class="btn-icon">🌾</span>播种水稻<span class="btn-cost">30金</span>
        </button>
        <button class="action-btn" onclick="plant('wheat')">
            <span class="btn-icon">🌿</span>播种小麦<span class="btn-cost">20金</span>
        </button>
        <button class="action-btn" onclick="plant('herb')">
            <span class="btn-icon">🌿</span>播种药材<span class="btn-cost">60金</span>
        </button>
        <button class="action-btn" onclick="plant('fruit')">
            <span class="btn-icon">🍎</span>播种果树<span class="btn-cost">50金</span>
        </button>
        <button class="action-btn" onclick="harvestAll()">
            <span class="btn-icon">🧺</span>全部收获
        </button>
        <button class="action-btn" onclick="upgradeLand()">
            <span class="btn-icon">🔨</span>开垦田地<span class="btn-cost" id="upgrade-cost"></span>
        </button>
    </div>
</div>

<!-- 日志 -->
<div id="log-area">
    <h3>📜 日志</h3>
    <div id="log"></div>
</div>

<!-- 底部 -->
<div id="footer">
    <button id="btn-reset" onclick="resetGame()">🔄 重新开始</button>
    <button id="btn-next" onclick="nextSeason()">▶ 下个季节</button>
</div>

</div>

<!-- 弹窗 -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <button class="modal-btn" onclick="closeModal()">知道了</button>
    </div>
</div>

<script>
// ========== 游戏数据 ==========
var gold = 200;
var landLevel = 2;       // 田地数量
var storage = 0;          // 粮仓库存
var fame = 0;             // 声望
var year = 1;
var season = 0;           // 0春1夏2秋3冬
var seasonNames = ['春','夏','秋','冬'];
var seasonEmoji = ['🌸','☀️','🍂','❄️'];
var seasonBodyClass = ['spring','summer','autumn','winter'];

// 田地状态: null=空闲, {crop:'rice'/'wheat'/'herb'/'fruit', turns:剩余生长回合}
var fields = [null, null];

// 作物定义
var crops = {
    rice:  { name:'水稻', icon:'🌾', cost:30, turns:2, yield:55, desc:'稳产粮食，不易受灾' },
    wheat: { name:'小麦', icon:'🌿', cost:20, turns:2, yield:40, desc:'便宜稳妥，产量一般' },
    herb:  { name:'药材', icon:'🌿', cost:60, turns:3, yield:150, desc:'高风险高回报' },
    fruit: { name:'果树', icon:'🍎', cost:50, turns:3, yield:110, desc:'收益可观，较稳定' }
};

// 开垦费用
function upgradeCost() {
    return 150 + (landLevel - 2) * 100;
}

// ========== UI 渲染 ==========
function render() {
    document.getElementById('gold-val').textContent = gold;
    document.getElementById('storage-val').textContent = storage;
    document.getElementById('land-val').textContent = landLevel;
    document.getElementById('fame-val').textContent = fame;
    document.getElementById('year-display').textContent = '第' + year + '年';
    document.getElementById('season-display').textContent = seasonEmoji[season] + ' ' + seasonNames[season];

    // 更新body季节class
    document.body.className = seasonBodyClass[season];

    // 渲染田地
    var html = '';
    for (var i = 0; i < landLevel; i++) {
        var f = fields[i];
        if (!f) {
            html += '<div class="field empty" onclick="clickField('+i+')">';
            html += '<div class="field-icon">⛳</div>';
            html += '<div class="field-name">空闲田地</div>';
            html += '<div class="field-status">点击播种</div>';
            html += '</div>';
        } else if (f.turns <= 0) {
            html += '<div class="field ready" onclick="harvestField('+i+')">';
            html += '<div class="field-icon">' + crops[f.crop].icon + '</div>';
            html += '<div class="field-name">' + crops[f.crop].name + '</div>';
            html += '<div class="field-status">✨ 可收获!</div>';
            html += '</div>';
        } else {
            html += '<div class="field growing" onclick="clickField('+i+')">';
            html += '<div class="field-icon">🌱</div>';
            html += '<div class="field-name">' + crops[f.crop].name + '</div>';
            html += '<div class="field-status">生长中 ' + f.turns + '/' + crops[f.crop].turns + ' 季</div>';
            html += '</div>';
        }
    }
    document.getElementById('fields').innerHTML = html;
    document.getElementById('upgrade-cost').textContent = upgradeCost() + '金';

    // 更新按钮状态
    updateButtons();
}

function updateButtons() {
    var btns = document.querySelectorAll('#action-btns .action-btn');
    btns.forEach(function(b) { b.classList.remove('disabled'); });

    // 冬季不能播种
    if (season === 3) {
        btns[0].classList.add('disabled');
        btns[1].classList.add('disabled');
        btns[2].classList.add('disabled');
        btns[3].classList.add('disabled');
    }

    // 钱不够
    if (gold < 30) btns[0].classList.add('disabled');
    if (gold < 20) btns[1].classList.add('disabled');
    if (gold < 60) btns[2].classList.add('disabled');
    if (gold < 50) btns[3].classList.add('disabled');
    if (gold < upgradeCost()) btns[5].classList.add('disabled');

    // 没有可收获的
    var hasReady = fields.some(function(f) { return f && f.turns <= 0; });
    if (!hasReady) btns[4].classList.add('disabled');
}

// ========== 操作 ==========
function clickField(i) {
    if (!fields[i]) {
        // 空闲田地：弹出种植选择（冬季不能种）
        if (season === 3) {
            addLog('❄️ 冬天不适合播种','bad');
            return;
        }
        // 简化为自动选择最合适的
        showModal('选择作物','请使用下方操作按钮选择要播种的作物');
    }
}

function plant(cropType) {
    if (season === 3) { addLog('❄️ 冬天无法播种','bad'); render(); return; }
    var c = crops[cropType];
    if (gold < c.cost) { addLog('💰 金币不足!','bad'); return; }

    // 找空闲田地
    var emptyIdx = -1;
    for (var i = 0; i < landLevel; i++) {
        if (!fields[i]) { emptyIdx = i; break; }
    }
    if (emptyIdx === -1) { addLog('🌱 没有空闲田地了!','bad'); return; }

    gold -= c.cost;
    fields[emptyIdx] = { crop: cropType, turns: c.turns };
    addLog('🌱 在田地'+(emptyIdx+1)+'播种了'+c.name+' (-'+c.cost+'金)','info');
    render();
}

function harvestField(i) {
    var f = fields[i];
    if (!f || f.turns > 0) return;
    var c = crops[f.crop];
    var bonus = 1;

    // 秋季收获加成
    if (season === 2) { bonus = 1.3; addLog('🍂 秋季收获加成 x1.3!','good'); }

    // 随机波动
    var r = 0.8 + Math.random() * 0.4; // 0.8~1.2
    var earned = Math.round(c.yield * bonus * r);

    storage += earned;
    fame += 1;
    fields[i] = null;
    addLog('🧺 收获' + c.name + ' +' + earned + ' (库存)','good');
    render();
}

function harvestAll() {
    var count = 0;
    for (var i = 0; i < landLevel; i++) {
        if (fields[i] && fields[i].turns <= 0) {
            harvestField(i);
            count++;
        }
    }
    if (count === 0) addLog('⚠️ 没有可收获的作物','bad');
    render();
}

function upgradeLand() {
    var cost = upgradeCost();
    if (gold < cost) { addLog('💰 金币不足!','bad'); return; }
    if (landLevel >= 6) { addLog('🏡 田地已达最大数量!','bad'); return; }
    gold -= cost;
    landLevel++;
    fields.push(null);
    addLog('🔨 开垦了新田地! 现在有'+landLevel+'块田地 (-'+cost+'金)','good');
    render();
}

// ========== 季节推进 ==========
function nextSeason() {
    // 生长进度
    for (var i = 0; i < landLevel; i++) {
        if (fields[i] && fields[i].turns > 0) {
            var speedup = 1;
            if (season === 1) speedup = 1.5; // 夏天生长加速
            fields[i].turns = Math.max(0, fields[i].turns - speedup);
            if (fields[i].turns <= 0) {
                addLog('🌾 田地'+(i+1)+'的'+crops[fields[i].crop].name+'成熟了!','good');
            }
        }
    }

    // 季节切换
    season++;
    if (season >= 4) { season = 0; year++; }

    // 冬季消耗
    if (season === 3) {
        var winterCost = landLevel * 5;
        if (gold >= winterCost) {
            gold -= winterCost;
            addLog('❄️ 入冬准备，消耗' + winterCost + '金','info');
        } else {
            addLog('❄️ 入冬资金不足，声望下降','bad');
            fame = Math.max(0, fame - 2);
        }
    }

    // 随机事件
    randomEvent();

    // 春季获得税收
    if (season === 0) {
        var tax = landLevel * 20 + Math.floor(storage * 0.3);
        gold += tax;
        storage = Math.floor(storage * 0.7);
        addLog('💰 春季税收 +' + tax + '金，粮仓卖出30%库存','good');
    }

    render();
}

// ========== 随机事件 ==========
function randomEvent() {
    var r = Math.random();
    if (r < 0.25) {
        // 25% 概率触发事件
        var events = [
            {
                text: '🦗 蝗虫过境！毁坏了部分作物...',
                effect: function() {
                    for (var i = 0; i < landLevel; i++) {
                        if (fields[i] && fields[i].turns > 0 && Math.random() < 0.3) {
                            fields[i] = null;
                        }
                    }
                },
                type: 'bad'
            },
            {
                text: '💧 天降甘霖！作物生长加速一季',
                effect: function() {
                    for (var i = 0; i < landLevel; i++) {
                        if (fields[i] && fields[i].turns > 0) fields[i].turns = Math.max(0, fields[i].turns - 1);
                    }
                },
                type: 'good'
            },
            {
                text: '🏪 商队路过，高价收购粮食！金币+50',
                effect: function() { gold += 50; },
                type: 'good'
            },
            {
                text: '🐛 田地发现害虫，损失10金币治理',
                effect: function() { gold = Math.max(0, gold - 10); },
                type: 'bad'
            },
            {
                text: '🧑‍🌾 老农传授种植技巧，声望+3',
                effect: function() { fame += 3; },
                type: 'good'
            },
            {
                text: '🌪️ 暴风雨来袭，损失20金币修葺田地',
                effect: function() { gold = Math.max(0, gold - 20); },
                type: 'bad'
            },
            {
                text: '🎁 邻村送来谢礼！金币+80',
                effect: function() { gold += 80; },
                type: 'good'
            },
            {
                text: '🏆 官府举办农事评比，声望+5、金币+30',
                effect: function() { fame += 5; gold += 30; },
                type: 'good'
            }
        ];
        var evt = events[Math.floor(Math.random() * events.length)];
        evt.effect();
        addLog(evt.text, evt.type);
    }

    // 食物存储过多损耗
    if (storage > 100) {
        var loss = Math.floor(storage * 0.1);
        storage -= loss;
        addLog('📦 粮仓存储过多，损耗' + loss + '库存','info');
    }
}

// ========== 日志 ==========
function addLog(msg, type) {
    var log = document.getElementById('log');
    var cls = type === 'good' ? 'log-good' : type === 'bad' ? 'log-bad' : 'log-info';
    var time = '[' + seasonNames[season] + '] ';
    log.innerHTML = '<div class="log-entry ' + cls + '">' + time + msg + '</div>' + log.innerHTML;
    // 保留最近30条
    var entries = log.querySelectorAll('.log-entry');
    for (var i = 30; i < entries.length; i++) {
        entries[i].remove();
    }
}

// ========== 弹窗 ==========
function showModal(title, text) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal').classList.add('show');
}
function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

// ========== 重置 ==========
function resetGame() {
    if (confirm('确定要重新开始吗？当前进度将丢失。')) {
        gold = 200;
        landLevel = 2;
        storage = 0;
        fame = 0;
        year = 1;
        season = 0;
        fields = [null, null];
        document.getElementById('log').innerHTML = '';
        addLog('🌅 新的一天开始了，开始种田吧!','good');
        render();
    }
}

// ========== 初始化 ==========
addLog('🌅 欢迎来到种田日记！从两块田地开始你的农耕之旅吧','good');
addLog('💡 提示：春季播种，秋季收获有加成，冬季不能播种','info');
render();
</script>
</body>
</html>
