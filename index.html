<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乱世烽火 - 三国RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    background:#0a0a0f;
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;padding:10px;
    background-image:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a0f 70%);
}
#game{
    width:100%;max-width:600px;
    background:#0d1117;
    border-radius:12px;overflow:hidden;
    box-shadow:0 0 40px rgba(180,140,60,0.2),0 0 80px rgba(0,0,0,0.6);
    position:relative;height:94vh;max-height:800px;
    display:flex;flex-direction:column;
    border:2px solid #2a2015;
}

/* ===== 开场界面 ===== */
#title-screen{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(180deg,#1a0808 0%,#2d1010 30%,#0d0505 70%,#1a0808 100%);
    z-index:500;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:16px;
}
#title-screen::before{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    background:
        radial-gradient(circle at 25% 35%,rgba(200,60,30,0.06) 0%,transparent 50%),
        radial-gradient(circle at 75% 65%,rgba(200,120,30,0.04) 0%,transparent 50%),
        radial-gradient(circle at 50% 80%,rgba(255,100,20,0.03) 0%,transparent 40%);
    pointer-events:none;
    animation:fireFlicker 4s ease-in-out infinite;
}
@keyframes fireFlicker{0%,100%{opacity:0.8}50%{opacity:1}}
.title-deco{
    font-size:56px;color:#c04020;
    text-shadow:0 0 40px rgba(200,80,30,0.6),0 0 80px rgba(255,100,20,0.2);
    animation:float 3s ease-in-out infinite;
    position:relative;z-index:1;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title-main{
    font-size:42px;color:#e8c080;
    text-shadow:0 0 30px rgba(200,120,40,0.6),0 3px 6px rgba(0,0,0,0.8);
    letter-spacing:8px;position:relative;z-index:1;
    font-weight:bold;
}
.title-sub{
    font-size:16px;color:#a07050;
    letter-spacing:6px;position:relative;z-index:1;
    margin-top:-5px;
}
.title-divider{
    width:140px;height:2px;
    background:linear-gradient(90deg,transparent,#c05030,transparent);
    position:relative;z-index:1;
}
#title-btns{
    display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;
    margin-top:10px;
}
.title-btn{
    padding:12px 50px;font-size:18px;
    background:linear-gradient(180deg,rgba(180,140,60,0.15) 0%,rgba(100,70,20,0.2) 100%);
    border:2px solid #6b4c2a;border-radius:8px;
    color:#e8d5a3;cursor:pointer;letter-spacing:4px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    transition:all 0.3s;position:relative;overflow:hidden;
}
.title-btn:hover{
    background:linear-gradient(180deg,rgba(200,100,40,0.3) 0%,rgba(140,60,20,0.3) 100%);
    border-color:#c05030;box-shadow:0 0 20px rgba(200,80,30,0.3);
    transform:scale(1.03);
}
.title-btn:active{transform:scale(0.96);}
.title-btn.disabled{
    opacity:0.35;cursor:not-allowed;pointer-events:none;
}
.title-version{
    font-size:11px;color:#4a3520;position:relative;z-index:1;
    margin-top:10px;
}

/* ===== 顶栏 ===== */
#topbar{
    background:linear-gradient(180deg,#1a1520,#101018);
    padding:8px 16px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:2px solid #3d2e1a;
}
#topbar h1{font-size:16px;color:#d4a853;letter-spacing:3px;}
#loc-name{font-size:12px;color:#8b7355;}

/* ===== 地图区（视口跟随主角） ===== */
#map-container{
    flex:1;position:relative;overflow:hidden;
    background:#0d0a10;
    min-height:0;
}
#map-viewport{
    position:absolute;top:0;left:0;right:0;bottom:0;
    overflow:hidden;
}
#map-layer{
    position:absolute;top:0;left:0;
    width:800px;height:560px;
    background:#2d5016;
    box-shadow:0 0 0 3px #3d2e1a, 0 0 30px rgba(0,0,0,0.6);
    transition:transform 0.2s ease-out;
}
.tile{
    position:absolute;image-rendering:pixelated;
    border:1px solid rgba(0,0,0,0.06);
}
.tile-grass{background:#4a7c2e;}
.tile-path{background:#c4a46c;}
.tile-wall{background:#4a4a4a;border-color:rgba(255,255,255,0.05);}
.tile-house{background:#7b6b5a;border-color:rgba(0,0,0,0.15);}
.tile-cave{background:#5d4037;border-color:rgba(0,0,0,0.2);}
.tile-dungeon{background:#5c1515;border-color:rgba(200,100,50,0.15);}
.tile-shop{background:#c06014;border-color:rgba(0,0,0,0.1);}
.tile-altar{background:#b8860b;border-color:rgba(0,0,0,0.1);}
.tile-water{background:#2980b9;border-color:rgba(255,255,255,0.08);}
.tile-forest{background:#2d6b1e;border-color:rgba(0,0,0,0.08);}
.tile-bridge{background:#6b5a4a;border-color:rgba(0,0,0,0.1);}
.tile-temple{background:#5d5550;border-color:rgba(0,0,0,0.1);}
.tile-sand{background:#c4a35a;border-color:rgba(0,0,0,0.06);}
/* 地图切换横幅 */
#map-banner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.85);color:#d4a853;font-size:24px;font-weight:bold;
    padding:14px 36px;border-radius:6px;z-index:999;pointer-events:none;
    opacity:0;transition:opacity 0.3s;
    text-shadow:0 0 8px rgba(212,168,83,0.5);
    border:1px solid rgba(212,168,83,0.3);
    letter-spacing:3px;
}
#map-banner.show{opacity:1;}
#map-banner.hide{opacity:0;}

/* ===== CSS像素角色 ===== */
.actor{position:absolute;z-index:10;transition:left 0.15s,top 0.15s;}
.actor-body{position:relative;width:28px;height:40px;}
.actor-head{
    width:15px;height:15px;border-radius:50%;
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    border:1px solid rgba(0,0,0,0.3);
}
.actor-hair{
    width:17px;height:6px;border-radius:3px 3px 0 0;
    position:absolute;top:-2px;left:50%;transform:translateX(-50%);
}
.actor-torso{
    width:19px;height:15px;border-radius:3px;
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    border:1px solid rgba(0,0,0,0.3);
}
.actor-left-leg,.actor-right-leg{
    width:6px;height:10px;border-radius:0 0 2px 2px;
    position:absolute;bottom:0;
}
.actor-left-leg{left:6px;}.actor-right-leg{right:6px;}
.actor-weapon{
    width:3px;height:22px;border-radius:1px;
    position:absolute;top:8px;right:-4px;
    background:#b0bec5;
}
.actor-shadow{
    width:20px;height:6px;background:rgba(0,0,0,0.35);
    border-radius:50%;position:absolute;bottom:-4px;left:50%;
    transform:translateX(-50%);
}
.actor-name{
    position:absolute;top:-19px;left:50%;transform:translateX(-50%);
    font-size:9px;white-space:nowrap;color:#fff;
    text-shadow:1px 1px 0 #000;
    font-family:"Microsoft YaHei",sans-serif;
}
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes walkBob{0%,100%{transform:translateY(0) translateX(0)}
    25%{transform:translateY(-3px) translateX(1px)}
    75%{transform:translateY(-3px) translateX(-1px)}}
.actor.idle .actor-body{animation:idleBounce 1.2s ease-in-out infinite;}
.actor.walk .actor-body{animation:walkBob 0.35s ease-in-out infinite;}
/* AI像素角色图 */
.actor-img{
    width:36px;height:48px;
    image-rendering:pixelated;
    object-fit:cover;
    position:absolute;
    top:-5px;left:50%;transform:translateX(-50%);
    border-radius:3px;
}
.actor.npc .actor-img{width:38px;height:50px;top:-6px;}
.actor.enemy .actor-img{width:34px;height:46px;top:-4px;}

/* ===== 状态面板 ===== */
#status-panel{
    background:rgba(0,0,0,0.88);padding:8px 14px;
    display:flex;justify-content:space-around;gap:6px;
    border-top:2px solid #3d2e1a;
    flex-wrap:wrap;align-items:flex-end;
}
.stat{text-align:center;min-width:52px;}
.stat-icon{font-size:14px;}
.stat-val{font-size:12px;font-weight:bold;color:#d4a853;margin-bottom:1px;}
.stat-label{font-size:9px;color:#8b7355;}
/* 血条/蓝条 */
.stat-bar-wrap{
    width:100%;height:5px;background:#222;
    border-radius:3px;overflow:hidden;
    border:1px solid #333;margin-top:2px;
}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 0.3s ease;}
.stat-bar-fill.hp-fill{background:linear-gradient(90deg,#c0392b,#e74c3c,#c0392b);}
.stat-bar-fill.mp-fill{background:linear-gradient(90deg,#2471a3,#3498db,#2471a3);}
.stat-bar-fill.exp-fill{background:linear-gradient(90deg,#b7950b,#f1c40f,#b7950b);}
.stat-hp-val{color:#e74c3c;font-size:12px;font-weight:bold;}
.stat-mp-val{color:#3498db;font-size:12px;font-weight:bold;}

/* ===== 操作栏 ===== */
#action-bar{
    background:rgba(0,0,0,0.88);padding:6px 14px;
    display:flex;gap:8px;justify-content:center;
    border-top:1px solid #3d2e1a;
}
.act-btn{
    padding:7px 16px;border-radius:6px;border:1px solid #4a3520;
    font-size:12px;font-weight:bold;cursor:pointer;
    background:linear-gradient(180deg,rgba(180,140,60,0.1),rgba(100,70,20,0.15));
    color:#e8d5a3;transition:all 0.15s;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
}
.act-btn:hover{background:linear-gradient(180deg,rgba(200,160,80,0.2),rgba(140,100,40,0.2));border-color:#b48c3c;}
.act-btn:active{transform:scale(0.95);}

/* ===== 背包弹窗 ===== */
#backpack-modal .modal-box{max-width:380px;width:92%;padding:16px 14px;}
.bp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.bp-header h2{font-size:16px;margin:0;}
.bp-gold{color:#f1c40f;font-size:13px;letter-spacing:1px;}
.bp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;max-height:260px;overflow-y:auto;}
.bp-slot{
    background:linear-gradient(180deg,rgba(40,30,20,0.7),rgba(20,15,10,0.7));
    border:2px solid rgba(80,60,30,0.5);border-radius:8px;padding:8px 4px;
    text-align:center;cursor:pointer;transition:all 0.15s;
    position:relative;min-height:60px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.bp-slot:hover{border-color:#b48c3c;background:linear-gradient(180deg,rgba(60,45,25,0.7),rgba(30,20,10,0.7));}
.bp-slot.selected{border-color:#d4a853;box-shadow:0 0 8px rgba(212,168,83,0.4);}
.bp-slot.empty{opacity:0.35;pointer-events:none;cursor:default;}
.bp-slot .icon{font-size:24px;display:block;margin-bottom:2px;}
.bp-slot .name{color:#c8b080;font-size:10px;line-height:1.2;}
.bp-slot .count{color:#f1c40f;font-size:11px;font-weight:bold;margin-top:1px;}
.bp-slot .rarity-1{border-color:rgba(120,120,120,0.5);}
.bp-slot .rarity-2{border-color:rgba(100,149,237,0.5);}
.bp-slot .rarity-3{border-color:rgba(212,168,83,0.6);}
.bp-detail{background:rgba(0,0,0,0.4);border-radius:8px;padding:8px 12px;margin-bottom:10px;min-height:22px;font-size:12px;color:#a89070;}
.bp-detail .empty-hint{color:#666;font-style:italic;}
.bp-actions{display:flex;gap:8px;justify-content:center;}
.bp-btn{
    padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:2px;border:1px solid #6b4c2a;transition:all 0.15s;
}
.bp-btn.use{background:linear-gradient(180deg,rgba(46,139,87,0.3),rgba(30,100,50,0.3));color:#90ee90;}
.bp-btn.use:hover{background:linear-gradient(180deg,rgba(60,180,100,0.4),rgba(40,130,60,0.4));}
.bp-btn.use:disabled{opacity:0.35;pointer-events:none;}
.bp-btn.discard{background:linear-gradient(180deg,rgba(180,60,40,0.3),rgba(130,30,20,0.3));color:#e8a090;}
.bp-btn.discard:hover{background:linear-gradient(180deg,rgba(200,70,50,0.4),rgba(160,40,30,0.4));}
.bp-btn.discard:disabled{opacity:0.35;pointer-events:none;}
.bp-btn.close{background:linear-gradient(180deg,rgba(100,100,100,0.3),rgba(60,60,60,0.3));color:#aaa;}
.bp-btn.close:hover{background:linear-gradient(180deg,rgba(130,130,130,0.4),rgba(80,80,80,0.4));}

/* ===== 对话框 ===== */
#dialog-box{
    display:none;position:absolute;bottom:0;left:0;right:0;
    background:rgba(10,8,14,0.97);padding:14px 18px;
    border-top:3px solid #b48c3c;z-index:50;
}
#dialog-speaker{font-size:14px;color:#e8a850;margin-bottom:6px;font-weight:bold;letter-spacing:2px;}
#dialog-text{font-size:13px;color:#ccc;line-height:1.7;margin-bottom:10px;}
#dialog-choices{display:flex;flex-wrap:wrap;gap:8px;}
.dchoice{
    padding:7px 16px;border-radius:4px;border:1px solid #6b4c2a;
    background:rgba(180,140,60,0.08);color:#d4a853;cursor:pointer;
    font-size:12px;font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    transition:all 0.15s;
}
.dchoice:hover{background:#b48c3c;color:#0d0d1a;border-color:#b48c3c;}

/* ===== 战斗面板 ===== */
#battle-panel{
    display:none;position:absolute;top:0;left:0;right:0;bottom:0;
    background:rgba(8,6,12,0.94);z-index:100;
    flex-direction:column;align-items:center;justify-content:center;
}
#battle-scene{padding:20px;text-align:center;}
.battle-row{display:flex;align-items:center;gap:30px;margin:10px 0;justify-content:center;}
.battle-char{text-align:center;min-width:80px;}
.battle-char .actor{position:relative;display:inline-block;}
.battle-hp-bar{
    width:130px;height:8px;background:#222;border-radius:4px;
    margin-top:6px;overflow:hidden;border:1px solid #444;
    display:inline-block;
}
.battle-hp-fill{height:100%;transition:width 0.3s;}
.hp-player{background:linear-gradient(90deg,#2ea043,#1a7a2e);}
.hp-enemy{background:linear-gradient(90deg,#c0392b,#7b241c);}
.battle-name{font-size:13px;color:#e8d5a3;margin-top:4px;letter-spacing:2px;}
.battle-nums{font-size:10px;color:#8b7355;}
#battle-vs{font-size:30px;color:#b48c3c;}
#battle-log{
    color:#d4a853;font-size:13px;min-height:24px;
    text-align:center;margin:12px 0;line-height:1.6;
}
#battle-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.bact-btn{
    padding:10px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
    font-size:12px;font-weight:bold;cursor:pointer;color:#fff;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:1px;transition:all 0.15s;
}
.bact-btn.atk{background:linear-gradient(180deg,#c0392b,#8b1a1a);}
.bact-btn.skill{background:linear-gradient(180deg,#2471a3,#154360);}
.bact-btn.item{background:linear-gradient(180deg,#1e8449,#145a32);}
.bact-btn.flee{background:linear-gradient(180deg,#555,#333);}
.bact-btn:hover{filter:brightness(1.2);transform:translateY(-1px);}
.bact-btn:disabled{opacity:0.4;pointer-events:none;filter:grayscale(0.5);}

/* 受击震动 */
@keyframes shake{
    0%,100%{transform:translateX(0);}
    10%,30%,50%,70%,90%{transform:translateX(-6px);}
    20%,40%,60%,80%{transform:translateX(6px);}
}
.battle-char.shake{animation:shake 0.4s ease-in-out;}
/* 暴击强震 */
@keyframes shake-heavy{
    0%,100%{transform:translateX(0) rotate(0);}
    10%,30%,50%,70%,90%{transform:translateX(-8px) rotate(-1.5deg);}
    20%,40%,60%,80%{transform:translateX(8px) rotate(1.5deg);}
}
.battle-char.shake-heavy{animation:shake-heavy 0.55s ease-in-out;}

/* 闪白(暴击命中闪光) */
@keyframes flash-hit{
    0%{filter:brightness(2.5);}
    100%{filter:brightness(1);}
}
.battle-char.flash{animation:flash-hit 0.3s ease-out;}

/* ===== Canvas像素画立绘 ===== */
.pixel-canvas{
    display:block;flex-shrink:0;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    border:2px solid #2a1a0a;
    border-radius:2px;
    box-shadow:inset 0 0 4px rgba(0,0,0,0.6), 0 0 6px rgba(180,120,40,0.2);
}
.pixel-sm{width:64px;height:80px;}
.pixel-md{width:100px;height:120px;}
.pixel-lg{width:140px;height:170px;}

/* ===== 弹窗 ===== */
.modal{
    display:none;position:absolute;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.88);z-index:200;
    flex-direction:column;align-items:center;justify-content:center;
}
.modal.show{display:flex;}
.modal-box{
    background:linear-gradient(180deg,#1a1520,#101018);
    border:2px solid #6b4c2a;border-radius:12px;
    padding:22px 26px;max-width:400px;width:90%;text-align:center;
}
.modal-box h2{color:#d4a853;margin-bottom:10px;font-size:18px;letter-spacing:3px;}
.modal-box p{color:#b8a080;font-size:13px;line-height:1.8;margin-bottom:16px;white-space:pre-line;}
.modal-btn{
    padding:9px 32px;border-radius:6px;border:1px solid #6b4c2a;
    background:linear-gradient(180deg,rgba(180,140,60,0.15),rgba(100,70,20,0.2));
    color:#e8d5a3;cursor:pointer;font-size:14px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:2px;transition:all 0.2s;
}
.modal-btn:hover{background:linear-gradient(180deg,rgba(200,160,80,0.3),rgba(140,100,40,0.3));border-color:#b48c3c;}

/* ===== 提示 ===== */
#hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.92);color:#d4a853;padding:10px 24px;
    border-radius:8px;font-size:13px;z-index:60;
    display:none;pointer-events:none;
    border:1px solid #6b4c2a;letter-spacing:1px;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
}

/* ===== 手机虚拟方向键 ===== */
#mobile-controls{
    display:none;
    position:absolute;bottom:10px;left:0;right:0;
    z-index:80;pointer-events:none;
    justify-content:space-between;align-items:flex-end;
    padding:0 10px;
}
#mobile-dpad{
    display:grid;grid-template-columns:44px 44px 44px;
    grid-template-rows:44px 44px 44px;
    gap:2px;pointer-events:auto;
}
.mbtn{
    width:44px;height:44px;border-radius:8px;
    border:1px solid rgba(180,140,60,0.4);
    background:rgba(20,15,10,0.75);
    color:#d4a853;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
}
.mbtn:active{background:rgba(180,140,60,0.35);transform:scale(0.9);}
.mbtn-empty{background:transparent;border:none;pointer-events:none;}
#mbtn-up{grid-column:2;grid-row:1;}
#mbtn-left{grid-column:1;grid-row:2;}
#mbtn-center{grid-column:2;grid-row:2;}
#mbtn-right{grid-column:3;grid-row:2;}
#mbtn-down{grid-column:2;grid-row:3;}

#mobile-actions{
    display:flex;flex-direction:column;gap:6px;pointer-events:auto;
}
.maction{
    width:56px;height:56px;border-radius:50%;
    border:2px solid rgba(180,140,60,0.5);
    background:rgba(30,15,5,0.8);
    color:#e8d5a3;font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
    font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;
    letter-spacing:1px;
}

<script>
// ==================== 外部背景音乐 ====================
var BGM_AUDIO = null;
var BGM_USE_EXTERNAL = false;
var BGM_URL = 'assets/bgm.mp3'; // 可替换为任何mp3文件路径/URL

function bgmInit(){
    if(BGM_AUDIO) return;
    BGM_AUDIO = document.createElement('audio');
    BGM_AUDIO.loop = true;
    BGM_AUDIO.volume = SND.musicVol;
    BGM_AUDIO.preload = 'auto';
    BGM_AUDIO.src = BGM_URL;
    document.body.appendChild(BGM_AUDIO);
    // 尝试加载，成功则用外部BGM
    BGM_AUDIO.addEventListener('canplaythrough',function(){
        BGM_USE_EXTERNAL = true;
    },{once:true});
    BGM_AUDIO.addEventListener('error',function(){
        BGM_USE_EXTERNAL = false;
    },{once:true});
    BGM_AUDIO.load();
}

function bgmPlay(){
    if(!BGM_AUDIO) bgmInit();
    if(BGM_AUDIO && BGM_USE_EXTERNAL){
        BGM_AUDIO.volume = SND.musicVol;
        var p = BGM_AUDIO.play();
        if(p && p.catch) p.catch(function(){BGM_USE_EXTERNAL=false;});
    }
}

function bgmStop(){
    if(BGM_AUDIO){
        BGM_AUDIO.pause();
        BGM_AUDIO.currentTime = 0;
    }
}

function bgmSetVol(v){
    if(BGM_AUDIO) BGM_AUDIO.volume = v;
}

// ==================== 音效系统 (Web Audio API) ====================
var SND = {ctx:null, sfxGain:null, musicGain:null, sfxVol:0.7, musicVol:0.3};
function sndInit(){
    if(!SND.ctx)try{
        SND.ctx=new(window.AudioContext||window.webkitAudioContext)();
        SND.sfxGain=SND.ctx.createGain();
        SND.sfxGain.gain.value=SND.sfxVol;
        SND.sfxGain.connect(SND.ctx.destination);
        SND.musicGain=SND.ctx.createGain();
        SND.musicGain.gain.value=SND.musicVol;
        SND.musicGain.connect(SND.ctx.destination);
        loadSettings();
    }catch(e){}
}
function sndTone(f,t,d,v,s){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    var o=c.createOscillator(),g=c.createGain();
    o.type=t||'sine';o.frequency.setValueAtTime(f,tm);
    if(s)o.frequency.exponentialRampToValueAtTime(f*s,tm+d);
    g.gain.setValueAtTime(v||0.12,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
    o.connect(g);g.connect(SND.sfxGain);o.start(tm);o.stop(tm+d);
}
function sndNoise(d,v,ff,q){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    var sr=c.sampleRate,len=Math.floor(sr*d);
    var b=c.createBuffer(1,len,sr),a=b.getChannelData(0);
    for(var i=0;i<len;i++)a[i]=Math.random()*2-1;
    var s=c.createBufferSource();s.buffer=b;
    var g=c.createGain();
    g.gain.setValueAtTime(v||0.06,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
    var f=c.createBiquadFilter();f.type=ff?'bandpass':'highpass';f.frequency.value=ff||2500;f.Q.value=q||0.8;
    s.connect(f);f.connect(g);g.connect(SND.sfxGain);s.start(tm);
}
function sndRing(f1,f2,d,v){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    for(var i=0;i<2;i++){var o=c.createOscillator(),g=c.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(i?f1:f2,tm);
        g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
        o.connect(g);g.connect(SND.sfxGain);o.start(tm);o.stop(tm+d);
    }
}
// 频率扫掠 — 剑出鞘蜂鸣
function sndSweep(ff,ft,d,v,tp){
    if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
    var o=c.createOscillator(),g=c.createGain();
    o.type=tp||'sawtooth';
    o.frequency.setValueAtTime(ff,tm);
    o.frequency.exponentialRampToValueAtTime(ft,tm+d*0.75);
    g.gain.setValueAtTime(v,tm);
    g.gain.exponentialRampToValueAtTime(0.001,tm+d);
    o.connect(g);g.connect(SND.sfxGain);
    o.start(tm);o.stop(tm+d+0.02);
}

// ⚔️ 普攻 — 铁器碰撞 + 金属回响
function sfxSword(){
    var dt=0.04; // 微量延迟让各层不重叠
    // 1. 剑出鞘蜂鸣 "铮——" (快速频率扫掠 400→6000Hz)
    sndSweep(400,6000,0.055,0.09,'sawtooth');
    // 2. 清脆金属撞击 — 高频双频嗡鸣 (模拟刀锋碰撞)
    setTimeout(function(){
        sndNoise(0.04,0.06,5500,0.2);
        sndRing(4200,4360,0.1,0.07);
    },15);
    // 3. 余音震颤 — 长衰减正弦 + 微颤 (模拟剑身震动)
    setTimeout(function(){
        if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
        var o=c.createOscillator(),g=c.createGain();
        o.type='sine';o.frequency.setValueAtTime(3200,tm);
        // 轻微频率颤音
        o.frequency.setValueAtTime(3200,tm);
        o.frequency.linearRampToValueAtTime(3180,tm+0.15);
        o.frequency.linearRampToValueAtTime(3210,tm+0.30);
        g.gain.setValueAtTime(0.05,tm);
        g.gain.exponentialRampToValueAtTime(0.001,tm+0.35);
        o.connect(g);g.connect(SND.sfxGain);
        o.start(tm);o.stop(tm+0.4);
    },30);
    // 4. 空气振荡 — 低沉气流
    setTimeout(function(){sndNoise(0.05,0.025,300,0.8);},25);
}

// 💥 会心一击 — 加强版：更响出鞘 + 更重撞击 + 双频余音 + 碎裂感
function sfxCrit(){
    sndSweep(300,7000,0.06,0.12,'sawtooth');
    setTimeout(function(){
        sndNoise(0.06,0.09,6000,0.18);
        sndRing(4800,4980,0.22,0.1);
    },10);
    setTimeout(function(){
        sndRing(8000,8260,0.16,0.06);
        sndTone(1400,'sawtooth',0.05,0.05);
    },25);
    setTimeout(function(){
        if(!SND.ctx)return;var c=SND.ctx,tm=c.currentTime;
        var o=c.createOscillator(),g=c.createGain();
        o.type='sine';o.frequency.setValueAtTime(3600,tm);
        o.frequency.linearRampToValueAtTime(3570,tm+0.2);
        o.frequency.linearRampToValueAtTime(3620,tm+0.4);
        g.gain.setValueAtTime(0.07,tm);
        g.gain.exponentialRampToValueAtTime(0.001,tm+0.5);
        o.connect(g);g.connect(SND.sfxGain);
        o.start(tm);o.stop(tm+0.55);
    },35);
    setTimeout(function(){sndNoise(0.07,0.03,200,1.0);sndTone(80,'triangle',0.18,0.04);},40);
}

// 🗡️ 霸王枪·单次突刺音效 (多次调用)
// 霸王枪·单次突刺（立即播放，无延迟，由doHit同步调用）
function sfxSlash(){
    sndSweep(600,4800,0.04,0.07,'sawtooth');
    sndNoise(0.03,0.05,5000,0.22);
    sndRing(3600,3740,0.09,0.06);
    sndTone(2800,'sine',0.12,0.04);
}
// 霸王枪·起手蓄力呼啸
function sfxSkill(){
    sndSweep(120,800,0.3,0.07,'triangle');
    sndNoise(0.35,0.05,500,0.8);
}

function sfxHit(){
    sndTone(50,'sine',0.28,0.08);
    sndNoise(0.05,0.03,200,0.7);
    sndTone(100,'triangle',0.12,0.03);
}
function sfxVictory(){
    var ns=[523,659,784,1047];
    for(var i=0;i<ns.length;i++){
        setTimeout((function(ff,ii){return function(){
            sndTone(ff,'triangle',0.22,0.08);
            if(ii===3)setTimeout(function(){sndTone(ff*2,'sine',0.3,0.06);},50);
        };})(ns[i],i),i*140);
    }
}
function sfxDefeat(){
    sndTone(300,'triangle',0.4,0.08);
    setTimeout(function(){sndTone(220,'triangle',0.45,0.1);},200);
    setTimeout(function(){sndTone(130,'triangle',0.55,0.12);},420);
    setTimeout(function(){sndTone(80,'sine',0.6,0.1);},600);
}
function sfxCoin(){sndTone(1400,'sine',0.08,0.06);setTimeout(function(){sndTone(1800,'sine',0.06,0.04);},60);}
function sfxLevelUp(){
    var ns=[392,523,659,784,1047,1318];
    for(var i=0;i<ns.length;i++){setTimeout((function(ff){return function(){sndTone(ff,'triangle',0.16,0.06);};})(ns[i]),i*110);}
}
function sfxHeal(){
    sndTone(440,'sine',0.5,0.04,1.4);
    setTimeout(function(){sndTone(554,'sine',0.35,0.03);},200);
    sndNoise(0.15,0.015,600,0.5);
}
function sfxFlee(){
    sndNoise(0.35,0.04,1800,0.5);
    sndTone(260,'triangle',0.3,0.03,4.5);
    sndTone(180,'sine',0.25,0.02,3.0);
}
function sfxClick(){sndTone(900,'sine',0.02,0.015);}
function sfxQuest(){
    sndTone(523,'triangle',0.12,0.05);
    setTimeout(function(){sndTone(659,'triangle',0.12,0.05);},100);
    setTimeout(function(){sndTone(784,'triangle',0.16,0.06);},200);
}
function sfxStart(){sndTone(150,'triangle',0.35,0.06,5);sndNoise(0.25,0.03,800,0.6);}

// ==================== 背景音乐 — 箫声沧海 ====================
var MUSIC = {playing:false, noteIdx:0, timer:null, drones:[], curFreq:0};
// 五声音阶 宫商角徵羽 C D E G A (三层)
var PENTA = [[131,147,165,196,220],[262,294,330,392,440],[523,587,659,784,880]];
// 沧海一声笑风格旋律 [八度, 音位, 时值(拍)]
var MELODY = [
    [1,2,2],[1,1,2],[1,0,3],[0,4,3],[0,3,2],[1,2,2],[1,1,2],[1,0,4],[0,4,2],
    [1,2,2],[1,1,2],[1,0,3],[0,4,2],[0,3,1],[0,4,2],[1,0,3],[1,1,4],
    [1,0,2],[1,1,2],[1,2,2],[1,3,3],[1,4,3],[2,0,5],
    [1,3,2],[1,2,2],[1,1,2],[1,0,3],[0,4,3],[0,3,4],
    [0,3,2],[0,4,2],[1,0,2],[1,1,2],[1,2,3],[1,0,3],[1,1,4],
    [1,2,3],[1,1,2],[1,0,2],[0,4,3],[0,3,2],[1,0,3],[1,0,6]
];
var BGM_BPM = 42, BGM_BEAT = 60000/BGM_BPM;

function musicPlayNote(){
    if(!SND.ctx||!MUSIC.playing) return;
    var idx = MUSIC.noteIdx % MELODY.length;
    var m = MELODY[idx];
    var freq = PENTA[m[0]][m[1]];
    var dur = m[2] * BGM_BEAT / 1000;
    var c = SND.ctx, tm = c.currentTime;
    var prevFreq = MUSIC.curFreq||freq;
    MUSIC.curFreq = freq;

    // 主箫声 — triangle波模拟竹管共鸣
    var o1 = c.createOscillator(), g1 = c.createGain();
    o1.type = 'triangle';
    if(idx>0&&Math.abs(freq-prevFreq)<freq*0.35){
        o1.frequency.setValueAtTime(prevFreq, tm);
        o1.frequency.exponentialRampToValueAtTime(freq, tm+0.12);
    } else { o1.frequency.setValueAtTime(freq, tm); }
    g1.gain.setValueAtTime(0, tm);
    g1.gain.linearRampToValueAtTime(0.09, tm+0.1);
    g1.gain.setValueAtTime(0.09, tm+dur*0.55);
    g1.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.95);
    o1.connect(g1); g1.connect(SND.musicGain);
    o1.start(tm); o1.stop(tm+dur+0.15);

    // 泛音 — sine高八度增加清澈感
    var o2 = c.createOscillator(), g2 = c.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq*2, tm);
    g2.gain.setValueAtTime(0, tm);
    g2.gain.linearRampToValueAtTime(0.03, tm+0.15);
    g2.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.7);
    o2.connect(g2); g2.connect(SND.musicGain);
    o2.start(tm); o2.stop(tm+dur*0.7+0.1);

    // 气声 — 模拟吹奏的呼吸噪音
    var sr = c.sampleRate;
    var noiseLen = Math.floor(sr * dur * 0.45);
    var nb = c.createBuffer(1, noiseLen, sr);
    var nd = nb.getChannelData(0);
    for(var i=0;i<noiseLen;i++) nd[i] = Math.random()*2-1;
    var ns = c.createBufferSource(); ns.buffer = nb;
    var ng = c.createGain();
    ng.gain.setValueAtTime(0, tm);
    ng.gain.linearRampToValueAtTime(0.012, tm+0.08);
    ng.gain.exponentialRampToValueAtTime(0.001, tm+dur*0.45);
    var nf = c.createBiquadFilter();
    nf.type = 'bandpass';
    nf.frequency.setValueAtTime(freq*5, tm);
    nf.Q.value = 1.2;
    ns.connect(nf); nf.connect(ng); ng.connect(SND.musicGain);
    ns.start(tm);

    // 余音混响 — 延迟淡出模拟山谷回响
    if(dur > 1.2){
        var o3 = c.createOscillator(), g3 = c.createGain();
        o3.type = 'sine';
        o3.frequency.setValueAtTime(freq*0.5, tm+dur*0.6);
        g3.gain.setValueAtTime(0, tm+dur*0.6);
        g3.gain.linearRampToValueAtTime(0.025, tm+dur*0.7);
        g3.gain.exponentialRampToValueAtTime(0.001, tm+dur*1.1);
        o3.connect(g3); g3.connect(SND.musicGain);
        o3.start(tm+dur*0.6); o3.stop(tm+dur*1.2);
    }

    MUSIC.noteIdx++;
    var nextDelay = m[2] * BGM_BEAT;
    // 在长音末尾稍有停顿，增加苍凉感
    if(m[2] >= 5) nextDelay += 150;
    MUSIC.timer = setTimeout(musicPlayNote, nextDelay);
}

function startMusic(){
    if(MUSIC.playing) return;
    // 先尝试外部BGM
    sndInit();
    bgmInit();
    // 给外部BGM一点时间判断是否可用
    setTimeout(function(){
        if(BGM_USE_EXTERNAL && BGM_AUDIO){
            MUSIC.playing = true;
            bgmPlay();
        }else{
            // 回落合成音乐
            if(!SND.ctx){ sndInit(); if(!SND.ctx) return; }
            MUSIC.playing = true; MUSIC.noteIdx = 0;
            var c = SND.ctx;
            MUSIC.drones=[];
            var droneFreqs = [32.7, 65.4, 98];
            for(var i=0;i<3;i++){
                var o=c.createOscillator(), g=c.createGain();
                o.type=i===0?'sine':'triangle';
                o.frequency.setValueAtTime(droneFreqs[i],c.currentTime);
                g.gain.setValueAtTime(i===0?0.016:i===1?0.012:0.008, c.currentTime);
                o.connect(g); g.connect(SND.musicGain);
                o.start(); MUSIC.drones.push({osc:o,gain:g});
            }
            musicPlayNote();
        }
    }, 800);
}

function stopMusic(){
    MUSIC.playing = false; MUSIC.curFreq = 0;
    if(MUSIC.timer){ clearTimeout(MUSIC.timer); MUSIC.timer = null; }
    if(MUSIC.drones){
        for(var i=0;i<MUSIC.drones.length;i++){
            try{MUSIC.drones[i].osc.stop()}catch(e){}
            MUSIC.drones[i].gain.disconnect();
        }
        MUSIC.drones=[];
    }
    bgmStop();
}

function setSfxVol(v){
    SND.sfxVol = Math.max(0, Math.min(1, v));
    if(SND.sfxGain) SND.sfxGain.gain.value = SND.sfxVol;
    var lbl = document.getElementById('sfx-vol-label'); if(lbl) lbl.textContent = Math.round(SND.sfxVol*100);
    saveSettings();
}
function setMusicVol(v){
    SND.musicVol = Math.max(0, Math.min(1, v));
    if(SND.musicGain) SND.musicGain.gain.value = SND.musicVol;
    bgmSetVol(SND.musicVol);
    var lbl = document.getElementById('music-vol-label'); if(lbl) lbl.textContent = Math.round(SND.musicVol*100);
    saveSettings();
}
function openSettings(){
    sndInit();
    document.getElementById('sfx-vol-slider').value = Math.round(SND.sfxVol*100);
    document.getElementById('music-vol-slider').value = Math.round(SND.musicVol*100);
    var sl = document.getElementById('sfx-vol-label'); if(sl) sl.textContent = Math.round(SND.sfxVol*100);
    var ml = document.getElementById('music-vol-label'); if(ml) ml.textContent = Math.round(SND.musicVol*100);
    document.getElementById('settings-modal').classList.add('show');
}
function closeSettings(){
    document.getElementById('settings-modal').classList.remove('show');
}
function saveSettings(){
    try{ localStorage.setItem('wuxia_settings', JSON.stringify({sfxVol:SND.sfxVol, musicVol:SND.musicVol})); }catch(e){}
}
function loadSettings(){
    try{
        var raw = localStorage.getItem('wuxia_settings');
        if(raw){
            var s = JSON.parse(raw);
            if(s.sfxVol != null) SND.sfxVol = s.sfxVol;
            if(s.musicVol != null) SND.musicVol = s.musicVol;
        }
    }catch(e){}
}

// 将旧格式{potion:3,superPotion:2}迁移为新格式[{id,count}]
function migrateItems(oldItems){
    var list = [];
    if(!oldItems) return list;
    if(Array.isArray(oldItems)) return oldItems;
    // 旧格式键值对 → 新格式
    for(var k in ITEM_DB){
        if(oldItems[k] && oldItems[k] > 0){
            list.push({id:k, count:oldItems[k]});
        }
    }
    // 保留未知道具
    for(var k in oldItems){
        if(!ITEM_DB[k]) list.push({id:k, count:oldItems[k]});
    }
    return list;
}

function getItemDef(id){ return ITEM_DB[id]; }
function findItemIdx(id){
    if(!player.items) return -1;
    for(var i=0;i<player.items.length;i++){if(player.items[i].id===id) return i;}
    return -1;
}
function getItemCount(id){
    var idx = findItemIdx(id);
    return idx>=0 ? player.items[idx].count : 0;
}
function addItem(id, count){
    if(!player.items) player.items = [];
    count = count || 1;
    var idx = findItemIdx(id);
    if(idx >= 0){
        player.items[idx].count = Math.min(99, player.items[idx].count + count);
    } else {
        player.items.push({id:id, count:Math.min(99, count)});
    }
}
function removeItem(id, count){
    count = count || 1;
    var idx = findItemIdx(id);
    if(idx < 0) return false;
    player.items[idx].count -= count;
    if(player.items[idx].count <= 0){
        player.items.splice(idx, 1);
    }
    return true;
}
function getTotalItems(){
    var n = 0;
    if(!player.items) return 0;
    for(var i=0;i<player.items.length;i++) n += player.items[i].count;
    return n;
}

// 当前地图ID和多地图敌人状态持久化
var currentMap = 'main';
var mapDeadStates = {main:{},north:{},south:{},east:{},west:{}};

// 全局引用（指向当前地图数据）
var mapData, npcs, enemies, deadEnemies;

function loadMapGlobals(mapId){
    var m = allMaps[mapId];
    mapData = m.data;
    MAP_W = m.data[0].length;
    MAP_H = m.data.length;
    npcs = m.npcs;
    enemies = m.enemies;
    if(!mapDeadStates[mapId]) mapDeadStates[mapId] = {};
    deadEnemies = mapDeadStates[mapId];
}
loadMapGlobals('main');

// 击杀计数（持久化，跨地图）
var killCounts = {bandit:0, bully:0, guard:0, boss:0};

// 地图切换
function switchMap(targetMapId, entryX, entryY){
    currentMap = targetMapId;
    loadMapGlobals(targetMapId);
    // 放置玩家，确保不落在阻挡格上
    player.x = Math.max(0, Math.min(MAP_W-1, entryX));
    player.y = Math.max(0, Math.min(MAP_H-1, entryY));
    var t = mapData[player.y] && mapData[player.y][player.x];
    if(t==='W'||t==='C'){
        var found=false;
        for(var r=1;r<5&&!found;r++){
            for(var dx=-r;dx<=r&&!found;dx++){
                for(var dy=-r;dy<=r&&!found;dy++){
                    var nx2=player.x+dx, ny2=player.y+dy;
                    if(nx2>=0&&nx2<MAP_W&&ny2>=0&&ny2<MAP_H){
                        var nt=mapData[ny2][nx2];
                        if(nt!=='W'&&nt!=='C'){player.x=nx2;player.y=ny2;found=true;}
                    }
                }
            }
        }
    }
    buildMap();
    renderPlayer();
    updateCamera();
    showMapBanner(allMaps[targetMapId].name);
}

// 地图切换提示横幅
var _bannerTimer = null;
function showMapBanner(name){
    var b = document.getElementById('map-banner');
    if(!b) return;
    b.textContent = '— '+name+' —';
    b.className = 'show';
    if(_bannerTimer) clearTimeout(_bannerTimer);
    _bannerTimer = setTimeout(function(){ b.className = 'hide'; }, 2000);
}

    if(currentMap==='north'){

        if(x>=17) return '东山崖';
        if(x>=5&&x<=7&&y<=2) return '古观旧址';
        if(x>=5&&x<=7&&y>=7&&y<=8) return '幽谷洞穴';

    }
    if(currentMap==='south'){

// ==================== 存档系统 ====================
var SAVE_KEY = 'wuxia_rpg_save';

function hasSave(){
    return !!localStorage.getItem(SAVE_KEY);
}

function saveGameData(){
    // 先把当前地图的deadEnemies写回持久化对象
    if(mapDeadStates[currentMap] !== deadEnemies) mapDeadStates[currentMap] = deadEnemies;
    var data = {
        player: player,
        killCounts: killCounts,
        mapDeadStates: mapDeadStates,
        currentMap: currentMap,
        quests: quests,
        hermitBuffed: player.hermitBuffed
    };
    try{
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        showHint('💾 存档成功！');
    }catch(e){
        showHint('❌ 存档失败，请检查浏览器存储空间');
    }
}

function loadGameData(){
    try{
        var raw = localStorage.getItem(SAVE_KEY);
        if(!raw) return false;
        var data = JSON.parse(raw);
        // 恢复玩家数据
        var p = data.player;
        player.x = p.x; player.y = p.y;
        player.hp = p.hp; player.maxHp = p.maxHp;
        player.mp = p.mp; player.maxMp = p.maxMp;
        player.atk = p.atk; player.def = p.def;
        player.level = p.level; player.exp = p.exp;
        player.expNeed = p.expNeed; player.gold = p.gold;
        player.items = migrateItems(p.items);
        player.quests = p.quests || {quest_1:false,quest_2:false,quest_3:false};
        player.hermitBuffed = p.hermitBuffed || data.hermitBuffed || false;
        // 恢复击杀数据和当前地图
        killCounts = data.killCounts || {bandit:0, bully:0, guard:0, boss:0};
        mapDeadStates = data.mapDeadStates || {main:{},north:{},south:{},east:{},west:{}};
        currentMap = data.currentMap || 'main';
        loadMapGlobals(currentMap);
        // deadEnemies is now set by loadMapGlobals, merge saved data
        if(data.mapDeadStates && data.mapDeadStates[currentMap]){
            deadEnemies = data.mapDeadStates[currentMap];
            mapDeadStates[currentMap] = deadEnemies;
        }
        quests = data.quests || {
            quest_1:{name:'剿灭黄巾',desc:'击败5名黄巾贼',target:5,progress:0,rewardGold:150,rewardExp:100,done:false,rewardClaimed:false},
            quest_2:{name:'肃清溃兵',desc:'击败3股西凉溃兵',target:3,progress:0,rewardGold:250,rewardExp:150,done:false,rewardClaimed:false},
            quest_3:{name:'斩杀华雄',desc:'击败华雄',target:1,progress:0,rewardGold:1200,rewardExp:600,done:false,rewardClaimed:false}
        };
        return true;
    }catch(e){
        console.error('读档失败:', e);
        return false;
    }
}

function renderPixelChar(canvas, charId){
    var W=canvas.width, H=canvas.height;
    var ctx=canvas.getContext('2d');
    ctx.imageSmoothingEnabled=false;
    var GW=20, GH=24;
    var ps=Math.floor(Math.min(W/GW, H/GH));
    var ox=Math.floor((W-GW*ps)/2);
    var oy=Math.floor((H-GH*ps)/2);

    // 暗色底色
    ctx.fillStyle='#14100c';
    ctx.fillRect(0,0,W,H);

    var d=_pxDef[charId]||_pxDef.hero;
    // 像素辅助函数
    var P=function(x,y,c){if(x<0||x>=GW||y<0||y>=GH)return;ctx.fillStyle=c;ctx.fillRect(ox+x*ps,oy+y*ps,ps,ps);};
    var B=function(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(ox+x*ps,oy+y*ps,w*ps,h*ps);};
    // 椭圆（用于头部）
    function oval(cx,cy,rw,rh,color){
        for(var dy=-rh;dy<=rh;dy++){
            for(var dx=-rw;dx<=rw;dx++){
                if(dx*dx*1.0/(rw*rw)+dy*dy*1.0/(rh*rh)<=1) P(cx+dx,cy+dy,color);
            }
        }
    }
    // 带轮廓椭圆
    function ovalOut(cx,cy,rw,rh,fill,outline,ot){
        ot=ot||1;
        for(var dy=-rh-ot;dy<=rh+ot;dy++){
            for(var dx=-rw-ot;dx<=rw+ot;dx++){
                var dist=dx*dx*1.0/(rw*rw)+dy*dy*1.0/(rh*rh);
                if(dist<=1&&dist>0.65) P(cx+dx,cy+dy,outline);
                else if(dist<=1) P(cx+dx,cy+dy,fill);
            }
        }
    }

    // 1. 身体（梯形：肩膀宽→腰部窄→直筒）
    var sx=10-d.shoulderW, sw=d.shoulderW*2;
    var wy=sx+1, ww=sw-2;
    var bodyTop=9;
    B(sx,bodyTop,sw,1,d.robeL); // 肩膀
    B(sx-1,bodyTop+1,sw+2,1,d.robeL);
    for(var r=bodyTop+2;r<=d.beltY-1;r++){ B(sx, r, sw, 1, d.robeL); }
    // 腰带
    var beltH=2;
    B(sx-1, d.beltY, sw+2, beltH, d.belt);
    // 下半身
    for(var r=d.beltY+beltH;r<=GH-1;r++){
        B(sx, r, sw, 1, d.robeL);
    }
    if(d.spike){ // 肩甲尖刺
        B(sx-2,bodyTop-1,2,3,d.hatC);
        B(sx+sw,bodyTop-1,2,3,d.hatC);
        P(sx-3,bodyTop-1,d.hatC); P(sx+sw+2,bodyTop-1,d.hatC);
    }
    if(d.chest){ // 胸甲
        B(10-2,bodyTop+2,4,3,d.hatC);
        B(10-1,bodyTop+5,2,2,d.belt);
    }

    // 2. 头部
    var hx=10, hy=6, hw=d.faceW+2, hh=3;
    oval(10, 5, hw, hh, d.skin);
    oval(10, 6, hw, hh, d.skin);
    // 轮廓
    ovalOut(10, 5, hw, hh, d.skin, d.skinD, 1);

    // 眼睛
    P(8, 4, d.eye); P(12, 4, d.eye);
    // 嘴
    P(10, 7, d.skinD);

    // 3. 帽子/头发
    drawHat(B,P,d);

    // 4. 武器
    drawWeapon(B,P,d);

    // 5. 胡子
    drawBeard(B,P,d);
}

function drawHat(B, P, d){
    var t=d.hat, c=d.hatC, a=d.hatA||c;
    switch(t){
    case 'topknot': // 束发髻
        B(7,2,6,1,c); B(8,1,4,1,c); B(9,0,2,1,c);
        if(d.hatA) B(7,1,7,1,d.hatA); // 发簪
        B(7,3,2,1,c); B(11,3,2,1,c); // 鬓角
        break;
    case 'wide': // 大斗笠
        B(2,0,16,2,c); B(1,2,18,2,a); B(1,3,18,1,a); P(0,2,c); P(19,2,c);
        break;
    case 'official': // 乌纱帽
        B(6,0,8,3,c); B(7,-1,6,1,c);
        B(2,1,4,2,a); B(14,1,4,2,a); // 帽翅
        break;
    case 'round': // 圆帽
        B(7,1,6,2,c); B(6,3,8,1,c); P(7,0,c); P(12,0,c);
        break;
    case 'cloth': // 布帽
        B(6,1,8,2,c); B(5,3,10,1,c); P(6,0,c); P(13,0,c);
        break;
    case 'helm': // 铁盔+红缨
        B(5,0,10,3,c); P(4,1,c); P(15,1,c);
        B(9,-1,2,2,a); P(9,-2,a); P(10,-2,a); // 红缨
        break;
    case 'horn': // 角盔
        B(5,0,10,3,c); P(4,1,c); P(15,1,c);
        P(3,0,c); P(16,0,c); // 尖角
        break;
    case 'giant': // 巨盔+高缨
        B(4,-1,12,4,c); B(3,3,14,1,c);
        B(8,-2,4,3,a); P(9,-3,a); P(10,-3,a); // 高红缨
        B(3,4,14,1,c);
        break;
    case 'band': // 黄巾
        B(6,1,8,2,c); P(5,3,c); P(14,3,c);
        B(7,0,3,1,'#2a1810'); B(11,0,3,1,'#2a1810'); // 乱发
        break;
    case 'leather': // 皮盔
        B(6,1,8,2,c); B(7,0,6,1,c);
        break;
    }
}

function drawWeapon(B, P, d){
    if(d.weapon==='none') return;
    var c=d.wC, s=d.wSide, sh=10+d.beltY||14, h=d.wH;
    var x=(s==='r')?16:4;
    switch(d.weapon){
    case 'sword':
        B(x,sh,2,h,c); B(x-1,sh,4,2,'#c8b860'); // 剑格
        break;
    case 'spear':
        B(x,sh-2,1,h+2,c); B(x-1,sh-4,3,2,c); // 枪头
        break;
    case 'knife':
        B(x,sh,2,h,c); B(x+2,sh+h-2,3,2,c);
        break;
    case 'fan':
        B(x,sh,3,2,c); B(x,sh+2,4,1,c); B(x,sh+3,3,1,c);
        break;
    case 'staff':
        B(x,sh-3,1,h+3,c);
        break;
    case 'whisk':
        B(x,sh,1,h,c);
        B(x+1,sh-h+4,2,h-1,'#aaa'); // 拂尘尾
        break;
    case 'bigBlade':
        B(x,sh-2,3,h+4,c); B(x-1,sh-3,5,2,'#c8b860'); // 护手
        break;
    }
}

function drawBeard(B, P, d){
    if(d.beard==='none') return;
    var c=d.bC, h=d.bH||6;
    switch(d.beard){
    case 'goatee':
        for(var i=0;i<h;i++){ P(9, 8+i, c); P(11, 8+i, c); P(10, 8+i, c); }
        break;
    case 'long':
        for(var i=0;i<h;i++){ B(9, 8+i, 2, 1, c); }
        break;
    case 'three':
        for(var i=0;i<h;i++){ P(8, 8+i, c); P(10, 8+i, c); P(12, 8+i, c); }
        break;
    }
}

// ===== AI画像渲染（优先AI画像，Canvas像素画为降级方案） =====
function renderAIPortrait(canvas, charId){
    var ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    var img = _aiCache[charId];
    var cw = canvas.width, ch = canvas.height;
    // 暗色底色
    ctx.fillStyle = '#14100c';
    ctx.fillRect(0, 0, cw, ch);
    if(img && img.complete && img.naturalWidth){
        var iw = img.naturalWidth, ih = img.naturalHeight;
        var scale = Math.min(cw/iw, ch/ih) * 0.94;
        var dw = iw * scale, dh = ih * scale;
        var dx = (cw - dw) / 2, dy = (ch - dh) / 2;
        // 先画图像
        ctx.drawImage(img, dx, dy, dw, dh);
        // 柔边渐变遮罩：中心透明，边缘渐暗融入背景
        var grd = ctx.createRadialGradient(cw/2, ch*0.45, Math.min(dw,dh)*0.28, cw/2, ch*0.45, Math.max(cw,ch)*0.58);
        grd.addColorStop(0, 'rgba(20,16,12,0)');
        grd.addColorStop(0.55, 'rgba(20,16,12,0)');
        grd.addColorStop(0.82, 'rgba(20,16,12,0.45)');
        grd.addColorStop(1, 'rgba(20,16,12,0.95)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, cw, ch);
    } else {
        // 降级：使用旧Canvas像素画
        renderPixelChar(canvas, charId);
    }
}

function initPixelPortrait(canvasId, charId){
    var c = document.getElementById(canvasId);
    if(!c) return;
    renderAIPortrait(c, charId);
}

function setDialogPixel(charId){
    var c = document.getElementById('dialog-canvas');

}

    if(pc) renderAIPortrait(pc, 'hero');
}

var prologueIdx = 0;
var prologueTyping = false;

function startPrologue(){
    prologueIdx = 0;
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('prologue-modal').classList.add('show');
    document.getElementById('prologue-btn').style.display = 'none';
    initPixelPortrait('prologue-canvas', 'storyteller');
    showPrologueLine(0);
}

function showPrologueLine(idx){
    if(idx >= prologueLines.length){
        finishPrologue();
        return;
    }
    prologueIdx = idx;
    prologueTyping = true;
    var el = document.getElementById('prologue-content');
    el.innerHTML = '';
    var line = prologueLines[idx];
    var i = 0;
    function typeChar(){
        if(i < line.length){
            el.innerHTML += line.charAt(i) === ' ' ? '&nbsp;' : line.charAt(i);
            i++;
            setTimeout(typeChar, 30);
        } else {
            prologueTyping = false;
            document.getElementById('prologue-btn').style.display = 'inline-block';
            if(idx >= prologueLines.length - 1){
                document.getElementById('prologue-btn').textContent = '踏入乱世';
            } else {
                document.getElementById('prologue-btn').textContent = '继续';
            }
        }
    }
    typeChar();
}

function nextPrologue(){
    if(prologueTyping) return;
    var next = prologueIdx + 1;
    if(next >= prologueLines.length){
        finishPrologue();
        return;
    }
    document.getElementById('prologue-btn').style.display = 'none';
    showPrologueLine(next);
}

// ==================== 渲染 ====================
function buildMap(){
    var layer = document.getElementById('map-layer');
    var mw = MAP_W * TILE, mh = MAP_H * TILE;
    layer.style.width = mw + 'px';
    layer.style.height = mh + 'px';
    var h = '';
    for(var y=0;y<MAP_H;y++){
        for(var x=0;x<MAP_W;x++){
            var t = mapData[y][x];
            var s = tileStyle[t];
            h += '<div class="tile '+s.cls+'" style="left:'+(x*TILE)+'px;top:'+(y*TILE)+'px;width:'+TILE+'px;height:'+TILE+'px;"></div>';
        }
    }
    layer.innerHTML = h;

    // NPC
    npcs.forEach(function(n){
        layer.innerHTML += genActorHTML(n.id, n.x, n.y, n.color, n.name, 'npc');
    });

    // 敌人——只渲染活着的
    enemies.forEach(function(e){
        if(!deadEnemies[e.id]){
            layer.innerHTML += genActorHTML(e.id, e.x, e.y, {skin:'#deb887',hair:'#333',cloth:e.color}, e.name, 'enemy');
        }
    });

    renderPlayer();
}

function genActorHTML(id,x,y,color,name,type){
    var cssX = x*TILE + (TILE-28)/2;
    var cssY = y*TILE + TILE-44;
    var h = '<div class="actor '+type+'" id="'+id+'" style="left:'+cssX+'px;top:'+cssY+'px;">';
    h += '<span class="actor-name">'+name+'</span>';
    h += '<div class="actor-shadow"></div>';
    h += '<div class="actor-body">';
    h += '<div class="actor-head" style="background:'+color.skin+'"></div>';
    h += '<div class="actor-hair" style="background:'+color.hair+'"></div>';
    h += '<div class="actor-torso" style="background:'+color.cloth+'"></div>';
    h += '<div class="actor-left-leg" style="background:#333"></div>';
    h += '<div class="actor-right-leg" style="background:#333"></div>';
    if(type==='player'){
        h += '<div class="actor-weapon" style="background:#b0bec5"></div>';
    }
    h += '</div></div>';
    return h;
}

function renderPlayer(){
    var pdiv = document.getElementById('player-actor');
    var cssX = player.x*TILE + (TILE-28)/2;
    var cssY = player.y*TILE + TILE-44;
    if(!pdiv){
        var layer = document.getElementById('map-layer');
        var color = {skin:'#ffe0bd',hair:'#3d2817',cloth:'#1a5276'};
        var h = genActorHTML('player-actor',player.x,player.y,color,'少侠','player');
        layer.insertAdjacentHTML('beforeend',h);
        pdiv = document.getElementById('player-actor');
    }
    pdiv.style.left = cssX+'px';
    pdiv.style.top = cssY+'px';
    pdiv.className = 'actor player idle';

    var loc = areaName(player.x,player.y);
    document.getElementById('loc-name').textContent = loc;
    updateStats();
    updateCamera();
}

// ==================== 镜头跟随 ====================
function updateCamera(){
    var viewport = document.getElementById('map-viewport');
    var mlayer = document.getElementById('map-layer');
    var vw = viewport.clientWidth;
    var vh = viewport.clientHeight;
    var mw = MAP_W * TILE;  // 560
    var mh = MAP_H * TILE;  // 400

    // 主角在地图上的像素中心
    var px = player.x * TILE + TILE/2;
    var py = player.y * TILE + TILE/2;

    // 如果地图比视口小，居中显示
    var tx, ty;
    if(mw <= vw){
        tx = (vw - mw) / 2;
    } else {
        tx = vw/2 - px;
        tx = Math.max(vw - mw, Math.min(0, tx));
    }
    if(mh <= vh){
        ty = (vh - mh) / 2;
    } else {
        ty = vh/2 - py;
        ty = Math.max(vh - mh, Math.min(0, ty));
    }

    mlayer.style.transform = 'translate('+Math.round(tx)+'px,'+Math.round(ty)+'px)';
}

function updateStats(){
    var hpPct = (player.hp/player.maxHp*100).toFixed(1);
    var mpPct = (player.mp/player.maxMp*100).toFixed(1);
    var expPct = (player.exp/player.expNeed*100).toFixed(1);
    document.getElementById('s-hp').textContent = player.hp+'/'+player.maxHp;
    document.getElementById('s-mp').textContent = player.mp+'/'+player.maxMp;
    document.getElementById('s-hpbar').style.width = hpPct+'%';
    document.getElementById('s-mpbar').style.width = mpPct+'%';
    document.getElementById('s-expbar').style.width = expPct+'%';
    document.getElementById('s-atk').textContent = player.atk;
    document.getElementById('s-gold').textContent = player.gold;
    document.getElementById('s-lv').textContent = 'Lv.'+player.level;
    document.getElementById('s-exp').textContent = 'EXP:'+player.exp+'/'+player.expNeed;
}

// ==================== 移动 ====================
document.addEventListener('keydown',function(e){
    if(!gameStarted) return;
    if(inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block'){
        if(e.key==='Escape' || e.key===' ' || e.key==='e'){
            closeDialog();
        }
        return;
    }

    var nx=player.x, ny=player.y;
    switch(e.key.toLowerCase()){
        case 'w':case 'arrowup':ny--;break;
        case 's':case 'arrowdown':ny++;break;
        case 'a':case 'arrowleft':nx--;break;
        case 'd':case 'arrowright':nx++;break;
        case ' ':case 'e':interact();return;
        default:return;
    }
    e.preventDefault();

    // 地图边界=切换地图
    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H){
        var mc = allMaps[currentMap].connections;
        if(ny<0 && mc.north) switchMap(mc.north, player.x, allMaps[mc.north].data.length-1);
        else if(ny>=MAP_H && mc.south) switchMap(mc.south, player.x, 0);
        else if(nx<0 && mc.west) switchMap(mc.west, allMaps[mc.west].data[0].length-1, player.y);
        else if(nx>=MAP_W && mc.east) switchMap(mc.east, 0, player.y);
        return;
    }
    // 不可通行
    var t=mapData[ny][nx];
    if(t==='W'||t==='C') return;

    // 检查敌人
    var en = enemies.find(function(v){
        return v.x===nx && v.y===ny && !deadEnemies[v.id];
    });
    if(en){startBattle(enemies.indexOf(en));return;}

    player.x=nx;player.y=ny;
    var pdiv=document.getElementById('player-actor');
    pdiv.className='actor player walk';
    if(walkTimer) clearTimeout(walkTimer);
    walkTimer=setTimeout(function(){pdiv.className='actor player idle';},350);

    renderPlayer();
    checkNpcProximity();
});

// ==================== NPC交互 ====================
function checkNpcProximity(){
    for(var i=0;i<npcs.length;i++){
        var n=npcs[i];
        if(Math.abs(player.x-n.x)<=1 && Math.abs(player.y-n.y)<=1){
            showHint('按空格与'+n.name+'对话');
            return;
        }
    }
    hideHint();
}

function interact(){
    if(!gameStarted) return;
    for(var i=0;i<npcs.length;i++){
        var n=npcs[i];
        if(Math.abs(player.x-n.x)<=1 && Math.abs(player.y-n.y)<=1){
            curNpc=i;
            // 根据任务状态自动跳转到对应对话
            curNpcDi=getNpcStartDialog(i);
            showDialog(n.dialogs[curNpcDi]);
            return;
        }
    }
    // 检查演武场治疗
    if(mapData[player.y][player.x]==='A'){
        showHint('🧘 在演武场调息，气血内力完全恢复！');
        player.hp=player.maxHp;player.mp=player.maxMp;
        updateStats();
    }
    // 检查敌人(同格)
    var en=enemies.find(function(v){return v.x===player.x && v.y===player.y && !deadEnemies[v.id];});
    if(en){startBattle(enemies.indexOf(en));}
}

function showDialog(d){
    var box=document.getElementById('dialog-box');
    var n = npcs[curNpc];
    document.getElementById('dialog-speaker').textContent=n.name;
    document.getElementById('dialog-text').textContent=d.s;
    // 像素头像
    setDialogPixel(n.id);
    var choices=document.getElementById('dialog-choices');
    choices.innerHTML='';

    if(d.heal){
        choices.innerHTML='<button class="dchoice" onclick="doHeal()">有劳大师</button>'+
            '<button class="dchoice" onclick="closeDialog()">不必了</button>';
    }else if(d.q){
        if(!player.quests[d.q]){
            choices.innerHTML='<button class="dchoice" onclick="acceptQuest(\''+d.q+'\')">义不容辞</button>'+
                '<button class="dchoice" onclick="closeDialog()">容我再想想</button>';
        }else if(d.t2 && quests[d.q].done && !quests[d.q].rewardClaimed){
            choices.innerHTML='<button class="dchoice" onclick="claimReward(\''+d.q+'\')">领取报酬</button>'+
                '<button class="dchoice" onclick="closeDialog()">告辞</button>';
        }
    }else if(d.buy){
        choices.innerHTML='<button class="dchoice" onclick="buyItem()">买行军散(10钱)</button>'+
            '<button class="dchoice" onclick="closeDialog()">不了，告辞</button>';
    }

    if(!choices.innerHTML){
        choices.innerHTML='<button class="dchoice" onclick="nextDialog()">继续</button>';
    }
    box.style.display='block';
}

function doHeal(){
    player.hp=player.maxHp;player.mp=player.maxMp;
    sfxHeal();
    showHint('🧘 大师诵经祈福，你感到浑身舒畅！');
    closeDialog();
    updateStats();
}

function getNpcStartDialog(npcIdx){
    var n=npcs[npcIdx];
    // 武师：根据任务进度自动跳转
    if(n.id==='master'){
        // quest_1已接正在进行中 → 询问进度
        if(player.quests.quest_1 && !quests.quest_1.done) return 2;
        // quest_1已完成未领报酬 → 领取报酬
        if(player.quests.quest_1 && quests.quest_1.done && !quests.quest_1.rewardClaimed) return 1;
        // quest_1报酬已领，quest_2未接 → quest_2介绍
        if(player.quests.quest_1 && quests.quest_1.rewardClaimed && !player.quests.quest_2) return 3;
        // quest_2已接正在进行中 → 询问进度
        if(player.quests.quest_2 && !quests.quest_2.done) return 5;
        // quest_2已完成未领报酬 → 领取报酬
        if(player.quests.quest_2 && quests.quest_2.done && !quests.quest_2.rewardClaimed) return 4;
        // 全部完成 → 开头
        return 0;
    }
    // 镖师：quest_2完成后可接quest_3，quest_3完成可领报酬
    if(n.id==='escort'){
        // quest_3已接，已完成，未领报酬 → 领取报酬
        if(player.quests.quest_3 && quests.quest_3.done && !quests.quest_3.rewardClaimed) return 1;
        // quest_3报酬已领 → 闲聊
        if(player.quests.quest_3 && quests.quest_3.rewardClaimed) return 0;
        // quest_2完成，quest_3未接 → 接quest_3
        if(player.quests.quest_2 && quests.quest_2.done && !player.quests.quest_3) return 1;
        return 0;
    }
    return 0;
}
function findNextDialog(npcIdx, curDi){
    var next=curDi+1;
    if(next>=npcs[npcIdx].dialogs.length) return -1;
    var nd=npcs[npcIdx].dialogs[next];
    // 跳过已接取的任务对话
    if(nd.q && player.quests[nd.q]) return -1;
    // 武师：从进度询问跳下一段需对应任务已完成
    var n=npcs[npcIdx];
    if(n.id==='master' && curDi===2 && !quests.quest_1.done) return -1;
    if(n.id==='master' && curDi===5 && !quests.quest_2.done) return -1;
    return next;
}
function advanceToDialog(idx){
    curNpcDi=idx;
    var d=npcs[curNpc].dialogs[curNpcDi];
    showDialog(d);
}
function nextDialog(){
    var d=npcs[curNpc].dialogs[curNpcDi];
    if(d.t){
        document.getElementById('dialog-text').textContent=d.t;
        var choices=document.getElementById('dialog-choices');
        if(d.q){
            if(player.quests[d.q] && quests[d.q].done && d.t2 && !quests[d.q].rewardClaimed){
                choices.innerHTML='<button class="dchoice" onclick="nextDialog2()">继续</button>';
            }else if(!player.quests[d.q]){
                choices.innerHTML='<button class="dchoice" onclick="acceptQuest(\''+d.q+'\')">义不容辞</button>'+
                    '<button class="dchoice" onclick="closeDialog()">容我再想想</button>';
            }else{
                choices.innerHTML='<button class="dchoice" onclick="closeDialog()">好</button>';
            }
        }else if(d.buff || d.t2){
            choices.innerHTML='<button class="dchoice" onclick="nextDialog2()">继续</button>';
        }else{
            var nextDi=findNextDialog(curNpc,curNpcDi);
            if(nextDi>=0){
                choices.innerHTML='<button class="dchoice" onclick="advanceToDialog('+nextDi+')">继续</button>';
            }else{
                choices.innerHTML='<button class="dchoice" onclick="closeDialog()">告辞</button>';
            }
        }
    }else{
        closeDialog();
    }
}

function nextDialog2(){
    var d=npcs[curNpc].dialogs[curNpcDi];
    document.getElementById('dialog-text').textContent=d.t2;
    // 处理buff（隐士只能领一次）
    if(d.buff){
        var n=npcs[curNpc];
        if(n.id==='hermit' && player.hermitBuffed){
            document.getElementById('dialog-text').textContent='这套吐纳之法你已融会贯通，无需再学了。';
            document.getElementById('dialog-choices').innerHTML='<button class="dchoice" onclick="closeDialog()">多谢前辈</button>';
            updateStats();
            return;
        }
        if(d.buff.mp){player.maxMp+=d.buff.mp;player.mp=Math.min(player.mp+d.buff.mp,player.maxMp);showHint('💠 内力上限+'+d.buff.mp+'！');}
        if(d.buff.hp){player.maxHp+=d.buff.hp;player.hp=Math.min(player.hp+d.buff.hp,player.maxHp);showHint('❤️ 气血上限+'+d.buff.hp+'！');}
        if(n.id==='hermit') player.hermitBuffed=true;
        updateStats();
    }
    if(d.q){
        document.getElementById('dialog-choices').innerHTML=
            '<button class="dchoice" onclick="claimReward(\''+d.q+'\')">领取报酬</button>'+
            '<button class="dchoice" onclick="closeDialog()">告辞</button>';
    }else{
        document.getElementById('dialog-choices').innerHTML=
            '<button class="dchoice" onclick="closeDialog()">多谢前辈</button>';
    }
}

function acceptQuest(q){
    player.quests[q]=true;
    sfxQuest();
    quests[q].progress = killCounts[q==='quest_1'?'bandit':q==='quest_2'?'bully':'boss'];
    if(quests[q].progress >= quests[q].target){
        quests[q].done = true;
        showModal('📜 任务已接受','【'+quests[q].name+'】\n'+quests[q].desc+'\n\n✅ 你已完成此任务的要求！\n速去领取报酬吧！');
    }else{
        showModal('📜 任务已接受','【'+quests[q].name+'】\n'+quests[q].desc+'\n\n目标: '+quests[q].progress+'/'+quests[q].target+'\n报酬: '+quests[q].rewardGold+'五铢钱 +'+quests[q].rewardExp+'修为');
    }
    closeDialog();
}

function claimReward(q){
    if(quests[q].rewardClaimed){showHint('报酬已领取过了！');closeDialog();return;}
    quests[q].rewardClaimed=true;
    var qd=quests[q];
    player.gold+=qd.rewardGold;
    player.exp+=qd.rewardExp;
    sfxCoin();
    var lvUp=checkLevelUpSilent();
    var txt='【'+qd.name+'】完成！\n\n';
    txt+='💰 五铢钱 +'+qd.rewardGold+'\n';
    txt+='✨ 修为 +'+qd.rewardExp;
    if(lvUp>0) txt+='\n\n🎉 威名远扬！等级提升至'+player.level+'级！';
    showModal('🏆 任务完成',txt);
    closeDialog();
}

function closeDialog(){
    document.getElementById('dialog-box').style.display='none';
    updateStats();
}

function buyItem(){
    if(player.gold<10){showHint('五铢钱不够!');closeDialog();return;}
    player.gold-=10;
    addItem('potion',1);
    sfxCoin();
    showHint('💊 购得行军散一包!');
    updateStats();
}

// ==================== 战斗 ====================
function startBattle(ei){
    enemyIdx=ei;
    var e=enemies[ei];
    enemyHp=e.hp;enemyMaxHp=e.hp;
    inBattle=true;

    document.getElementById('battle-panel').style.display='flex';
    document.getElementById('be-name').textContent=e.name;
    document.getElementById('be-hp').textContent=enemyHp;
    document.getElementById('be-maxhp').textContent=enemyMaxHp;
    document.getElementById('be-hpbar').style.width='100%';
    document.getElementById('bp-hp').textContent=player.hp;
    document.getElementById('bp-maxhp').textContent=player.maxHp;
    document.getElementById('bp-mp').textContent=player.mp;
    document.getElementById('bp-maxmp').textContent=player.maxMp;
    document.getElementById('bp-hpbar').style.width=(player.hp/player.maxHp*100)+'%';
    document.getElementById('bp-mpbar').style.width=(player.mp/player.maxMp*100)+'%';
    document.getElementById('battle-log').textContent='⚔️ 狭路相逢！'+e.name+'挡在了你的面前！';
    sfxStart();

    // 像素战斗立绘
    setBattlePixel(e.type);
}

function disableBattleBtns(){
    var btns=document.querySelectorAll('#battle-actions .bact-btn');
    for(var i=0;i<btns.length;i++) btns[i].disabled=true;
}
function enableBattleBtns(){
    var btns=document.querySelectorAll('#battle-actions .bact-btn');
    for(var i=0;i<btns.length;i++) btns[i].disabled=false;
}

function shakeChar(sel,heavy){
    var el=document.querySelector(sel);
    if(!el)return;
    el.classList.remove('shake','shake-heavy');
    void el.offsetWidth;
    el.classList.add(heavy?'shake-heavy':'shake');
    setTimeout(function(){el.classList.remove('shake','shake-heavy');},heavy?550:400);
}
function flashChar(sel){
    var el=document.querySelector(sel);
    if(!el)return;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
    setTimeout(function(){el.classList.remove('flash');},300);
}

function battleAction(act){
    var e=enemies[enemyIdx];
    var log=document.getElementById('battle-log');

    if(act==='flee'){
        if(Math.random()<0.5){
            log.textContent='💨 轻功施展，脱离了战斗！';
            sfxFlee();
            endBattle(false);
        }else{
            log.textContent='❌ 逃脱失败！';
            sfxHit();
            shakeChar('.battle-char:first-child');
            enemyTurn();
        }
        return;
    }

    if(act==='atk'){
        var rng=Math.floor(Math.random()*7);
        var crit=rng>=5?2:1;
        var dmg=Math.max(1,(player.atk-e.def)*crit+Math.floor(Math.random()*5));
        enemyHp-=dmg;
        log.textContent='⚔️ 一剑挥出，造成 '+dmg+' 点伤害！'+(crit>1?' 【会心一击！】':'');
        if(crit>1){sfxCrit();shakeChar('#battle-panel .battle-char:last-child',true);flashChar('#battle-panel .battle-char:last-child');}
        else{sfxSword();shakeChar('#battle-panel .battle-char:last-child');}
    }

    if(act==='skill'){
        if(player.mp<10){log.textContent='💠 内力不足！需要10点内力';return;}
        player.mp-=10;
        sfxSkill();
        disableBattleBtns();
        doSkillMultiHit(e,log);
        return;
    }

    if(act==='item'){
        if(getTotalItems()<=0){
            log.textContent='❌ 行囊空空，无物可用！';
            return;
        }
        openBackpack(true);
        return;
    }

    updateBattleUI();

    if(enemyHp<=0){
        log.textContent='🎉 '+e.name+' 被击败了！';
        endBattle(true);
        return;
    }
    enemyTurn();
}

function doSkillMultiHit(e,log){
    // 三连斩：总伤害不变，分三次打出
    var baseDmg=Math.max(3,Math.floor(player.atk*2.2)-e.def*3+Math.floor(Math.random()*10));
    var hits=3;
    var remaining=baseDmg;
    var hitDmgs=[];
    for(var i=0;i<hits;i++){
        var hdmg=Math.max(1,Math.floor(remaining/(hits-i)));
        remaining-=hdmg;
        hitDmgs.push(hdmg);
    }

    var names=['横扫千军','穿心一枪','回马一枪'];
    var delay=0;
    function doHit(i){
        if(i>=hits||enemyHp<=0||!inBattle){
            enableBattleBtns();
            if(enemyHp<=0&&inBattle){
                log.textContent='🎉 '+e.name+' 被击败了！';
                endBattle(true);
            }
            return;
        }
        enemyHp-=hitDmgs[i];
        sfxSlash(); // 斩击音效与伤害同步
        log.textContent='🗡️ 霸王枪·'+names[i]+'！造成 '+hitDmgs[i]+' 点伤害！(消耗10内力)';
        shakeChar('#battle-panel .battle-char:last-child',i===2);
        updateBattleUI();

        if(enemyHp<=0){
            log.textContent='🎉 '+e.name+' 被击败了！';
            enableBattleBtns();
            endBattle(true);
            return;
        }
        if(i<hits-1){
            setTimeout(function(){doHit(i+1);},200);
        }else{
            setTimeout(function(){
                enableBattleBtns();
                if(inBattle && enemyHp>0) enemyTurn();
            },220);
        }
    }
    setTimeout(function(){doHit(0);},80);
}

function enemyTurn(){
    var e=enemies[enemyIdx];
    var dmg=Math.max(1,e.atk-player.def+Math.floor(Math.random()*5));
    var crit=false;
    if(Math.random()<0.12){dmg=Math.floor(dmg*1.8);crit=true;}
    player.hp-=dmg;
    document.getElementById('battle-log').textContent+='\n'+e.name+'反击，造成 '+dmg+' 点伤害！'+(crit?' 【重击！】':'');
    sfxHit();
    if(crit){shakeChar('#battle-panel .battle-char:first-child',true);}
    else{shakeChar('#battle-panel .battle-char:first-child');}
    updateBattleUI();

    if(player.hp<=0){
        player.hp=1;
        sfxDefeat();
        document.getElementById('battle-log').textContent='💀 你倒在了血泊中...被过路商队救回了颍川';
        endBattle(false);
        player.x=9;player.y=3;
        buildMap();
        renderPlayer();
        showModal('💀 力竭倒下','你被敌人击败了！\n\n被过路商队救回了颍川，气血恢复至1。\n回去调息修养后再来报仇吧！');
    }
}

function updateBattleUI(){
    document.getElementById('be-hp').textContent=Math.max(0,enemyHp);
    document.getElementById('be-hpbar').style.width=(Math.max(0,enemyHp)/enemyMaxHp*100)+'%';
    document.getElementById('bp-hp').textContent=Math.max(0,player.hp);
    document.getElementById('bp-hpbar').style.width=(Math.max(0,player.hp)/player.maxHp*100)+'%';
    document.getElementById('bp-mp').textContent=player.mp;
    document.getElementById('bp-mpbar').style.width=(player.mp/player.maxMp*100)+'%';
    // 同步底部状态栏
    document.getElementById('s-hp').textContent=Math.max(0,player.hp)+'/'+player.maxHp;
    document.getElementById('s-mp').textContent=player.mp+'/'+player.maxMp;
    document.getElementById('s-hpbar').style.width=(Math.max(0,player.hp)/player.maxHp*100)+'%';
    document.getElementById('s-mpbar').style.width=(player.mp/player.maxMp*100)+'%';
}

function endBattle(won){
    var e=enemies[enemyIdx];
    if(won){
        sfxVictory();
        player.exp+=e.exp;
        player.gold+=e.gold;

        // 标记敌人死亡，不再重生
        deadEnemies[e.id]=true;

        // 击杀计数
        if(e.type==='bandit') killCounts.bandit++;
        if(e.type==='bully') killCounts.bully++;
        if(e.type==='guard') killCounts.guard++;
        if(e.type==='boss') killCounts.boss++;

        // 任务进度
        var questDone=false;
        if(player.quests.quest_1 && !quests.quest_1.done && e.type==='bandit'){
            quests.quest_1.progress++;
            if(quests.quest_1.progress>=quests.quest_1.target){
                quests.quest_1.done=true;
                questDone=true;
            }
        }
        if(player.quests.quest_2 && !quests.quest_2.done && e.type==='bully'){
            quests.quest_2.progress++;
            if(quests.quest_2.progress>=quests.quest_2.target){
                quests.quest_2.done=true;
                questDone=true;
            }
        }
        if(e.type==='boss'){
            if(player.quests.quest_3 && !quests.quest_3.done){
                quests.quest_3.progress++;
                if(quests.quest_3.progress>=quests.quest_3.target){
                    quests.quest_3.done=true;
                    questDone=true;
                }
            }
        }
        var lvUp=checkLevelUpSilent();

        // ===== 战斗结算弹窗 =====
        var resultTxt='⚔️ '+e.name+' 已被击败！\n\n';
        resultTxt+='💰 五铢钱 +'+e.gold+'\n';
        resultTxt+='✨ 修为 +'+e.exp;
        if(lvUp>0) resultTxt+='\n\n🎉 威名远扬！等级提升至'+player.level+'级！';
        if(questDone) resultTxt+='\n\n📜 有任务目标已达成！回去领赏吧。';
        showModal('🎉 战斗胜利',resultTxt);
    }

    document.getElementById('battle-panel').style.display='none';
    inBattle=false;
    enemyIdx=null;
    updateStats();
    buildMap();
    renderPlayer();
}

function checkLevelUpSilent(){
    var gained=0;
    while(player.exp>=player.expNeed){
        player.exp-=player.expNeed;
        player.level++;
        player.expNeed=Math.floor(player.expNeed*1.6);
        player.maxHp+=22;player.hp=player.maxHp;
        player.maxMp+=12;player.mp=player.maxMp;
        player.atk+=4;player.def+=2;
        gained++;
        sfxLevelUp();
    }
    return gained;
}
