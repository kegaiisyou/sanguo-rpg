var bagInBattle = false;
var bagSelectedId = null;

function openBackpack(inBattle){
    bagInBattle = !!inBattle;
    bagSelectedId = null;
    document.getElementById('bp-gold').textContent = player.gold;
    document.getElementById('bp-detail').innerHTML = '<span class="empty-hint">点击道具查看详情</span>';
    document.getElementById('bp-btn-use').disabled = true;
    document.getElementById('bp-btn-discard').disabled = true;
    document.getElementById('backpack-modal').classList.add('show');
    renderBackpackGrid();
}

function closeBackpack(){
    document.getElementById('backpack-modal').classList.remove('show');
    bagSelectedId = null;
    bagInBattle = false;
}

function renderBackpackGrid(){
    var grid = document.getElementById('bp-grid');
    var html = '';
    // 只显示已拥有的道具
    for(var k in ITEM_DB){
        var def = ITEM_DB[k];
        var count = getItemCount(def.id);
        if(count <= 0) continue; // 跳过未拥有的
        var selCls = (bagSelectedId === def.id) ? ' selected' : '';
        html += '<div class="bp-slot rarity-'+def.rarity+selCls+'" onclick="selectBagItem(\''+def.id+'\')">';
        html += '<span class="icon">'+def.icon+'</span>';
        html += '<span class="name">'+def.name+'</span>';
        html += '<span class="count">x'+count+'</span>';
        html += '</div>';
    }
    if(!html) html = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:20px;">行囊空空</div>';
    grid.innerHTML = html;
}

function selectBagItem(id){
    bagSelectedId = id;
    renderBackpackGrid();
    var def = getItemDef(id);
    var count = getItemCount(id);
    var detail = document.getElementById('bp-detail');
    if(count > 0){
        var rarityTxt = ['','普通','稀有','珍品'][def.rarity] || '普通';
        detail.innerHTML = '<b style="color:#d4a853;">'+def.icon+' '+def.name+'</b> ['+rarityTxt+']<br>'+def.desc+'<br>拥有: <b>'+count+'</b> 个';
        document.getElementById('bp-btn-use').disabled = false;
        document.getElementById('bp-btn-discard').disabled = false;
    } else {
        detail.innerHTML = '<span class="empty-hint">尚未获得此道具</span>';
        document.getElementById('bp-btn-use').disabled = true;
        document.getElementById('bp-btn-discard').disabled = true;
    }
}

function useBagItem(){
    if(!bagSelectedId) return;
    var def = getItemDef(bagSelectedId);
    var count = getItemCount(bagSelectedId);
    if(count <= 0) return;

    var eff = def.effect;
    var used = false;
    var msg = '';

    if(def.type === 'heal'){
        if(player.hp >= player.maxHp){
            msg = '💡 气血已满，无需恢复！';
        } else if(eff.hp === 'full'){
            removeItem(def.id, 1);
            player.hp = player.maxHp;
            msg = '🧪 服下'+def.name+'，气血完全恢复！';
            sfxHeal(); used = true;
        } else {
            removeItem(def.id, 1);
            player.hp = Math.min(player.maxHp, player.hp + eff.hp);
            msg = '💊 服下'+def.name+'，恢复 '+eff.hp+' 气血！';
            sfxHeal(); used = true;
        }
    } else if(def.type === 'mp'){
        if(player.mp >= player.maxMp){
            msg = '💡 内力已满，无需恢复！';
        } else {
            removeItem(def.id, 1);
            player.mp = Math.min(player.maxMp, player.mp + (eff.mp||20));
            msg = '💠 服下'+def.name+'，恢复 '+(eff.mp||20)+' 内力！';
            sfxHeal(); used = true;
        }
    } else if(def.type === 'gold'){
        removeItem(def.id, 1);
        player.gold += (eff.gold||50);
        document.getElementById('bp-gold').textContent = player.gold;
        msg = '💰 打开'+def.name+'，获得 '+(eff.gold||50)+' 两银子！';
        sfxCoin(); used = true;
    } else if(def.type === 'buff'){
        msg = '💡 战斗中才能使用此道具！';
    }

    // 战斗中自动关闭背包
    if(bagInBattle && used){
        var log = document.getElementById('battle-log');
        log.textContent = msg;
        updateBattleUI();
        closeBackpack();
        if(enemyHp <= 0){
            log.textContent = '🎉 ' + enemies[enemyIdx].name + ' 被击败了！';
            endBattle(true);
        } else {
            enemyTurn();
        }
        return;
    }

    updateStats();
    renderBackpackGrid();
    selectBagItem(bagSelectedId);
    document.getElementById('bp-detail').innerHTML = (used ? '✅ ': '') + msg + '<br>' + document.getElementById('bp-detail').innerHTML;
}

function discardBagItem(){
    if(!bagSelectedId){
        var dt = document.getElementById('bp-detail');
        dt.innerHTML = '<span style="color:#e8a090;">请先选择一个道具</span>';
        return;
    }
    var def = getItemDef(bagSelectedId);
    if(!def) return;
    var count = getItemCount(bagSelectedId);
    if(count <= 0) return;
    // 二次确认
    var sure = confirm('确定要丢弃 1 个 ' + def.name + ' 吗？\n此操作不可撤销！');
    if(!sure) return;
    removeItem(def.id, 1);
    updateStats();
    renderBackpackGrid();
    var remain = getItemCount(bagSelectedId);
    if(remain > 0){
        selectBagItem(bagSelectedId);
    } else {
        bagSelectedId = null;
        document.getElementById('bp-detail').innerHTML = '<span class="empty-hint">已丢弃 '+def.name+'</span>';
        document.getElementById('bp-btn-use').disabled = true;
        document.getElementById('bp-btn-discard').disabled = true;
    }
}

function showQuest(){
    var txt='📜 乱世任务\n\n';
    var hasQuest=false;
    for(var k in quests){
        var q=quests[k];
        // 不显示未接的任务
        if(!player.quests[k]) continue;
        hasQuest=true;
        var status=q.done ? '[✅ 已完成]' : '[进行中 '+q.progress+'/'+q.target+']';
        txt+=status+' '+q.name+'\n';
        txt+='  '+q.desc+'\n';
        txt+='  报酬: '+q.rewardGold+'五铢钱 +'+q.rewardExp+'修为\n\n';
    }
    if(!hasQuest) txt+='暂无进行中的任务。\n前往颍川找县尉韩伯接取任务吧！\n\n';
    txt+='击杀: 黄巾×'+killCounts.bandit+' 溃兵×'+killCounts.bully+' 西凉×'+killCounts.guard;
    showModal('任务',txt);
}

function showHint(msg){
    var h=document.getElementById('hint');
    h.textContent=msg;h.style.display='block';
    setTimeout(function(){h.style.display='none';},2200);
}
function hideHint(){document.getElementById('hint').style.display='none';}

// ==================== 手机虚拟方向键 ====================
function mobileDir(dir, e){
    if(!gameStarted || inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block') return;
    e.preventDefault();
    mobileMoveDir = dir;
    // 立即执行一次
    doMobileMove();
    // 长按持续移动
    if(mobileMoveInterval) clearInterval(mobileMoveInterval);
    mobileMoveInterval = setInterval(doMobileMove, 130);
    // 高亮按钮
    var btn = document.getElementById('mbtn-'+dir);
    if(btn) btn.classList.add('pressed');
}

function mobileStop(e){
    if(e) e.preventDefault();
    mobileMoveDir = null;
    if(mobileMoveInterval){ clearInterval(mobileMoveInterval); mobileMoveInterval = null; }
    // 取消所有按钮高亮
    document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('pressed'); });
    var pdiv = document.getElementById('player-actor');
    if(pdiv) pdiv.className = 'actor player idle';
}

function doMobileMove(){
    if(!mobileMoveDir || !gameStarted || inBattle) return;
    if(document.getElementById('dialog-box').style.display==='block') return;

    var nx = player.x, ny = player.y;
    switch(mobileMoveDir){
        case 'up': ny--; break;
        case 'down': ny++; break;
        case 'left': nx--; break;
        case 'right': nx++; break;
    }

    // 地图边界=切换地图
    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H){
        var mc2 = allMaps[currentMap].connections;
        if(ny<0 && mc2.north) switchMap(mc2.north, player.x, allMaps[mc2.north].data.length-1);
        else if(ny>=MAP_H && mc2.south) switchMap(mc2.south, player.x, 0);
        else if(nx<0 && mc2.west) switchMap(mc2.west, allMaps[mc2.west].data[0].length-1, player.y);
        else if(nx>=MAP_W && mc2.east) switchMap(mc2.east, 0, player.y);
        return;
    }
    var t = mapData[ny][nx];
    if(t==='W'||t==='C') return;

    // 检查敌人
    var en = enemies.find(function(v){
        return v.x===nx && v.y===ny && !deadEnemies[v.id];
    });
    if(en){
        mobileStop({preventDefault:function(){}});
        startBattle(enemies.indexOf(en));
        return;
    }

    player.x = nx; player.y = ny;
    var pdiv = document.getElementById('player-actor');
    if(pdiv) pdiv.className = 'actor player walk';
    if(walkTimer) clearTimeout(walkTimer);
    walkTimer = setTimeout(function(){ if(pdiv) pdiv.className = 'actor player idle'; }, 350);

    renderPlayer();
    checkNpcProximity();
}

function mobileInteract(e){
    if(!gameStarted || inBattle) return;
    e.preventDefault();
    interact();
}

function showModal(title,text){
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-text').textContent=text;
    document.getElementById('modal').classList.add('show');
}
function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

// ==================== 初始化 ====================
// 移动端阻止默认手势
document.getElementById('game').addEventListener('touchstart',function(e){
    if(e.target.closest('#mobile-controls') || e.target.closest('#map-viewport')){
        e.preventDefault();
    }
},{passive:false});
document.addEventListener('gesturestart',function(e){ e.preventDefault(); });
document.addEventListener('gesturechange',function(e){ e.preventDefault(); });

buildMap();
renderPlayer();
initTitleScreen();
// 标题界面默认显示，不自动开始
document.getElementById('title-screen').style.display='flex';
updateStats();
</script>
