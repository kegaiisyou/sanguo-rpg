<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国：乱世烽火 - 完整版</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #0a0a15 100%); color: #e8dcc4; padding: 12px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        h1 { color: #d4af37; text-align: center; margin: 15px 0; font-size: 1.4rem; }
        
        /* 开始界面 */
        .intro-text { font-size: 0.9rem; line-height: 1.8; color: #c4b49c; text-align: center; padding: 10px; }
        
        /* 选择按钮 */
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .select-btn { padding: 12px; background: linear-gradient(135deg, #1a1520, #2a1a10); border: 2px solid #3a2a1a; border-radius: 8px; color: #c4b49c; cursor: pointer; text-align: left; transition: all 0.2s; }
        .select-btn:hover { border-color: #d4af37; transform: translateY(-2px); }
        .select-btn.selected { border-color: #d4af37; background: linear-gradient(135deg, #2a2015, #3a2a1a); }
        .select-name { color: #d4af37; font-weight: bold; font-size: 0.95rem; }
        .select-desc { font-size: 0.7rem; color: #8a7a6a; margin-top: 3px; }
        
        /* 角色选择 */
        .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .role-btn { padding: 10px; background: #1a1520; border: 2px solid #3a2a1a; border-radius: 8px; color: #c4b49c; cursor: pointer; text-align: center; transition: all 0.2s; }
        .role-btn:hover { border-color: #d4af37; }
        .role-btn.selected { border-color: #d4af37; background: #2a2015; }
        
        /* 主游戏区域 */
        #mainPanel { display: none; }
        
        /* 开始界面 */
        #startPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; background: linear-gradient(180deg, #1a1a2e 0%, #0a0a15 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        
        /* 简化状态栏 - 仅显示位置 */
        .mini-status-bar { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #1a1520, #2a1a10); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #3a2a1a; }
        .location-display { display: flex; align-items: center; gap: 6px; }
        .location-icon { font-size: 1rem; }
        .location-value { color: #9ab87a; font-weight: bold; font-size: 0.9rem; }
        .location-place { color: #7a9acd; font-size: 0.8rem; }
        
        /* 信息栏 */
        .info-bar { display: flex; justify-content: space-between; font-size: 0.75rem; color: #8a7a6a; margin-bottom: 8px; padding: 8px; background: #0f0a08; border-radius: 6px; }
        .date-display { color: #d4af37; font-weight: bold; }
        
        /* 任务栏 */
        .quest-bar { background: linear-gradient(135deg, #1a1520, #2a1a10); border: 1px solid #4a3a20; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
        .quest-title { color: #d4af37; font-size: 0.8rem; }
        
        /* 游戏日志 */
        #gameLog { background: #0f0a08; padding: 10px; height: 280px; overflow-y: auto; border-radius: 8px; margin-bottom: 8px; border: 1px solid #2a1a10; font-size: 0.85rem; }
        .log-msg { margin-bottom: 8px; line-height: 1.5; }
        .log-msg .cmd { color: #ffd700; font-weight: bold; cursor: pointer; }
        .log-msg .cmd:hover { text-decoration: underline; }
        
        /* 移动面板 */
        #movePanel { display: none; background: #0f0a08; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 2px solid #d4af37; max-height: 70vh; overflow-y: auto; }
        .dest-title { color: #d4af37; font-size: 1rem; text-align: center; margin-bottom: 10px; }
        .dest-current { font-size: 0.8rem; color: #8a7a6a; text-align: center; margin-bottom: 10px; }
        .dest-section { margin-bottom: 12px; }
        .dest-section-title { color: #7a9acd; font-size: 0.8rem; margin-bottom: 6px; border-bottom: 1px solid #2a1a10; padding-bottom: 3px; }
        .dest-btns { display: flex; flex-wrap: wrap; gap: 6px; }
        .dest-btn { padding: 8px 12px; background: #1a1520; border: 1px solid #3a2a1a; border-radius: 6px; color: #c4b49c; font-size: 0.8rem; cursor: pointer; }
        .dest-btn:hover { border-color: #d4af37; color: #d4af37; }
        .dest-btn.nearby { border-color: #4a6a4a; color: #9ab87a; }
        .dest-btn.nearby:hover { background: #2a3020; }
        .dest-btn.far { border-color: #8b4513; }
        .dest-btn.exit { border-color: #6a5080; color: #b8a0d0; }
        .dest-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .dest-close { width: 100%; padding: 10px; background: #2a2015; border: 1px solid #3a2a1a; color: #8a7a6a; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        /* 设施交互面板 */
        #placePanel { display: none; background: #0f0a08; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 2px solid #4a6a4a; }
        .place-name { color: #9ab87a; font-size: 1.1rem; text-align: center; margin-bottom: 8px; }
        .place-desc { color: #8a7a6a; font-size: 0.85rem; text-align: center; margin-bottom: 15px; line-height: 1.6; }
        .place-actions { margin-top: 15px; }
        .action-btn { width: 100%; padding: 12px; background: #1a1520; border: 1px solid #3a2a1a; border-radius: 6px; color: #c4b49c; font-size: 0.85rem; cursor: pointer; margin-bottom: 8px; text-align: left; }
        .action-btn:hover { border-color: #d4af37; color: #d4af37; }
        .action-btn.exit { border-color: #6a5080; color: #b8a0d0; background: #1a1525; }
        
        /* 快捷按钮 */
        .quick-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .qbtn { padding: 7px 10px; background: #1a1520; border: 1px solid #3a2a1a; border-radius: 5px; color: #8a7a6a; font-size: 0.75rem; cursor: pointer; }
        .qbtn:hover { border-color: #8b4513; color: #d4af37; }
        
        /* 输入区域 */
        .input-area { display: flex; gap: 6px; }
        #commandInput { flex: 1; padding: 8px; background: #1a1520; color: #c4b49c; border: 1px solid #3a2a1a; border-radius: 6px; font-size: 0.85rem; }
        #sendBtn { padding: 8px 12px; background: #8b4513; color: #d4af37; border: 1px solid #d4af37; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        
        /* 警告提示 */
        .warning { color: #c97a7a; font-size: 0.75rem; text-align: center; margin: 8px 0; }
        
        /* 战斗/商店/背包/状态面板 */
        .panel { display: none; background: #0f0a08; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 2px solid #8b4513; }
        .panel-title { color: #d4af37; font-size: 1rem; text-align: center; margin-bottom: 10px; }
        .panel-close { width: 100%; padding: 10px; background: #2a2015; border: 1px solid #3a2a1a; color: #8a7a6a; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        /* 物品列表 */
        .item-row { display: flex; justify-content: space-between; padding: 8px; background: #1a1520; border-radius: 6px; margin-bottom: 6px; }
        
        /* 战斗按钮 */
        .battle-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .battle-btn { padding: 12px; background: #2a1520; border: 1px solid #8b0000; border-radius: 6px; color: #c4b49c; cursor: pointer; }
        
        /* 天气显示 */
        .weather-bar { display: flex; align-items: center; gap: 8px; padding: 6px; background: #1a1520; border-radius: 6px; margin-bottom: 8px; font-size: 0.75rem; }
        .weather-icon { font-size: 1rem; }
        .weather-text { color: #8a7a6a; }
        
        /* 环境介绍弹窗 */
        #envPanel { display: none; background: #0f0a08; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 2px solid #4a6a4a; }
        .env-title { color: #9ab87a; font-size: 1rem; text-align: center; margin-bottom: 10px; }
        .env-desc { color: #c4b49c; font-size: 0.85rem; line-height: 1.8; margin-bottom: 12px; }
        .env-npc { background: #1a2015; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #4a6a4a; }
        .env-npc-name { color: #9ab87a; font-size: 0.8rem; font-weight: bold; }
        .env-npc-text { color: #a0a0a0; font-size: 0.8rem; font-style: italic; margin-top: 4px; }
        .env-yell { background: #201510; padding: 8px; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid #8b4513; }
        .env-yell-text { color: #c4a060; font-size: 0.8rem; }
        
        /* 坐骑显示 */
        .mount-info { color: #b8a0d0; font-size: 0.7rem; }
        
        /* 移动动画提示 */
        .travel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 20, 0.85);
            z-index: 9999;
            opacity: 0;
            pointer-events: none !important;
        }
        .travel-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: auto !important;
        }
        .travel-animation {
            text-align: center;
            animation: travelPulse 1.5s ease-in-out infinite;
        }
        .travel-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: iconBounce 1s ease-in-out infinite;
        }
        .travel-text {
            color: #d4af37;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: textGlow 1s ease-in-out infinite alternate;
        }
        .travel-sub {
            color: #8a7a6a;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        @keyframes travelPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            100% { text-shadow: 0 0 30px rgba(212, 175, 55, 0.8); }
        }
        
        /* 成功到达动画 */
        .arrival-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a2510, #2a3a20);
            border: 2px solid #9ab87a;
            border-radius: 12px;
            padding: 30px 50px;
            text-align: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            animation: arrivalAnim 2s ease-out forwards;
        }
        .arrival-icon { font-size: 3rem; margin-bottom: 10px; }
        .arrival-text { color: #9ab87a; font-size: 1.3rem; font-weight: bold; }
        
        @keyframes arrivalAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            25% { transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }
        
        /* 状态面板样式 */
        #statusPanel .panel-section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a1a10;
        }
        #statusPanel .panel-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .status-section-title {
            color: #7a9acd;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            background: #1a1520;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .stat-label { color: #8a7a6a; font-size: 0.8rem; }
        .stat-value { color: #d4af37; font-weight: bold; font-size: 0.85rem; }
        .stat-value.hp { color: #7ac97a; }
        .stat-value.atk { color: #c97a7a; }
        .stat-value.int { color: #7a9acd; }
        .stat-value.fame { color: #d4af37; }
        
        /* 背包面板资源显示 */
        .resource-section {
            background: linear-gradient(135deg, #1a1520, #2a1a10);
            border: 1px solid #3a2a1a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .resource-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a1a10;
        }
        .resource-row:last-child { border-bottom: none; }
        .resource-info { display: flex; align-items: center; gap: 8px; }
        .resource-icon { font-size: 1.2rem; }
        .resource-name { color: #c4b49c; font-size: 0.85rem; }
        .resource-value { color: #d4af37; font-weight: bold; font-size: 0.95rem; }
    </style>
</head>
<body>
    <!-- 开始界面 - 必须在最前面 -->
    <div id="startPanel">
        <h1 style="color:#d4af37;margin-bottom:20px;">三國：亂世烽火</h1>
        <div class="intro-text">
            东风忽起，垂杨舞回。<br>
            恍惚间，耳边似有金戈铁马之声...<br><br>
            待睁眼时，却见自己立于<br>
            古道荒郊，黄沙漫天...<br><br>
            <strong style="color:#d4af37;">乱世已起，公子何为？</strong>
        </div>
        
        <button id="startBtn" onclick="startGame()" style="width:100%;padding:15px;background:#8b4513;color:#d4af37;border:2px solid #d4af37;border-radius:8px;font-size:1.1rem;cursor:pointer;margin-top:20px;">踏入乱世</button>
    </div>
    
    <!-- 主游戏面板 -->
    <div id="mainPanel">
        <!-- 天气显示 -->
        <div class="weather-bar">
            <span class="weather-icon" id="weatherIcon">☀️</span>
            <span class="weather-text" id="weatherText">天气：晴朗</span>
            <span class="mount-info" id="mountInfo"></span>
        </div>
        
        <!-- 简化状态栏：位置信息 -->
        <div class="mini-status-bar">
            <div class="location-display">
                <span class="location-icon">📍</span>
                <span class="location-value" id="locationCity">洛阳</span>
                <span class="location-place" id="locationPlace">· 城门</span>
            </div>
        </div>
        
        <div class="info-bar">
            <span id="timeInfo">189年1月1日</span>
            <span id="locationDetail"></span>
        </div>
        
        <div class="quest-bar">
            <div class="quest-title" id="questTitle">● 当前任务：无</div>
        </div>
        
        <div id="gameLog"></div>
        
        <!-- 快捷按钮 -->
        <div class="quick-btns">
            <button class="qbtn" data-action="openMove">📍 移动</button>
            <button class="qbtn" data-action="openInventory">🎒 背包</button>
            <button class="qbtn" data-action="openStatus">📊 状态</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="commandInput" placeholder="输入指令或问题...">
            <button id="sendBtn">确定</button>
        </div>
    </div>
    
    <!-- 移动面板 -->
    <div id="movePanel">
        <div class="dest-title" id="moveTitle">📍 移动</div>
        <div class="dest-current" id="moveLocation"></div>
        <div id="moveContent"></div>
        <button class="dest-close" data-action="closeMove">返回</button>
    </div>
    
    <!-- 设施交互面板 -->
    <div id="placePanel">
        <div class="dest-title" id="placeTitle">📍 当前位置</div>
        <div id="placeContent"></div>
        <button class="dest-close" data-action="closePlace">返回</button>
    </div>
    <!-- 地图面板 -->
    <div id="mapPanel" class="panel" style="border-color:#4a6a4a;">
        <div class="panel-title">🗺️ 天下地图</div>
        <div id="mapContent" style="font-family:monospace;font-size:0.65rem;line-height:1.3;color:#8a7a6a;white-space:pre;"></div>
        <button class="panel-close" data-action="closeMap">关闭</button>
    </div>
    
    <!-- 商店面板 -->
    <div id="shopPanel" class="panel">
        <div class="panel-title">🏪 商店</div>
        <div id="shopItems"></div>
        <button class="panel-close" data-action="closeShop">关闭</button>
    </div>
    
    <!-- 贸易面板 -->
    <div id="tradePanel" class="panel" style="border-color:#d4af37;">
        <div class="panel-title">💰 商贸市场</div>
        <div id="tradeInfo"></div>
        <div id="tradeItems"></div>
        <button class="panel-close" data-action="closeTrade">关闭</button>
    </div>
    
    <!-- 背包面板 -->
    <div id="inventoryPanel" class="panel" style="border-color:#6a5080;">
        <div class="panel-title">🎒 背包</div>
        <div id="invItems"></div>
        <button class="panel-close" data-action="closeInventory">返回游戏</button>
    </div>
    
    <!-- 状态面板 -->
    <div id="statusPanel" class="panel" style="border-color:#7a9acd;">
        <div class="panel-title">📊 角色状态</div>
        <div id="statusItems"></div>
        <button class="panel-close" data-action="closeStatus">返回游戏</button>
    </div>
    
    
    
    <!-- 移动动画覆盖层 -->
    <div id="travelOverlay" class="travel-overlay">
        <div class="travel-animation">
            <div class="travel-icon" id="travelIcon">🚶</div>
            <div class="travel-text" id="travelText">正在前往...</div>
            <div class="travel-sub" id="travelSub">请稍候</div>
        </div>
    </div>
    
    <!-- 战斗面板 -->
    <div id="battlePanel" class="panel" style="border-color:#8b0000;">
        <div class="panel-title">⚔️ 战斗</div>
        <div style="text-align:center;margin-bottom:10px;">
            <div style="color:#c97a7a;font-weight:bold;" id="enemyName">敌人</div>
            <div style="color:#c97a7a;">HP: <span id="enemyHp">50</span></div>
        </div>
        <div style="color:#8acd7a;text-align:center;margin-bottom:10px;">
            你: <span id="playerHp">100</span>/<span id="playerMaxHp">100</span>
        </div>
        <div class="battle-btns">
            <button class="battle-btn" data-action="battle" data-param="attack">攻击</button>
            <button class="battle-btn" data-action="battle" data-param="defend">防御</button>
            <button class="battle-btn" data-action="battle" data-param="skill">技能</button>
            <button class="battle-btn" data-action="battle" data-param="flee">逃跑</button>
        </div>
    </div>

    <script>
    // ==================== 游戏数据 ====================
    const WEATHER_TYPES = [
        { name: "晴朗", icon: "☀️", speedMod: 1.0, desc: "风和日丽，适合赶路" },
        { name: "多云", icon: "⛅", speedMod: 0.9, desc: "天色阴沉，行路稍缓" },
        { name: "阴天", icon: "☁️", speedMod: 0.85, desc: "乌云密布，道路难行" },
        { name: "小雨", icon: "🌧️", speedMod: 0.7, desc: "细雨绵绵，道路泥泞" },
        { name: "大雨", icon: "⛈️", speedMod: 0.5, desc: "暴雨如注，寸步难行" },
        { name: "小雪", icon: "🌨️", speedMod: 0.6, desc: "雪花飘飘，路滑难行" },
        { name: "大雪", icon: "❄️", speedMod: 0.4, desc: "大雪封山，难以通行" },
        { name: "大风", icon: "💨", speedMod: 0.7, desc: "狂风大作，步履维艰" },
        { name: "雾", icon: "🌫️", speedMod: 0.6, desc: "大雾弥漫，辨不清方向" },
        { name: "沙尘", icon: "🌪️", speedMod: 0.5, desc: "黄沙漫天，眯眼难睁" }
    ];
    
    const ROAD_TYPES = {
        "官道": { baseSpeed: 1.0, rationsPerDay: 1, desc: "平坦宽阔的官道，快马加鞭一日千里", color: "#9ab87a" },
        "山路": { baseSpeed: 0.6, rationsPerDay: 2, desc: "崎岖难行的山路，行进缓慢", color: "#c4a060" },
        "水路": { baseSpeed: 1.2, rationsPerDay: 1, desc: "顺流而下，轻松惬意", color: "#6ab0d0" },
        "荒野": { baseSpeed: 0.4, rationsPerDay: 3, desc: "荒无人烟的野外，危机四伏", color: "#a08060" },
        "小道": { baseSpeed: 0.5, rationsPerDay: 2, desc: "隐秘小道，人迹罕至", color: "#7a9acd" }
    };
    
    // 道路状态
    const ROAD_STATUS = {

    // 检查并触发历史事件
    function checkHistoricalEvents() {
        for (var eventName in CITY_EVENTS) {
            var event = CITY_EVENTS[eventName];
            if (triggeredEvents.indexOf(eventName) === -1) {
                if (player.year > event.year || (player.year === event.year && player.month >= event.month)) {
                    event.trigger();
                    triggeredEvents.push(eventName);
                }
            }
        }
    }

    // ==================== 初始化 ====================
    window.onload = function() {
        document.getElementById('startBtn').onclick = startGame;
        
        // 按钮事件委托
        document.body.onclick = function(e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            
            var action = btn.dataset.action;
            var param = btn.dataset.param;
            
            if (action === 'openMove') openMove();
            else if (action === 'closeMove') closeMove();
            else if (action === 'closePlace') closePlace();
            else if (action === 'openShop') openShop();
            else if (action === 'closeShop') closeShop();
            else if (action === 'openInventory') openInventory();
            else if (action === 'closeInventory') closeInventory();
            else if (action === 'openStatus') openStatus();
            else if (action === 'closeStatus') closeStatus();
            else if (action === 'openMap') openMap();
            else if (action === 'closeMap') closeMap();
            else if (action === 'openTrade') openTrade();
            else if (action === 'closeTrade') closeTrade();
            else if (action === 'battle') handleBattle(param);
        };
        
        // 发送按钮
        document.getElementById('sendBtn').onclick = handleCommand;
        document.getElementById('commandInput').onkeypress = function(e) {
            if (e.key === 'Enter') handleCommand();
        };
    };
    
    function startGame() {
        player.name = "旅人";
        player.role = "商旅";
        var loc = LOCATIONS[player.location];
        player.currentPlace = getCityEntryPlaceName(loc.type);
        
        log("【系统】公元" + player.year + "年1月1日，你来到东汉末年的中原...", "important");
        log("【系统】此时董卓把持朝政，天下大乱...", "system");
        log("【提示】点击下方按钮开始你的乱世之旅！", "success");
        
        // 初始环境描写
        showArrivalDescription(loc);
        
        // 检查历史事件
        checkHistoricalEvents();
        
        document.getElementById('startPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        
        assignQuest();
        updateUI();
    }

        // 更新坐骑信息
        var mount = MOUNTS[player.mount];
        document.getElementById('mountInfo').textContent = player.mount !== "无" ? "🐴 " + mount.name : "";
        
        // 更新位置显示 - 城市+地点
        document.getElementById('locationCity').textContent = player.location;

    // 按类型分组地点
    function groupPlacesByType(places) {
        var groups = {
            "宫廷": [], "官府": [], "军事": [], "坊市": [], "风景": [], "码头": [], "其他": []
        };
        for (var p in places) {
            var place = places[p];
            var type = place.type || "其他";
            if (!groups[type]) groups[type] = [];
            groups[type].push({ name: p, place: place });
        }
        return groups;
    }

    function travel(destination) {
        if (player.rations <= 0) {
            log("【移动】没有干粮，无法出行！", "combat");
            return;
        }
        
        var destLoc = LOCATIONS[destination];
        if (!destLoc) {
            log("【移动】未知目的地！", "combat");
            return;
        }
        
        // 关闭面板
        closeMove();
        
        // 显示动画
        var overlay = document.getElementById('travelOverlay');
        var travelIcon = document.getElementById('travelIcon');
        var travelText = document.getElementById('travelText');
        var travelSub = document.getElementById('travelSub');
        
        // 根据交通工具选择图标
        var mount = MOUNTS[player.mount];
        if (player.mount === "快船" || destLoc.road === "水路") {
            travelIcon.textContent = "⛵";
        } else if (player.mount !== "无") {
            travelIcon.textContent = "🐴";
        } else {
            travelIcon.textContent = "🚶";
        }
        
        travelText.textContent = "前往 " + destination + " ...";
        travelSub.textContent = destLoc.road + " · 预计消耗干粮1份";
        
        overlay.classList.add('active');
        
        // 计算旅途时间
        var baseTime = destLoc.road === "水路" ? 0.8 : (destLoc.road === "官道" ? 1 : 1.5);
        var travelTime = baseTime / mount.speedMod;
        
        // 消耗干粮
        if (player.rations < 1) {
            log("【移动】干粮不足！需要1份，只剩" + player.rations + "份", "combat");
            overlay.classList.remove('active');
            return;
        }
        
        player.rations -= 1;
        
        // 随机事件（旅途中）
        if (Math.random() < 0.3) {
            travelSub.textContent = "路途中遇到意外...";
            setTimeout(function() {
                randomEvent();
            }, 1000);
        }
        
        // 到达
        setTimeout(function() {
            overlay.classList.remove('active');
            
            player.location = destination;
            player.currentPlace = getCityEntryPlaceName(destLoc.type);
            
            var entryPlace = player.currentPlace;
            
            if (player.discovered.indexOf(destination) === -1) {
                player.discovered.push(destination);
                player.fame += 2;
                log("【发现】首次到达" + destination + "！名望+2", "success");
            }
            
            log("【城际移动】历经艰辛，你终于抵达了" + destination, "item");
            log(destLoc.envDesc || destLoc.desc, "normal");
            log("📍 " + destination + " · " + entryPlace, "system");
            
            // 消耗时间
            advanceTime(travelTime);
            updateUI();
            
            // 显示城门交互提示
            if (destLoc.nearby && destLoc.nearby.length > 0) {
                log("输入 <span class='cmd'>出城</span> 可前往: " + destLoc.nearby.join("、"), "system");
            }
            
        }, 2000);
    }

    // ==================== 商贸系统 ====================
    function openTrade() {
        var loc = LOCATIONS[player.location];
        var hub = TRADE_HUBS[player.location];
        
        if (!hub) {
            log("【商贸】此地无市场！", "system");
            return;
        }
        
        var mount = MOUNTS[player.mount];
        var maxLoad = mount ? mount.capacity : 10;
        var currentLoad = calculateCurrentLoad();
        
        document.getElementById('tradeInfo').innerHTML = 
            '<div style="color:#8a7a6a;font-size:0.8rem;text-align:center;padding:8px;background:#1a1520;border-radius:6px;">' +
            '📦 载重：' + currentLoad + '/' + maxLoad + ' | 💰 银两：' + player.silver + '银' +
            '</div>';
        
        var html = '<div style="margin-bottom:10px;"><span style="color:#9ab87a;">特产物美价廉：</span><span style="color:#d4af37;">【' + hub.specialty + '】</span></div>';
        
        // 出售按钮
        for (var goods in player.goods) {
            if (player.goods[goods] > 0) {
                var price = calculateGoodsPrice(goods, 'sell');
                html += '<div class="item-row">';
                html += '<span style="color:#c4b49c;">' + goods + ' ×' + player.goods[goods] + '</span>';
                html += '<button onclick="sellGoods(\'' + goods + '\')" style="padding:4px 10px;background:#8b4513;color:#d4af37;border:none;border-radius:4px;cursor:pointer;">卖 ' + price + '银</button>';
                html += '</div>';
            }
        }
        
        if (!player.goods || Object.keys(player.goods).length === 0) {
            html += '<div style="color:#8a7a6a;text-align:center;padding:20px;">暂无货物可售</div>';
        }
        
        // 购买输入
        html += '<div style="margin-top:15px;padding-top:15px;border-top:1px solid #2a1a10;">';
        html += '<div style="color:#7a9acd;font-size:0.8rem;margin-bottom:8px;">购买货物：</div>';
        html += '<div style="display:flex;gap:6px;">';
        html += '<select id="buyGoodsSelect" style="flex:1;padding:8px;background:#1a1520;color:#c4b49c;border:1px solid #3a2a1a;border-radius:4px;">';
        for (var g in GOODS) {
            html += '<option value="' + g + '">' + g + ' (' + GOODS[g].basePrice + '银)</option>';
        }
        html += '</select>';
        html += '<input type="number" id="buyGoodsNum" value="1" min="1" style="width:60px;padding:8px;background:#1a1520;color:#c4b49c;border:1px solid #3a2a1a;border-radius:4px;">';
        html += '<button onclick="buyGoods()" style="padding:8px 12px;background:#4a6a4a;color:#d4af37;border:none;border-radius:4px;cursor:pointer;">买</button>';
        html += '</div></div>';
        
        document.getElementById('tradeItems').innerHTML = html;
        
        document.getElementById('mainPanel').style.display = 'none';
        document.getElementById('tradePanel').style.display = 'block';
    }
    
    function calculateCurrentLoad() {
        var load = 0;
        for (var g in player.goods) {
            if (GOODS[g]) {
                load += player.goods[g] * GOODS[g].weight;
            }
        }
        return load;
    }
    
    function calculateGoodsPrice(goods, type) {
        var hub = TRADE_HUBS[player.location];
        var base = GOODS[goods].basePrice;
        
        if (!hub) return base;
        
        if (type === 'sell') {
            // 卖货：特产贵，需求货便宜
            if (hub.specialty === goods) {
                return Math.round(base * hub.priceBonus);
            } else if (hub.demand === goods) {
                return Math.round(base / hub.priceBonus);
            }
        }
        return base;
    }
    
    function sellGoods(goods) {
        if (!player.goods[goods] || player.goods[goods] <= 0) {
            log("【商贸】没有" + goods + "可卖！", "system");
            return;
        }
        
        var price = calculateGoodsPrice(goods, 'sell');
        player.goods[goods] -= 1;
        player.silver += price;
        
        if (player.goods[goods] <= 0) {
            delete player.goods[goods];
        }
        
        log("【商贸】出售【" + goods + "】×1，获得" + price + "银两", "success");
        
        updateUI();
        openTrade();
    }
    
    function buyGoods() {
        var select = document.getElementById('buyGoodsSelect');
        var numInput = document.getElementById('buyGoodsNum');
        var goods = select.value;
        var num = parseInt(numInput.value) || 1;
        
        if (num <= 0) {
            log("【商贸】数量必须大于0！", "system");
            return;
        }
        
        var hub = TRADE_HUBS[player.location];
        var basePrice = GOODS[goods].basePrice;
        var priceMod = hub && hub.specialty === goods ? 1/hub.priceBonus : (hub && hub.demand === goods ? hub.priceBonus : 1);
        var buyPrice = Math.round(basePrice * priceMod) * num;
        
        if (player.silver < buyPrice) {
            log("【商贸】银两不足！需要" + buyPrice + "银。", "combat");
            log("您现有：" + player.silver + "银", "item");
            return;
        }
        
        var load = calculateCurrentLoad();
        var mount = MOUNTS[player.mount];
        var maxLoad = mount ? mount.capacity : 10;
        var weight = GOODS[goods].weight * num;
        
        if (load + weight > maxLoad) {
            log("【商贸】载重不足！当前载重：" + load + "/" + maxLoad, "combat");
            log("可购买" + Math.floor((maxLoad - load) / GOODS[goods].weight) + "个「" + goods + "」", "item");
            return;
        }
        
        player.silver -= buyPrice;
        player.goods[goods] = (player.goods[goods] || 0) + num;
        
        log("【商贸】购买【" + goods + "】×" + num + "，花费" + buyPrice + "银两", "success");
        log("📦 持有：" + goods + " ×" + player.goods[goods] + " | 💰 银两：" + player.silver, "item");
        
        updateUI();
        openTrade();
    }

    function handleCommand() {
        var input = document.getElementById('commandInput');
        var text = input.value.trim();
        if (!text) return;
        
        log("【指令】" + text, "normal");
        input.value = '';
        
        // 处理命令
        if (text === "状态" || text === "status") {
            openStatus();
        }
        else if (text === "背包" || text === "inventory") {
            openInventory();
        }
        else if (text === "地图" || text === "map") {
            openMap();
        }
        else if (text === "移动" || text === "travel" || text === "城") {
            openMove();
        }
        else if (text === "出城") {
            showDestinations();
        }
        // 处理 go 城市名 格式
        else if (text.indexOf("go ") === 0 || text.indexOf("前往 ") === 0 || text.indexOf("去 ") === 0) {
            var dest = text.replace(/^(go |前往 |去 )/, "");
            if (LOCATIONS[dest]) {
                travel(dest);
            } else {
                log("【指令】未知的城市：" + dest, "combat");
            }
        }
        else if (text === "商贸" || text === "trade") {
            openTrade();
        }
        else if (text === "客栈" || text === "inn" || text === "住店") {
            openInn();
        }
        else if (text === "普" || text === "普通" || text === "普通间") {
            restAtInn("normal");
        }
        else if (text === "好" || text === "好房间" || text === "上房") {
            restAtInn("good");
        }
        else if (text === "休息" || text === "大堂") {
            restAtInn("free");
        }
        else {
            // 问答系统
            handleQA(text);
        }
    }
    
    function handleQA(text) {
        var weather = WEATHER_TYPES[player.weather];
        var mount = MOUNTS[player.mount];
        var loc = LOCATIONS[player.location];
        
        // 商旅相关关键词
        if (text.indexOf("道路") !== -1 || text.indexOf("路况") !== -1 || text.indexOf("路") !== -1) {
            if (loc.nearby && loc.nearby.length > 0) {
                var roadInfoList = [];
                loc.nearby.forEach(function(city) {
                    var key1 = player.location + "-" + city;
                    var key2 = city + "-" + player.location;
                    var roadInfo = player.roadIntel[key1] || player.roadIntel[key2];

                        var statusData = ROAD_STATUS[roadInfo.status] || ROAD_STATUS["崎岖"];
                        roadInfoList.push(statusData.icon + city + "：" + roadInfo.status);
                    } else {
                        roadInfoList.push("❓" + city + "：尚未探明");
                    }
                });
                log("【问答】" + player.location + "周边道路：" + roadInfoList.join(" | "), "item");

                log("【问答】此地偏远，无相邻道路。", "system");
            }

            "董卓": "董卓残暴不仁，烧杀抢掠，商旅视为畏途，非必要切勿前往！",
            "自己": "您乃" + player.role + "，孑然一身，商旅四方。",
            "这里": "此地乃" + player.location + "，" + loc.desc + "。道路为【" + (loc.road || "官道") + "】。",
            "天气": weather.icon + " " + weather.name + "，" + weather.desc + "。行军速度：" + Math.round(weather.speedMod * 100) + "%。",

    function calculateGoodsValue() {
        var value = 0;
        for (var g in player.goods) {
            if (GOODS[g]) {
                value += player.goods[g] * GOODS[g].basePrice;
            }
        }
        return value;
    }

            { text: "商队路过", action: "merchant" },

        var r = events[Math.floor(Math.random() * events.length)];
        
        if (r.action === "beggar") {

                player.rations -= 5;
                player.fame += 3;
                log("【事件】施舍流民5份干粮，名望+3", "success");
            } else if (player.silver >= 5) {
                player.silver -= 5;
                player.fame += 2;
                log("【事件】施舍流民5银两，名望+2", "success");
            } else {
                log("【事件】遇到流民请求施舍，但您囊中羞涩...", "system");
            }
        } else if (r.action === "trace") {
            log("【事件】前方可能有贼人，小心！", "system");
        } else if (r.action === "deserter") {
            log("【事件】遇到逃兵，您策马扬鞭，逃兵望尘莫及...", "system");
        }
    }
    
    // ==================== 任务系统 ====================
    function assignQuest() {
        player.quest = { title: "初入阵营", desc: "了解当前局势", target: "init" };
    }
    
    function checkQuest(type) {
        if (type === "city" && player.quest && player.quest.target === "init") {
            player.quest = { title: "探索四方", desc: "探索至少3座城池", target: "explore3" };
            log("【任务更新】" + player.quest.title, "important");
        }
        
        if (player.quest && player.quest.target === "explore3") {
            if (player.discovered.length >= 3) {
                player.fame += 20;
                log("★ 任务完成！名望+20", "success");
                player.quest = { title: "积累名望", desc: "名望达到50", target: "fame50" };
            }
        }
    }
    
    // ==================== 时间系统 ====================
    function advanceTime(days) {
        days = days || 1;
        var yearChanged = false;
        for (var i = 0; i < days; i++) {
            player.day++;
            
            var daysInMonth = [29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30];
            var maxDay = daysInMonth[player.month - 1];
            
            if (player.day > maxDay) {
                player.day = 1;
                player.month++;
                
                if (player.month > 12) {
                    player.month = 1;
                    player.year++;
                    yearChanged = true;
                    log("【系统】公元" + player.year + "年到了！", "system");
                }
                
                if (Math.random() > 0.5) {
                    updateWeather();
                }
            }
        }
        
        // 新年时检查历史事件
        if (yearChanged) {
            checkHistoricalEvents();
        }
    }
    </script>
