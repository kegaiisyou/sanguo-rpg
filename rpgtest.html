<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG测试 - 少年侠客闯江湖 v0.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 游戏容器 */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部状态栏 */
        #status-bar {
            height: 60px;
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-bottom: 2px solid #4a4a6a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-bar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .status-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .hp-fill { background: linear-gradient(90deg, #ff4757, #ff6b81); }
        .mp-fill { background: linear-gradient(90deg, #3742fa, #5352ed); }
        .exp-fill { background: linear-gradient(90deg, #2ed573, #7bed9f); }
        
        /* 游戏场景区域 */
        #game-world {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #2d2d44;
        }
        
        /* 地图容器 */
        #map {
            position: absolute;
            width: 2000px;
            height: 1500px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150"><rect fill="%231a1a2e" width="200" height="150"/><circle cx="30" cy="40" r="15" fill="%23333"/><circle cx="100" cy="80" r="20" fill="%232d2d44"/><rect x="150" y="100" width="30" height="30" fill="%234a4a6a"/></svg>');
            background-size: cover;
        }
        
        /* 场景区域 */
        .scene {
            position: absolute;
            border: 2px dashed #4a4a6a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .scene:hover {
            border-color: #ffa502;
            box-shadow: 0 0 20px rgba(255, 165, 2, 0.3);
        }
        
        .scene-label {
            color: #ffa502;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
        
        /* 玩家角色 */
        #player {
            position: absolute;
            width: 60px;
            height: 80px;
            transition: all 0.15s;
            z-index: 100;
        }
        
        #player img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }
        
        /* 角色动画 */
        .walking {
            animation: walk 0.3s steps(2) infinite;
        }
        
        @keyframes walk {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        
        /* 方向指示 */
        .facing-down { transform: scaleY(1); }
        .facing-up { transform: scaleY(1); }
        .facing-left { transform: scaleX(-1); }
        .facing-right { transform: scaleX(1); }
        
        /* 碰撞区域 */
        .obstacle {
            position: absolute;
            background: rgba(255, 71, 87, 0.3);
            border: 2px solid #ff4757;
            border-radius: 4px;
        }
        
        /* NPC */
        .npc {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .npc:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px #ffa502);
        }
        
        .npc img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 底部提示栏 */
        #hint-bar {
            height: 50px;
            background: linear-gradient(0deg, #2d2d44 0%, #1a1a2e 100%);
            border-top: 2px solid #4a4a6a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            color: #888;
        }
        
        /* 交互提示 */
        #interaction-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d44;
            border: 2px solid #ffa502;
            border-radius: 12px;
            padding: 20px 30px;
            display: none;
            z-index: 1000;
            text-align: center;
            min-width: 300px;
        }
        
        #interaction-popup h3 {
            color: #ffa502;
            margin-bottom: 10px;
        }
        
        #interaction-popup p {
            margin-bottom: 15px;
            color: #ccc;
        }
        
        .popup-btn {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s;
        }
        
        .popup-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 165, 2, 0.5);
        }
        
        /* 小地图 */
        #minimap {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 150px;
            height: 100px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #minimap-viewport {
            position: absolute;
            border: 2px solid #ffa502;
            background: rgba(255, 165, 2, 0.1);
        }
        
        #minimap-player {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff4757;
            border-radius: 50%;
        }
        
        /* 键盘提示 */
        #key-hints {
            position: fixed;
            bottom: 70px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .key {
            display: inline-block;
            background: #4a4a6a;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 3px;
            color: #ffa502;
        }
        
        /* 加载界面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        #loading-screen h1 {
            color: #ffa502;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        #loading-bar {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        #loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffa502, #ff6348);
            width: 0%;
            transition: width 0.3s;
        }
        
        /* 闪屏效果 */
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1500;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        .flash-active {
            animation: flash 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading-screen">
        <h1>⚔️ 少年侠客闯江湖</h1>
        <p>正在加载游戏资源...</p>
        <div id="loading-bar">
            <div id="loading-progress"></div>
        </div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="game-container" style="display: none;">
        <!-- 顶部状态栏 -->
        <div id="status-bar">
            <div class="status-item">
                <span>🗡️</span>
                <span id="player-name">少年侠客</span>
            </div>
            <div class="status-item">
                <span>❤️ 生命</span>
                <div class="status-bar">
                    <div class="status-bar-fill hp-fill" id="hp-bar" style="width: 100%"></div>
                </div>
                <span id="hp-text">100/100</span>
            </div>
            <div class="status-item">
                <span>💧 内力</span>
                <div class="status-bar">
                    <div class="status-bar-fill mp-fill" id="mp-bar" style="width: 100%"></div>
                </div>
                <span id="mp-text">50/50</span>
            </div>
            <div class="status-item">
                <span>⭐ 经验</span>
                <div class="status-bar">
                    <div class="status-bar-fill exp-fill" id="exp-bar" style="width: 0%"></div>
                </div>
                <span id="exp-text">0/100</span>
            </div>
            <div class="status-item">
                <span>📍 位置</span>
                <span id="current-scene">客栈门口</span>
            </div>
            <div class="status-item">
                <span>🕐</span>
                <span id="game-time">第1天 清晨</span>
            </div>
        </div>
        
        <!-- 游戏世界 -->
        <div id="game-world">
            <div id="map">
                <!-- 场景区域 -->
                <div class="scene" id="scene-inn" style="left: 400px; top: 300px; width: 200px; height: 150px;">
                    <div class="scene-label">🏨 客栈<br><small>休息恢复</small></div>
                </div>
                
                <div class="scene" id="scene-dojo" style="left: 800px; top: 200px; width: 250px; height: 200px;">
                    <div class="scene-label">⚔️ 武馆<br><small>学习技能</small></div>
                </div>
                
                <div class="scene" id="scene-market" style="left: 200px; top: 500px; width: 300px; height: 200px;">
                    <div class="scene-label">🏮 集市<br><small>购买物品</small></div>
                </div>
                
                <div class="scene" id="scene-forest" style="left: 600px; top: 600px; width: 400px; height: 300px;">
                    <div class="scene-label">🌲 山林<br><small>探险战斗</small></div>
                </div>
                
                <div class="scene" id="scene-temple" style="left: 1100px; top: 500px; width: 200px; height: 250px;">
                    <div class="scene-label">🏯 寺庙<br><small>祈求平安</small></div>
                </div>
                
                <div class="scene" id="scene-village" style="left: 100px; top: 150px; width: 200px; height: 150px;">
                    <div class="scene-label">🏠 村庄<br><small>起始地点</small></div>
                </div>
                
                <!-- NPC -->
                <div class="npc" id="npc-elder" style="left: 150px; top: 200px; width: 50px; height: 70px;">
                    <span style="font-size: 30px;">👴</span>
                </div>
                
                <div class="npc" id="npc-merchant" style="left: 300px; top: 550px; width: 50px; height: 70px;">
                    <span style="font-size: 30px;">💰</span>
                </div>
                
                <div class="npc" id="npc-master" style="left: 900px; top: 280px; width: 50px; height: 70px;">
                    <span style="font-size: 30px;">🧙</span>
                </div>
                
                <!-- 障碍物 -->
                <div class="obstacle" style="left: 350px; top: 480px; width: 100px; height: 50px;"></div>
                <div class="obstacle" style="left: 550px; top: 350px; width: 80px; height: 80px;"></div>
                
                <!-- 玩家 -->
                <div id="player">
                    <!-- 如果有图片资源，取消下面注释 -->
                    <!-- <img src="player.png" alt="玩家"> -->
                    
                    <!-- 临时使用CSS绘制的角色 -->
                    <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- 身体 -->
                        <rect x="15" y="35" width="30" height="35" rx="5" fill="#4a4a6a"/>
                        <!-- 头部 -->
                        <circle cx="30" cy="20" r="18" fill="#f5deb3"/>
                        <!-- 头发 -->
                        <path d="M12 20 Q15 5 30 5 Q45 5 48 20 Q45 15 30 15 Q15 15 12 20" fill="#2d2d44"/>
                        <!-- 发带 -->
                        <rect x="10" y="12" width="40" height="4" fill="#ff4757"/>
                        <!-- 眼睛 -->
                        <circle cx="24" cy="20" r="2" fill="#2d2d44"/>
                        <circle cx="36" cy="20" r="2" fill="#2d2d44"/>
                        <!-- 嘴巴 -->
                        <path d="M26 28 Q30 30 34 28" stroke="#c97c5d" stroke-width="2" fill="none"/>
                        <!-- 剑 -->
                        <rect x="48" y="30" width="4" height="35" fill="#888"/>
                        <rect x="46" y="28" width="8" height="6" fill="#ffa502"/>
                        <!-- 剑穗 -->
                        <path d="M50 65 Q55 75 50 80" stroke="#ff4757" stroke-width="2" fill="none"/>
                        <!-- 腰带 -->
                        <rect x="13" y="50" width="34" height="5" fill="#ffa502"/>
                        <!-- 靴子 -->
                        <rect x="18" y="68" width="10" height="10" rx="2" fill="#2d2d44"/>
                        <rect x="32" y="68" width="10" height="10" rx="2" fill="#2d2d44"/>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- 小地图 -->
        <div id="minimap">
            <div id="minimap-viewport" style="left: 0; top: 0; width: 50px; height: 40px;"></div>
            <div id="minimap-player" style="left: 0; top: 0;"></div>
        </div>
        
        <!-- 键盘提示 -->
        <div id="key-hints">
            <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动
            <span class="key">E</span> 交互
            <span class="key">M</span> 菜单
        </div>
        
        <!-- 底部提示 -->
        <div id="hint-bar">
            <span id="hint-text">按 W/A/S/D 移动，靠近NPC按 E 交互</span>
        </div>
        
        <!-- 交互弹窗 -->
        <div id="interaction-popup">
            <h3 id="popup-title">标题</h3>
            <p id="popup-content">内容</p>
            <div id="popup-buttons"></div>
        </div>
        
        <!-- 闪屏效果 -->
        <div class="screen-flash" id="screen-flash"></div>
    </div>
    
    <script>
        // ==================== 游戏状态 ====================
        const GameState = {
            player: {
                x: 200,
                y: 200,
                speed: 5,
                facing: 'down',
                hp: 100,
                maxHp: 100,
                mp: 50,
                maxMp: 50,
                exp: 0,
                maxExp: 100,
                level: 1,
                name: '少年侠客'
            },
            map: {
                width: 2000,
                height: 1500
            },
            camera: {
                x: 0,
                y: 0
            },
            time: {
                day: 1,
                period: '清晨' // 清晨, 上午, 中午, 下午, 傍晚, 夜晚
            },
            scenePositions: {
                'inn': { x: 400, y: 300, w: 200, h: 150, name: '客栈' },
                'dojo': { x: 800, y: 200, w: 250, h: 200, name: '武馆' },
                'market': { x: 200, y: 500, w: 300, h: 200, name: '集市' },
                'forest': { x: 600, y: 600, w: 400, h: 300, name: '山林' },
                'temple': { x: 1100, y: 500, w: 200, h: 250, name: '寺庙' },
                'village': { x: 100, y: 150, w: 200, h: 150, name: '村庄' }
            },
            npcPositions: {
                'elder': { x: 150, y: 200, name: '村长', dialogue: '少年，你肩负着拯救村子的使命...' },
                'merchant': { x: 300, y: 550, name: '商人', dialogue: '要买点东西吗？这里有各种道具。' },
                'master': { x: 900, y: 280, name: '师父', dialogue: '想学武艺？先打好基本功再说。' }
            }
        };
        
        // ==================== 游戏核心 ====================
        class Game {
            constructor() {
                this.keys = {};
                this.isMoving = false;
                this.nearbyNPC = null;
                this.currentScene = null;
                this.init();
            }
            
            init() {
                // 加载游戏
                this.loadGame();
                
                // 绑定事件
                this.bindEvents();
                
                // 开始游戏循环
                this.startGameLoop();
                
                // 加载完毕后隐藏加载界面
                setTimeout(() => {
                    this.hideLoadingScreen();
                }, 1500);
            }
            
            loadGame() {
                // 模拟加载进度
                const loadingProgress = document.getElementById('loading-progress');
                let progress = 0;
                const loadInterval = setInterval(() => {
                    progress += Math.random() * 30;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(loadInterval);
                    }
                    loadingProgress.style.width = progress + '%';
                }, 200);
            }
            
            hideLoadingScreen() {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                
                // 初始化玩家位置
                this.updatePlayerPosition();
            }
            
            bindEvents() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    
                    // 交互键
                    if (e.key.toLowerCase() === 'e' && this.nearbyNPC) {
                        this.interactWithNPC(this.nearbyNPC);
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
                
                // 场景点击
                document.querySelectorAll('.scene').forEach(scene => {
                    scene.addEventListener('click', () => {
                        const sceneId = scene.id.replace('scene-', '');
                        this.enterScene(sceneId);
                    });
                });
                
                // NPC点击
                document.querySelectorAll('.npc').forEach(npc => {
                    npc.addEventListener('click', () => {
                        const npcId = npc.id.replace('npc-', '');
                        this.interactWithNPC(npcId);
                    });
                });
            }
            
            startGameLoop() {
                const gameLoop = () => {
                    this.handleMovement();
                    this.checkNearbyNPCs();
                    this.updateCamera();
                    this.updateUI();
                    requestAnimationFrame(gameLoop);
                };
                requestAnimationFrame(gameLoop);
            }
            
            handleMovement() {
                const player = GameState.player;
                const playerEl = document.getElementById('player');
                let dx = 0, dy = 0;
                
                if (this.keys['w'] || this.keys['arrowup']) {
                    dy = -player.speed;
                    player.facing = 'up';
                }
                if (this.keys['s'] || this.keys['arrowdown']) {
                    dy = player.speed;
                    player.facing = 'down';
                }
                if (this.keys['a'] || this.keys['arrowleft']) {
                    dx = -player.speed;
                    player.facing = 'left';
                }
                if (this.keys['d'] || this.keys['arrowright']) {
                    dx = player.speed;
                    player.facing = 'right';
                }
                
                // 边界检测
                const newX = Math.max(0, Math.min(GameState.map.width - 60, player.x + dx));
                const newY = Math.max(0, Math.min(GameState.map.height - 80, player.y + dy));
                
                // 更新位置
                if (dx !== 0 || dy !== 0) {
                    player.x = newX;
                    player.y = newY;
                    playerEl.classList.add('walking');
                    this.isMoving = true;
                } else {
                    playerEl.classList.remove('walking');
                    this.isMoving = false;
                }
                
                // 更新方向
                playerEl.className = '';
                playerEl.classList.add(player.facing === 'left' ? 'facing-left' : 
                                       player.facing === 'right' ? 'facing-right' : '');
                if (this.isMoving) {
                    playerEl.classList.add('walking');
                }
                
                this.updatePlayerPosition();
            }
            
            updatePlayerPosition() {
                const player = GameState.player;
                const playerEl = document.getElementById('player');
                playerEl.style.left = player.x + 'px';
                playerEl.style.top = player.y + 'px';
                
                // 更新小地图
                this.updateMinimap();
                
                // 更新当前位置
                this.updateCurrentScene();
            }
            
            updateCamera() {
                const player = GameState.player;
                const world = document.getElementById('game-world');
                const map = document.getElementById('map');
                const viewWidth = world.clientWidth;
                const viewHeight = world.clientHeight;
                
                // 计算相机位置（玩家在屏幕中心）
                let camX = player.x - viewWidth / 2 + 30;
                let camY = player.y - viewHeight / 2 + 40;
                
                // 边界限制
                camX = Math.max(0, Math.min(GameState.map.width - viewWidth, camX));
                camY = Math.max(0, Math.min(GameState.map.height - viewHeight, camY));
                
                map.style.transform = `translate(${-camX}px, ${-camY}px)`;
                
                // 更新小地图视角
                const minimapViewport = document.getElementById('minimap-viewport');
                const minimapPlayer = document.getElementById('minimap-player');
                
                const mapScaleX = 150 / GameState.map.width;
                const mapScaleY = 100 / GameState.map.height;
                
                minimapViewport.style.left = (camX * mapScaleX) + 'px';
                minimapViewport.style.top = (camY * mapScaleY) + 'px';
                minimapViewport.style.width = (viewWidth * mapScaleX) + 'px';
                minimapViewport.style.height = (viewHeight * mapScaleY) + 'px';
                
                minimapPlayer.style.left = (player.x * mapScaleX) + 'px';
                minimapPlayer.style.top = (player.y * mapScaleY) + 'px';
            }
            
            updateMinimap() {
                // 已在 updateCamera 中更新
            }
            
            checkNearbyNPCs() {
                const player = GameState.player;
                let foundNPC = null;
                
                for (const [npcId, npcData] of Object.entries(GameState.npcPositions)) {
                    const dist = Math.hypot(player.x - npcData.x, player.y - npcData.y);
                    if (dist < 80) {
                        foundNPC = npcId;
                        break;
                    }
                }
                
                if (foundNPC !== this.nearbyNPC) {
                    this.nearbyNPC = foundNPC;
                    this.updateHint();
                }
            }
            
            updateHint() {
                const hintEl = document.getElementById('hint-text');
                if (this.nearbyNPC) {
                    const npcData = GameState.npcPositions[this.nearbyNPC];
                    hintEl.textContent = `靠近 ${npcData.name}，按 E 键对话`;
                } else if (this.currentScene) {
                    hintEl.textContent = `已进入 ${GameState.scenePositions[this.currentScene]?.name || '未知区域'}，点击查看详情`;
                } else {
                    hintEl.textContent = '按 W/A/S/D 移动，靠近NPC按 E 交互';
                }
            }
            
            updateCurrentScene() {
                const player = GameState.player;
                let inScene = null;
                
                for (const [sceneId, sceneData] of Object.entries(GameState.scenePositions)) {
                    if (player.x >= sceneData.x && player.x <= sceneData.x + sceneData.w &&
                        player.y >= sceneData.y && player.y <= sceneData.y + sceneData.h) {
                        inScene = sceneId;
                        break;
                    }
                }
                
                if (inScene !== this.currentScene) {
                    this.currentScene = inScene;
                    document.getElementById('current-scene').textContent = 
                        inScene ? GameState.scenePositions[inScene].name : '野外';
                    this.updateHint();
                }
            }
            
            interactWithNPC(npcId) {
                const npcData = GameState.npcPositions[npcId];
                if (!npcData) return;
                
                this.showPopup(npcData.name, npcData.dialogue, [
                    { text: '对话', action: () => this.talkToNPC(npcId) },
                    { text: '离开', action: () => this.closePopup() }
                ]);
            }
            
            talkToNPC(npcId) {
                const npcData = GameState.npcPositions[npcId];
                this.showPopup(npcData.name, npcData.dialogue + '\n\n[对话内容待扩展]', [
                    { text: '继续交谈', action: () => this.closePopup() },
                    { text: '离开', action: () => this.closePopup() }
                ]);
            }
            
            enterScene(sceneId) {
                const sceneData = GameState.scenePositions[sceneId];
                if (!sceneData) return;
                
                this.showPopup(sceneData.name, `你来到了${sceneData.name}，这里可以进行各种活动。`, [
                    { text: '探索', action: () => {
                        this.showFlash();
                        this.closePopup();
                    }},
                    { text: '离开', action: () => this.closePopup() }
                ]);
            }
            
            showPopup(title, content, buttons) {
                const popup = document.getElementById('interaction-popup');
                document.getElementById('popup-title').textContent = title;
                document.getElementById('popup-content').textContent = content;
                
                const btnContainer = document.getElementById('popup-buttons');
                btnContainer.innerHTML = '';
                
                buttons.forEach(btn => {
                    const button = document.createElement('button');
                    button.className = 'popup-btn';
                    button.textContent = btn.text;
                    button.onclick = btn.action;
                    btnContainer.appendChild(button);
                });
                
                popup.style.display = 'block';
            }
            
            closePopup() {
                document.getElementById('interaction-popup').style.display = 'none';
            }
            
            showFlash() {
                const flash = document.getElementById('screen-flash');
                flash.classList.remove('flash-active');
                void flash.offsetWidth; // 触发重绘
                flash.classList.add('flash-active');
            }
            
            updateUI() {
                const player = GameState.player;
                
                // 更新状态条
                document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
                document.getElementById('hp-text').textContent = `${player.hp}/${player.maxHp}`;
                
                document.getElementById('mp-bar').style.width = (player.mp / player.maxMp * 100) + '%';
                document.getElementById('mp-text').textContent = `${player.mp}/${player.maxMp}`;
                
                document.getElementById('exp-bar').style.width = (player.exp / player.maxExp * 100) + '%';
                document.getElementById('exp-text').textContent = `${player.exp}/${player.maxExp}`;
                
                document.getElementById('game-time').textContent = `第${GameState.time.day}天 ${GameState.time.period}`;
            }
        }
        
        // 启动游戏
        const game = new Game();
        
        // ==================== 预留接口 ====================
        // 角色图片加载（未来替换SVG）
        function loadPlayerImage(url) {
            const playerEl = document.getElementById('player');
            playerEl.innerHTML = `<img src="${url}" alt="玩家">`;
        }
        
        // 设置玩家名称
        function setPlayerName(name) {
            GameState.player.name = name;
            document.getElementById('player-name').textContent = name;
        }
    </script>
</body>
</html>
