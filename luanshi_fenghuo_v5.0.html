<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乱世烽火 - 劳役营篇 v5.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--panel:#16213e;--card:#0f3460;--accent:#e94560;--text:#eaeaea;--dim:#8892a0;--green:#4ecca3;--gold:#d4af37;--danger:#c97a7a}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hidden{display:none!important}
.create-screen{padding:20px;overflow-y:auto;flex:1}
.create-title{text-align:center;font-size:22px;color:var(--gold);margin-bottom:8px}
.create-intro{text-align:center;color:var(--dim);font-size:12px;margin-bottom:20px;line-height:1.5}
.create-section{margin-bottom:14px}
.create-label{color:var(--green);font-size:12px;margin-bottom:8px}
.name-input{width:100%;padding:12px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px}
.name-input:focus{outline:none;border-color:var(--gold)}
.gender-select{display:flex;gap:10px}
.gender-btn{flex:1;padding:12px;background:var(--card);border:2px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);cursor:pointer;text-align:center;transition:all 0.2s}
.gender-btn.selected{border-color:var(--gold);background:rgba(212,175,55,0.15);color:var(--gold)}
.gender-btn .icon{font-size:22px;display:block;margin-bottom:4px}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#8b4513,#a0522d);border:2px solid var(--gold);border-radius:10px;color:var(--gold);font-size:14px;font-weight:bold;cursor:pointer;margin-top:10px}
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:750;padding:15px}
.dialog-overlay.show{display:flex}
.dialog-box{background:var(--panel);border:2px solid var(--gold);border-radius:12px;padding:16px;max-width:340px;width:100%;max-height:80vh;overflow-y:auto}
.dialog-title{color:var(--gold);font-size:14px;text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1)}
.dialog-content{color:var(--text);font-size:12px;line-height:1.6;margin-bottom:12px;white-space:pre-line}
.dialog-options{display:flex;flex-direction:column;gap:6px}
.dialog-btn{background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:var(--text);cursor:pointer;text-align:left;font-size:12px;transition:all 0.15s}
.dialog-btn:active{border-color:var(--gold);color:var(--gold)}
.dialog-btn.primary{background:linear-gradient(135deg,#8b4513,#a0522d);border-color:var(--gold);color:var(--gold);text-align:center}
.dialog-btn.danger{background:rgba(200,50,50,0.2);border-color:var(--danger);color:var(--danger)}
.log-important{color:var(--gold)}.log-success{color:var(--green)}.log-danger{color:var(--danger)}.log-narrative{color:var(--dim);font-style:italic}.log-action{color:var(--green)}.log-dialog{color:#a8b8c8}
.top{background:var(--panel);padding:10px 14px;display:flex;align-items:center;flex-shrink:0;gap:10px}
.top .title{font-weight:bold;color:var(--accent);font-size:13px;flex-shrink:0}
.top .time{flex:1;text-align:center;font-size:12px;color:var(--dim)}
.top .stats{display:flex;gap:10px;font-size:12px;flex-shrink:0}
.top .stats span{color:var(--green)}
.main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;gap:24px;position:relative}
.interact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:320px}
.card{background:var(--card);border-radius:14px;padding:20px 16px;text-align:center;cursor:pointer;transition:all 0.2s;border:2px solid transparent;min-width:80px}
.card:active{transform:scale(0.92);background:var(--accent)}
.card .icon{font-size:32px}.card .name{font-size:12px;margin-top:6px}.card .action{font-size:10px;color:var(--dim);margin-top:2px}
.escape-section{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);border-radius:10px;padding:12px;width:100%;max-width:320px}
.escape-btn{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--dim);font-size:13px;cursor:not-allowed}
.escape-btn.ready{border-color:var(--gold);color:var(--gold);cursor:pointer;animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(212,175,55,0.3)}50%{box-shadow:0 0 15px rgba(212,175,55,0.5)}}
.escape-conds{display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:11px}
.cond{color:var(--dim)}.cond.done{color:var(--green)}
.location-flash{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:600;opacity:0;pointer-events:none;transition:opacity 0.15s}
.location-flash.show{opacity:1;pointer-events:auto}
.location-flash .name{font-size:28px;font-weight:bold;color:white;margin-bottom:12px}
.location-flash .desc{font-size:14px;color:rgba(255,255,255,0.8);text-align:center;padding:0 30px;line-height:1.5}
.log{background:var(--panel);padding:12px 14px;flex-shrink:0;max-height:100px;overflow-y:auto}
.log-entry{font-size:12px;color:var(--dim);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.4}
.log-entry:last-child{border:none}
.log-entry .log-time{color:var(--accent);margin-right:8px}
.log-entry .log-text{color:var(--dim)}.log-entry .log-text.log-important{color:var(--gold)}.log-entry .log-text.log-success{color:var(--green)}.log-entry .log-text.log-danger{color:var(--danger)}.log-entry .log-text.log-narrative{color:var(--dim);font-style:italic}.log-entry .log-text.log-action{color:var(--green)}.log-entry .log-text.log-dialog{color:#a8b8c8}
.bottom{background:var(--panel);padding:10px 14px;display:flex;justify-content:space-around;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.05)}
.bottom button{background:var(--card);border:none;color:var(--text);padding:10px 16px;border-radius:10px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:60px;transition:all 0.15s}
.bottom button:active,.bottom button.active{background:var(--accent)}
.bottom button .icon{font-size:18px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:flex-end;z-index:700}
.modal.show{display:flex}
.modal-content{background:var(--panel);width:100%;max-height:70vh;border-radius:18px 18px 0 0;padding:18px;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal.show .modal-content{animation:slideUp 0.25s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.modal-header h3{font-size:15px;font-weight:bold}
.modal-close{background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer}
.map-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.map-cell{background:var(--card);border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;transition:all 0.15s;border:2px solid transparent}
.map-cell:active{transform:scale(0.95)}
.map-cell.current{border-color:var(--accent)}
.map-cell .icon{font-size:20px}.map-cell .name{font-size:11px;margin-top:4px}.map-cell .info{font-size:9px;color:var(--dim);margin-top:2px}
.state-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.state-cell{background:var(--card);border-radius:10px;padding:12px 6px;text-align:center}
.state-cell .icon{font-size:18px}.state-cell .val{font-size:16px;font-weight:bold;margin-top:4px}.state-cell .label{font-size:9px;color:var(--dim)}
.escape-progress{margin-bottom:16px}
.escape-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-bottom:8px}
.escape-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width 0.3s}
.escape-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.escape-tag{font-size:11px;padding:5px 12px;background:rgba(255,255,255,0.05);border-radius:20px}
.escape-tag.done{color:var(--green);background:rgba(78,204,163,0.15)}
.locked-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;justify-content:center;align-items:center;flex-direction:column;color:var(--danger);text-align:center;padding:20px}
.locked-overlay.active{display:flex}
.locked-icon{font-size:4rem;margin-bottom:20px}
.locked-title{font-size:1.5rem;margin-bottom:10px;color:var(--gold)}
.locked-text{font-size:0.9rem;line-height:1.8;color:var(--dim);margin-bottom:20px}
.locked-buttons{display:flex;flex-direction:column;gap:10px;margin-top:15px}
.locked-btn{background:rgba(200,50,50,0.2);border:2px solid var(--danger);border-radius:8px;padding:12px 24px;color:var(--danger);font-size:0.9rem;cursor:pointer}
.locked-btn-rest{background:rgba(78,204,163,0.2);border:2px solid var(--green);border-radius:8px;padding:12px 24px;color:var(--green);font-size:0.9rem;cursor:pointer}
.game-over{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:none;justify-content:center;align-items:center;flex-direction:column;text-align:center;padding:20px}
.game-over.active{display:flex}
.game-over-icon{font-size:5rem;margin-bottom:20px}
.game-over-title{font-size:1.8rem;color:var(--danger);margin-bottom:15px}
.game-over-subtitle{font-size:1rem;color:var(--dim);margin-bottom:20px}
.game-over-btn{background:var(--card);border:2px solid var(--gold);border-radius:8px;padding:12px 30px;color:var(--gold);font-size:1rem;cursor:pointer}
.intro-overlay{position:fixed;inset:0;background:#0a0a12;z-index:900;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center}
.intro-overlay.hidden{display:none}
.intro-scene{max-width:320px;margin-bottom:30px}
.intro-scene .scene-num{color:var(--gold);font-size:12px;margin-bottom:10px;letter-spacing:2px}
.intro-scene .scene-title{font-size:20px;color:var(--text);margin-bottom:15px}
.intro-scene .scene-text{color:var(--dim);font-size:13px;line-height:2}
.intro-nav{display:flex;gap:12px;margin-top:20px}
.intro-nav button{padding:12px 24px;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.2s}
.intro-nav .skip-btn{background:transparent;border:1px solid var(--dim);color:var(--dim)}
.intro-nav .next-btn{background:linear-gradient(135deg,#8b4513,#a0522d);border:1px solid var(--gold);color:var(--gold)}
.tutorial-box{background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(212,175,55,0.05));border:1px solid var(--gold);border-radius:10px;padding:14px;margin:10px 0;text-align:center}
.tutorial-box .tutorial-icon{font-size:28px;margin-bottom:8px}
.tutorial-box .tutorial-title{color:var(--gold);font-size:13px;font-weight:bold;margin-bottom:6px}
.tutorial-box .tutorial-desc{color:var(--dim);font-size:11px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

<!-- 序章开场 -->
<div class="intro-overlay" id="introOverlay">
  <div class="intro-scene" id="introScene"></div>
  <div class="intro-nav">
    <button class="skip-btn" onclick="skipIntro()">跳过</button>
    <button class="next-btn" onclick="nextIntro()" id="introNextBtn">继续 →</button>
  </div>
</div>

<!-- 创建角色 -->
<div id="createScreen" class="create-screen hidden">
  <h1 class="create-title">⚔️ 乱世烽火 ⚔️</h1>
  <p class="create-intro">公元180年，大汉幽州。<br>深秋，官道上的囚车缓缓前行...</p>
  <div class="create-section">
    <div class="create-label">📝 为自己取个名字</div>
    <input type="text" class="name-input" id="playerName" placeholder="输入你的名字" maxlength="6">
  </div>
  <div class="create-section">
    <div class="create-label">⚧ 选择性别</div>
    <div class="gender-select">
      <div class="gender-btn selected" onclick="selectGender('男')" id="genderMale"><span class="icon">👨</span>男</div>
      <div class="gender-btn" onclick="selectGender('女')" id="genderFemale"><span class="icon">👩</span>女</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">🚀 开始序章</button>
</div>

<!-- 游戏界面 -->
<div id="gameScreen" class="hidden">
<div class="top">
  <div class="title">🔥 乱世烽火</div>
  <div class="time" id="timeDisplay">06:00 清晨</div>
  <div class="stats">💪 <span id="stVal">80</span>% · 🍜 <span id="fdVal">70</span>% · 📅 第<span id="dayVal">1</span>天</div>
</div>
<div class="main">
  <div class="interact-grid" id="interactGrid"></div>
  <div class="escape-section" id="escapeSection">
    <button class="escape-btn" id="escBtn" onclick="tryEscape()">🚫 条件不足</button>
    <div class="escape-conds">
      <span class="cond" id="condRoute">❌ 路线</span>
      <span class="cond" id="condInfo">❌ 情报</span>
      <span class="cond" id="condTool">❌ 工具</span>
      <span class="cond" id="condStamina">❌ 体力</span>
    </div>
  </div>
</div>
<div class="log" id="logPanel"></div>
<div class="location-flash" id="locationFlash">
  <div class="name" id="flashName">牢房</div>
  <div class="desc" id="flashDesc">休息睡觉的地方</div>
</div>
<div class="bottom">
  <button onclick="showMap()" id="btnMap"><span class="icon">🗺️</span>地图</button>
  <button onclick="showState()" id="btnState"><span class="icon">📊</span>状态</button>
  <button onclick="showItems()" id="btnItems"><span class="icon">🎒</span>背包</button>
  <button onclick="showEscape()" id="btnEscape"><span class="icon">🚪</span>逃跑</button>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modal-title">标题</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box">
    <div class="dialog-title" id="dialogTitle"></div>
    <div class="dialog-content" id="dialogContent"></div>
    <div class="dialog-options" id="dialogOptions"></div>
  </div>
</div>
<div class="locked-overlay" id="lockedOverlay">
  <div class="locked-icon">🔒</div>
  <div class="locked-title">关禁闭</div>
  <div class="locked-text" id="lockedText">你被关进了暗无天日的禁闭室...</div>
  <div class="locked-buttons">
    <button class="locked-btn" onclick="waitInCell()">⏰ 熬过这段时间 (推进4小时)</button>
    <button class="locked-btn-rest" onclick="restInCell()">💤 好好休息 (推进8小时)</button>
  </div>
</div>
<div class="game-over" id="gameOver">
  <div class="game-over-icon" id="goIcon">💀</div>
  <div class="game-over-title" id="goTitle">游戏结束</div>
  <div class="game-over-subtitle" id="goSubtitle">...</div>
  <button class="game-over-btn" onclick="location.reload()">重新开始</button>
</div>
</div>

<script>
// ==================== 序章数据 ====================
const INTRO_SCENES=[
{num:'序章',title:'囚车之困',text:`深秋，幽州官道。

寒风卷着枯叶，
一辆囚车在泥泞中颠簸。

你睁开眼——
头痛欲裂，嘴里有血腥味。
手腕上的铁链已经磨破了皮。`},
{num:'',title:'同囚之人',text:`囚车里还有三个人：

👴 老王（五十多岁，老实巴交的农民）
👤 二愣子（二十岁，一脸茫然）
❓ 还有一个蜷缩在角落、用破布遮住脸的人...`},
{num:'Day 1',title:'抵达劳役营',text:`官差头目踢开囚车门：

「都给老子下来！
　能走的走，不能走的拖着走！」

破败的木栅栏围成的营地，
约两百名劳役，衣衫褴褛，
监工手持皮鞭来回巡视。`},
{num:'',title:'老王的忠告',text:`老王压低声音：

「小兄弟，你是哪里人？
　这里是涿郡劳役营，
　专门修官道的。

　逃跑的都被打死了，
　你可千万别乱来...」`}
];
let introIndex=0;

// ==================== 序章控制 ====================
function showIntro(){
  document.getElementById('introOverlay').classList.remove('hidden');
  updateIntroScene();
}
function updateIntroScene(){
  let s=INTRO_SCENES[introIndex];
  document.getElementById('introScene').innerHTML=`<div class="scene-num">${s.num}</div><div class="scene-title">${s.title}</div><div class="scene-text">${s.text.replace(/\n/g,'<br>')}</div>`;
  document.getElementById('introNextBtn').textContent=introIndex>=INTRO_SCENES.length-1?'开始 →':'继续 →';
}
function nextIntro(){
  introIndex++;
  if(introIndex>=INTRO_SCENES.length)skipIntro();
  else updateIntroScene();
}
function skipIntro(){
  document.getElementById('introOverlay').classList.add('hidden');
  document.getElementById('createScreen').classList.remove('hidden');
}

// ==================== 游戏数据 ====================
const LOCS={
  dorm:{n:'牢房',i:'🏠',d:'休息睡觉的地方',time:[22,23,0,1,2,3,4,5],tags:['rest'],enc:[
    {id:'lw',n:'老王',i:'👴',d:'五十多岁的老农',type:'npc',npcId:'lw'},
    {id:'el',n:'二愣子',i:'👤',d:'二十岁，一脸茫然',type:'npc',npcId:'el'},
    {id:'mk',n:'蒙面人',i:'❓',d:'蜷缩在角落的神秘人',type:'npc',npcId:'mk'}
  ]},
  yard:{n:'操场',i:'🌳',d:'放风、休息的地方',time:[11,12,13,19,20,21],tags:['rest'],enc:[
    {id:'gsd',n:'官差',i:'⚔️',d:'两个守卫在门口',type:'guard'},
    {id:'wl',n:'水井',i:'💧',d:'可以打水解渴',type:'rest'}
  ]},
  kitchen:{n:'厨房',i:'🍜',d:'偷食物的好地方',time:[11,12,17,18],tags:['steal'],enc:[
    {id:'ck',n:'胖厨子',i:'👨‍🍳',d:'脾气不好的伙夫',type:'npc',npcId:'ck'},
    {id:'fb',n:'食物桶',i:'🪣',d:'可能有剩饭剩菜',type:'steal'}
  ]},
  mine:{n:'矿区',i:'⛏️',d:'采矿的苦差事',time:[8,9,10,11,14,15,16,17],tags:['work'],enc:[
    {id:'wj',n:'王监工',i:'👮',d:'凶狠残忍的监工',type:'guard'},
    {id:'ct',n:'矿车',i:'🛒',d:'推矿车，累但安全',type:'work',stamina:22,name:'推矿车'},
    {id:'rk',n:'岩壁',i:'🪨',d:'凿石头，危险但快',type:'work',stamina:30,name:'凿石头',risk:0.15}
  ]},
  wood:{n:'伐木场',i:'🪓',d:'砍伐木材的地方',time:[8,9,10,11,14,15,16,17],tags:['work'],enc:[
    {id:'ls',n:'刘监工',i:'👮',d:'相对温和的监工',type:'guard'},
    {id:'tr',n:'大树',i:'🌲',d:'砍大树，体力活',type:'work',stamina:25,name:'砍大树'}
  ]},
  stable:{n:'马厩',i:'🐴',d:'喂养马匹的地方',time:[8,9,10,11,14,15,16,17,19,20,21],tags:['work'],enc:[
    {id:'hm',n:'老马夫',i:'👴',d:'不爱说话的老头',type:'npc',npcId:'hm'},
    {id:'hs',n:'马匹',i:'🐴',d:'喂马、遛马',type:'work',stamina:15,name:'喂马匹',bonus:5}
  ]},
  gate:{n:'营门',i:'🚪',d:'有士兵把守',time:[],tags:['forbidden'],locked:true,enc:[
    {id:'gs',n:'守门士兵',i:'⚔️',d:'两人把守，严密监视',type:'guard'}

// ==================== 工具函数 ====================
function getTimePeriod(h){
  if(h>=6&&h<8)return{icon:'🌅',text:'清晨',period:'morning'};
  if(h>=8&&h<12)return{icon:'🔥',text:'上午',period:'morning'};
  if(h>=12&&h<14)return{icon:'🍜',text:'中午',period:'noon'};
  if(h>=14&&h<18)return{icon:'🔥',text:'下午',period:'afternoon'};
  if(h>=18&&h<20)return{icon:'🌆',text:'傍晚',period:'evening'};
  if(h>=20&&h<23)return{icon:'🌙',text:'夜间',period:'night'};
  return{icon:'🌙',text:'深夜',period:'night'};
}
function isNight(){return G.hour>=20||G.hour<6;}
function canAccess(id){
  let loc=LOCS[id];
  if(G.locked&&id!=='dorm')return false;
  if(loc.locked)return false;
  if(loc.nightOnly&&!isNight())return false;
  if(id==='dorm')return true;
  if(isNight())return true;
  return loc.time.includes(G.hour);
}
function getEscapeStatus(){
  return{route:G.progress.route,info:G.progress.info,tool:G.inventory.includes('iron')||G.inventory.includes('rope'),stamina:G.stamina>=40};
}
function isEscapeReady(){
  const s=getEscapeStatus();
  return s.route&&s.info&&s.tool&&s.stamina;
}
function getNPCRelationLevel(t){
  if(t>=3)return 3;
  if(t>=2)return 2;
  if(t>=1)return 1;
  return 0;
}

// ==================== 对话系统 ====================
function showDialog(d){
  document.getElementById('dialogTitle').textContent=d.title||'';
  document.getElementById('dialogContent').innerHTML=d.content||'';
  document.getElementById('dialogOptions').innerHTML=d.options.map((o,i)=>
    `<button class="dialog-btn ${o.primary?'primary':''} ${o.danger?'danger':''}" onclick="doCb(${i})">${o.text}</button>`
  ).join('');
  window.dialogOpts=d.options;
  document.getElementById('dialogOverlay').classList.add('show');
}
function doCb(i){if(window.dialogOpts[i]&&window.dialogOpts[i].action)window.dialogOpts[i].action();}
function closeDialog(){
  document.getElementById('dialogOverlay').classList.remove('show');
  setTimeout(()=>{
    if(!document.getElementById('dialogOverlay').classList.contains('show')){
      document.getElementById('dialogTitle').textContent='';
      document.getElementById('dialogContent').innerHTML='';
      document.getElementById('dialogOptions').innerHTML='';
      window.dialogOpts=[];
    }
  },300);
}
function showModal(t,c,ch){
  document.getElementById('modal-title').textContent=t;
  let b=document.getElementById('modal-body');
  if(ch&&ch.length){
    b.innerHTML=c+'<div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">'+ch.map((c,i)=>`<button class="dialog-btn ${c.primary?'primary':''} ${c.danger?'danger':''}" onclick="modalCb(${i})">${c.text}</button>`).join('')+'</div>';
    window.modalCbs=ch;
  }else b.innerHTML=c;
  document.getElementById('modal').classList.add('show');
}
function modalCb(i){
  closeModal();
  setTimeout(()=>{if(window.modalCbs[i]&&window.modalCbs[i].action)window.modalCbs[i].action();},150);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function addLog(t,ty='narrative'){
  G.log.unshift({t,ty});
  if(G.log.length>50)G.log.pop();
  renderLog();
}
function renderLog(){
  let p=getTimePeriod(G.hour);
  document.getElementById('logPanel').innerHTML=G.log.slice(0,10).map(e=>
    `<div class="log-entry"><span class="log-time">[${p.text}]</span><span class="log-text log-${e.ty}">${e.t}</span></div>`
  ).join('');
}

function updateUI(){
  let p=getTimePeriod(G.hour);
  document.getElementById('timeDisplay').textContent=`${G.hour.toString().padStart(2,'0')}:00 ${p.text}`;
  document.getElementById('dayVal').textContent=G.day;
  document.getElementById('stVal').textContent=G.stamina;
  document.getElementById('fdVal').textContent=G.food;
  updateInteractGrid();
  updateEscapeConditions();
  updateLockedStatus();
  checkTutorial();
}
function updateInteractGrid(){
  let loc=LOCS[G.loc];
  let html='';
  if(loc.enc&&loc.enc.length>0){
    loc.enc.forEach(e=>{
      let tag='',action=e.d;
      switch(e.type){
        case'npc':tag='交谈';break;
        case'guard':tag='小心';break;
        case'work':tag='劳役';break;
        case'rest':tag='休息';break;
        case'steal':tag='偷窃';break;
        case'observe':tag='观察';break;
        case'patrol':tag='危险';break;
      }
      html+=`<div class="card" onclick="interact('${e.id}')"><div class="icon">${e.i}</div><div class="name">${e.n}</div><div class="action">${tag}</div></div>`;
    });
  }
  let cnt=loc.enc?loc.enc.length:0;
  for(let i=cnt;i<9;i++)html+=`<div class="card" style="opacity:0.3"><div class="icon">·</div><div class="name">·</div><div class="action">·</div></div>`;
  document.getElementById('interactGrid').innerHTML=html;
}
function updateEscapeConditions(){
  const s=getEscapeStatus();
  document.getElementById('condRoute').className='cond '+(s.route?'done':'');
  document.getElementById('condRoute').textContent=(s.route?'✓':'❌')+' 路线';
  document.getElementById('condInfo').className='cond '+(s.info?'done':'');
  document.getElementById('condInfo').textContent=(s.info?'✓':'❌')+' 情报';
  document.getElementById('condTool').className='cond '+(s.tool?'done':'');
  document.getElementById('condTool').textContent=(s.tool?'✓':'❌')+' 工具';
  document.getElementById('condStamina').className='cond '+(s.stamina?'done':'');
  document.getElementById('condStamina').textContent=(s.stamina?'✓':'❌')+' 体力';
  let btn=document.getElementById('escBtn');
  if(isEscapeReady()){btn.className='escape-btn ready';btn.textContent='🔓 尝试逃跑';}
  else{btn.className='escape-btn';btn.textContent='🚫 条件不足';}
}
function updateLockedStatus(){
  let o=document.getElementById('lockedOverlay');
  if(G.locked){
    o.classList.add('active');
    document.getElementById('lockedText').innerHTML=`你被关进了暗无天日的禁闭室...<br><br>🔒 处罚：${getLockReason()}<br>⏰ 禁闭剩余：${G.lockHours}小时<br><br><span style="color:#5a5a6a">只能在牢房里等待处罚结束...</span>`;
  }else o.classList.remove('active');
}
function getLockReason(){
  if(G.lockHours>=20)return'严重违规，关禁闭一天';
  if(G.caught>=2)return'多次违规，关禁闭半天';
  if(G.stamina<=0)return'体力耗尽昏迷';
  return'违规被抓';
}

  showModal('📊 状态',`<div class="state-grid"><div class="state-cell"><div class="icon">💪</div><div class="val">${G.stamina}%</div><div class="label">体力</div></div><div class="state-cell"><div class="icon">🍜</div><div class="val">${G.food}%</div><div class="label">饱食</div></div><div class="state-cell"><div class="icon">📅</div><div class="val">第${G.day}天</div><div class="label">天数</div></div><div class="state-cell"><div class="icon">⚠️</div><div class="val">${G.caught}</div><div class="label">被捕</div></div></div><div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:12px;margin-top:12px"><div style="color:var(--dim);font-size:11px;margin-bottom:8px">逃跑准备</div><div style="display:flex;flex-wrap:wrap;gap:8px"><span style="font-size:12px;padding:4px 10px;background:var(--card);border-radius:4px;color:${s.route?'var(--green)':'var(--dim)'}">${chk(s.route)} 发现路线</span><span style="font-size:12px;padding:4px 10px;background:var(--card);border-radius:4px;color:${s.info?'var(--green)':'var(--dim)'}">${chk(s.info)} 掌握情报</span><span style="font-size:12px;padding:4px 10px;background:var(--card);border-radius:4px;color:${s.tool?'var(--green)':'var(--dim)'}">${chk(s.tool)} 收集工具</span></div></div>`);
}
function showItems(){
  let items=G.inventory.map(id=>ITEMS[id]).filter(Boolean);
  let html=items.length?items.map(item=>`<div style="background:var(--card);border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px"><span style="font-size:24px">${item.i}</span><div><div style="font-size:13px">${item.n}</div><div style="font-size:11px;color:var(--dim)">${item.d}</div></div></div>`).join(''):'<div style="text-align:center;color:var(--dim);padding:20px">背包是空的</div>';
  showModal('🎒 背包',html);
}
function showEscape(){
  const s=getEscapeStatus();
  const ready=isEscapeReady();
  const chk=v=>v?'✓':'✗';
  const cnt=[s.route,s.info,s.tool,s.stamina].filter(Boolean).length;
  showModal('🚪 逃跑',`<div class="escape-progress"><div class="escape-bar"><div class="escape-fill" style="width:${cnt*25}%"></div></div></div><div class="escape-items"><span class="escape-tag ${s.route?'done':''}">${chk(s.route)} 发现逃跑路线</span><span class="escape-tag ${s.info?'done':''}">${chk(s.info)} 掌握巡逻情报</span><span class="escape-tag ${s.tool?'done':''}">${chk(s.tool)} 收集逃跑工具</span><span class="escape-tag ${s.stamina?'done':''}">${chk(s.stamina)} 体力≥40%</span></div><button onclick="${ready?'closeModal();tryEscape()':'closeModal()'}" style="width:100%;padding:14px;margin-top:16px;background:${ready?'linear-gradient(135deg, #8b4513, #a0522d)':'var(--card)'};border:2px solid ${ready?'var(--gold)':'rgba(255,255,255,0.1)'};border-radius:8px;color:${ready?'var(--gold)':'var(--dim)'};font-size:14px;cursor:${ready?'pointer':'not-allowed'}">${ready?'🔓 尝试逃跑':'🚫 条件不足'}</button>`);
}
function moveTo(id){
  if(G.locked&&id!=='dorm'){addLog('🔒 你被关禁闭中，只能待在牢房...','danger');return;}
  if(G.loc===id)return;
  let loc=LOCS[id];
  if(loc.locked){addLog('🚫 那里无法通行...','narrative');return;}
  if(!canAccess(id)){addLog('⏰ 现在不能去那里...','narrative');return;}
  G.loc=id;
  addLog(`📍 来到「${loc.n}」`,'action');
  if(id==='wall'&&Math.random()<0.3)addLog('⚠️ 巡逻队正在附近！小心被抓住！','danger');
  if(G.introPhase==='escaped1_waiting'&&id==='eastWall'){attemptEscape1();return;}
  showLocationFlash(loc);
  updateUI();
}
function interact(id){
  let loc=LOCS[G.loc];
  let enc=loc.enc.find(e=>e.id===id);
  if(!enc)return;
  if(G.introPhase==='escaped1_waiting'&&id==='pt2'){attemptEscape1();return;}
  if(G.introPhase==='escaped2_waiting'&&id==='gs'){attemptEscape2();return;}
  if(G.introPhase==='escaped3_waiting'){attemptEscape3();return;}
  if(G.introPhase==='escaped4_waiting'){attemptEscape4();return;}
  switch(enc.type){
    case'npc':showNPCDialog(enc.npcId||id);break;
    case'guard':encounterGuard(enc);break;
    case'work':doWork(enc);break;
    case'rest':doRest(enc);break;
    case'steal':doSteal(enc);break;
    case'observe':doObserve(enc);break;
    case'patrol':encounterPatrol(enc);break;
  }
}
function showNPCDialog(npcId){
  let npc=NPCS[npcId];
  if(!npc)return;
  let trust=G.trust[npcId]||0;
  let level=getNPCRelationLevel(trust);
  if(npc.isIntro)level=Math.min(level,1);
  let npcData=npc.levels[level];
  if(!npcData){level=0;npcData=npc.levels[level];}
  showDialog({title:`${npc.i} ${npc.n}`,content:`<div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:12px"><div style="font-size:2rem">${npc.i}</div><div style="color:#c9b896;font-size:0.9rem">${npc.n}</div>${!npc.isIntro?`<div style="color:#5a5a6a;font-size:0.7rem;margin-top:4px">关系：${RELATION_NAMES[level]}</div>`:''}</div><p style="color:#a8b8c8;line-height:1.6;white-space:pre-line">${npcData.intro}</p>`,options:npcData.opts.map(o=>({text:o.q,action:()=>{if(o.close){closeDialog();return;}showNPCReply(npcId,o,npc);}}))});
}
function showNPCReply(npcId,opt,npc){
  addLog(`💬 你：${opt.q}`,'action');
  addLog(`${npc.i} ${npc.n}：${opt.a}`,'dialog');
  if(opt.trust){
    G.trust[npcId]=Math.max(0,(G.trust[npcId]||0)+opt.trust);
    if(opt.trust>0)addLog(`💬 关系改善 (+${opt.trust})`,'important');
    if(opt.trust<0)addLog(`😠 关系变差 (${opt.trust})`,'danger');
  }
  if(opt.unlock){
    if(opt.unlock==='route'&&!G.progress.route){G.progress.route=true;addLog('📝 发现逃跑路线：围墙东北角','important');}
    if(opt.unlock==='info'&&!G.progress.info){G.progress.info=true;addLog('📝 掌握巡逻规律：戌时(20:00)换班','important');}
  }
  if(opt.unlock2){
    if(opt.unlock2==='route'&&!G.progress.route){G.progress.route=true;addLog('📝 发现逃跑路线：围墙东北角','important');}
    if(opt.unlock2==='info'&&!G.progress.info){G.progress.info=true;addLog('📝 掌握巡逻规律：戌时(20:00)换班','important');}
  }
  if(opt.giveFood&&G.food<100){G.food=Math.min(100,G.food+15);addLog('🍞 获得了一些食物','important');}
  if(opt.giveFood2&&G.food<100){G.food=Math.min(100,G.food+10);addLog('🍞 额外获得了一些食物','important');}
  document.getElementById('dialogTitle').textContent=`${npc.i} ${npc.n}`;
  document.getElementById('dialogContent').innerHTML=`<div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:12px;white-space:pre-line"><p style="color:#9ab87a;margin-bottom:10px">问：${opt.q}</p><p style="color:#a8b8c8;line-height:1.6">答：${opt.a}</p></div>`;
  window.dialogOpts=[{action:()=>showNPCDialog(npcId)},{action:closeDialog}];
  document.getElementById('dialogOptions').innerHTML=`<button class="dialog-btn primary" onclick="doCb(0)">继续交谈</button><button class="dialog-btn" onclick="doCb(1)">先走了</button>`;
}

// ==================== 正常游戏逻辑 ====================
function encounterGuard(enc){
  let d=Math.random();
  addLog(`${enc.i} ${enc.n}打量着你...`,'narrative');
  if(d<0.3){
    showDialog({title:`${enc.i} ${enc.n}`,content:`<div style="text-align:center;margin-bottom:15px"><div style="font-size:3rem">${enc.i}</div><div style="color:#c9b896">${enc.n}</div></div><p style="color:#c97a7a">监工瞪着你：「你鬼鬼祟祟的，在干什么！」</p>`,options:[{text:'挣扎辩解',danger:true,action:()=>{closeDialog();getCaught('被监工发现你鬼鬼祟祟');}}]});
  }else if(d<0.6){
    showDialog({title:`${enc.i} ${enc.n}`,content:`<div style="text-align:center;margin-bottom:15px"><div style="font-size:3rem">${enc.i}</div><div style="color:#c9b896">${enc.n}</div></div><p style="color:#c9a87a">监工呵斥道：「看什么看！滚去干活！」</p>`,options:[{text:'低头离开',action:()=>{closeDialog();addLog(`${enc.i} ${enc.n}呵斥道：看什么看！滚去干活！`,'action');updateUI();}}]});
  }else{
    showDialog({title:`${enc.i} ${enc.n}`,content:`<div style="text-align:center;margin-bottom:15px"><div style="font-size:3rem">${enc.i}</div><div style="color:#c9b896">${enc.n}</div></div><p>监工瞥了你一眼，没理会，继续盯着别处。</p>`,options:[{text:'悄悄离开',action:()=>{closeDialog();addLog(`${enc.i} ${enc.n}瞥了你一眼，没理会`,'narrative');updateUI();}}]});
  }
}
function encounterPatrol(enc){
  let d=Math.random();
  addLog(`${enc.i} ${enc.n}正在巡逻...`,'narrative');
  if(d<0.4){
    showDialog({title:`${enc.i} ${enc.n}`,content:`<div style="text-align:center;margin-bottom:15px"><div style="font-size:3rem">${enc.i}</div><div style="color:#c9b896">${enc.n}</div></div><p style="color:#c97a7a">巡逻队发现你了！「站住！有人！」火把逼近，你无处可逃...</p>`,options:[{text:'被抓住',danger:true,action:()=>{closeDialog();getCaught('被巡逻队发现你在围墙附近');}}]});
  }else{
    showDialog({title:`${enc.i} ${enc.n}`,content:`<div style="text-align:center;margin-bottom:15px"><div style="font-size:3rem">${enc.i}</div><div style="color:#c9b896">${enc.n}</div></div><p>巡逻队从你藏身处走过，火光照亮四周...脚步声渐渐远去...</p>`,options:[{text:'松了口气',action:()=>{closeDialog();addLog(`${enc.i} ${enc.n}走远了，你松了口气`,'narrative');updateUI();}}]});
  }
}
function doWork(enc){
  if(G.locked){addLog('🔒 你被关禁闭中，无法外出劳役','danger');return;}
  if(!canAccess(G.loc)){addLog('⏰ 现在不是劳役时间...','narrative');return;}
  let cost=enc.stamina||20;
  if(G.stamina<cost){addLog('⚠️ 体力不足，无法劳役！','danger');return;}
  G.stamina-=cost;G.food=Math.max(0,G.food-5);
  addLog(`${enc.i} ${enc.name||enc.n}... 体力 -${cost} 饱食 -5`,'action');
  if(G.hour<12)G.tasks.morning=true;else if(G.hour<18)G.tasks.afternoon=true;
  if(enc.risk&&Math.random()<enc.risk){let h=10+Math.floor(Math.random()*15);G.stamina=Math.max(0,G.stamina-h);addLog(`⚠️ 出了点意外！体力 -${h}`,'danger');}
  if(Math.random()<0.1){let found=Math.random()<0.5?'iron':'cloth';if(G.inventory.length<4&&!G.inventory.includes(found)){G.inventory.push(found);G.progress.tool=true;addLog(`📦 发现物品：${ITEMS[found].i} ${ITEMS[found].n}！`,'important');}}
  if(enc.bonus){G.food=Math.min(100,G.food+enc.bonus);addLog(`饱食度恢复 +${enc.bonus}`,'action');}
  checkStatus();advanceTime();updateUI();
}
function doRest(enc){
  let gain=enc.id==='wl'?10:20;
  G.stamina=Math.min(100,G.stamina+gain);
  addLog(`${enc.i} 休息了一会儿... 体力 +${gain}`,'action');
  advanceTime();checkStatus();updateUI();
}
function doSteal(enc){
  if(G.locked){addLog('🔒 你被关禁闭中','danger');return;}
  if(!canAccess(G.loc)){addLog('⏰ 现在不能偷...','narrative');return;}
  addLog(`${enc.i} 你悄悄靠近${enc.n}...`,'action');
  if(Math.random()<0.4){getCaught('偷食物时被当场抓住');}
  else{let g=15+Math.floor(Math.random()*15);G.food=Math.min(100,G.food+g);addLog(`🍞 成功偷到食物！饱食度 +${g}`,'important');advanceTime();checkStatus();updateUI();}
}
function doObserve(enc){
  if(G.loc!=='wall'){addLog('...这里没什么好观察的','narrative');return;}
  if(!G.progress.route){G.progress.route=true;addLog(`🔍 你仔细观察${enc.n}...`,'action');addLog(`🧱 发现逃跑路线！围墙东北角可以挖开逃跑！`,'important');}
  else{addLog(`🔍 你再次确认逃跑路线...`,'action');addLog(`🧱 逃跑路线：东北角墙角，趁巡逻间隔逃跑`,'important');}
  if(Math.random()<0.3&&G.inventory.length<4&&!G.inventory.includes('rope')){G.inventory.push('rope');G.progress.tool=true;addLog(`📦 在墙角发现一根麻绳！逃跑工具！`,'important');}
  advanceTime();updateUI();
}
function getCaught(reason){
  G.caught++;G.stamina=Math.max(0,G.stamina-20);
  let items=[...G.inventory];G.inventory=[];
  if(items.length>0)addLog(`📦 物品被没收：${items.map(i=>ITEMS[i]?.i).join(' ')}`,'danger');
  addLog(`⚠️ ${reason}`,'danger');
  let content=`<p style="color:#c97a7a">你被抓了！</p><p>${reason}</p>`;
  if(G.caught===1){content+=`<p style="margin-top:10px">处罚：体力 -20，物品被没收，今晚不许吃饭</p>`;G.food=Math.max(0,G.food-20);}
  else if(G.caught===2){content+=`<p style="margin-top:10px">处罚：体力 -20，物品被没收，关禁闭半天(12小时)</p>`;G.locked=true;G.lockHours=12;}
  else if(G.caught>=3){content+=`<p style="margin-top:10px;color:#c97a7a">处罚极其严厉！关禁闭一天(24小时)！逃跑准备全部重置！</p>`;G.locked=true;G.lockHours=24;G.progress={route:false,info:false,tool:false};G.tasks={morning:false,afternoon:false,evening:false};}
  content+=`<p style="margin-top:10px">累计被抓：${G.caught}/3</p>`;
  showModal('⚠️ 被抓了！',content,[{text:'认错',action:()=>{checkStatus();updateUI();}}]);
}
function tryEscape(){
  if(!isEscapeReady()){addLog('🚫 逃跑条件不足...','narrative');return;}
  addLog('🔓 你决定今晚逃跑！悄悄溜向围墙...','important');
  let chance=0.4;
  if(G.progress.info)chance+=0.2;
  if(G.inventory.includes('iron')||G.inventory.includes('rope'))chance+=0.2;
  setTimeout(()=>{
    if(Math.random()<chance){
      G.escaped=true;
      addLog('🎉 你成功逃出了劳役营！','important');
      addLog('趁着巡逻换班的空档，你翻过低矮的围墙，向着山林狂奔...','narrative');
      addLog('身后是渐渐远去的火光和叫喊声，但你没有回头...','narrative');
      showDialog({title:'🎊 成功逃脱！',content:`<p style="text-align:center;font-size:1.2rem">🎊 恭喜！你成功逃出了广年屯劳役营！</p><p style="margin-top:15px">在一个月黑风高的夜晚，你趁着巡逻换班的空档，翻过低矮的围墙，向着山林狂奔...</p><p>身后是渐渐远去的火光和叫喊声，但你没有回头。</p><p style="margin-top:15px;color:#d4af37">【乱世烽火 · 劳役营篇 · 完】</p><p style="color:#5a5a6a;margin-top:10px">存活天数：${G.day}天</p>`,options:[{text:'新的旅途开始...',action:()=>{closeDialog();document.getElementById('gameOver').classList.add('active');document.getElementById('goIcon').textContent='🎉';document.getElementById('goTitle').textContent='成功逃脱！';document.getElementById('goTitle').style.color='#d4af37';document.getElementById('goSubtitle').textContent=`你成功逃出劳役营，存活 ${G.day} 天！`;}}]});
    }else{addLog('⚠️ 刚要翻墙就被发现了！','danger');getCaught('逃跑时被巡逻队当场抓住');}
  },800);
}
function advanceTime(){
  G.hour+=2;
  if(G.hour>=24){G.hour-=24;newDay();}
  G.food=Math.max(0,G.food-3);
  if(G.food<30){G.stamina=Math.max(0,G.stamina-8);addLog('🍜 太饿了，身体越来越虚弱...体力 -8','danger');}
  if(G.hour===18&&!G.locked)checkEveningRollCall();
  checkStatus();updateUI();
}
function checkEveningRollCall(){
  addLog('🌆 傍晚点名时间到了...','narrative');
  if(G.day===1){addLog(`✅ 第1天，点名通过`,'action');G.tasks.morning=true;G.tasks.afternoon=true;G.tasks.evening=true;return;}
  let missed=false;let reasons=[];
  if(!G.tasks.morning){missed=true;reasons.push('上午没干活');}
  if(!G.tasks.afternoon){missed=true;reasons.push('下午没干活');}
  G.tasks.evening=true;
  if(missed){
    showDialog({title:'🌆 傍晚点名',content:`<p>🌆 傍晚点名，监工开始逐个检查...</p><p style="color:#c97a7a;margin-top:10px">「${reasons.join('、')}」</p><p style="margin-top:15px">监工瞪着你：「你就是那个偷懒的！」监工大怒！</p>`,options:[{text:'低头认错',danger:true,action:()=>{closeDialog();addLog(`⚠️ 点名时被发现偷懒！监工大怒！`,'danger');getCaught(`点名时被发现${reasons.join('、')}，监工大怒`);}}]});
  }else{
    showDialog({title:'🌆 傍晚点名',content:`<p>🌆 傍晚点名，监工开始逐个检查...</p><p style="margin-top:15px">监工扫了你一眼，点了点头。</p><p style="color:#9ab87a;margin-top:10px">「算你识相，滚吧。」</p>`,options:[{text:'松了口气',action:()=>{closeDialog();addLog(`✅ 点名通过，一切正常`,'action');updateUI();}}]});
  }
}
function newDay(){
  G.day++;G.food=Math.max(0,G.food-10);
  if(G.locked&&G.lockHours>0){addLog('🔒 禁闭还没结束，你仍被关在禁闭室里...','narrative');}
  else if(G.locked&&G.lockHours<=0){G.locked=false;G.lockHours=0;G.caught=0;addLog('🔓 关禁闭结束，你被放出来了！','important');}
  G.tasks={morning:false,afternoon:false,evening:false};
  let recovery=G.locked?10:25;
  G.stamina=Math.min(100,G.stamina+recovery);
  addLog('────────────────────','important');
  addLog(`🌅 第${G.day}天清晨，号角再次响起...`,'important');
  addLog(`睡眠恢复：体力 +${recovery}`,'action');
  if(G.day>30)gameOver('timeout','被押往更远的地方服苦役...');
}
function checkStatus(){
  if(G.stamina<=0&&!G.locked){G.stamina=10;G.locked=true;addLog('⚠️ 体力耗尽，晕倒在地...','danger');addLog('🔒 你被抬进禁闭室休养...','danger');}
  if(G.food<=0){G.food=5;G.stamina=Math.max(0,G.stamina-30);addLog('⚠️ 严重饥饿！体力大幅下降！','danger');if(G.stamina<=0){G.stamina=10;G.locked=true;addLog('🔒 你饿晕了，被抬进禁闭室...','danger');}}
}
function gameOver(type,msg){
  let o=document.getElementById('gameOver');o.classList.add('active');
  if(type==='timeout'){document.getElementById('goIcon').textContent='😢';document.getElementById('goTitle').textContent='任务失败';document.getElementById('goTitle').style.color='#c97a7a';document.getElementById('goSubtitle').textContent=`${msg}（存活 ${G.day-1} 天）`;}
}
function waitInCell(){
  if(!G.locked)return;
  G.hour+=4;if(G.hour>=24)G.hour-=24;G.lockHours-=4;G.food=Math.max(0,G.food-5);
  let p=getTimePeriod(G.hour);
  addLog(`⏰ 在禁闭室里煎熬地等待了4小时... (${p.icon} ${p.text})`,'narrative');
  if(G.lockHours<=0){G.locked=false;G.lockHours=0;G.caught=0;addLog('🔓 禁闭结束，你被放出来了！','important');}
  checkStatus();updateUI();
}
function restInCell(){
  if(!G.locked)return;
  G.hour+=8;if(G.hour>=24)G.hour-=24;G.lockHours-=8;G.food=Math.max(0,G.food-8);G.stamina=Math.min(100,G.stamina+15);
  let p=getTimePeriod(G.hour);
  addLog(`💤 在禁闭室里昏睡...过了8小时 (${p.icon} ${p.text})`,'action');
  addLog('体力恢复 +15','action');
  if(G.lockHours<=0){G.locked=false;G.lockHours=0;G.caught=0;addLog('🔓 禁闭结束，你被放出来了！','important');}
  checkStatus();updateUI();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('dialogOverlay').addEventListener('click',function(e){if(e.target===this)closeDialog();});

// 启动序章
showIntro();
</script>
</body>
</html>
