<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乱世烽火 - 劳役营篇</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft YaHei';background:#1a1510;color:#d4c4a8;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        /* ========== 顶部：极简状态栏 ========== */
        .header{
            background:#2a2015;
            padding:12px 15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid #3a2a1a;
            flex-shrink:0;
        }
        .header-left{display:flex;align-items:center;gap:12px}
        .game-title{color:#d4af37;font-weight:bold;font-size:1rem}
        .time-badge{
            display:flex;align-items:center;gap:6px;
            background:#1a1510;padding:5px 12px;border-radius:15px;
            border:1px solid #3a2a1a;
        }
        .time-icon{font-size:1.1rem}
        .time-num{font-size:0.9rem;font-weight:bold}
        .time-period{font-size:0.7rem;color:#8a7a6a}
        .header-stats{display:flex;gap:8px}
        .stat-mini{
            padding:4px 10px;background:#1a1510;border-radius:10px;
            font-size:0.75rem;border:1px solid #3a2a1a;
        }
        .stat-mini.danger{background:#2a1515;border-color:#5a2020;color:#c97a7a}
        .stat-mini.good{background:#1a2515;border-color:#3a4a2a;color:#9ab87a}
        
        /* ========== 主区域：当前位置 + 遭遇 ========== */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:15px;gap:15px}
        
        /* 当前位置卡片 */
        .location-card{
            background:#1a1510;border:1px solid #3a2a1a;
            border-radius:12px;padding:15px;flex-shrink:0;
        }
        .location-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .location-name{font-size:1.1rem;display:flex;align-items:center;gap:10px}
        .location-name i{font-size:1.3rem}
        .location-tag{
            padding:3px 12px;border-radius:12px;font-size:0.65rem;
        }
        .tag-work{background:#251a10;color:#c9a87a}
        .tag-rest{background:#151a10;color:#7ac9a8}
        .tag-danger{background:#251010;color:#c97a7a}
        .location-env{font-size:0.8rem;color:#6a5a4a;font-style:italic}
        
        /* 遭遇网格 */
        .encounters{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
            gap:10px;
            flex:1;overflow-y:auto;
        }
        .enc{
            background:#1a1510;border:1px solid #3a2a1a;
            border-radius:12px;padding:15px;
            display:flex;flex-direction:column;align-items:center;gap:8px;
            cursor:pointer;transition:all 0.2s;
        }
        .enc:hover{background:#252015;border-color:#5a4a3a;transform:scale(1.02)}
        .enc:active{transform:scale(0.98)}
        .enc-icon{font-size:1.8rem}
        .enc-name{font-size:0.85rem;text-align:center}
        .enc-type{
            font-size:0.6rem;padding:2px 8px;border-radius:8px;
            color:#7ab8c9;background:#1a2530;
        }
        
        /* ========== 底部：任务 + 逃跑 ========== */
        .footer{
            background:#0f0a08;
            border-top:2px solid #3a2a1a;
            padding:12px 15px;
            flex-shrink:0;
        }
        
        /* 任务栏 */
        .tasks-row{
            display:flex;justify-content:center;gap:20px;margin-bottom:10px;
        }
        .task-item{
            display:flex;align-items:center;gap:6px;
            font-size:0.75rem;color:#5a4a3a;
        }
        .task-item.done{color:#9ab87a}
        .task-item.urgent{color:#c9a87a}
        
        /* 逃跑按钮 */
        .escape-row{display:flex;gap:10px}
        .btn{
            flex:1;padding:14px;border-radius:10px;
            font-size:0.85rem;cursor:pointer;
            border:2px solid;transition:all 0.2s;
        }
        .btn-area{
            background:#1a1510;border-color:#3a2a1a;color:#6a5a4a;
        }
        .btn-area:active{background:#252015}
        .btn-escape{
            background:#1a1510;border-color:#3a2a1a;color:#5a4a3a;
            cursor:not-allowed;
        }
        .btn-escape.ready{
            background:#2a3520;border-color:#9ab87a;color:#9ab87a;
            cursor:pointer;animation:glow 2s infinite;
        }
        @keyframes glow{
            0%,100%{box-shadow:0 0 5px rgba(154,184,122,0.3)}
            50%{box-shadow:0 0 15px rgba(154,184,122,0.5)}
        }
        
        /* ========== 弹窗 ========== */
        .modal-overlay{
            display:none;position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.85);z-index:100;
            justify-content:center;align-items:flex-end;padding:0;
        }
        .modal-overlay.active{display:flex}
        
        .modal{
            background:#2a2015;border:2px solid #3a2a1a;
            border-radius:20px 20px 0 0;
            width:100%;max-height:80vh;overflow-y:auto;
            padding:20px;
        }
        .modal-handle{
            width:40px;height:4px;background:#3a2a1a;
            border-radius:2px;margin:0 auto 15px;
        }
        .modal-title{
            font-size:1.1rem;color:#d4af37;margin-bottom:15px;text-align:center;
        }
        .modal-content{font-size:0.9rem;line-height:1.7;margin-bottom:20px}
        .modal-content p{margin-bottom:10px}
        
        /* 区域选择网格 */
        .area-grid{
            display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
        }
        .area-btn{
            aspect-ratio:1;background:#1a1510;border:1px solid #3a2a1a;
            border-radius:12px;display:flex;flex-direction:column;
            align-items:center;justify-content:center;gap:5px;
            cursor:pointer;font-size:0.6rem;color:#8a7a6a;
            transition:all 0.2s;
        }
        .area-btn:hover{background:#252015;border-color:#5a4a3a}
        .area-btn.current{background:#2a3520;border-color:#9ab87a;color:#9ab87a}
        .area-btn.disabled{opacity:0.4;cursor:not-allowed}
        .area-btn i{font-size:1.3rem}
        
        /* 状态详情 */
        .stat-detail{
            background:#1a1510;border-radius:10px;padding:15px;margin-bottom:10px;
        }
        .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a1a10}
        .stat-row:last-child{border:none}
        .stat-label{color:#8a7a6a}
        .stat-value{font-weight:bold}
        .stat-value.danger{color:#c97a7a}
        .stat-value.good{color:#9ab87a}
        
        /* 逃跑详情 */
        .escape-conditions{
            display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px;
        }
        .condition{
            text-align:center;padding:12px;background:#1a1510;border-radius:10px;
        }
        .condition.done{background:#1a2515;color:#9ab87a}
        .condition.fail{color:#5a4a3a}
        
        /* 逃跑进度 */
        .progress-list{background:#1a1510;border-radius:10px;padding:15px;margin-bottom:15px}
        .progress-item{
            display:flex;justify-content:space-between;padding:8px 0;
            border-bottom:1px solid #2a1a10;font-size:0.85rem;
        }
        .progress-item:last-child{border:none}
        .progress-item.done{color:#9ab87a}
        .progress-item.pending{color:#5a4a3a}
        
        /* 选项按钮 */
        .modal-choices{display:flex;flex-direction:column;gap:10px}
        .choice-btn{
            background:#1a2510;border:1px solid #3a4a2a;border-radius:10px;
            padding:14px;text-align:center;color:#9ab87a;font-size:0.9rem;
            cursor:pointer;transition:all 0.2s;
        }
        .choice-btn:hover{background:#2a3520;border-color:#9ab87a}
        .choice-btn.danger{background:#251510;border-color:#5a3a3a;color:#c97a7a}
        .choice-btn.danger:hover{background:#3a2020;border-color:#c97a7a}
        .choice-btn:active{transform:scale(0.98)}
        
        /* 滚动条 */
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#1a1510}
        ::-webkit-scrollbar-thumb{background:#3a2a1a;border-radius:2px}
        
        /* 禁闭遮罩 */
        .locked-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.95);z-index:200;
            display:none;justify-content:center;align-items:center;
            flex-direction:column;text-align:center;padding:20px;
        }
        .locked-overlay.active{display:flex}
        .locked-icon{font-size:4rem;margin-bottom:15px}
        .locked-title{font-size:1.3rem;color:#d4af37;margin-bottom:10px}
        .locked-text{color:#8a7a6a;line-height:1.8;margin-bottom:20px}
        .locked-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
        .locked-btn{
            padding:14px;border-radius:10px;font-size:0.9rem;cursor:pointer;
            border:2px solid;transition:all 0.2s;
        }
        .locked-btn.warn{background:#251510;border-color:#5a3a3a;color:#c97a7a}
        .locked-btn.warn:hover{background:#3a2020}
        .locked-btn.ok{background:#1a2510;border-color:#3a4a2a;color:#9ab87a}
        .locked-btn.ok:hover{background:#2a3520}
        
        /* 游戏结束 */
        .game-over{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.95);z-index:300;
            display:none;justify-content:center;align-items:center;
            flex-direction:column;text-align:center;padding:20px;
        }
        .game-over.active{display:flex}
        .go-icon{font-size:5rem;margin-bottom:20px}
        .go-title{font-size:1.5rem;margin-bottom:10px}
        .go-sub{color:#8a7a6a;margin-bottom:20px}
        .go-btn{
            background:#2a2010;border:2px solid #d4af37;border-radius:10px;
            padding:14px 30px;color:#d4af37;font-size:1rem;cursor:pointer;
        }
        
        /* 日志弹窗 */
        .log-list{background:#1a1510;border-radius:10px;padding:10px;max-height:200px;overflow-y:auto}
        .log-item{font-size:0.75rem;padding:6px 0;border-bottom:1px solid #2a1a10}
        .log-item:last-child{border:none}
        .log-item.narrative{color:#8a7a6a}
        .log-item.action{color:#9ab87a}
        .log-item.danger{color:#c97a7a}
        .log-item.important{color:#d4af37}
    </style>
</head>
<body>
    <!-- 顶部 -->
    <div class="header">
        <div class="header-left">
            <span class="game-title">🔥 乱世烽火</span>
            <div class="time-badge">
                <span class="time-icon" id="timeIcon">🌅</span>
                <span class="time-num" id="timeNum">06:00</span>
                <span class="time-period" id="timePeriod">清晨</span>
            </div>
        </div>
        <div class="header-stats">
            <div class="stat-mini" id="stStat">💪 <span id="stVal">80</span>%</div>
            <div class="stat-mini" id="fdStat">🍜 <span id="fdVal">70</span>%</div>
            <div class="stat-mini" id="dayStat">📅<span id="dayVal">1</span>天</div>
        </div>
    </div>
    
    <!-- 主区域 -->
    <div class="main">
        <!-- 当前位置 -->
        <div class="location-card">
            <div class="location-header">
                <div class="location-name">
                    <i id="curIcon">🏠</i>
                    <span id="curName">牢房</span>
                </div>
                <span class="location-tag tag-rest" id="curTag">休息</span>
            </div>
            <div class="location-env" id="curEnv">天色微亮，牢房里弥漫着潮湿的霉味...</div>
        </div>
        
        <!-- 遭遇 -->
        <div class="encounters" id="encList"></div>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        <div class="tasks-row" id="taskRow">
            <div class="task-item" id="taskM"><span id="tMIcon">☐</span><span>上午</span></div>
            <div class="task-item" id="taskA"><span id="tAIcon">☐</span><span>下午</span></div>
            <div class="task-item" id="taskE"><span id="tEIcon">☐</span><span>傍晚</span></div>
        </div>
        <div class="escape-row">
            <button class="btn btn-area" onclick="showAreas()">📍 切换区域</button>
            <button class="btn btn-area" onclick="showStatus()">📊 状态</button>
            <button class="btn btn-escape" id="escBtn" onclick="tryEscape()">🔓 逃跑</button>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>
    
    <!-- 禁闭 -->
    <div class="locked-overlay" id="lockedOverlay">
        <div class="locked-icon">🔒</div>
        <div class="locked-title">关禁闭</div>
        <div class="locked-text" id="lockedText">你被关进了暗无天日的禁闭室...</div>
        <div class="locked-buttons">
            <button class="locked-btn warn" onclick="waitInCell()">⏰ 熬过4小时</button>
            <button class="locked-btn ok" onclick="restInCell()">💤 休息8小时</button>
        </div>
    </div>
    
    <!-- 游戏结束 -->
    <div class="game-over" id="gameOver">
        <div class="go-icon" id="goIcon">💀</div>
        <div class="go-title" id="goTitle">游戏结束</div>
        <div class="go-sub" id="goSub">...</div>
        <button class="go-btn" onclick="location.reload()">重新开始</button>
    </div>

<script>
// ==================== 数据 ====================
const LOCS = {
    dorm:{n:'牢房',i:'🏠',d:'休息',time:[22,23,0,1,2,3,4,5],tags:['rest'],
        env:{morning:'鸡鸣声响起...',noon:'阳光从高窗照进来...',evening:'暮色渐沉...',night:'月光从铁窗照入...'},
        enc:[
            {id:'bed',n:'木板床',i:'🛏️',type:'rest'},
            {id:'oz',n:'老张',i:'👴',type:'npc'},
            {id:'z4',n:'赵四',i:'👤',type:'npc'}
        ]},
    yard:{n:'操场',i:'🌳',d:'放风',time:[11,12,13,19,20,21],tags:['rest'],
        env:{morning:'早起的犯人走动...',noon:'阳光刺眼...',evening:'点名即将开始...',night:'空无一人...'},
        enc:[
            {id:'lw',n:'李五',i:'👤',type:'npc'},
            {id:'sd',n:'士兵',i:'⚔️',type:'guard'},
            {id:'wl',n:'水井',i:'💧',type:'rest'}
        ]},
    kitchen:{n:'厨房',i:'🍜',d:'偷食物',time:[11,12,17,18],tags:['steal'],
        env:{noon:'伙夫忙活午饭...',evening:'伙夫清点食材...',night:'黑漆漆的...'},
        enc:[
            {id:'ck',n:'胖厨子',i:'👨‍🍳',type:'npc'},
            {id:'fb',n:'食物桶',i:'🪣',type:'steal'}
        ]},
    mine:{n:'矿区',i:'⛏️',d:'采矿',time:[8,9,10,11,14,15,16,17],tags:['work'],
        env:{morning:'矿洞里叮叮当当...',noon:'烈日下汗流浃背...',evening:'收工的钟声...'},
        enc:[
            {id:'wj',n:'王监工',i:'👮',type:'guard'},
            {id:'ct',n:'矿车',i:'🛒',type:'work',s:22,n:'推矿车'},
            {id:'rk',n:'岩壁',i:'🪨',type:'work',s:30,n:'凿石头',r:0.15}
        ]},
    wood:{n:'伐木场',i:'🪓',d:'砍伐',time:[8,9,10,11,14,15,16,17],tags:['work'],
        env:{morning:'斧头砍木头...',noon:'木屑纷飞...'},
        enc:[
            {id:'ls',n:'刘三',i:'👮',type:'guard'},
            {id:'tr',n:'大树',i:'🌲',type:'work',s:25,n:'砍大树'},
            {id:'wd',n:'木柴',i:'🪵',type:'work',s:18,n:'搬木柴'}
        ]},
    stable:{n:'马厩',i:'🐴',d:'喂马',time:[8,9,10,11,14,15,16,17,19,20,21],tags:['work'],
        env:{morning:'马匹嘶鸣...',evening:'喂马遛马...'},
        enc:[
            {id:'hm',n:'老马夫',i:'👴',type:'npc'},
            {id:'hs',n:'马匹',i:'🐴',type:'work',s:15,n:'喂马',b:5}
        ]},
    gate:{n:'营门',i:'🚪',d:'禁止',time:[],tags:['locked'],locked:true,enc:[]},
    wall:{n:'围墙',i:'🧱',d:'逃跑',time:[20,21,22,23],tags:['escape'],nightOnly:true,
        env:{night:'月光下，墙根处有黑影...'},
        enc:[
            {id:'pt',n:'巡逻队',i:'👮',type:'patrol'},
            {id:'sp',n:'墙角松动',i:'🔍',type:'observe'}
        ]}
};

const NPCS = {
    oz:{n:'老张',i:'👴',levels:{
        0:{intro:'...新来的？有事？',opts:[
            {q:'这里的情况？',a:'王监工最狠，别惹事。',t:0},
            {q:'先走了',c:true}
        ]},
        2:{intro:'有些事...可以和你说说。',opts:[
            {q:'有逃跑的可能吗？',a:'围墙东北角，夜里巡逻少。',t:1,u:'route'},
            {q:'先走了',c:true}
        ]},
        3:{intro:'兄弟，你是我最靠谱的人...',opts:[
            {q:'逃跑的事细说',a:'围墙东北角，半个时辰才来一趟巡逻。',t:1,u:'route'},
            {q:'先走了',c:true}
        ]}
    }},
    z4:{n:'赵四',i:'👤',levels:{
        0:{intro:'...三年了...',opts:[
            {q:'想逃出去吗？',a:'逃？...逃不掉的...',t:0},
            {q:'先走了',c:true}
        ]},
        2:{intro:'...你是个好人...',opts:[
            {q:'逃跑的路？',a:'东北角...有人试过被抓了...',t:1,u:'route'},
            {q:'先走了',c:true}
        ]},
        3:{intro:'你是来救我的吗？',opts:[
            {q:'告诉我逃跑的事',a:'东北角...戌时换班...最松懈...',t:1,u:'route',u2:'info'},
            {q:'先走了',c:true}
        ]}
    }},
    lw:{n:'李五',i:'👤',levels:{
        0:{intro:'新来的？够呛啊。',opts:[
            {q:'这里的情况？',a:'王监工最狠。',t:0},
            {q:'先走了',c:true}
        ]},
        2:{intro:'兄弟！什么都告诉你！',opts:[
            {q:'逃跑的事？',a:'围墙东北角，巡逻最少！',t:1,u:'route'},
            {q:'王监工弱点？',a:'好赌！戌时溜出去，管得最松。',t:1,u:'info'},
            {q:'先走了',c:true}
        ]}
    }},
    ck:{n:'胖厨子',i:'👨‍🍳',levels:{
        0:{intro:'看什么看！滚远点！',opts:[
            {q:'给点吃的...',a:'做梦！',t:-1},
            {q:'先走了',c:true}
        ]},
        3:{intro:'跟我儿子差不多大...',opts:[
            {q:'给点吃的',a:'（塞给你馒头）别让人看见...',t:2,g:1,g2:1},
            {q:'先走了',c:true}
        ]}
    }},
    hm:{n:'老马夫',i:'👴',levels:{
        2:{intro:'...坐吧，你小子不错。',opts:[
            {q:'逃跑的路？',a:'围墙东北角，有人往那边跑...',t:1,u:'route'},
            {q:'先走了',c:true}
        ]},
        3:{intro:'好孩子...像我的儿子...',opts:[
            {q:'逃跑帮我',a:'东北角...戌时巡逻最少...',t:1,u:'route',u2:'info'},
            {q:'先走了',c:true}
        ]}
    }}
};

// ==================== 状态 ====================
let G={
    h:6,d:1,s:80,f:70,loc:'dorm',trust:{},
    p:{r:false,i:false},inv:[],c:0,
    lock:false,lh:0,
    tk:{m:false,a:false,e:false},
    log:[]
};
let cb=[];

// ==================== 工具 ====================
const $=(id)=>document.getElementById(id);
const TP=h=>{
    if(h>=6&&h<8)return{i:'🌅',t:'清晨',p:'morning'};
    if(h>=8&&h<12)return{i:'🔥',t:'上午',p:'morning'};
    if(h>=12&&h<14)return{i:'🍜',t:'中午',p:'noon'};
    if(h>=14&&h<18)return{i:'🔥',t:'下午',p:'afternoon'};
    if(h>=18&&h<20)return{i:'🌆',t:'傍晚',p:'evening'};
    return{i:'🌙',t:'夜间',p:'night'};
};
const night=()=>G.h>=20||G.h<6;
const canAccess=id=>{
    let l=LOCS[id];
    if(G.lock&&id!=='dorm')return false;
    if(l.locked)return false;
    if(l.nightOnly&&!night())return false;
    if(id==='dorm')return true;
    if(night())return true;
    return l.time.includes(G.h);
};

function showModal(html){
    $('modalContent').innerHTML=html;
    $('modalOverlay').classList.add('active');
}
function closeModal(){$('modalOverlay').classList.remove('active');}
function docb(i,k){k?cb[i]():(closeModal(),setTimeout(()=>cb[i](),100));}

// ==================== 弹窗内容 ====================

// 区域选择
function showAreas(){
    let html='<div class="modal-handle"></div>';
    html+='<div class="modal-title">📍 选择区域</div>';
    html+='<div class="area-grid">';
    Object.entries(LOCS).forEach(([id,l])=>{
        let cur=G.loc===id;
        let acc=canAccess(id);
        let dis=!acc&&!cur;
        let cls='area-btn'+(cur?' current':'')+(dis?' disabled':'');
        let clk=dis?'':`onclick="moveTo('${id}')"`;
        let badge='';
        if(l.locked)badge='禁';
        else if(l.nightOnly&&!night())badge='夜';
        html+=`<div class="${cls}" ${clk}>
            <i>${l.i}</i>
            <span>${l.n}</span>
            ${badge?`<span style="font-size:0.5rem;color:#c97a7a">${badge}</span>`:''}
        </div>`;
    });
    html+='</div>';
    html+='<button class="choice-btn" onclick="closeModal()">关闭</button>';
    showModal(html);
}

// 状态详情
function showStatus(){
    let p=TP(G.h);
    let hasR=G.inv.includes('rope')||G.inv.includes('iron');
    let html='<div class="modal-handle"></div>';
    html+='<div class="modal-title">📊 状态详情</div>';
    html+='<div class="stat-detail">';
    html+=`<div class="stat-row"><span class="stat-label">💪 体力</span><span class="stat-value ${G.s<30?'danger':G.s>70?'good':''}">${G.s}%</span></div>`;
    html+=`<div class="stat-row"><span class="stat-label">🍜 饱食</span><span class="stat-value ${G.f<30?'danger':G.f>70?'good':''}">${G.f}%</span></div>`;
    html+=`<div class="stat-row"><span class="stat-label">📅 天数</span><span class="stat-value">第${G.d}天</span></div>`;
    html+=`<div class="stat-row"><span class="stat-label">⏰ 时间</span><span class="stat-value">${G.h}:00 ${p.t}</span></div>`;
    html+=`<div class="stat-row"><span class="stat-label">⚠️ 被抓</span><span class="stat-value ${G.c>0?'danger':''}">${G.c}次</span></div>`;
    html+=`</div>`;
    
    html+='<div class="modal-title" style="margin-top:15px">📝 逃跑准备</div>';
    html+='<div class="progress-list">';
    html+=`<div class="progress-item ${G.p.r?'done':'pending'}"><span>发现路线</span><span>${G.p.r?'✓':'✗'}</span></div>`;
    html+=`<div class="progress-item ${G.p.i?'done':'pending'}"><span>掌握情报</span><span>${G.p.i?'✓':'✗'}</span></div>`;
    html+=`<div class="progress-item ${hasR?'done':'pending'}"><span>收集工具</span><span>${hasR?'✓':'✗'}</span></div>`;
    html+='</div>';
    
    html+='<div class="modal-title" style="margin-top:15px">📜 最近日志</div>';
    html+='<div class="log-list">';
    G.log.slice(0,8).forEach(l=>{
        html+=`<div class="log-item ${l.ty}">${l.t}</div>`;
    });
    html+='</div>';
    
    html+='<button class="choice-btn" onclick="closeModal()">关闭</button>';
    showModal(html);
}

// NPC对话
function showNPC(id){
    let npc=NPCS[id];
    let lv=G.trust[id]||0;
    let level=lv>=3?3:lv>=2?2:lv>=1?1:0;
    let data=npc.levels[level]||npc.levels[0];
    
    cb=[];
    let choices=data.opts.map((o,i)=>{
        cb.push(()=>{
            if(o.c){closeModal();return;}
            npcReply(id,o);
        });
        return`<button class="choice-btn" onclick="docb(${i},true)">${o.q}</button>`;
    }).join('');
    
    showModal(`
        <div class="modal-handle"></div>
        <div class="modal-title">${npc.i} ${npc.n}</div>
        <div style="background:#1a1510;border-radius:12px;padding:20px;text-align:center;margin-bottom:15px">
            <div style="font-size:3rem">${npc.i}</div>
            <div style="color:#6a5a4a;font-size:0.7rem;margin-top:5px">${['陌生','熟悉','信任','挚友'][level]}</div>
        </div>
        <p style="color:#a8b8c8;text-align:center;margin-bottom:20px">${data.intro}</p>
        <div class="modal-choices">${choices}</div>
    `);
}

function npcReply(id,opt){
    let npc=NPCS[id];
    addLog(`你说：${opt.q}`,'action');
    addLog(`${npc.i}${npc.n}：${opt.a}`,'dialog');
    
    if(opt.t)G.trust[id]=Math.max(0,(G.trust[id]||0)+opt.t);
    if(opt.t>0)addLog(`关系改善 (+${opt.t})`,'important');
    if(opt.t<0)addLog(`关系变差 (${opt.t})`,'danger');
    
    if(opt.u==='route'&&!G.p.r){G.p.r=true;addLog('📝 发现逃跑路线！','important');}
    if(opt.u==='info'&&!G.p.i){G.p.i=true;addLog('📝 掌握巡逻规律！','important');}
    if(opt.u2==='route'&&!G.p.r){G.p.r=true;addLog('📝 发现逃跑路线','important');}
    if(opt.u2==='info'&&!G.p.i){G.p.i=true;addLog('📝 掌握巡逻规律','important');}
    
    if(opt.g&&G.f<100)G.f=Math.min(100,G.f+15);
    if(opt.g2&&G.f<100)G.f=Math.min(100,G.f+10);
    
    showModal(`
        <div class="modal-handle"></div>
        <div class="modal-title">${npc.i} ${npc.n}</div>
        <div style="background:#1a1510;border-radius:12px;padding:15px;margin-bottom:15px">
            <p style="color:#9ab87a">问：${opt.q}</p>
            <p style="color:#a8b8c8;margin-top:10px">答：${opt.a}</p>
        </div>
        <div class="modal-choices">
            <button class="choice-btn" onclick="showNPC('${id}')">继续交谈</button>
            <button class="choice-btn" onclick="closeModal()">先走了</button>
        </div>
    `);
}

// 遭遇交互
function interact(id){
    let loc=LOCS[G.loc];
    let enc=loc.enc.find(e=>e.id===id);
    if(!enc)return;
    
    switch(enc.type){
        case 'npc':showNPC(id);break;
        case 'guard':encounterGuard(enc);break;
        case 'work':doWork(enc);break;
        case 'rest':doRest(enc);break;
        case 'steal':doSteal(enc);break;
        case 'observe':doObserve(enc);break;
        case 'patrol':encounterPatrol(enc);break;
    }
}

// 守卫
function encounterGuard(enc){
    addLog(`${enc.i}${enc.n}打量着你...`,'narrative');
    let d=Math.random();
    if(d<0.3){
        showModal(`<div class="modal-handle"></div><div class="modal-title">${enc.i} ${enc.n}</div><p style="color:#c97a7a">「你鬼鬼祟祟的！」</p><p style="margin-top:10px">监工大怒...</p><div class="modal-choices"><button class="choice-btn danger" onclick="getCaught('被监工发现')">被抓</button></div>`);
    }else if(d<0.6){
        showModal(`<div class="modal-handle"></div><div class="modal-title">${enc.i} ${enc.n}</div><p>「滚去干活！」</p><div class="modal-choices"><button class="choice-btn" onclick="closeModal()">离开</button></div>`);
    }else{
        showModal(`<div class="modal-handle"></div><div class="modal-title">${enc.i} ${enc.n}</div><p>监工瞥了你一眼，没理会。</p><div class="modal-choices"><button class="choice-btn" onclick="closeModal()">离开</button></div>`);
    }
}

// 巡逻
function encounterPatrol(enc){
    addLog(`${enc.i}${enc.n}正在巡逻...`,'narrative');
    if(Math.random()<0.4){
        showModal(`<div class="modal-handle"></div><div class="modal-title">${enc.i} ${enc.n}</div><p style="color:#c97a7a">巡逻队发现你了！「站住！」</p><div class="modal-choices"><button class="choice-btn danger" onclick="getCaught('被巡逻队发现')">被抓</button></div>`);
    }else{
        showModal(`<div class="modal-handle"></div><div class="modal-title">${enc.i} ${enc.n}</div><p>巡逻队走远了...</p><div class="modal-choices"><button class="choice-btn" onclick="closeModal()">松口气</button></div>`);
    }
}

// 劳役
function doWork(enc){
    if(G.lock){addLog('🔒 被关禁闭','danger');return;}
    let cost=enc.s||20;
    if(G.s<cost){addLog('⚠️ 体力不足','danger');return;}
    G.s-=cost;G.f=Math.max(0,G.f-5);
    addLog(`${enc.i}${enc.n||enc.i}: -${cost}体力`,'action');
    if(G.h<12)G.tk.m=true;else if(G.h<18)G.tk.a=true;
    if(enc.r&&Math.random()<enc.r){
        let h=10+Math.floor(Math.random()*15);
        G.s=Math.max(0,G.s-h);
        addLog(`⚠️ 意外！-${h}体力`,'danger');
    }
    if(Math.random()<0.1){
        let f=Math.random()<0.5?'rope':'cloth';
        if(G.inv.length<5&&!G.inv.includes(f)){G.inv.push(f);addLog(`📦发现麻绳`,'important');}
    }
    if(enc.b){G.f=Math.min(100,G.f+enc.b);addLog(`饱食+${enc.b}`,'action');}
    check();advance();
}

// 休息
function doRest(enc){
    if(enc.id==='bed'&&G.loc!=='dorm'){addLog('不方便休息','narrative');return;}
    let g=enc.id==='wl'?10:20;
    G.s=Math.min(100,G.s+g);
    addLog(`${enc.i}休息: +${g}体力`,'action');
    advance();check();
}

// 偷窃
function doSteal(enc){
    if(G.lock){addLog('🔒 被关禁闭','danger');return;}
    addLog(`${enc.i}悄悄靠近...`,'action');
    if(Math.random()<0.4){getCaught('偷食物被当场抓住');return;}
    let g=15+Math.floor(Math.random()*15);
    G.f=Math.min(100,G.f+g);
    addLog(`🍞成功: +${g}饱食`,'important');
    advance();check();
}

// 观察
function doObserve(enc){
    if(G.loc!=='wall'){addLog('没什么好观察','narrative');return;}
    if(!G.p.r){G.p.r=true;addLog('🔍发现逃跑路线！围墙东北角！','important');}
    else{addLog('🔍再次确认逃跑路线','action');}
    if(Math.random()<0.3&&G.inv.length<5&&!G.inv.includes('rope')){G.inv.push('rope');addLog('📦发现麻绳！','important');}
    advance();
}

// 被抓
function getCaught(reason){
    G.c++;G.s=Math.max(0,G.s-20);
    let items=[...G.inv];G.inv=[];
    if(items.length)addLog(`📦物品被没收`,'danger');
    addLog(`⚠️${reason}`,'danger');
    
    let content='';
    if(G.c===1){
        G.f=Math.max(0,G.f-20);
        content=`<p>处罚：-20体力，物品没收</p>`;
    }else if(G.c===2){
        G.lock=true;G.lh=12;
        content=`<p>处罚：关禁闭12小时</p>`;
    }else{
        G.lock=true;G.lh=24;G.p={r:false,i:false};
        content=`<p style="color:#c97a7a">重罚！关禁闭24小时！逃跑准备重置！</p>`;
    }
    content+=`<p>累计被抓：${G.c}/3</p>`;
    showModal(`<div class="modal-handle"></div><div class="modal-title">⚠️ 被抓！</div><p style="color:#c97a7a">${reason}</p>${content}<div class="modal-choices"><button class="choice-btn" onclick="check();update();closeModal()">认错</button></div>`);
}

// 逃跑
function tryEscape(){
    let r=G.p.r,nn=night()&&G.h>=20&&G.h<=23,s=G.s>=40,t=G.h>=20&&G.h<=23;
    if(!r||!nn||!s||!t){addLog('🚫 条件不足','system');return;}
    addLog('🔓 决定今晚逃跑！','important');
    let ch=0.4;
    if(G.p.i)ch+=0.2;
    if(G.inv.includes('rope')||G.inv.includes('iron'))ch+=0.2;
    setTimeout(()=>{
        if(Math.random()<ch){
            G.escaped=true;
            addLog('🎉 成功逃脱！','important');
            showModal(`<div class="modal-title">🎉 成功逃脱！</div><p>你翻过围墙，向着山林狂奔...</p><p style="margin-top:15px;color:#d4af37">【乱世烽火·劳役营篇·完】</p><p style="margin-top:10px">存活${G.d}天</p><div class="modal-choices"><button class="choice-btn" onclick="gameOverWin()">继续</button></div>`);
        }else{
            addLog('⚠️ 被发现了！','danger');
            getCaught('逃跑时被巡逻队抓住');
        }
    },300);
}

// 推进时间
function advance(){
    G.h+=2;
    if(G.h>=24){G.h-=24;newDay();}
    G.f=Math.max(0,G.f-3);
    if(G.f<30){G.s=Math.max(0,G.s-8);addLog('🍜太饿: -8体力','danger');}
    if(G.h===18&&!G.lock)checkRollCall();
    check();update();
}

function checkRollCall(){
    addLog('🌆 傍晚点名...','system');
    if(G.d===1){addLog('✅ 点名通过','action');G.tk.m=G.tk.a=G.tk.e=true;return;}
    let miss=!G.tk.m||!G.tk.a;
    if(miss){
        showModal(`<div class="modal-handle"></div><div class="modal-title">🌆 傍晚点名</div><p style="color:#c97a7a">「你就是那个偷懒的！」</p><div class="modal-choices"><button class="choice-btn danger" onclick="getCaught('点名被发现偷懒')">认错</button></div>`);
    }else{
        G.tk.e=true;
        showModal(`<div class="modal-handle"></div><div class="modal-title">🌆 傍晚点名</div><p>「算你识相，滚吧。」</p><div class="modal-choices"><button class="choice-btn" onclick="update()">离开</button></div>`);
    }
}

function newDay(){
    G.d++;G.f=Math.max(0,G.f-10);
    if(G.lock&&G.lh>0)addLog('🔒 禁闭继续...','narrative');
    else if(G.lock){G.lock=false;G.lh=0;G.c=0;addLog('🔓 禁闭结束！','important');}
    G.tk={m:false,a:false,e:false};
    let r=G.lock?10:25;
    G.s=Math.min(100,G.s+r);
    addLog(`🌅 第${G.d}天: +${r}体力`,'important');
    if(G.d>30)gameOver('time','被押往更远的地方...');
}

function check(){
    if(G.s<=0&&!G.lock){G.s=10;G.lock=true;addLog('⚠️体力耗尽晕倒','danger');addLog('🔒被抬进禁闭室','danger');}
    if(G.f<=0){G.f=5;G.s=Math.max(0,G.s-30);addLog('⚠️严重饥饿！','danger');if(G.s<=0){G.s=10;G.lock=true;addLog('🔒饿晕了','danger');}}
}

function gameOverWin(){
    $('gameOver').classList.add('active');
    $('goIcon').textContent='🎉';
    $('goTitle').textContent='成功逃脱！';
    $('goTitle').style.color='#d4af37';
    $('goSub').textContent=`存活${G.d}天`;
}
function gameOver(type,msg){
    $('gameOver').classList.add('active');
    $('goIcon').textContent='💀';
    $('goTitle').textContent='游戏结束';
    $('goTitle').style.color='#c97a7a';
    $('goSub').textContent=`${msg}（${G.d}天）`;
}

// 禁闭
function waitInCell(){
    G.h+=4;if(G.h>=24)G.h-=24;
    G.lh-=4;G.f=Math.max(0,G.f-5);
    addLog(`⏰禁闭4小时...`,'narrative');
    if(G.lh<=0){G.lock=false;G.lh=0;G.c=0;addLog('🔓禁闭结束！','important');}
    check();update();
}
function restInCell(){
    G.h+=8;if(G.h>=24)G.h-=24;
    G.lh-=8;G.f=Math.max(0,G.f-8);G.s=Math.min(100,G.s+15);
    addLog(`💤禁闭休息8小时: +15体力`,'action');
    if(G.lh<=0){G.lock=false;G.lh=0;G.c=0;addLog('🔓禁闭结束！','important');}
    check();update();
}

// 移动
function moveTo(id){
    if(G.lock&&id!=='dorm'){addLog('🔒被关禁闭','danger');return;}
    if(G.loc===id)return;
    let l=LOCS[id];
    if(l.locked){addLog('🚫无法通行','system');return;}
    if(!canAccess(id)){addLog('⏰现在不能去','system');return;}
    G.loc=id;
    addLog(`📍来到${l.n}`,'action');
    update();closeModal();
}

// 日志
function addLog(text,type='narrative'){
    G.log.unshift({t:text,ty:type});
    if(G.log.length>30)G.log.pop();
}

// ==================== 更新UI ====================
function update(){
    let p=TP(G.h);
    $('timeIcon').textContent=p.i;
    $('timeNum').textContent=G.h.toString().padStart(2,'0')+':00';
    $('timePeriod').textContent=p.t;
    $('dayVal').textContent=G.d;
    
    $('stVal').textContent=G.s;
    $('stStat').className='stat-mini '+(G.s<30?'danger':G.s>70?'good':'');
    $('fdVal').textContent=G.f;
    $('fdStat').className='stat-mini '+(G.f<30?'danger':G.f>70?'good':'');
    
    // 任务
    ['M','A','E'].forEach((k,i)=>{
        let tk=['m','a','e'][i];
        let el=$(`task${k}`);
        let icon=$(`t${k}Icon`);
        let done=G.tk[tk];
        let overdue=G.h>=(i===0?12:i===1?18:24);
        el.className='task-item '+(done?'done':overdue?'':'urgent');
        icon.textContent=done?'☑':'☐';
    });
    
    // 作息条
    document.querySelectorAll('.sch').forEach(el=>{
        let h=parseInt(el.dataset.h);
        el.classList.remove('current','passed');
        if(G.h>=h&&G.h<h+2)el.classList.add('current');
        else if(G.h<h)el.classList.add('passed');
    });
    
    // 当前位置
    let loc=LOCS[G.loc];
    let env=loc.env[p.p]||loc.env.night||'';
    $('curIcon').textContent=loc.i;
    $('curName').textContent=loc.n;
    $('curEnv').textContent=env;
    let tag=$('curTag');
    if(loc.tags.includes('work')){tag.className='location-tag tag-work';tag.textContent='劳役';}
    else if(loc.tags.includes('escape')||loc.tags.includes('steal')){tag.className='location-tag tag-danger';tag.textContent=loc.tags.includes('escape')?'逃跑':'危险';}
    else{tag.className='location-tag tag-rest';tag.textContent='休息';}
    
    // 遭遇
    let typeMap={npc:'交谈',guard:'小心',work:'劳役',rest:'休息',steal:'偷窃',observe:'观察',patrol:'危险'};
    $('encList').innerHTML=loc.enc.map(e=>`
        <div class="enc" onclick="interact('${e.id}')">
            <span class="enc-icon">${e.i}</span>
            <span class="enc-name">${e.n}</span>
            <span class="enc-type">${typeMap[e.type]||'互动'}</span>
        </div>
    `).join('');
    
    // 逃跑按钮
    let rOk=G.p.r,nOk=night()&&G.h>=20&&G.h<=23,sOk=G.s>=40,tOk=G.h>=20&&G.h<=23;
    let ready=rOk&&nOk&&sOk&&tOk;
    let btn=$('escBtn');
    btn.className='btn btn-escape'+(ready?' ready':'');
    btn.textContent=ready?'🔓逃跑':'🔒逃跑';
    btn.disabled=!ready;
    
    // 禁闭
    let lock=$('lockedOverlay');
    if(G.lock){
        lock.classList.add('active');
        $('lockedText').innerHTML=`🔒 ${G.lh>=20?'严重违规':G.c>=2?'多次违规':'违规被抓'}<br>⏰剩余${G.lh}小时`;
    }else{lock.classList.remove('active');}
}

function init(){
    update();
    addLog('🔥乱世烽火·劳役营篇','system');
    addLog('184年，黄巾之乱爆发...','narrative');
    showModal(`
        <div class="modal-title">序章·乱世难民</div>
        <p>184年，黄巾之乱爆发。你被抓到边塞广年屯劳役营。</p>
        <p>每日做牛做马，不知何时是个尽头...</p>
        <p style="margin-top:15px;color:#c9a87a">📋 目标：30天内找到逃跑路线并逃脱！</p>
        <p style="margin-top:10px;color:#8a7a6a">💡 提示：完成劳役，与NPC交谈获取情报</p>
        <p style="margin-top:15px;color:#6a5a4a;font-style:italic">「想办法活下去...」</p>
        <div class="modal-choices"><button class="choice-btn" onclick="closeModal()">开始游戏</button></div>
    `);
}
init();
</script>
</body>
</html>
