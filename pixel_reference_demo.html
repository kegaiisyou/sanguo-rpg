<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素画参考风格 - 披甲武将</title>
<style>
  body { margin:0; background:#1a1612; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#e8e0d0; }
  .wrap { text-align:center; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; border:4px solid #3a2a1a; box-shadow:0 0 40px rgba(0,0,0,.5); background:#f5f2e8; }
  .info { margin-top:16px; font-size:14px; color:#a09080; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="portrait" width="320" height="480"></canvas>
  <div class="info">参考：披甲武将 · 32×48 像素网格 · 10倍缩放</div>
</div>

<script>
(function(){
  var canvas = document.getElementById('portrait');
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  var GW = 32, GH = 48;
  var ps = 10;
  var ox = Math.floor((canvas.width - GW*ps)/2);
  var oy = Math.floor((canvas.height - GH*ps)/2);

  var C = {
    bg: '#f0ebe3',
    helmet: '#222222',
    helmetL: '#4a4a4a',
    helmetD: '#111111',
    plume: '#c82018',
    plumeL: '#e83028',
    plumeD: '#901010',
    skin: '#c89878',
    skinD: '#9a6850',
    beard: '#1a1010',
    armor: '#8b7040',
    armorL: '#b09060',
    armorD: '#5a4020',
    robe: '#a01010',
    robeL: '#c82020',
    robeD: '#600808',
    trim: '#e8e0d0',
    trimD: '#b0a890',
    belt: '#1a1010',
    buckle: '#c8a020',
    sword: '#d0d8e0',
    swordD: '#9098a0',
    hilt: '#a08030',
    hand: '#c89878',
    handD: '#9a6850',
    shoe: '#1a1010'
  };

  function P(x,y,c){ if(x<0||x>=GW||y<0||y>=GH)return; ctx.fillStyle=c; ctx.fillRect(ox+x*ps, oy+y*ps, ps, ps); }
  function B(x,y,w,h,c){ if(x<0||x>=GW||y<0||y>=GH){ var x2=Math.max(0,x), y2=Math.max(0,y), x3=Math.min(GW,x+w), y3=Math.min(GH,y+h); w=x3-x2; h=y3-y2; if(w<=0||h<=0)return; x=x2; y=y2; } ctx.fillStyle=c; ctx.fillRect(ox+x*ps, oy+y*ps, w*ps, h*ps); }

  // 背景
  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ===== 下半身：战袍下摆 + 靴 =====
  // 下摆（红底，中间有护甲片）
  B(9,34,14,10,C.robe);      // 下摆主体
  B(8,36,16,7,C.robe);
  B(7,39,18,4,C.robeD);
  // 中间护甲（裙甲）
  B(13,35,6,9,C.armor);
  B(13,36,6,7,C.armorL);
  B(14,35,4,9,C.armorL);
  B(13,39,6,1,C.armorD);
  B(14,43,4,1,C.armorD);
  // 下摆白边
  B(8,41,2,4,C.trim); B(22,41,2,4,C.trim);
  B(9,43,1,2,C.trimD); B(22,43,1,2,C.trimD);
  // 靴
  B(10,45,5,3,C.shoe); B(19,45,5,3,C.shoe);
  B(10,46,5,1,C.helmetL); B(19,46,5,1,C.helmetL); // 靴甲

  // ===== 躯干：铠甲 + 红袍 =====
  // 内袍
  B(10,22,12,14,C.robe);
  B(9,24,14,10,C.robe);
  B(9,30,14,4,C.robeD);     // 腰下阴影
  // 胸甲（鳞片甲）
  B(10,22,12,9,C.armor);
  B(11,22,10,8,C.armorL);
  B(11,23,10,1,C.armorD); B(11,25,10,1,C.armorD); B(11,27,10,1,C.armorD); B(11,29,10,1,C.armorD);
  // 胸甲中线
  B(15,22,2,9,C.armorD);
  // 护心镜/腰带扣
  B(13,30,6,2,C.buckle);
  B(14,30,4,1,C.armorL);
  // 腰带
  B(9,31,14,2,C.belt);
  B(14,30,4,3,C.buckle);

  // ===== 肩甲 =====
  // 左肩甲
  B(4,21,7,5,C.armor);
  B(4,21,6,4,C.armorL);
  B(3,23,2,3,C.armorD);
  // 右肩甲
  B(21,21,7,5,C.armor);
  B(22,21,6,4,C.armorL);
  B(27,23,2,3,C.armorD);
  // 肩甲铆钉
  P(6,22,C.armorD); P(10,22,C.armorD); P(24,22,C.armorD); P(28,22,C.armorD);

  // ===== 披风/红袍肩部 =====
  B(5,18,6,4,C.robe); B(21,18,6,4,C.robe); // 肩后披风
  B(4,19,2,5,C.robeD); B(26,19,2,5,C.robeD);
  // 白袖口内衬（从肩甲下露出）
  B(6,25,3,3,C.trim); B(23,25,3,3,C.trim);

  // ===== 左臂（自然下垂） =====
  B(6,26,5,10,C.robe);
  B(6,26,2,10,C.robeL);      // 左臂亮部
  B(9,30,2,5,C.robeD);       // 阴影
  B(6,35,5,2,C.trim);        // 袖口
  B(7,36,3,2,C.hand);        // 左手
  B(8,36,2,1,C.handD);

  // ===== 右臂（握剑） =====
  B(21,26,5,10,C.robe);
  B(24,26,2,10,C.robeD);     // 右臂暗部
  B(21,35,5,2,C.trim);       // 袖口
  B(22,36,4,2,C.hand);       // 右手
  B(23,37,2,1,C.handD);

  // ===== 剑 =====
  // 剑身
  B(22,32,2,10,C.sword);     // 剑身（从右手伸出）
  B(22,34,2,8,C.swordD);     // 剑身边缘
  B(23,33,1,8,C.sword);      // 剑高光
  // 剑格
  B(21,30,5,2,C.hilt);
  B(22,30,3,1,C.armorL);
  // 剑柄
  B(23,26,1,4,C.hilt);
  B(23,25,1,1,C.armorL);     // 柄首

  // ===== 颈部 =====
  B(13,20,6,2,C.skin);
  B(13,21,6,1,C.skinD);
  // 颈甲
  B(12,20,8,2,C.armor);
  B(13,20,6,1,C.armorL);

  // ===== 头部 =====
  // 脸
  B(12,10,8,9,C.skin);
  B(12,17,8,2,C.skinD);      // 下巴/下颌阴影
  B(13,11,2,2,C.skinD);      // 左眼窝
  B(17,11,2,2,C.skinD);      // 右眼窝
  // 眼睛
  P(14,12,C.beard); P(17,12,C.beard);
  P(13,11,C.beard); P(18,11,C.beard); // 眉毛
  // 鼻子
  P(15,14,C.skinD); P(16,14,C.skinD); P(15,15,C.skinD);
  // 嘴/胡须
  B(14,16,4,1,C.beard);
  B(13,17,6,2,C.beard);      // 上唇胡
  B(14,18,4,3,C.beard);      // 下巴胡须
  B(12,19,2,3,C.beard);      // 左鬓胡须
  B(18,19,2,3,C.beard);      // 右鬓胡须
  B(13,20,8,1,C.beard);      // 连鬓胡

  // ===== 头盔 =====
  // 头盔主体
  B(11,6,10,8,C.helmet);
  B(12,5,8,8,C.helmetL);     // 亮部
  B(11,9,10,5,C.helmet);
  B(11,12,10,3,C.helmetD);   // 护颊暗部
  // 头盔前檐
  B(10,11,12,1,C.helmetD);
  B(11,10,10,1,C.helmetL);
  // 头盔顶部
  B(12,4,8,2,C.helmet);
  B(13,3,6,2,C.helmetL);
  // 护颊片
  B(10,10,2,6,C.helmetD); B(20,10,2,6,C.helmetD);
  // 铆钉
  P(11,8,C.armorL); P(20,8,C.armorL);

  // ===== 盔缨（红缨） =====
  // 盔顶基座
  B(14,1,4,2,C.helmetD);
  // 红缨根部
  B(15,0,2,2,C.plumeD);
  B(14,-1,4,2,C.plume);
  B(13,-2,6,2,C.plume);
  B(12,-3,8,2,C.plumeL);
  B(14,-4,4,2,C.plumeL);
  B(15,-5,2,1,C.plumeL);
  P(13,-1,C.plumeD); P(18,-1,C.plumeD);

})();
</script>
</body>
</html>
