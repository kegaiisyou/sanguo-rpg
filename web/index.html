<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>乱世烽火 · 文字放置</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; overscroll-behavior: none;
    background: #1a1410; color: #e8dcc0; font-family: "PingFang SC", "Microsoft YaHei", serif; }
  #game { display: flex; flex-direction: column; height: 100dvh; max-width: 560px; margin: 0 auto; }
  #status { display: flex; flex-wrap: wrap; gap: 6px 12px; padding: 10px 12px; background: #2a1f16;
    border-bottom: 1px solid #3d2e20; font-size: 13px; }
  #status span { white-space: nowrap; }
  #log { flex: 1; overflow-y: auto; padding: 12px; line-height: 1.7; font-size: 15px; }
  #log .line { margin: 0 0 6px; }
  #log .prologue { color: #c9a86a; font-style: italic; }
  #log .evt { color: #e0a85a; font-weight: bold; margin-top: 8px; }
  #log .good { color: #7fd17f; }
  #log .sys { color: #9a8f7a; }
  #log .res { color: #d8c89a; }
  #panel { padding: 8px 12px; border-top: 1px solid #3d2e20; display: flex; flex-direction: column; gap: 6px; }
  #actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; border-top: 1px solid #3d2e20; background: #221912; }
  button { flex: 1 1 45%; min-width: 120px; padding: 12px; font-size: 15px; color: #f0e6cf;
    background: #3a2c1e; border: 1px solid #5a4632; border-radius: 8px; cursor: pointer; }
  button:active { background: #4a3a28; }
  button:disabled { opacity: .45; cursor: default; }
  button.choice { flex: 1 1 100%; text-align: left; }
</style>
</head>
<body>
<div id="game">
  <div id="status"></div>
  <div id="log"></div>
  <div id="panel"></div>
  <div id="actions"></div>
</div>
<script src="../shared/config/constants.js"></script>
<script src="../shared/config/balance.js"></script>
<script src="../shared/story/sects.js"></script>
<script src="../shared/story/skills.js"></script>
<script src="../shared/story/events.js"></script>
<script src="../shared/story/dialogues.js"></script>
<script src="../shared/index.js"></script>
<script src="storage.js"></script>
<script src="game.js"></script>
</body>
</html>
