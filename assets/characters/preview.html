<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            color: #eee; 
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        h1 { text-align: center; color: #00d4ff; margin-bottom: 30px; }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .char {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .char p { margin: 10px 0 5px; color: #888; font-size: 12px; }
        img { 
            image-rendering: pixelated; 
            background: #333;
            border-radius: 8px;
        }
        .size-label { font-size: 10px; color: #666; }
    </style>
</head>
<body>
    <h1>角色全身像预览 (不抠图)</h1>
    <div class="grid">
        <div class="char">
            <p>角色 1</p>
            <img src="char_01_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 2</p>
            <img src="char_02_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 3</p>
            <img src="char_03_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 4</p>
            <img src="char_04_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 5</p>
            <img src="char_05_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 6</p>
            <img src="char_06_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 7</p>
            <img src="char_07_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 8</p>
            <img src="char_08_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
        <div class="char">
            <p>角色 9</p>
            <img src="char_09_64.png"><br>
            <span class="size-label">64x64</span>
        </div>
    </div>
</body>
</html>
